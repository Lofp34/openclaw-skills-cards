_dir, args.skill_name, args.skill_path)\n\n    # Determine output paths\n    output_json = args.output or (args.benchmark_dir / \"benchmark.json\")\n    output_md = output_json.with_suffix(\".md\")\n\n    # Write benchmark.json\n    with open(output_json, \"w\") as f:\n        json.dump(benchmark, f, indent=2)\n    print(f\"Generated: {output_json}\")\n\n    # Write benchmark.md\n    markdown = generate_markdown(benchmark)\n    with open(output_md, \"w\") as f:\n        f.write(markdown)\n    print(f\"Generated: {output_md}\")\n\n    # Print summary\n    run_summary = benchmark[\"run_summary\"]\n    configs = [k for k in run_summary if k != \"delta\"]\n    delta = run_summary.get(\"delta\", {})\n\n    print(f\"\\nSummary:\")\n    for config in configs:\n        pr = run_summary[config][\"pass_rate\"][\"mean\"]\n        label = config.replace(\"_\", \" \").title()\n        print(f\"  {label}: {pr*100:.1f}% pass rate\")\n    print(f\"  Delta:         {delta.get('pass_rate', '—')}\")\n\n\nif __name__ == \"__main__\":\n    main()\n", "binary": false, "truncated": false}, {"name": "generate_report.py", "is_md": false, "content": "#!/usr/bin/env python3\n\"\"\"Generate an HTML report from run_loop.py output.\n\nTakes the JSON output from run_loop.py and generates a visual HTML report\nshowing each description attempt with check/x for each test case.\nDistinguishes between train and test queries.\n\"\"\"\n\nimport argparse\nimport html\nimport json\nimport sys\nfrom pathlib import Path\n\n\ndef generate_html(data: dict, auto_refresh: bool = False, skill_name: str = \"\") -> str:\n    \"\"\"Generate HTML report from loop output data. If auto_refresh is True, adds a meta refresh tag.\"\"\"\n    history = data.get(\"history\", [])\n    holdout = data.get(\"holdout\", 0)\n    title_prefix = html.escape(skill_name + \" \\u2014 \") if skill_name else \"\"\n\n    # Get all unique queries from train and test sets, with should_trigger info\n    train_queries: list[dict] = []\n    test_queries: list[dict] = []\n    if history:\n        for r in history[0].get(\"train_results\", history[0].get(\"results\", [])):\n            train_queries.append({\"query\": r[\"query\"], \"should_trigger\": r.get(\"should_trigger\", True)})\n        if history[0].get(\"test_results\"):\n            for r in history[0].get(\"test_results\", []):\n                test_queries.append({\"query\": r[\"query\"], \"should_trigger\": r.get(\"should_trigger\", True)})\n\n    refresh_tag = '    <meta http-equiv=\"refresh\" content=\"5\">\\n' if auto_refresh else \"\"\n\n    html_parts = [\"\"\"<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n\"\"\" + refresh_tag + \"\"\"    <title>\"\"\" + title_prefix + \"\"\"Skill Description Optimization\u003c/title>\n    <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n    <link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n    <link href=\"https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap\" rel=\"stylesheet\">\n    <style>\n        body {\n            font-family: 'Lora', Georgia, serif;\n            max-width: 100%;\n            margin: 0 auto;\n            padding: 20px;\n            background: #faf9f5;\n            color: #141413;\n        }\n        h1 { font-family: 'Poppins', sans-serif; color: #141413; }\n        .explainer {\n            background: white;\n            padding: 15px;\n            border-radius: 6px;\n            margin-bottom: 20px;\n            border: 1px solid #e8e6dc;\n            color: #b0aea5;\n            font-size: 0.875rem;\n            line-height: 1.6;\n        }\n        .summary {\n            background: white;\n            padding: 15px;\n            border-radius: 6px;\n            margin-bottom: 20px;\n            border: 1px solid #e8e6dc;\n        }\n        .summary p { margin: 5px 0; }\n        .best { color: #788c5d; font-weight: bold; }\n        .table-container {\n            overflow-x: auto;\n            width: 100%;\n        }\n        table {\n            border-collapse: collapse;\n            background: white;\n            border: 1px solid #e8e6dc;\n            border-radius: 6px;\n            font-size: 12px;\n            min-width: 100%;\n        }\n        th, td {\n            padding: 8px;\n            text-align: left;\n            border: 1px solid #e8e6dc;\n            white-space: normal;\n            word-wrap: break-word;\n        }\n        th {\n            font-family: 'Poppins', sans-serif;\n            background: #141413;\n            color: #faf9f5;\n            font-weight: 500;\n        }\n        th.test-col {\n            background: #6a9bcc;\n        }\n        th.query-col { min-width: 200px; }\n        td.description {\n            font-family: monospace;\n            font-size: 11px;\n            word-wrap: break-word;\n            max-width: 400px;\n        }\n        td.result {\n            text-align: center;\n            font-size: 16px;\n            min-width: 40px;\n        }\n        td.test-result {\n            background: #f0f6fc;\n        }\n        .pass { color: #788c5d; }\n        .fail { color: #c44; }\n        .rate {\n            font-size: 9px;\n            color: #b0aea5;\n            display: block;\n        }\n        tr:hover { background: #faf9f5; }\n        .score {\n            display: inline-block;\n            padding: 2px 6px;\n            border-radius: 4px;\n            font-weight: bold;\n            font-size: 11px;\n        }\n        .score-good { background: #eef2e8; color: #788c5d; }\n        .score-ok { background: #fef3c7; color: #d97706; }\n        .score-bad { background: #fceaea; color: #c44; }\n        .train-label { color: #b0aea5; font-size: 10px; }\n        .test-label { color: #6a9bcc; font-size: 10px; font-weight: bold; }\n        .best-row { background: #f5f8f2; }\n        th.positive-col { border-bottom: 3px solid #788c5d; }\n        th.negative-col { border-bottom: 3px solid #c44; }\n        th.test-col.positive-col { border-bottom: 3px solid #788c5d; }\n        th.test-col.negative-col { border-bottom: 3px solid #c44; }\n        .legend { font-family: 'Poppins', sans-serif; display: flex; gap: 20px; margin-bottom: 10px; font-size: 13px; align-items: center; }\n        .legend-item { display: flex; align-items: center; gap: 6px; }\n        .legend-swatch { width: 16px; height: 16px; border-radius: 3px; display: inline-block; }\n        .swatch-positive { background: #141413; border-bottom: 3px solid #788c5d; }\n        .swatch-negative { background: #141413; border-bottom: 3px solid #c44; }\n        .swatch-test { background: #6a9bcc; }\n        .swatch-train { background: #141413; }\n    \u003c/style>\n\u003c/head>\n<body>\n    <h1>\"\"\" + title_prefix + \"\"\"Skill Description Optimization\u003c/h1>\n    <div class=\"explainer\">\n        <strong>Optimizing your skill's description.\u003c/strong> This page updates automatically as Claude tests different versions of your skill's description. Each row is an iteration — a new description attempt. The columns show test queries: green checkmarks mean the skill triggered correctly (or correctly didn't trigger), red crosses mean it got it wrong. The \"Train\" score shows performance on queries used to improve the description; the \"Test\" score shows performance on held-out queries the optimizer hasn't seen. When it's done, Claude will apply the best-performing description to your skill.\n    \u003c/div>\n\"\"\"]\n\n    # Summary section\n    best_test_score = data.get('best_test_score')\n    best_train_score = data.get('best_train_score')\n    html_parts.append(f\"\"\"\n    <div class=\"summary\">\n        <p><strong>Original:\u003c/strong> {html.escape(data.get('original_description', 'N/A'))}\u003c/p>\n        <p class=\"best\"><strong>Best:\u003c/strong> {html.escape(data.get('best_description', 'N/A'))}\u003c/p>\n        <p><strong>Best Score:\u003c/strong> {data.get('best_score', 'N/A')} {'(test)' if best_test_score else '(train)'}\u003c/p>\n        <p><strong>Iterations:\u003c/strong> {data.get('iterations_run', 0)} | <strong>Train:\u003c/strong> {data.get('train_size', '?')} | <strong>Test:\u003c/strong> {data.get('test_size', '?')}\u003c/p>\n    \u003c/div>\n\"\"\")\n\n    # Legend\n    html_parts.append(\"\"\"\n    <div class=\"legend\">\n        <span style=\"font-weight:600\">Query columns:\u003c/span>\n        <span class=\"legend-item\"><span class=\"legend-swatch swatch-positive\">\u003c/span> Should trigger\u003c/span>\n        <span class=\"legend-item\"><span class=\"legend-swatch swatch-negative\">\u003c/span> Should NOT trigger\u003c/span>\n        <span class=\"legend-item\"><span class=\"legend-swatch swatch-train\">\u003c/span> Train\u003c/span>\n        <span class=\"legend-item\"><span class=\"legend-swatch swatch-test\">\u003c/span> Test\u003c/span>\n    \u003c/div>\n\"\"\")\n\n    # Table header\n    html_parts.append(\"\"\"\n    <div class=\"table-container\">\n    <table>\n        <thead>\n            <tr>\n                <th>Iter\u003c/th>\n                <th>Train\u003c/th>\n                <th>Test\u003c/th>\n                <th class=\"query-col\">Description\u003c/th>\n\"\"\")\n\n    # Add column headers for train queries\n    for qinfo in train_queries:\n        polarity = \"positive-col\" if qinfo[\"should_trigger\"] else \"negative-col\"\n        html_parts.append(f'                <th class=\"{polarity}\">{html.escape(qinfo[\"query\"])}\u003c/th>\\n')\n\n    # Add column headers for test queries (different color)\n    for qinfo in test_queries:\n        polarity = \"positive-col\" if qinfo[\"should_trigger\"] else \"negative-col\"\n        html_parts.append(f'                <th class=\"test-col {polarity}\">{html.escape(qinfo[\"query\"])}\u003c/th>\\n')\n\n    html_parts.append(\"\"\"            \u003c/tr>\n        \u003c/thead>\n        <tbody>\n\"\"\")\n\n    # Find best iteration for highlighting\n    if test_queries:\n        best_iter = max(history, key=lambda h: h.get(\"test_passed\") or 0).get(\"iteration\")\n    else:\n        best_iter = max(history, key=lambda h: h.get(\"train_passed\", h.get(\"passed\", 0))).get(\"iteration\")\n\n    # Add rows for each iteration\n    for h in history:\n        iteration = h.get(\"iteration\", \"?\")\n        train_passed = h.get(\"train_passed\", h.get(\"passed\", 0))\n        train_total = h.get(\"train_total\", h.get(\"total\", 0))\n        test_passed = h.get(\"test_passed\")\n        test_total = h.get(\"test_total\")\n        description = h.get(\"description\", \"\")\n        train_results = h.get(\"train_results\", h.get(\"results\", []))\n        test_results = h.get(\"test_results\", [])\n\n        # Create lookups for results by query\n        train_by_query = {r[\"query\"]: r for r in train_results}\n        test_by_query = {r[\"query\"]: r for r in test_results} if test_results else {}\n\n        # Compute aggregate correct/total runs across all retries\n        def aggregate_runs(results: list[dict]) -> tuple[int, int]:\n            correct = 0\n            total = 0\n            for r in results:\n                runs = r.get(\"runs\", 0)\n                triggers = r.get(\"triggers\", 0)\n                total += runs\n                if r.get(\"should_trigger\", True):\n                    correct += triggers\n                else:\n                    correct += runs - triggers\n            return correct, total\n\n        train_correct, train_runs = aggregate_runs(train_results)\n        test_correct, test_runs = aggregate_runs(test_results)\n\n        # Determine score classes\n        def score_class(correct: int, total: int) -> str:\n            if total > 0:\n                ratio = correct / total\n                if ratio >= 0.8:\n                    return \"score-good\"\n                elif ratio >= 0.5:\n                    return \"score-ok\"\n            return \"score-bad\"\n\n        train_class = score_class(train_correct, train_runs)\n        test_class = score_class(test_correct, test_runs)\n\n        row_class = \"best-row\" if iteration == best_iter else \"\"\n\n        html_parts.append(f\"\"\"            <tr class=\"{row_class}\">\n                <td>{iteration}\u003c/td>\n                <td><span class=\"score {train_class}\">{train_correct}/{train_runs}\u003c/span>\u003c/td>\n                <td><span class=\"score {test_class}\">{test_correct}/{test_runs}\u003c/span>\u003c/td>\n                <td class=\"description\">{html.escape(description)}\u003c/td>\n\"\"\")\n\n        # Add result for each train query\n        for qinfo in train_queries:\n            r = train_by_query.get(qinfo[\"query\"], {})\n            did_pass = r.get(\"pass\", False)\n            triggers = r.get(\"triggers\", 0)\n            runs = r.get(\"runs\", 0)\n\n            icon = \"✓\" if did_pass else \"✗\"\n            css_class = \"pass\" if did_pass else \"fail\"\n\n            html_parts.append(f'                <td class=\"result {css_class}\">{icon}<span class=\"rate\">{triggers}/{runs}\u003c/span>\u003c/td>\\n')\n\n        # Add result for each test query (with different background)\n        for qinfo in test_queries:\n            r = test_by_query.get(qinfo[\"query\"], {})\n            did_pass = r.get(\"pass\", False)\n            triggers = r.get(\"triggers\", 0)\n            runs = r.get(\"runs\", 0)\n\n            icon = \"✓\" if did_pass else \"✗\"\n            css_class = \"pass\" if did_pass else \"fail\"\n\n            html_parts.append(f'                <td class=\"result test-result {css_class}\">{icon}<span class=\"rate\">{triggers}/{runs}\u003c/span>\u003c/td>\\n')\n\n        html_parts.append(\"            \u003c/tr>\\n\")\n\n    html_parts.append(\"\"\"        \u003c/tbody>\n    \u003c/table>\n    \u003c/div>\n\"\"\")\n\n    html_parts.append(\"\"\"\n\u003c/body>\n\u003c/html>\n\"\"\")\n\n    return \"\".join(html_parts)\n\n\ndef main():\n    parser = argparse.ArgumentParser(description=\"Generate HTML report from run_loop output\")\n    parser.add_argument(\"input\", help=\"Path to JSON output from run_loop.py (or - for stdin)\")\n    parser.add_argument(\"-o\", \"--output\", default=None, help=\"Output HTML file (default: stdout)\")\n    parser.add_argument(\"--skill-name\", default=\"\", help=\"Skill name to include in the report title\")\n    args = parser.parse_args()\n\n    if args.input == \"-\":\n        data = json.load(sys.stdin)\n    else:\n        data = json.loads(Path(args.input).read_text())\n\n    html_output = generate_html(data, skill_name=args.skill_name)\n\n    if args.output:\n        Path(args.output).write_text(html_output)\n        print(f\"Report written to {args.output}\", file=sys.stderr)\n    else:\n        print(html_output)\n\n\nif __name__ == \"__main__\":\n    main()\n", "binary": false, "truncated": false}, {"name": "improve_description.py", "is_md": false, "content": "#!/usr/bin/env python3\n\"\"\"Improve a skill description based on eval results.\n\nTakes eval results (from run_eval.py) and generates an improved description\nby calling `claude -p` as a subprocess (same auth pattern as run_eval.py —\nuses the session's Claude Code auth, no separate ANTHROPIC_API_KEY needed).\n\"\"\"\n\nimport argparse\nimport json\nimport os\nimport re\nimport subprocess\nimport sys\nfrom pathlib import Path\n\nfrom scripts.utils import parse_skill_md\n\n\ndef _call_claude(prompt: str, model: str | None, timeout: int = 300) -> str:\n    \"\"\"Run `claude -p` with the prompt on stdin and return the text response.\n\n    Prompt goes over stdin (not argv) because it embeds the full SKILL.md\n    body and can easily exceed comfortable argv length.\n    \"\"\"\n    cmd = [\"claude\", \"-p\", \"--output-format\", \"text\"]\n    if model:\n        cmd.extend([\"--model\", model])\n\n    # Remove CLAUDECODE env var to allow nesting claude -p inside a\n    # Claude Code session. The guard is for interactive terminal conflicts;\n    # programmatic subprocess usage is safe. Same pattern as run_eval.py.\n    env = {k: v for k, v in os.environ.items() if k != \"CLAUDECODE\"}\n\n    result = subprocess.run(\n        cmd,\n        input=prompt,\n        capture_output=True,\n        text=True,\n        env=env,\n        timeout=timeout,\n    )\n    if result.returncode != 0:\n        raise RuntimeError(\n            f\"claude -p exited {result.returncode}\\nstderr: {result.stderr}\"\n        )\n    return result.stdout\n\n\ndef improve_description(\n    skill_name: str,\n    skill_content: str,\n    current_description: str,\n    eval_results: dict,\n    history: list[dict],\n    model: str,\n    test_results: dict | None = None,\n    log_dir: Path | None = None,\n    iteration: int | None = None,\n) -> str:\n    \"\"\"Call Claude to improve the description based on eval results.\"\"\"\n    failed_triggers = [\n        r for r in eval_results[\"results\"]\n        if r[\"should_trigger\"] and not r[\"pass\"]\n    ]\n    false_triggers = [\n        r for r in eval_results[\"results\"]\n        if not r[\"should_trigger\"] and not r[\"pass\"]\n    ]\n\n    # Build scores summary\n    train_score = f\"{eval_results['summary']['passed']}/{eval_results['summary']['total']}\"\n    if test_results:\n        test_score = f\"{test_results['summary']['passed']}/{test_results['summary']['total']}\"\n        scores_summary = f\"Train: {train_score}, Test: {test_score}\"\n    else:\n        scores_summary = f\"Train: {train_score}\"\n\n    prompt = f\"\"\"You are optimizing a skill description for a Claude Code skill called \"{skill_name}\". A \"skill\" is sort of like a prompt, but with progressive disclosure -- there's a title and description that Claude sees when deciding whether to use the skill, and then if it does use the skill, it reads the .md file which has lots more details and potentially links to other resources in the skill folder like helper files and scripts and additional documentation or examples.\n\nThe description appears in Claude's \"available_skills\" list. When a user sends a query, Claude decides whether to invoke the skill based solely on the title and on this description. Your goal is to write a description that triggers for relevant queries, and doesn't trigger for irrelevant ones.\n\nHere's the current description:\n<current_description>\n\"{current_description}\"\n\u003c/current_description>\n\nCurrent scores ({scores_summary}):\n<scores_summary>\n\"\"\"\n    if failed_triggers:\n        prompt += \"FAILED TO TRIGGER (should have triggered but didn't):\\n\"\n        for r in failed_triggers:\n            prompt += f'  - \"{r[\"query\"]}\" (triggered {r[\"triggers\"]}/{r[\"runs\"]} times)\\n'\n        prompt += \"\\n\"\n\n    if false_triggers:\n        prompt += \"FALSE TRIGGERS (triggered but shouldn't have):\\n\"\n        for r in false_triggers:\n            prompt += f'  - \"{r[\"query\"]}\" (triggered {r[\"triggers\"]}/{r[\"runs\"]} times)\\n'\n        prompt += \"\\n\"\n\n    if history:\n        prompt += \"PREVIOUS ATTEMPTS (do NOT repeat these — try something structurally different):\\n\\n\"\n        for h in history:\n            train_s = f\"{h.get('train_passed', h.get('passed', 0))}/{h.get('train_total', h.get('total', 0))}\"\n            test_s = f\"{h.get('test_passed', '?')}/{h.get('test_total', '?')}\" if h.get('test_passed') is not None else None\n            score_str = f\"train={train_s}\" + (f\", test={test_s}\" if test_s else \"\")\n            prompt += f'<attempt {score_str}>\\n'\n            prompt += f'Description: \"{h[\"description\"]}\"\\n'\n            if \"results\" in h:\n                prompt += \"Train results:\\n\"\n                for r in h[\"results\"]:\n                    status = \"PASS\" if r[\"pass\"] else \"FAIL\"\n                    prompt += f'  [{status}] \"{r[\"query\"][:80]}\" (triggered {r[\"triggers\"]}/{r[\"runs\"]})\\n'\n            if h.get(\"note\"):\n                prompt += f'Note: {h[\"note\"]}\\n'\n            prompt += \"\u003c/attempt>\\n\\n\"\n\n    prompt += f\"\"\"\u003c/scores_summary>\n\nSkill content (for context on what the skill does):\n<skill_content>\n{skill_content}\n\u003c/skill_content>\n\nBased on the failures, write a new and improved description that is more likely to trigger correctly. When I say \"based on the failures\", it's a bit of a tricky line to walk because we don't want to overfit to the specific cases you're seeing. So what I DON'T want you to do is produce an ever-expanding list of specific queries that this skill should or shouldn't trigger for. Instead, try to generalize from the failures to broader categories of user intent and situations where this skill would be useful or not useful. The reason for this is twofold:\n\n1. Avoid overfitting\n2. The list might get loooong and it's injected into ALL queries and there might be a lot of skills, so we don't want to blow too much space on any given description.\n\nConcretely, your description should not be more than about 100-200 words, even if that comes at the cost of accuracy. There is a hard limit of 1024 characters — descriptions over that will be truncated, so stay comfortably under it.\n\nHere are some tips that we've found to work well in writing these descriptions:\n- The skill should be phrased in the imperative -- \"Use this skill for\" rather than \"this skill does\"\n- The skill description should focus on the user's intent, what they are trying to achieve, vs. the implementation details of how the skill works.\n- The description competes with other skills for Claude's attention — make it distinctive and immediately recognizable.\n- If you're getting lots of failures after repeated attempts, change things up. Try different sentence structures or wordings.\n\nI'd encourage you to be creative and mix up the style in different iterations since you'll have multiple opportunities to try different approaches and we'll just grab the highest-scoring one at the end. \n\nPlease respond with only the new description text in <new_description> tags, nothing else.\"\"\"\n\n    text = _call_claude(prompt, model)\n\n    match = re.search(r\"<new_description>(.*?)\u003c/new_description>\", text, re.DOTALL)\n    description = match.group(1).strip().strip('\"') if match else text.strip().strip('\"')\n\n    transcript: dict = {\n        \"iteration\": iteration,\n        \"prompt\": prompt,\n        \"response\": text,\n        \"parsed_description\": description,\n        \"char_count\": len(description),\n        \"over_limit\": len(description) > 1024,\n    }\n\n    # Safety net: the prompt already states the 1024-char hard limit, but if\n    # the model blew past it anyway, make one fresh single-turn call that\n    # quotes the too-long version and asks for a shorter rewrite. (The old\n    # SDK path did this as a true multi-turn; `claude -p` is one-shot, so we\n    # inline the prior output into the new prompt instead.)\n    if len(description) > 1024:\n        shorten_prompt = (\n            f\"{prompt}\\n\\n\"\n            f\"---\\n\\n\"\n            f\"A previous attempt produced this description, which at \"\n            f\"{len(description)} characters is over the 1024-character hard limit:\\n\\n\"\n            f'\"{description}\"\\n\\n'\n            f\"Rewrite it to be under 1024 characters while keeping the most \"\n            f\"important trigger words and intent coverage. Respond with only \"\n            f\"the new description in <new_description> tags.\"\n        )\n        shorten_text = _call_claude(shorten_prompt, model)\n        match = re.search(r\"<new_description>(.*?)\u003c/new_description>\", shorten_text, re.DOTALL)\n        shortened = match.group(1).strip().strip('\"') if match else shorten_text.strip().strip('\"')\n\n        transcript[\"rewrite_prompt\"] = shorten_prompt\n        transcript[\"rewrite_response\"] = shorten_text\n        transcript[\"rewrite_description\"] = shortened\n        transcript[\"rewrite_char_count\"] = len(shortened)\n        description = shortened\n\n    transcript[\"final_description\"] = description\n\n    if log_dir:\n        log_dir.mkdir(parents=True, exist_ok=True)\n        log_file = log_dir / f\"improve_iter_{iteration or 'unknown'}.json\"\n        log_file.write_text(json.dumps(transcript, indent=2))\n\n    return description\n\n\ndef main():\n    parser = argparse.ArgumentParser(description=\"Improve a skill description based on eval results\")\n    parser.add_argument(\"--eval-results\", required=True, help=\"Path to eval results JSON (from run_eval.py)\")\n    parser.add_argument(\"--skill-path\", required=True, help=\"Path to skill directory\")\n    parser.add_argument(\"--history\", default=None, help=\"Path to history JSON (previous attempts)\")\n    parser.add_argument(\"--model\", required=True, help=\"Model for improvement\")\n    parser.add_argument(\"--verbose\", action=\"store_true\", help=\"Print thinking to stderr\")\n    args = parser.parse_args()\n\n    skill_path = Path(args.skill_path)\n    if not (skill_path / \"SKILL.md\").exists():\n        print(f\"Error: No SKILL.md found at {skill_path}\", file=sys.stderr)\n        sys.exit(1)\n\n    eval_results = json.loads(Path(args.eval_results).read_text())\n    history = []\n    if args.history:\n        history = json.loads(Path(args.history).read_text())\n\n    name, _, content = parse_skill_md(skill_path)\n    current_description = eval_results[\"description\"]\n\n    if args.verbose:\n        print(f\"Current: {current_description}\", file=sys.stderr)\n        print(f\"Score: {eval_results['summary']['passed']}/{eval_results['summary']['total']}\", file=sys.stderr)\n\n    new_description = improve_description(\n        skill_name=name,\n        skill_content=content,\n        current_description=current_description,\n        eval_results=eval_results,\n        history=history,\n        model=args.model,\n    )\n\n    if args.verbose:\n        print(f\"Improved: {new_description}\", file=sys.stderr)\n\n    # Output as JSON with both the new description and updated history\n    output = {\n        \"description\": new_description,\n        \"history\": history + [{\n            \"description\": current_description,\n            \"passed\": eval_results[\"summary\"][\"passed\"],\n            \"failed\": eval_results[\"summary\"][\"failed\"],\n            \"total\": eval_results[\"summary\"][\"total\"],\n            \"results\": eval_results[\"results\"],\n        }],\n    }\n    print(json.dumps(output, indent=2))\n\n\nif __name__ == \"__main__\":\n    main()\n", "binary": false, "truncated": false}, {"name": "package_skill.py", "is_md": false, "content": "#!/usr/bin/env python3\n\"\"\"\nSkill Packager - Creates a distributable .skill file of a skill folder\n\nUsage:\n    python utils/package_skill.py <path/to/skill-folder> [output-directory]\n\nExample:\n    python utils/package_skill.py skills/public/my-skill\n    python utils/package_skill.py skills/public/my-skill ./dist\n\"\"\"\n\nimport fnmatch\nimport sys\nimport zipfile\nfrom pathlib import Path\nfrom scripts.quick_validate import validate_skill\n\n# Patterns to exclude when packaging skills.\nEXCLUDE_DIRS = {\"__pycache__\", \"node_modules\"}\nEXCLUDE_GLOBS = {\"*.pyc\"}\nEXCLUDE_FILES = {\".DS_Store\"}\n# Directories excluded only at the skill root (not when nested deeper).\nROOT_EXCLUDE_DIRS = {\"evals\"}\n\n\ndef should_exclude(rel_path: Path) -> bool:\n    \"\"\"Check if a path should be excluded from packaging.\"\"\"\n    parts = rel_path.parts\n    if any(part in EXCLUDE_DIRS for part in parts):\n        return True\n    # rel_path is relative to skill_path.parent, so parts[0] is the skill\n    # folder name and parts[1] (if present) is the first subdir.\n    if len(parts) > 1 and parts[1] in ROOT_EXCLUDE_DIRS:\n        return True\n    name = rel_path.name\n    if name in EXCLUDE_FILES:\n        return True\n    return any(fnmatch.fnmatch(name, pat) for pat in EXCLUDE_GLOBS)\n\n\ndef package_skill(skill_path, output_dir=None):\n    \"\"\"\n    Package a skill folder into a .skill file.\n\n    Args:\n        skill_path: Path to the skill folder\n        output_dir: Optional output directory for the .skill file (defaults to current directory)\n\n    Returns:\n        Path to the created .skill file, or None if error\n    \"\"\"\n    skill_path = Path(skill_path).resolve()\n\n    # Validate skill folder exists\n    if not skill_path.exists():\n        print(f\"❌ Error: Skill folder not found: {skill_path}\")\n        return None\n\n    if not skill_path.is_dir():\n        print(f\"❌ Error: Path is not a directory: {skill_path}\")\n        return None\n\n    # Validate SKILL.md exists\n    skill_md = skill_path / \"SKILL.md\"\n    if not skill_md.exists():\n        print(f\"❌ Error: SKILL.md not found in {skill_path}\")\n        return None\n\n    # Run validation before packaging\n    print(\"🔍 Validating skill...\")\n    valid, message = validate_skill(skill_path)\n    if not valid:\n        print(f\"❌ Validation failed: {message}\")\n        print(\"   Please fix the validation errors before packaging.\")\n        return None\n    print(f\"✅ {message}\\n\")\n\n    # Determine output location\n    skill_name = skill_path.name\n    if output_dir:\n        output_path = Path(output_dir).resolve()\n        output_path.mkdir(parents=True, exist_ok=True)\n    else:\n        output_path = Path.cwd()\n\n    skill_filename = output_path / f\"{skill_name}.skill\"\n\n    # Create the .skill file (zip format)\n    try:\n        with zipfile.ZipFile(skill_filename, 'w', zipfile.ZIP_DEFLATED) as zipf:\n            # Walk through the skill directory, excluding build artifacts\n            for file_path in skill_path.rglob('*'):\n                if not file_path.is_file():\n                    continue\n                arcname = file_path.relative_to(skill_path.parent)\n                if should_exclude(arcname):\n                    print(f\"  Skipped: {arcname}\")\n                    continue\n                zipf.write(file_path, arcname)\n                print(f\"  Added: {arcname}\")\n\n        print(f\"\\n✅ Successfully packaged skill to: {skill_filename}\")\n        return skill_filename\n\n    except Exception as e:\n        print(f\"❌ Error creating .skill file: {e}\")\n        return None\n\n\ndef main():\n    if len(sys.argv) < 2:\n        print(\"Usage: python utils/package_skill.py <path/to/skill-folder> [output-directory]\")\n        print(\"\\nExample:\")\n        print(\"  python utils/package_skill.py skills/public/my-skill\")\n        print(\"  python utils/package_skill.py skills/public/my-skill ./dist\")\n        sys.exit(1)\n\n    skill_path = sys.argv[1]\n    output_dir = sys.argv[2] if len(sys.argv) > 2 else None\n\n    print(f\"📦 Packaging skill: {skill_path}\")\n    if output_dir:\n        print(f\"   Output directory: {output_dir}\")\n    print()\n\n    result = package_skill(skill_path, output_dir)\n\n    if result:\n        sys.exit(0)\n    else:\n        sys.exit(1)\n\n\nif __name__ == \"__main__\":\n    main()\n", "binary": false, "truncated": false}, {"name": "quick_validate.py", "is_md": false, "content": "#!/usr/bin/env python3\n\"\"\"\nQuick validation script for skills - minimal version\n\"\"\"\n\nimport sys\nimport os\nimport re\nimport yaml\nfrom pathlib import Path\n\ndef validate_skill(skill_path):\n    \"\"\"Basic validation of a skill\"\"\"\n    skill_path = Path(skill_path)\n\n    # Check SKILL.md exists\n    skill_md = skill_path / 'SKILL.md'\n    if not skill_md.exists():\n        return False, \"SKILL.md not found\"\n\n    # Read and validate frontmatter\n    content = skill_md.read_text()\n    if not content.startswith('---'):\n        return False, \"No YAML frontmatter found\"\n\n    # Extract frontmatter\n    match = re.match(r'^---\\n(.*?)\\n---', content, re.DOTALL)\n    if not match:\n        return False, \"Invalid frontmatter format\"\n\n    frontmatter_text = match.group(1)\n\n    # Parse YAML frontmatter\n    try:\n        frontmatter = yaml.safe_load(frontmatter_text)\n        if not isinstance(frontmatter, dict):\n            return False, \"Frontmatter must be a YAML dictionary\"\n    except yaml.YAMLError as e:\n        return False, f\"Invalid YAML in frontmatter: {e}\"\n\n    # Define allowed properties\n    ALLOWED_PROPERTIES = {'name', 'description', 'license', 'allowed-tools', 'metadata', 'compatibility'}\n\n    # Check for unexpected properties (excluding nested keys under metadata)\n    unexpected_keys = set(frontmatter.keys()) - ALLOWED_PROPERTIES\n    if unexpected_keys:\n        return False, (\n            f\"Unexpected key(s) in SKILL.md frontmatter: {', '.join(sorted(unexpected_keys))}. \"\n            f\"Allowed properties are: {', '.join(sorted(ALLOWED_PROPERTIES))}\"\n        )\n\n    # Check required fields\n    if 'name' not in frontmatter:\n        return False, \"Missing 'name' in frontmatter\"\n    if 'description' not in frontmatter:\n        return False, \"Missing 'description' in frontmatter\"\n\n    # Extract name for validation\n    name = frontmatter.get('name', '')\n    if not isinstance(name, str):\n        return False, f\"Name must be a string, got {type(name).__name__}\"\n    name = name.strip()\n    if name:\n        # Check naming convention (kebab-case: lowercase with hyphens)\n        if not re.match(r'^[a-z0-9-]+$', name):\n            return False, f\"Name '{name}' should be kebab-case (lowercase letters, digits, and hyphens only)\"\n        if name.startswith('-') or name.endswith('-') or '--' in name:\n            return False, f\"Name '{name}' cannot start/end with hyphen or contain consecutive hyphens\"\n        # Check name length (max 64 characters per spec)\n        if len(name) > 64:\n            return False, f\"Name is too long ({len(name)} characters). Maximum is 64 characters.\"\n\n    # Extract and validate description\n    description = frontmatter.get('description', '')\n    if not isinstance(description, str):\n        return False, f\"Description must be a string, got {type(description).__name__}\"\n    description = description.strip()\n    if description:\n        # Check for angle brackets\n        if '<' in description or '>' in description:\n            return False, \"Description cannot contain angle brackets (< or >)\"\n        # Check description length (max 1024 characters per spec)\n        if len(description) > 1024:\n            return False, f\"Description is too long ({len(description)} characters). Maximum is 1024 characters.\"\n\n    # Validate compatibility field if present (optional)\n    compatibility = frontmatter.get('compatibility', '')\n    if compatibility:\n        if not isinstance(compatibility, str):\n            return False, f\"Compatibility must be a string, got {type(compatibility).__name__}\"\n        if len(compatibility) > 500:\n            return False, f\"Compatibility is too long ({len(compatibility)} characters). Maximum is 500 characters.\"\n\n    return True, \"Skill is valid!\"\n\nif __name__ == \"__main__\":\n    if len(sys.argv) != 2:\n        print(\"Usage: python quick_validate.py <skill_directory>\")\n        sys.exit(1)\n    \n    valid, message = validate_skill(sys.argv[1])\n    print(message)\n    sys.exit(0 if valid else 1)", "binary": false, "truncated": false}, {"name": "run_eval.py", "is_md": false, "content": "#!/usr/bin/env python3\n\"\"\"Run trigger evaluation for a skill description.\n\nTests whether a skill's description causes Claude to trigger (read the skill)\nfor a set of queries. Outputs results as JSON.\n\"\"\"\n\nimport argparse\nimport json\nimport os\nimport select\nimport subprocess\nimport sys\nimport time\nimport uuid\nfrom concurrent.futures import ProcessPoolExecutor, as_completed\nfrom pathlib import Path\n\nfrom scripts.utils import parse_skill_md\n\n\ndef find_project_root() -> Path:\n    \"\"\"Find the project root by walking up from cwd looking for .claude/.\n\n    Mimics how Claude Code discovers its project root, so the command file\n    we create ends up where claude -p will look for it.\n    \"\"\"\n    current = Path.cwd()\n    for parent in [current, *current.parents]:\n        if (parent / \".claude\").is_dir():\n            return parent\n    return current\n\n\ndef run_single_query(\n    query: str,\n    skill_name: str,\n    skill_description: str,\n    timeout: int,\n    project_root: str,\n    model: str | None = None,\n) -> bool:\n    \"\"\"Run a single query and return whether the skill was triggered.\n\n    Creates a command file in .claude/commands/ so it appears in Claude's\n    available_skills list, then runs `claude -p` with the raw query.\n    Uses --include-partial-messages to detect triggering early from\n    stream events (content_block_start) rather than waiting for the\n    full assistant message, which only arrives after tool execution.\n    \"\"\"\n    unique_id = uuid.uuid4().hex[:8]\n    clean_name = f\"{skill_name}-skill-{unique_id}\"\n    project_commands_dir = Path(project_root) / \".claude\" / \"commands\"\n    command_file = project_commands_dir / f\"{clean_name}.md\"\n\n    try:\n        project_commands_dir.mkdir(parents=True, exist_ok=True)\n        # Use YAML block scalar to avoid breaking on quotes in description\n        indented_desc = \"\\n  \".join(skill_description.split(\"\\n\"))\n        command_content = (\n            f\"---\\n\"\n            f\"description: |\\n\"\n            f\"  {indented_desc}\\n\"\n            f\"---\\n\\n\"\n            f\"# {skill_name}\\n\\n\"\n            f\"This skill handles: {skill_description}\\n\"\n        )\n        command_file.write_text(command_content)\n\n        cmd = [\n            \"claude\",\n            \"-p\", query,\n            \"--output-format\", \"stream-json\",\n            \"--verbose\",\n            \"--include-partial-messages\",\n        ]\n        if model:\n            cmd.extend([\"--model\", model])\n\n        # Remove CLAUDECODE env var to allow nesting claude -p inside a\n        # Claude Code session. The guard is for interactive terminal conflicts;\n        # programmatic subprocess usage is safe.\n        env = {k: v for k, v in os.environ.items() if k != \"CLAUDECODE\"}\n\n        process = subprocess.Popen(\n            cmd,\n            stdout=subprocess.PIPE,\n            stderr=subprocess.DEVNULL,\n            cwd=project_root,\n            env=env,\n        )\n\n        triggered = False\n        start_time = time.time()\n        buffer = \"\"\n        # Track state for stream event detection\n        pending_tool_name = None\n        accumulated_json = \"\"\n\n        try:\n            while time.time() - start_time < timeout:\n                if process.poll() is not None:\n                    remaining = process.stdout.read()\n                    if remaining:\n                        buffer += remaining.decode(\"utf-8\", errors=\"replace\")\n                    break\n\n                ready, _, _ = select.select([process.stdout], [], [], 1.0)\n                if not ready:\n                    continue\n\n                chunk = os.read(process.stdout.fileno(), 8192)\n                if not chunk:\n                    break\n                buffer += chunk.decode(\"utf-8\", errors=\"replace\")\n\n                while \"\\n\" in buffer:\n                    line, buffer = buffer.split(\"\\n\", 1)\n                    line = line.strip()\n                    if not line:\n                        continue\n\n                    try:\n                        event = json.loads(line)\n                    except json.JSONDecodeError:\n                        continue\n\n                    # Early detection via stream events\n                    if event.get(\"type\") == \"stream_event\":\n                        se = event.get(\"event\", {})\n                        se_type = se.get(\"type\", \"\")\n\n                        if se_type == \"content_block_start\":\n                            cb = se.get(\"content_block\", {})\n                            if cb.get(\"type\") == \"tool_use\":\n                                tool_name = cb.get(\"name\", \"\")\n                                if tool_name in (\"Skill\", \"Read\"):\n                                    pending_tool_name = tool_name\n                                    accumulated_json = \"\"\n                                else:\n                                    return False\n\n                        elif se_type == \"content_block_delta\" and pending_tool_name:\n                            delta = se.get(\"delta\", {})\n                            if delta.get(\"type\") == \"input_json_delta\":\n                                accumulated_json += delta.get(\"partial_json\", \"\")\n                                if clean_name in accumulated_json:\n                                    return True\n\n                        elif se_type in (\"content_block_stop\", \"message_stop\"):\n                            if pending_tool_name:\n                                return clean_name in accumulated_json\n                            if se_type == \"message_stop\":\n                                return False\n\n                    # Fallback: full assistant message\n                    elif event.get(\"type\") == \"assistant\":\n                        message = event.get(\"message\", {})\n                        for content_item in message.get(\"content\", []):\n                            if content_item.get(\"type\") != \"tool_use\":\n                                continue\n                            tool_name = content_item.get(\"name\", \"\")\n                            tool_input = content_item.get(\"input\", {})\n                            if tool_name == \"Skill\" and clean_name in tool_input.get(\"skill\", \"\"):\n                                triggered = True\n                            elif tool_name == \"Read\" and clean_name in tool_input.get(\"file_path\", \"\"):\n                                triggered = True\n                            return triggered\n\n                    elif event.get(\"type\") == \"result\":\n                        return triggered\n        finally:\n            # Clean up process on any exit path (return, exception, timeout)\n            if process.poll() is None:\n                process.kill()\n                process.wait()\n\n        return triggered\n    finally:\n        if command_file.exists():\n            command_file.unlink()\n\n\ndef run_eval(\n    eval_set: list[dict],\n    skill_name: str,\n    description: str,\n    num_workers: int,\n    timeout: int,\n    project_root: Path,\n    runs_per_query: int = 1,\n    trigger_threshold: float = 0.5,\n    model: str | None = None,\n) -> dict:\n    \"\"\"Run the full eval set and return results.\"\"\"\n    results = []\n\n    with ProcessPoolExecutor(max_workers=num_workers) as executor:\n        future_to_info = {}\n        for item in eval_set:\n            for run_idx in range(runs_per_query):\n                future = executor.submit(\n                    run_single_query,\n                    item[\"query\"],\n                    skill_name,\n                    description,\n                    timeout,\n                    str(project_root),\n                    model,\n                )\n                future_to_info[future] = (item, run_idx)\n\n        query_triggers: dict[str, list[bool]] = {}\n        query_items: dict[str, dict] = {}\n        for future in as_completed(future_to_info):\n            item, _ = future_to_info[future]\n            query = item[\"query\"]\n            query_items[query] = item\n            if query not in query_triggers:\n                query_triggers[query] = []\n            try:\n                query_triggers[query].append(future.result())\n            except Exception as e:\n                print(f\"Warning: query failed: {e}\", file=sys.stderr)\n                query_triggers[query].append(False)\n\n    for query, triggers in query_triggers.items():\n        item = query_items[query]\n        trigger_rate = sum(triggers) / len(triggers)\n        should_trigger = item[\"should_trigger\"]\n        if should_trigger:\n            did_pass = trigger_rate >= trigger_threshold\n        else:\n            did_pass = trigger_rate < trigger_threshold\n        results.append({\n            \"query\": query,\n            \"should_trigger\": should_trigger,\n            \"trigger_rate\": trigger_rate,\n            \"triggers\": sum(triggers),\n            \"runs\": len(triggers),\n            \"pass\": did_pass,\n        })\n\n    passed = sum(1 for r in results if r[\"pass\"])\n    total = len(results)\n\n    return {\n        \"skill_name\": skill_name,\n        \"description\": description,\n        \"results\": results,\n        \"summary\": {\n            \"total\": total,\n            \"passed\": passed,\n            \"failed\": total - passed,\n        },\n    }\n\n\ndef main():\n    parser = argparse.ArgumentParser(description=\"Run trigger evaluation for a skill description\")\n    parser.add_argument(\"--eval-set\", required=True, help=\"Path to eval set JSON file\")\n    parser.add_argument(\"--skill-path\", required=True, help=\"Path to skill directory\")\n    parser.add_argument(\"--description\", default=None, help=\"Override description to test\")\n    parser.add_argument(\"--num-workers\", type=int, default=10, help=\"Number of parallel workers\")\n    parser.add_argument(\"--timeout\", type=int, default=30, help=\"Timeout per query in seconds\")\n    parser.add_argument(\"--runs-per-query\", type=int, default=3, help=\"Number of runs per query\")\n    parser.add_argument(\"--trigger-threshold\", type=float, default=0.5, help=\"Trigger rate threshold\")\n    parser.add_argument(\"--model\", default=None, help=\"Model to use for claude -p (default: user's configured model)\")\n    parser.add_argument(\"--verbose\", action=\"store_true\", help=\"Print progress to stderr\")\n    args = parser.parse_args()\n\n    eval_set = json.loads(Path(args.eval_set).read_text())\n    skill_path = Path(args.skill_path)\n\n    if not (skill_path / \"SKILL.md\").exists():\n        print(f\"Error: No SKILL.md found at {skill_path}\", file=sys.stderr)\n        sys.exit(1)\n\n    name, original_description, content = parse_skill_md(skill_path)\n    description = args.description or original_description\n    project_root = find_project_root()\n\n    if args.verbose:\n        print(f\"Evaluating: {description}\", file=sys.stderr)\n\n    output = run_eval(\n        eval_set=eval_set,\n        skill_name=name,\n        description=description,\n        num_workers=args.num_workers,\n        timeout=args.timeout,\n        project_root=project_root,\n        runs_per_query=args.runs_per_query,\n        trigger_threshold=args.trigger_threshold,\n        model=args.model,\n    )\n\n    if args.verbose:\n        summary = output[\"summary\"]\n        print(f\"Results: {summary['passed']}/{summary['total']} passed\", file=sys.stderr)\n        for r in output[\"results\"]:\n            status = \"PASS\" if r[\"pass\"] else \"FAIL\"\n            rate_str = f\"{r['triggers']}/{r['runs']}\"\n            print(f\"  [{status}] rate={rate_str} expected={r['should_trigger']}: {r['query'][:70]}\", file=sys.stderr)\n\n    print(json.dumps(output, indent=2))\n\n\nif __name__ == \"__main__\":\n    main()\n", "binary": false, "truncated": false}, {"name": "run_loop.py", "is_md": false, "content": "#!/usr/bin/env python3\n\"\"\"Run the eval + improve loop until all pass or max iterations reached.\n\nCombines run_eval.py and improve_description.py in a loop, tracking history\nand returning the best description found. Supports train/test split to prevent\noverfitting.\n\"\"\"\n\nimport argparse\nimport json\nimport random\nimport sys\nimport tempfile\nimport time\nimport webbrowser\nfrom pathlib import Path\n\nfrom scripts.generate_report import generate_html\nfrom scripts.improve_description import improve_description\nfrom scripts.run_eval import find_project_root, run_eval\nfrom scripts.utils import parse_skill_md\n\n\ndef split_eval_set(eval_set: list[dict], holdout: float, seed: int = 42) -> tuple[list[dict], list[dict]]:\n    \"\"\"Split eval set into train and test sets, stratified by should_trigger.\"\"\"\n    random.seed(seed)\n\n    # Separate by should_trigger\n    trigger = [e for e in eval_set if e[\"should_trigger\"]]\n    no_trigger = [e for e in eval_set if not e[\"should_trigger\"]]\n\n    # Shuffle each group\n    random.shuffle(trigger)\n    random.shuffle(no_trigger)\n\n    # Calculate split points\n    n_trigger_test = max(1, int(len(trigger) * holdout))\n    n_no_trigger_test = max(1, int(len(no_trigger) * holdout))\n\n    # Split\n    test_set = trigger[:n_trigger_test] + no_trigger[:n_no_trigger_test]\n    train_set = trigger[n_trigger_test:] + no_trigger[n_no_trigger_test:]\n\n    return train_set, test_set\n\n\ndef run_loop(\n    eval_set: list[dict],\n    skill_path: Path,\n    description_override: str | None,\n    num_workers: int,\n    timeout: int,\n    max_iterations: int,\n    runs_per_query: int,\n    trigger_threshold: float,\n    holdout: float,\n    model: str,\n    verbose: bool,\n    live_report_path: Path | None = None,\n    log_dir: Path | None = None,\n) -> dict:\n    \"\"\"Run the eval + improvement loop.\"\"\"\n    project_root = find_project_root()\n    name, original_description, content = parse_skill_md(skill_path)\n    current_description = description_override or original_description\n\n    # Split into train/test if holdout > 0\n    if holdout > 0:\n        train_set, test_set = split_eval_set(eval_set, holdout)\n        if verbose:\n            print(f\"Split: {len(train_set)} train, {len(test_set)} test (holdout={holdout})\", file=sys.stderr)\n    else:\n        train_set = eval_set\n        test_set = []\n\n    history = []\n    exit_reason = \"unknown\"\n\n    for iteration in range(1, max_iterations + 1):\n        if verbose:\n            print(f\"\\n{'='*60}\", file=sys.stderr)\n            print(f\"Iteration {iteration}/{max_iterations}\", file=sys.stderr)\n            print(f\"Description: {current_description}\", file=sys.stderr)\n            print(f\"{'='*60}\", file=sys.stderr)\n\n        # Evaluate train + test together in one batch for parallelism\n        all_queries = train_set + test_set\n        t0 = time.time()\n        all_results = run_eval(\n            eval_set=all_queries,\n            skill_name=name,\n            description=current_description,\n            num_workers=num_workers,\n            timeout=timeout,\n            project_root=project_root,\n            runs_per_query=runs_per_query,\n            trigger_threshold=trigger_threshold,\n            model=model,\n        )\n        eval_elapsed = time.time() - t0\n\n        # Split results back into train/test by matching queries\n        train_queries_set = {q[\"query\"] for q in train_set}\n        train_result_list = [r for r in all_results[\"results\"] if r[\"query\"] in train_queries_set]\n        test_result_list = [r for r in all_results[\"results\"] if r[\"query\"] not in train_queries_set]\n\n        train_passed = sum(1 for r in train_result_list if r[\"pass\"])\n        train_total = len(train_result_list)\n        train_summary = {\"passed\": train_passed, \"failed\": train_total - train_passed, \"total\": train_total}\n        train_results = {\"results\": train_result_list, \"summary\": train_summary}\n\n        if test_set:\n            test_passed = sum(1 for r in test_result_list if r[\"pass\"])\n            test_total = len(test_result_list)\n            test_summary = {\"passed\": test_passed, \"failed\": test_total - test_passed, \"total\": test_total}\n            test_results = {\"results\": test_result_list, \"summary\": test_summary}\n        else:\n            test_results = None\n            test_summary = None\n\n        history.append({\n            \"iteration\": iteration,\n            \"description\": current_description,\n            \"train_passed\": train_summary[\"passed\"],\n            \"train_failed\": train_summary[\"failed\"],\n            \"train_total\": train_summary[\"total\"],\n            \"train_results\": train_results[\"results\"],\n            \"test_passed\": test_summary[\"passed\"] if test_summary else None,\n            \"test_failed\": test_summary[\"failed\"] if test_summary else None,\n            \"test_total\": test_summary[\"total\"] if test_summary else None,\n            \"test_results\": test_results[\"results\"] if test_results else None,\n            # For backward compat with report generator\n            \"passed\": train_summary[\"passed\"],\n            \"failed\": train_summary[\"failed\"],\n            \"total\": train_summary[\"total\"],\n            \"results\": train_results[\"results\"],\n        })\n\n        # Write live report if path provided\n        if live_report_path:\n            partial_output = {\n                \"original_description\": original_description,\n                \"best_description\": current_description,\n                \"best_score\": \"in progress\",\n                \"iterations_run\": len(history),\n                \"holdout\": holdout,\n                \"train_size\": len(train_set),\n                \"test_size\": len(test_set),\n                \"history\": history,\n            }\n            live_report_path.write_text(generate_html(partial_output, auto_refresh=True, skill_name=name))\n\n        if verbose:\n            def print_eval_stats(label, results, elapsed):\n                pos = [r for r in results if r[\"should_trigger\"]]\n                neg = [r for r in results if not r[\"should_trigger\"]]\n                tp = sum(r[\"triggers\"] for r in pos)\n                pos_runs = sum(r[\"runs\"] for r in pos)\n                fn = pos_runs - tp\n                fp = sum(r[\"triggers\"] for r in neg)\n                neg_runs = sum(r[\"runs\"] for r in neg)\n                tn = neg_runs - fp\n                total = tp + tn + fp + fn\n                precision = tp / (tp + fp) if (tp + fp) > 0 else 1.0\n                recall = tp / (tp + fn) if (tp + fn) > 0 else 1.0\n                accuracy = (tp + tn) / total if total > 0 else 0.0\n                print(f\"{label}: {tp+tn}/{total} correct, precision={precision:.0%} recall={recall:.0%} accuracy={accuracy:.0%} ({elapsed:.1f}s)\", file=sys.stderr)\n                for r in results:\n                    status = \"PASS\" if r[\"pass\"] else \"FAIL\"\n                    rate_str = f\"{r['triggers']}/{r['runs']}\"\n                    print(f\"  [{status}] rate={rate_str} expected={r['should_trigger']}: {r['query'][:60]}\", file=sys.stderr)\n\n            print_eval_stats(\"Train\", train_results[\"results\"], eval_elapsed)\n            if test_summary:\n                print_eval_stats(\"Test \", test_results[\"results\"], 0)\n\n        if train_summary[\"failed\"] == 0:\n            exit_reason = f\"all_passed (iteration {iteration})\"\n            if verbose:\n                print(f\"\\nAll train queries passed on iteration {iteration}!\", file=sys.stderr)\n            break\n\n        if iteration == max_iterations:\n            exit_reason = f\"max_iterations ({max_iterations})\"\n            if verbose:\n                print(f\"\\nMax iterations reached ({max_iterations}).\", file=sys.stderr)\n            break\n\n        # Improve the description based on train results\n        if verbose:\n            print(f\"\\nImproving description...\", file=sys.stderr)\n\n        t0 = time.time()\n        # Strip test scores from history so improvement model can't see them\n        blinded_history = [\n            {k: v for k, v in h.items() if not k.startswith(\"test_\")}\n            for h in history\n        ]\n        new_description = improve_description(\n            skill_name=name,\n            skill_content=content,\n            current_description=current_description,\n            eval_results=train_results,\n            history=blinded_history,\n            model=model,\n            log_dir=log_dir,\n            iteration=iteration,\n        )\n        improve_elapsed = time.time() - t0\n\n        if verbose:\n            print(f\"Proposed ({improve_elapsed:.1f}s): {new_description}\", file=sys.stderr)\n\n        current_description = new_description\n\n    # Find the best iteration by TEST score (or train if no test set)\n    if test_set:\n        best = max(history, key=lambda h: h[\"test_passed\"] or 0)\n        best_score = f\"{best['test_passed']}/{best['test_total']}\"\n    else:\n        best = max(history, key=lambda h: h[\"train_passed\"])\n        best_score = f\"{best['train_passed']}/{best['train_total']}\"\n\n    if verbose:\n        print(f\"\\nExit reason: {exit_reason}\", file=sys.stderr)\n        print(f\"Best score: {best_score} (iteration {best['iteration']})\", file=sys.stderr)\n\n    return {\n        \"exit_reason\": exit_reason,\n        \"original_description\": original_description,\n        \"best_description\": best[\"description\"],\n        \"best_score\": best_score,\n        \"best_train_score\": f\"{best['train_passed']}/{best['train_total']}\",\n        \"best_test_score\": f\"{best['test_passed']}/{best['test_total']}\" if test_set else None,\n        \"final_description\": current_description,\n        \"iterations_run\": len(history),\n        \"holdout\": holdout,\n        \"train_size\": len(train_set),\n        \"test_size\": len(test_set),\n        \"history\": history,\n    }\n\n\ndef main():\n    parser = argparse.ArgumentParser(description=\"Run eval + improve loop\")\n    parser.add_argument(\"--eval-set\", required=True, help=\"Path to eval set JSON file\")\n    parser.add_argument(\"--skill-path\", required=True, help=\"Path to skill directory\")\n    parser.add_argument(\"--description\", default=None, help=\"Override starting description\")\n    parser.add_argument(\"--num-workers\", type=int, default=10, help=\"Number of parallel workers\")\n    parser.add_argument(\"--timeout\", type=int, default=30, help=\"Timeout per query in seconds\")\n    parser.add_argument(\"--max-iterations\", type=int, default=5, help=\"Max improvement iterations\")\n    parser.add_argument(\"--runs-per-query\", type=int, default=3, help=\"Number of runs per query\")\n    parser.add_argument(\"--trigger-threshold\", type=float, default=0.5, help=\"Trigger rate threshold\")\n    parser.add_argument(\"--holdout\", type=float, default=0.4, help=\"Fraction of eval set to hold out for testing (0 to disable)\")\n    parser.add_argument(\"--model\", required=True, help=\"Model for improvement\")\n    parser.add_argument(\"--verbose\", action=\"store_true\", help=\"Print progress to stderr\")\n    parser.add_argument(\"--report\", default=\"auto\", help=\"Generate HTML report at this path (default: 'auto' for temp file, 'none' to disable)\")\n    parser.add_argument(\"--results-dir\", default=None, help=\"Save all outputs (results.json, report.html, log.txt) to a timestamped subdirectory here\")\n    args = parser.parse_args()\n\n    eval_set = json.loads(Path(args.eval_set).read_text())\n    skill_path = Path(args.skill_path)\n\n    if not (skill_path / \"SKILL.md\").exists():\n        print(f\"Error: No SKILL.md found at {skill_path}\", file=sys.stderr)\n        sys.exit(1)\n\n    name, _, _ = parse_skill_md(skill_path)\n\n    # Set up live report path\n    if args.report != \"none\":\n        if args.report == \"auto\":\n            timestamp = time.strftime(\"%Y%m%d_%H%M%S\")\n            live_report_path = Path(tempfile.gettempdir()) / f\"skill_description_report_{skill_path.name}_{timestamp}.html\"\n        else:\n            live_report_path = Path(args.report)\n        # Open the report immediately so the user can watch\n        live_report_path.write_text(\"<html><body><h1>Starting optimization loop...\u003c/h1><meta http-equiv='refresh' content='5'>\u003c/body>\u003c/html>\")\n        webbrowser.open(str(live_report_path))\n    else:\n        live_report_path = None\n\n    # Determine output directory (create before run_loop so logs can be written)\n    if args.results_dir:\n        timestamp = time.strftime(\"%Y-%m-%d_%H%M%S\")\n        results_dir = Path(args.results_dir) / timestamp\n        results_dir.mkdir(parents=True, exist_ok=True)\n    else:\n        results_dir = None\n\n    log_dir = results_dir / \"logs\" if results_dir else None\n\n    output = run_loop(\n        eval_set=eval_set,\n        skill_path=skill_path,\n        description_override=args.description,\n        num_workers=args.num_workers,\n        timeout=args.timeout,\n        max_iterations=args.max_iterations,\n        runs_per_query=args.runs_per_query,\n        trigger_threshold=args.trigger_threshold,\n        holdout=args.holdout,\n        model=args.model,\n        verbose=args.verbose,\n        live_report_path=live_report_path,\n        log_dir=log_dir,\n    )\n\n    # Save JSON output\n    json_output = json.dumps(output, indent=2)\n    print(json_output)\n    if results_dir:\n        (results_dir / \"results.json\").write_text(json_output)\n\n    # Write final HTML report (without auto-refresh)\n    if live_report_path:\n        live_report_path.write_text(generate_html(output, auto_refresh=False, skill_name=name))\n        print(f\"\\nReport: {live_report_path}\", file=sys.stderr)\n\n    if results_dir and live_report_path:\n        (results_dir / \"report.html\").write_text(generate_html(output, auto_refresh=False, skill_name=name))\n\n    if results_dir:\n        print(f\"Results saved to: {results_dir}\", file=sys.stderr)\n\n\nif __name__ == \"__main__\":\n    main()\n", "binary": false, "truncated": false}, {"name": "utils.py", "is_md": false, "content": "\"\"\"Shared utilities for skill-creator scripts.\"\"\"\n\nfrom pathlib import Path\n\n\n\ndef parse_skill_md(skill_path: Path) -> tuple[str, str, str]:\n    \"\"\"Parse a SKILL.md file, returning (name, description, full_content).\"\"\"\n    content = (skill_path / \"SKILL.md\").read_text()\n    lines = content.split(\"\\n\")\n\n    if lines[0].strip() != \"---\":\n        raise ValueError(\"SKILL.md missing frontmatter (no opening ---)\")\n\n    end_idx = None\n    for i, line in enumerate(lines[1:], start=1):\n        if line.strip() == \"---\":\n            end_idx = i\n            break\n\n    if end_idx is None:\n        raise ValueError(\"SKILL.md missing frontmatter (no closing ---)\")\n\n    name = \"\"\n    description = \"\"\n    frontmatter_lines = lines[1:end_idx]\n    i = 0\n    while i < len(frontmatter_lines):\n        line = frontmatter_lines[i]\n        if line.startswith(\"name:\"):\n            name = line[len(\"name:\"):].strip().strip('\"').strip(\"'\")\n        elif line.startswith(\"description:\"):\n            value = line[len(\"description:\"):].strip()\n            # Handle YAML multiline indicators (>, |, >-, |-)\n            if value in (\">\", \"|\", \">-\", \"|-\"):\n                continuation_lines: list[str] = []\n                i += 1\n                while i < len(frontmatter_lines) and (frontmatter_lines[i].startswith(\"  \") or frontmatter_lines[i].startswith(\"\\t\")):\n                    continuation_lines.append(frontmatter_lines[i].strip())\n                    i += 1\n                description = \" \".join(continuation_lines)\n                continue\n            else:\n                description = value.strip('\"').strip(\"'\")\n        i += 1\n\n    return name, description, content\n", "binary": false, "truncated": false}], "subdirs": []}]}, {"name": "skills-registry", "source": "Global", "path": "skills/skills-registry", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: skills-registry\ndescription: \"Maintient à jour le registre central des skills de la flotte (REGISTRY.md) en scannant tous les workspaces. Utilisé par le cron dominical 6h.\"\n---\n\n# Skills Registry — Maintenance du registre central\n\nScanne tous les workspaces d'agents, extrait les skills (nom, description, cas d'usage) et régénère `~/.openclaw/skills/REGISTRY.md`.\n\n## Script principal\n\n```bash\npython3 {baseDir}/scripts/update-registry.py\n```\n\nLe script :\n1. Scanne tous les `workspace-*/skills/*/SKILL.md` et `agents/*/skills/*/SKILL.md`\n2. Extrait nom, description, et workspace source pour chaque skill\n3. Classe par domaine (Analyse, Rédaction, Prospection, Vidéo, SEO, Dev, CRM, IA, Outils)\n4. Régénère `REGISTRY.md` avec mise à jour de la date\n5. Ajoute le fichier à git (dans `~/.openclaw/skills/`) et commit si changement\n", "binary": false, "truncated": false}], "subdirs": [{"name": "scripts", "files": [{"name": "update-registry.py", "is_md": false, "content": "#!/usr/bin/env python3\n\"\"\"Scanne tous les workspaces et régénère ~/.openclaw/skills/REGISTRY.md\"\"\"\nimport os, re, glob\nfrom datetime import datetime\nfrom collections import defaultdict\n\nSKILLS_DIR = os.path.expanduser(\"~/.openclaw/skills\")\nREGISTRY_PATH = os.path.join(SKILLS_DIR, \"REGISTRY.md\")\n\n# Workspaces à scanner\nWORKSPACES = [\n    os.path.expanduser(\"~/.openclaw/workspace\"),\n    os.path.expanduser(\"~/.openclaw/workspace-executive-assistant\"),\n    os.path.expanduser(\"~/.openclaw/workspace-copywriter-publisher\"),\n    os.path.expanduser(\"~/.openclaw/workspace-site-maintainer\"),\n    os.path.expanduser(\"~/.openclaw/workspace-video-montage\"),\n    os.path.expanduser(\"~/.openclaw/workspace-prospector\"),\n    os.path.expanduser(\"~/.openclaw/workspace-construct\"),\n    os.path.expanduser(\"~/.openclaw/workspace-sales-coach\"),\n    os.path.expanduser(\"~/.openclaw/agents/flora-assistante-bot\"),\n    os.path.expanduser(\"~/.openclaw/agents/mcb\"),\n    os.path.expanduser(\"~/.openclaw/workspace-crm-manager\"),\n    os.path.expanduser(\"~/.openclaw/agents/workspace-cleaner\"),\n    os.path.expanduser(\"~/.openclaw/workspace-ingenieur-dev\"),\n    os.path.expanduser(\"~/.openclaw/workspace-target-hunter\"),\n]\n\nDOMAINES = {\n    \"Analyse & Stratégie\": [\"analyse-entretien-exhaustive\", \"elite-business-advisory\", \"consulting-report-generator\", \"cfo-advisor\"],\n    \"Rédaction & Publication\": [\"blog-article-creator\", \"blog-hero-image-creator\", \"bd-carousel\", \"carrousel-bd-linkedin\", \"article-publication\", \"copywriter-publisher\", \"gpt-image-2-workshop\"],\n    \"Prospection & Commercial\": [\"prospecting-orchestrator\", \"sales-call-coach\", \"commercial-playbook-from-transcript\", \"pedagogie-vente-coaching\", \"pme-proposition-2-pages\"],\n    \"Vidéo & Audio\": [\"video-montage-agent\", \"freedom-boat-club-temoignage\", \"youtube\", \"youtube-api-skill\", \"google-gemini-tts\", \"whisper-transcriber\"],\n    \"SEO & Site Web\": [\"content-pipeline\", \"seo\", \"serp-analyzer\", \"generative-engine-optimization\", \"google-analytics\", \"google-search-console\", \"api-gateway\"],\n    \"Développement & Stack tech\": [\"ingenieur-dev\", \"neon\", \"nextjs\", \"prisma\", \"shadcn-ui\", \"tailwind\", \"vercel\"],\n    \"CRM & Gestion\": [\"crm-manager\", \"upvd-report\", \"doodle-creator\"],\n    \"IA & Agents\": [\"agent-architect\", \"skill-creator\", \"subagent-creator\", \"fleet-health\", \"fleet-map\", \"self-improving-agent\", \"self-improvement\"],\n    \"Outils & Utilitaires\": [\"gog\", \"goal\", \"pdf\", \"word-docx\", \"powerpoint-pptx\", \"linkedin-api\", \"linkedin-search\", \"openclaw-cli\", \"clawddocs\"],\n}\n\ndef extract_description(skill_dir):\n    skill_md = os.path.join(skill_dir, \"SKILL.md\")\n    if not os.path.exists(skill_md):\n        return None, None\n    try:\n        with open(skill_md) as f:\n            content = f.read(3000)\n    except:\n        return None, None\n    \n    desc = None\n    usage = None\n    for line in content.split(\"\\n\"):\n        m = re.match(r'^description:\\s*[\"\\']?(.+?)[\"\\']?\\s*$', line)\n        if m:\n            desc = m.group(1).strip()\n        # Chercher \"Use when\" ou \"Utiliser quand\"\n        if \"utiliser quand\" in line.lower() or \"use when\" in line.lower():\n            usage = line.strip()\n    \n    if desc and len(desc) > 150:\n        desc = desc[:147] + \"...\"\n    \n    # Extraire du body si pas dans le frontmatter\n    if not desc:\n        for line in content.split(\"\\n\"):\n            line = line.strip()\n            if line and not line.startswith(\"#\") and not line.startswith(\"---\") and len(line) > 10:\n                desc = line[:150]\n                break\n    \n    return desc or \"(pas de description)\", usage\n\ndef get_workspace_label(ws_path):\n    name = os.path.basename(ws_path)\n    if \"agents/\" in ws_path:\n        return name\n    return name.replace(\"workspace-\", \"\")\n\ndef scan_all():\n    skills_data = {}  # name -> list of (workspace, desc, usage)\n    \n    for ws in WORKSPACES:\n        skills_dir = os.path.join(ws, \"skills\")\n        if not os.path.isdir(skills_dir):\n            continue\n        ws_label = get_workspace_label(ws)\n        for skill_name in sorted(os.listdir(skills_dir)):\n            skill_dir = os.path.join(skills_dir, skill_name)\n            if not os.path.isdir(skill_dir) or skill_name.startswith('.'):\n                continue\n            desc, usage = extract_description(skill_dir)\n            if skill_name not in skills_data:\n                skills_data[skill_name] = []\n            skills_data[skill_name].append((ws_label, desc, usage))\n    \n    # Ajouter les skills globaux (non déjà trouvés dans les workspaces)\n    for skill_name in sorted(os.listdir(SKILLS_DIR)):\n        if skill_name.startswith('.') or skill_name == 'skills-registry':\n            continue\n        skill_dir = os.path.join(SKILLS_DIR, skill_name)\n        if not os.path.isdir(skill_dir):\n            continue\n        skill_md = os.path.join(skill_dir, \"SKILL.md\")\n        if not os.path.exists(skill_md):\n            continue\n        desc, usage = extract_description(skill_dir)\n        if skill_name not in skills_data:\n            skills_data[skill_name] = []\n        # Ne pas dupliquer si déjà trouvé avec la même description\n        already = any(d == desc for _, d, _ in skills_data[skill_name])\n        if not already:\n            skills_data[skill_name].append((\"global\", desc, usage))\n    \n    return skills_data\n\ndef classify_skill(name):\n    for domaine, skills in DOMAINES.items():\n        if name in skills:\n            return domaine\n    return \"Autres\"\n\ndef generate_registry(skills_data):\n    now = datetime.now().strftime(\"%Y-%m-%d %H:%M\")\n    \n    # Compter les workspaces\n    all_ws = set()\n    for sources in skills_data.values():\n        for ws, _, _ in sources:\n            all_ws.add(ws)\n    \n    md = f\"\"\"# REGISTRY.md — Registre des skills de la flotte\n\n*Dernière mise à jour : {now} | Cron : dimanche 6h | {len(skills_data)} skills dans {len(all_ws)} workspaces*\n\n> **Règle pour tous les agents :** pour toute tâche inhabituelle qui dépasse 1-2 étapes simples, consulte ce registre AVANT d'agir. Identifie le skill le plus adapté, puis lis son `SKILL.md` source dans le workspace indiqué.\n\n---\n\n\"\"\"\n    \n    # Classer par domaine\n    by_domaine = defaultdict(list)\n    for name, sources in skills_data.items():\n        domaine = classify_skill(name)\n        # Prendre la source primaire (non-globale si possible)\n        primary = sources[0]\n        for ws, desc, _ in sources:\n            if ws != \"global\" and desc != \"(pas de description)\":\n                primary = (ws, desc, _)\n                break\n        by_domaine[domaine].append((name, primary[0], primary[1]))\n    \n    DOMAINE_EMOJIS = {\n        \"Analyse & Stratégie\": \"📊\",\n        \"Rédaction & Publication\": \"📝\",\n        \"Prospection & Commercial\": \"🎯\",\n        \"Vidéo & Audio\": \"🎬\",\n        \"SEO & Site Web\": \"🌐\",\n        \"Développement & Stack tech\": \"🛠\",\n        \"CRM & Gestion\": \"📋\",\n        \"IA & Agents\": \"🧠\",\n        \"Outils & Utilitaires\": \"🔧\",\n        \"Autres\": \"📦\",\n    }\n    \n    for domaine in DOMAINES:\n        skills = by_domaine.get(domaine, [])\n        if not skills:\n            continue\n        emoji = DOMAINE_EMOJIS.get(domaine, \"📦\")\n        md += f\"## {emoji} {domaine}\\n\\n\"\n        md += \"| Skill | Source | Usage |\\n\"\n        md += \"|---|---|---|\\n\"\n        for name, ws, desc in sorted(skills):\n            src = \"global\" if ws == \"global\" else ws\n            md += f\"| `{name}` | {src} | {desc} |\\n\"\n        md += \"\\n\"\n    \n    # Autres\n    others = by_domaine.get(\"Autres\", [])\n    if others:\n        md += f\"## 📦 Autres\\n\\n\"\n        md += \"| Skill | Source | Usage |\\n\"\n        md += \"|---|---|---|\\n\"\n        for name, ws, desc in sorted(others):\n            src = \"global\" if ws == \"global\" else ws\n            md += f\"| `{name}` | {src} | {desc} |\\n\"\n        md += \"\\n\"\n    \n    md += \"---\\n\\n\"\n    md += \"## 🔄 Maintenance\\n\\n\"\n    md += \"Ce registre est régénéré automatiquement chaque **dimanche à 6h00** (Europe/Paris) par le cron `skills-registry-update`.\\n\\n\"\n    md += \"Le fleet-health du dimanche 9h inclut dans son rapport HDE une section dédiée à l'évolution des skills et de ce registre.\\n\\n\"\n    md += \"**Ne pas modifier manuellement** — les modifications seront écrasées par le cron.\\n\"\n    \n    return md\n\nif __name__ == \"__main__\":\n    skills_data = scan_all()\n    registry = generate_registry(skills_data)\n    \n    # Sauvegarder\n    os.makedirs(SKILLS_DIR, exist_ok=True)\n    with open(REGISTRY_PATH, 'w') as f:\n        f.write(registry)\n    \n    # Git add + commit\n    import subprocess\n
