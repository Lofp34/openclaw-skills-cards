<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f; --card: #13131a; --card-hover: #181820;
  --border: #25252e; --border-active: #3a3a4a;
  --text: #e4e4e7; --text-dim: #71717a; --text-bright: #fafafa;
  --accent: #6366f1; --accent-dim: #4f46e5;
  --code-bg: #1e1e26; --radius: 10px;
}
body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; line-height: 1.6; }
.container { max-width: 1100px; margin: 0 auto; padding: 40px 20px 80px; }
header { text-align: center; margin-bottom: 48px; }
header h1 { font-size: 2.2rem; font-weight: 800;
  background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 8px; }
header p { color: var(--text-dim); }
.stats { display: flex; justify-content: center; gap: 24px; margin-top: 20px; flex-wrap: wrap; }
.stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 24px; text-align: center; }
.stat-num { font-size: 1.5rem; font-weight: 700; color: var(--text-bright); }
.stat-label { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.section-title { font-size: 1.3rem; font-weight: 700; color: var(--text-bright);
  margin: 40px 0 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 10px; }
.section-title .count { font-size: 0.85rem; color: var(--text-dim); font-weight: 400; background: var(--card); padding: 2px 10px; border-radius: 20px; }
.search-bar { margin: 0 auto 32px; max-width: 500px; }
.search-bar input { width: 100%; padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: inherit; font-size: 0.95rem; outline: none; }
.search-bar input:focus { border-color: var(--accent); }
.skill-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; transition: border-color 0.2s; }
.skill-card:hover { border-color: var(--border-active); }
.skill-card.open { border-color: var(--accent-dim); }
.skill-header { padding: 16px 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; transition: background 0.15s; }
.skill-header:hover { background: var(--card-hover); }
.skill-header-left { display: flex; align-items: center; gap: 12px; }
.skill-name { font-weight: 600; font-size: 1rem; color: var(--text-bright); font-family: 'JetBrains Mono', monospace; }
.badge { font-size: 0.7rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
.badge-workspace { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
.badge-global { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
.chevron { transition: transform 0.2s; color: var(--text-dim); }
.skill-card.open .chevron { transform: rotate(90deg); }
.skill-body { display: none; padding: 0 20px 20px; }
.skill-card.open .skill-body { display: block; }
.file-card { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; margin-top: 8px; overflow: hidden; }
.file-header { padding: 10px 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--text-dim); user-select: none; }
.file-header:hover { background: rgba(255,255,255,0.03); }
.file-body { display: none; padding: 14px; overflow-x: auto; max-height: 600px; overflow-y: auto; }
.file-card.open .file-body { display: block; }
.file-body pre { white-space: pre-wrap; word-wrap: break-word; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.5; }
.md-content h1 { font-size: 1.4rem; font-weight: 700; margin: 16px 0 8px; }
.md-content h2 { font-size: 1.2rem; font-weight: 600; margin: 14px 0 6px; }
.md-content h3 { font-size: 1.05rem; font-weight: 600; margin: 12px 0 4px; }
.md-content p { margin: 6px 0; }
.md-content ul, .md-content ol { margin: 6px 0; padding-left: 24px; }
.md-content li { margin: 2px 0; }
.md-content code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 0.85em; }
.md-content pre { background: var(--bg); padding: 12px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
.md-content table { border-collapse: collapse; width: 100%; margin: 8px 0; }
.md-content th, .md-content td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
.md-content th { background: var(--bg); font-weight: 600; }
.md-content blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-dim); margin: 8px 0; }
.subdir-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 8px; margin-top: 8px; overflow: hidden; }
.subdir-header { padding: 10px 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #a78bfa; user-select: none; }
.subdir-header:hover { background: rgba(255,255,255,0.03); }
.subdir-body { display: none; padding: 0 12px 12px; }
.subdir-card.open .subdir-body { display: block; }
.file-count { font-size: 0.75rem; color: var(--text-dim); background: var(--card); padding: 2px 8px; border-radius: 10px; }
.truncated-note { color: #f59e0b; font-size: 0.8rem; font-style: italic; padding: 4px 0; }
</style>

<script type="application/json" id="skills-data">
[{"name": "goal", "source": "Workspace", "path": "skills/goal", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: goal\ndescription: \"Mode objectif long-terme : décompose un objectif en plan, suit l'avancement, persiste entre sessions, reprend automatiquement. Usage : /goal <description> ou 'active le mode goal pour <tâche>'\"\nmetadata:\n  trigger_keywords: [\"/goal\", \"mode goal\", \"active le mode goal\", \"goal mode\"]\n  version: \"1.0.0\"\n  author: \"ClawdIA\"\n---\n\n# Goal Skill — Mode Objectif Long-Terme\n\nPermet de définir un objectif complexe, de le décomposer en étapes, de suivre l'avancement, et de reprendre automatiquement après interruption — comme le `/goal` de Codex CLI, mais natif OpenClaw.\n\n## Déclencheurs\n\n- `/goal <description de l'objectif>`\n- \"active le mode goal pour <tâche>\"\n- \"passe en mode goal : <tâche>\"\n\n## Workflow\n\n### 1. Réception de l'objectif\n\nQuand l'utilisateur déclenche le mode goal :\n\n1. **Analyser** l'objectif : portée, complexité, dépendances\n2. **Décomposer** en plan structuré avec `update_plan` (étapes ordonnées, statuts)\n3. **Estimer** la durée et le nombre de sessions nécessaires\n4. **Informer** l'utilisateur du plan et demander confirmation\n\n### 2. Persistance\n\nCréer un fichier d'état dans `goals/active/YYYY-MM-DD_<slug>.json` :\n\n```json\n{\n  \"id\": \"goal-YYYYMMDD-XXX\",\n  \"title\": \"Titre court\",\n  \"description\": \"Description complète\",\n  \"status\": \"active | paused | completed | failed\",\n  \"created\": \"ISO-8601\",\n  \"updated\": \"ISO-8601\",\n  \"plan\": [\n    {\"step\": \"...\", \"status\": \"pending|in_progress|completed\", \"notes\": \"\"}\n  ],\n  \"context_summary\": \"Résumé de l'état pour reprise\",\n  \"session_count\": 0,\n  \"total_tokens_est\": 0\n}\n```\n\n### 3. Exécution\n\n- Avancer étape par étape, une seule `in_progress` à la fois\n- Mettre à jour `update_plan` à chaque changement d'étape\n- Sauvegarder l'état après chaque étape complétée\n- Si une étape nécessite un sous-agent, utiliser `sessions_spawn`\n\n### 4. Reprise après interruption\n\nAu début de chaque nouvelle session, si un goal est actif :\n1. Lire `goals/active/` pour détecter les goals non terminés\n2. Rappeler à l'utilisateur : \"Goal en cours : <titre> — continuer ?\"\n3. Si oui, reprendre à l'étape `in_progress` ou la première `pending`\n\n### 5. Finalisation\n\n- Marquer le goal comme `completed` ou `failed`\n- Déplacer le fichier de `goals/active/` vers `goals/archive/`\n- Résumé final : étapes complétées, durée, tokens utilisés\n\n## Commandes\n\n| Commande | Action |\n|----------|--------|\n| `/goal status` | Affiche les goals actifs et leur avancement |\n| `/goal pause` | Met en pause le goal courant |\n| `/goal resume` | Reprend le goal mis en pause |\n| `/goal cancel` | Annule le goal courant (demande confirmation) |\n| `/goal list` | Liste tous les goals (actifs + archivés) |\n\n## Fichiers\n\n```\nskills/goal/\n├── SKILL.md           # Ce fichier\n├── SKILL.md.goal      # Backup\n└── state/\n    └── active/        # Goals en cours\n```\n\nLes fichiers de goal sont stockés dans `goals/active/` à la racine du workspace de l'agent qui exécute le goal.\n\n## Règles\n\n- Ne jamais lancer plus d'un goal à la fois sans accord explicite\n- Si une étape échoue, logger l'erreur et proposer : réessayer / ignorer / adapter\n- Mettre à jour le `context_summary` après chaque étape pour permettre une reprise propre\n- Informer l'utilisateur à chaque jalon atteint\n- Si le goal nécessite plus de 3 sessions, proposer un cron de rappel\n", "binary": false, "truncated": false}], "subdirs": []}, {"name": "gog", "source": "Workspace", "path": "skills/gog", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: gog\ndescription: Google Workspace CLI for Gmail, Calendar, Drive, Contacts, Sheets, and Docs.\nhomepage: https://gogcli.sh\nmetadata: {\"clawdbot\":{\"emoji\":\"🎮\",\"requires\":{\"bins\":[\"gog\"]},\"install\":[{\"id\":\"brew\",\"kind\":\"brew\",\"formula\":\"steipete/tap/gogcli\",\"bins\":[\"gog\"],\"label\":\"Install gog (brew)\"}]}}\n---\n\n# gog\n\nUse `gog` for Gmail/Calendar/Drive/Contacts/Sheets/Docs. Requires OAuth setup.\n\nSetup (once)\n- `gog auth credentials /path/to/client_secret.json`\n- `gog auth add you@gmail.com --services gmail,calendar,drive,contacts,sheets,docs`\n- `gog auth list`\n\nCommon commands\n- Gmail search: `gog gmail search 'newer_than:7d' --max 10`\n- Gmail send: `gog gmail send --to a@b.com --subject \"Hi\" --body \"Hello\"`\n- Calendar: `gog calendar events <calendarId> --from <iso> --to <iso>`\n- Drive search: `gog drive search \"query\" --max 10`\n- Contacts: `gog contacts list --max 20`\n- Sheets get: `gog sheets get <sheetId> \"Tab!A1:D10\" --json`\n- Sheets update: `gog sheets update <sheetId> \"Tab!A1:B2\" --values-json '[[\"A\",\"B\"],[\"1\",\"2\"]]' --input USER_ENTERED`\n- Sheets append: `gog sheets append <sheetId> \"Tab!A:C\" --values-json '[[\"x\",\"y\",\"z\"]]' --insert INSERT_ROWS`\n- Sheets clear: `gog sheets clear <sheetId> \"Tab!A2:Z\"`\n- Sheets metadata: `gog sheets metadata <sheetId> --json`\n- Docs export: `gog docs export <docId> --format txt --out /tmp/doc.txt`\n- Docs cat: `gog docs cat <docId>`\n\nNotes\n- Set `GOG_ACCOUNT=you@gmail.com` to avoid repeating `--account`.\n- For scripting, prefer `--json` plus `--no-input`.\n- Sheets values can be passed via `--values-json` (recommended) or as inline rows.\n- Docs supports export/cat/copy. In-place edits require a Docs API client (not in gog).\n- Confirm before sending mail or creating events.\n", "binary": false, "truncated": false}, {"name": "_meta.json", "is_md": false, "content": "{\n  \"ownerId\": \"kn70pywhg0fyz996kpa8xj89s57yhv26\",\n  \"slug\": \"gog\",\n  \"version\": \"1.0.0\",\n  \"publishedAt\": 1767545346060\n}", "binary": false, "truncated": false}], "subdirs": []}, {"name": "subagent-creator", "source": "Workspace", "path": "skills/subagent-creator", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: subagent-creator\ndescription: Create, scope, and prepare specialized sub-agents from capabilities incubated in the main agent. Use when the user wants to create a sub-agent, extract a stable workflow or expertise from the main agent, structure an agent secondary role, define what must be exported, or prepare the artifacts needed before building a dedicated specialized agent.\n---\n\n# Subagent Creator\n\nUse this skill to transform an incubated capability in the main agent into a clean, specialized sub-agent design.\n\nKeep the work concrete. Do not jump straight to implementation if the capability is still vague or too implicit.\n\n## Workflow\n\n1. Identify the capability to extract.\n2. Check whether it is mature enough for extraction.\n3. Turn implicit knowledge into explicit artifacts.\n4. Define the future sub-agent mission and boundaries.\n5. Specify what must be exported, what must stay out, and what must be reformulated.\n6. Propose the target structure for the sub-agent.\n7. Validate that the result is explicit enough to support creation.\n\n## Core principles\n\n- Create specialized sub-agents, not miniature copies of the main agent.\n- Export only what is necessary for the sub-agent mission.\n- Prefer stable references over chat-history dependence.\n- Separate mission, references, workflow, and validation.\n- When a rule is still implicit, convert it into a document, checklist, or protocol before export.\n- Keep artifacts reusable.\n\n## Outputs to produce\n\nProduce the artifacts that fit the user request, usually among:\n- reference summary\n- sub-agent specification\n- export specification\n- target structure\n- validation checklist\n\n## References\n\nRead the following references when needed:\n- `references/architecture-principles.md` for architecture-derived design principles\n- `references/export-patterns.md` for export rules and anti-patterns\n- `references/validation-checklist.md` for maturity and readiness checks\n- `references/artifact-templates.md` for compact output templates\n\n## Working rule\n\nStay practical. This skill exists to help create sub-agents that can actually be built and used, not to produce abstract agent theory.\n", "binary": false, "truncated": false}], "subdirs": [{"name": "references", "files": [{"name": "architecture-principles.md", "is_md": true, "content": "# Architecture principles for sub-agent creation\n\n## Goal\nUse architecture principles as design constraints for specialized sub-agents.\n\n## Principles\n\n### 1. Separate roles clearly\nA sub-agent must have a bounded mission. Do not create a small clone of the main agent.\n\n### 2. Keep responsibilities explicit\nDefine what the sub-agent owns, what the main agent keeps, and where the handoff happens.\n\n### 3. Prefer stable references over hidden context\nIf the sub-agent needs a rule repeatedly, store it in a file or reference instead of relying on chat memory.\n\n### 4. Design explicit flows\nA good sub-agent has a visible sequence: input, work, checks, output.\n\n### 5. Minimize implicit dependencies\nAnything essential to success should be documented and exportable.\n\n### 6. Keep specialization vertical\nThe sub-agent should solve a real bounded job end to end, not a vague category of tasks.\n\n### 7. Define completion criteria\nA sub-agent should know when the job is actually done.\n\n## Translation into design questions\nBefore creating a sub-agent, ask:\n- What is its exact mission?\n- What must it read before acting?\n- What does it produce?\n- What remains under main-agent control?\n- What checks define completion?\n- What implicit knowledge still needs to be externalized?\n", "binary": false, "truncated": false}, {"name": "artifact-templates.md", "is_md": true, "content": "# Artifact templates\n\n## 1. Reference summary\n- Context\n- What was learned\n- Key decisions\n- Known pitfalls\n- Current stable assets\n- Next extraction step\n\n## 2. Sub-agent specification\n- Mission\n- Finality\n- Problem solved\n- Scope\n- Out of scope\n- Required references\n- Target workflow\n- Quality criteria\n- Risks\n\n## 3. Export specification\n- What must be exported\n- Why it matters\n- What must not be exported\n- What must be reformulated\n- Minimal viable export\n- Recommended target export\n\n## 4. Target structure\n- skill or sub-agent name\n- core file(s)\n- references to embed\n- optional scripts/assets\n- execution flow\n- validation points\n\n## 5. Validation checklist\n- maturity confirmed\n- artifacts complete\n- export explicit enough\n- sub-agent mission clear\n- ready for creation or not ready yet\n", "binary": false, "truncated": false}, {"name": "export-patterns.md", "is_md": true, "content": "# Export patterns for sub-agent creation\n\n## Export what is necessary\nGood export transfers the minimal specialized nucleus required for the future sub-agent to succeed.\n\nExport:\n- mission-specific rules\n- stable references\n- workflow steps\n- known pitfalls\n- validation criteria\n\n## Do not export blindly\nAvoid exporting:\n- the full personality of the main agent\n- unrelated workspace rules\n- broad contextual memories with no impact on the mission\n- undocumented intuitions\n\n## Reformulate before export\nSome things should not be copied as-is.\n\nTransform:\n- habits into protocols\n- intuitions into criteria\n- remembered exceptions into written guardrails\n- vague quality feelings into validation checks\n\n## Export test\nAn export is good if a fresh sub-agent could use the exported material and still perform the mission with limited extra context.\n\n## Common anti-patterns\n- exporting everything “just in case”\n- keeping critical know-how only in conversation history\n- confusing style, mission, workflow, and infrastructure\n- creating a sub-agent before its capability is explicit enough\n", "binary": false, "truncated": false}, {"name": "validation-checklist.md", "is_md": true, "content": "# Validation checklist for sub-agent extraction\n\n## 1. Capability maturity\n- Has this capability already worked in real tasks?\n- Are the main recurring steps known?\n- Are the common failure modes known?\n- Is the mission stable enough to define clearly?\n\n## 2. Documentation readiness\n- Is there a reference summary?\n- Is there a specification of the future sub-agent?\n- Is there an export specification?\n- Are critical rules written down?\n\n## 3. Export quality\n- Do we know what must be exported?\n- Do we know what must stay out?\n- Have implicit rules been reformulated into explicit ones?\n\n## 4. Sub-agent clarity\n- Is the sub-agent mission bounded?\n- Are inputs, outputs, and checks clear?\n- Is the future workflow understandable?\n- Are completion criteria defined?\n\n## 5. Readiness decision\nExtraction is ready when:\n- the capability is real\n- the artifacts exist\n- critical implicit knowledge has been externalized\n- the future sub-agent mission is clear enough to build\n", "binary": false, "truncated": false}], "subdirs": []}]}, {"name": "teach", "source": "Workspace", "path": "skills/teach", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: \"teach\"\ndescription: \"Teach the user a new skill or concept, within this workspace.\"\ndisable-model-invocation: true\nargument-hint: \"What would you like to learn about?\"\n---\n\nThe user has asked you to teach them something. This is a stateful request - they intend to learn the topic over multiple sessions.\n\n## Teaching Workspace\n\nTreat the current directory as a teaching workspace. The state of their learning is captured in this directory in several files:\n\n- `MISSION.md`: A document capturing the _reason_ the user is interested in the topic. This should be used to ground all teaching. Use the format in [MISSION-FORMAT.md](./references/MISSION-FORMAT.md).\n- `./reference/*.html`: A directory of reference materials. These are the compressed learnings from the lessons - cheat sheets, reference algorithms, syntax, yoga poses, glossaries. They are the raw units of learning. They should be beautiful documents which print out well, and are designed for quick reference.\n- `RESOURCES.md`: A list of resources which can be explored to ground your teaching in contextual knowledge, or to acquire knowledge and wisdom. Use the format in [RESOURCES-FORMAT.md](./references/RESOURCES-FORMAT.md).\n- `./learning-records/*.md`: A directory of learning records, which capture what the user has learned. These are loosely equivalent to architectural decision records in software development - they capture non-obvious lessons and key insights that may need to be revised later, or drive future sessions. These should be used to calculate the zone of proximal development. They are titled `0001-<dash-case-name>.md`, where the number increments each time. Use the format in [LEARNING-RECORD-FORMAT.md](./references/LEARNING-RECORD-FORMAT.md).\n- `./lessons/*.html`: A directory of lessons. A **lesson** is a single, self-contained HTML output that teaches one tightly-scoped thing tied to the mission. This is the primary unit of teaching in this workspace.\n- `./assets/*`: Reusable **components** shared across lessons. See [Assets](#assets).\n- `NOTES.md`: A scratchpad for you to jot down user preferences, or working notes.\n\n## Philosophy\n\nTo learn at a deep level, the user needs three things:\n\n- **Knowledge**, captured from high-quality, high-trust resources\n- **Skills**, acquired through highly-relevant interactive lessons devised by you, based on the knowledge\n- **Wisdom**, which comes from interacting with other learners and practitioners\n\nBefore the `RESOURCES.md` is well-populated, your focus should be to find high-quality resources which will help the user acquire knowledge. Never trust your parametric knowledge.\n\nSome topics may require more skills than knowledge. Learning more about theoretical physics might be more knowledge-based. For yoga, more skills-based.\n\n### Fluency vs Storage Strength\n\nYou should be careful to split between two types of learning:\n\n- **Fluency strength**: in-the-moment retrieval of knowledge\n- **Storage strength**: long-term retention of knowledge\n\nFluency can give the user an illusory sense of mastery, but storage strength is the real goal. Try to design lessons which build long-term retention by desirable difficulty:\n\n- Using retrieval practice (recall from memory)\n- Spacing (distributing practice over time)\n- Interleaving (mixing up different but related topics in practice - for skills practice only)\n\n## Lessons\n\nA lesson is the main thing you produce — the unit in which knowledge and skills reach the user. Each lesson is one self-contained HTML file, saved to `./lessons/` and titled `0001-<dash-case-name>.html` where the number increments each time.\n\nA lesson should be **beautiful** — clean, readable typography and layout — since the user will return to these later to review. Think Tufte.\n\nThe lesson should be short, and completable very quickly. Learners' working memory is very small, and we need to stay within it. But each lesson should give the user a single tangible win that they can build on. It should be directly tied to the mission, and should be in the user's zone of proximal development.\n\nIf possible, open the lesson file for the user by running a CLI command.\n\nEach lesson should link via HTML anchors to other lessons and reference documents.\n\nEach lesson should recommend a primary source for the user to read or watch. This should be the most high-quality, high-trust resource you found on the topic.\n\nEach lesson should contain a reminder to ask followup questions to the agent. The agent is their teacher, and can assist with anything that's unclear.\n\n## Assets\n\nLessons are built from reusable **components**, stored in `./assets/`: stylesheets, quiz widgets, simulators, diagram helpers — anything a second lesson could reuse.\n\nReuse is the default, not the exception. Before authoring a lesson, read `./assets/` and build from the components already there. When a lesson needs something new and reusable, write it as a component in `./assets/` and link to it — never inline code a future lesson would duplicate.\n\nA shared stylesheet is the first component every workspace earns: every lesson links it, so the lessons look like one consistent course rather than a pile of one-offs. As the workspace grows, so should the component library.\n\n## The Mission\n\nEvery lesson should be tied into the mission - the reason that the user is interested in learning about the topic.\n\nIf the user is unclear about the mission, or the `MISSION.md` is not populated, your first job should be to question the user on why they want to learn this.\n\nFailing to understand the mission will mean knowledge acquisition is not grounded in real-world goals. Lessons will feel too abstract. You will have no way of judging what the user should do next.\n\nMissions may change as the user develops more skills and knowledge. This is normal - make sure to update the `MISSION.md` and add a learning record to capture the change. Confirm with the user before changing the mission.\n\n## Zone Of Proximal Development\n\nEach lesson, the user should always feel as if they are being challenged 'just enough'.\n\nThe user may specify an exact thing they want to learn. If they don't, figure out their zone of proximal development by:\n\n- Reading their `learning-records`\n- Figuring out the right thing to teach them based on their mission\n- Teach the most relevant thing that fits in their zone of proximal development\n\n## Knowledge\n\nLessons should be designed around a skill the user is going to learn. The knowledge in the lesson should be only what's required to acquire that skill. You teach the knowledge first, then get the user to practice the skills via an interactive feedback loop.\n\nKnowledge should first be gathered from trusted resources. Use `RESOURCES.md` to keep track of them. Lessons should be littered with citations - links to external resources to back up any claim made. This increases the trustworthiness of the lesson.\n\nFor acquiring knowledge, difficulty is the enemy. It eats working memory you need for understanding.\n\n## Skills\n\nIf knowledge is all about acquisition, skills are about durability and flexibility. Make the knowledge stick.\n\nFor skill acquisition, difficulty is the tool. Effortful retrieval is what builds storage strength. Skills should be taught through interactive lessons. There are several tools at your disposal:\n\n- Interactive lessons, using quizzes and light in-browser tasks\n- Lessons which guide the user through a list of real-world steps to take (for instance, yoga poses)\n\nEach of these should be based on a **feedback loop**, where the user receives feedback on their performance. This feedback loop should be as tight as possible, giving feedback immediately - and ideally automatically.\n\nFor quizzes, each answer should be exactly the same number of words (and characters, if possible). Don't give the user any clues about the answer through formatting.\n\n## Acquiring Wisdom\n\nWisdom comes from true real-world interaction - testing your skills outside the learning environment.\n\nWhen the user asks a question that appears to require wisdom, your default posture should be to attempt to answer - but to ultimately delegate to a **community**.\n\nA community is a place (online or offline) where the user can test their skills in the real world. This might be a forum, a subreddit, a real-world class (budget permitting) or a local interest group.\n\nYou should attempt to find high-reputation communities the user can join. If the user expresses a preference that they don't want to join a community, respect it.\n\n## Reference Documents\n\nWhile creating lessons, you should also create reference documents. Lessons can reference these documents - they are useful for tracking raw units of knowledge useful across lessons.\n\nLessons will rarely be revisited later - reference documents will be. They should be the compressed essence of the lesson, in a format designed for quick reference.\n\nSome learning topics lend themselves to reference:\n\n- Syntax and code snippets for programming\n- Algorithms and flowcharts for processes\n- Yoga poses and sequences for yoga\n- Exercises and routines for fitness\n- Glossaries for any topic with its own nomenclature\n\nGlossaries, in particular, are an essential reference. Once one is created, it should be adhered to in every lesson.\n\n## `NOTES.md`\n\nThe user will sometimes express preferences of how they want to be taught, or things you should keep in mind. This is the place to record those preferences, so you can refer back to them when designing lessons or working with the user.\n", "binary": false, "truncated": false}], "subdirs": [{"name": "references", "files": [{"name": "LEARNING-RECORD-FORMAT.md", "is_md": true, "content": "# Learning Record Format\n\nLearning records live in `./learning-records/` and use sequential numbering: `0001-slug.md`, `0002-slug.md`, etc. Create the directory lazily — only when the first record is written.\n\nThey are the teaching equivalent of ADRs: they capture non-obvious lessons, key insights, and stated prior knowledge that will steer future sessions. They are used to calculate the zone of proximal development.\n\n## Template\n\n```md\n# {Short title of what was learned or established}\n\n{1-3 sentences: what was learned (or what prior knowledge was established), and why it matters for future sessions.}\n```\n\nThat is the whole format. A learning record can be a single paragraph. The value is recording _that_ this is now known and _why_ it changes what to teach next — not in filling out sections.\n\n## Optional sections\n\nOnly include these when they add genuine value. Most records won't need them.\n\n- **Status** frontmatter (`active | superseded by LR-NNNN`) — useful when an earlier understanding turns out to be wrong and is replaced.\n- **Evidence** — how the user demonstrated the understanding (a question answered, an exercise completed, prior experience cited). Useful when the claim might be revisited.\n- **Implications** — what this unlocks or rules out for future sessions. Worth recording when non-obvious.\n\n## Numbering\n\nScan `./learning-records/` for the highest existing number and increment by one.\n\n## When to write a learning record\n\nWrite one when any of these is true:\n\n1. **The user demonstrated genuine understanding of something non-trivial** — not just exposure, but evidence they can use the concept correctly. This sets a new floor for what to teach next.\n2. **The user disclosed prior knowledge** — \"I already know X.\" Record it so future sessions don't re-teach it. Also record the _depth_ claimed.\n3. **A misconception was corrected** — the user previously believed something wrong and now sees why. These are high-value: they predict future stumbling blocks for related topics.\n4. **The mission shifted in response to learning** — the user discovered they cared about something different than they thought. Cross-link to [[MISSION.md]] and update it.\n\n### What does _not_ qualify\n\n- Material that was merely covered. Coverage is not learning. Wait for evidence.\n- Anything already captured tersely in [[GLOSSARY.md]] as a term definition. Don't duplicate.\n- Session-by-session activity logs. Learning records are not a journal — they are decision-grade insights.\n\n## Supersession\n\nWhen a later record contradicts an earlier one (the user's understanding deepened or corrected), mark the old record `Status: superseded by LR-NNNN` rather than deleting it. The history of how understanding evolved is itself useful signal.\n", "binary": false, "truncated": false}, {"name": "MISSION-FORMAT.md", "is_md": true, "content": "# MISSION.md Format\n\n`MISSION.md` lives at the workspace root. It captures the _reason_ the user is learning this topic. Every teaching decision — what to teach next, which resources to surface, which exercises to design — should trace back to this document.\n\n## Template\n\n```md\n# Mission: {Topic}\n\n## Why\n{1-3 sentences. The concrete real-world goal the user is chasing. What changes in their life or work when they have this skill? Avoid abstract framings like \"to understand X\" — push for the underlying outcome.}\n\n## Success looks like\n- {A specific, observable thing the user will be able to do}\n- {Another specific thing}\n- {…}\n\n## Constraints\n- {Time, budget, prior commitments, learning preferences, anything that bounds the approach}\n\n## Out of scope\n- {Adjacent topics the user explicitly does not want to chase right now — protects the zone of proximal development}\n```\n\n## Rules\n\n- **One mission per workspace.** If the user wants to learn two unrelated things, that is two workspaces.\n- **Concrete over abstract.** \"Run a half marathon by October\" beats \"get fitter.\" \"Ship a Rust CLI to my team\" beats \"learn Rust.\"\n- **Push back on vagueness.** If the user cannot articulate why, interview them before writing anything. A bad mission is worse than no mission.\n- **Revise when reality shifts.** Missions change. When the user's goal moves, update this file — don't leave a stale mission steering future sessions.\n- **Keep it short.** If `MISSION.md` runs past a screen, it has stopped being a compass and started being a plan.\n", "binary": false, "truncated": false}, {"name": "RESOURCES-FORMAT.md", "is_md": true, "content": "# RESOURCES.md Format\n\n`RESOURCES.md` is the curated set of trusted sources for this topic. Knowledge for explainers should be drawn from here, not from parametric guesses. Wisdom comes from the communities listed here.\n\n## Structure\n\n```md\n# {Topic} Resources\n\n## Knowledge\n\n- [Book: _The Science and Practice of Strength Training_ — Zatsiorsky & Kraemer](https://example.com)\n  Foundational text on programming and adaptation. Use for: anything to do with periodisation, recovery, intensity zones.\n- [Article: \"How Much Should I Train?\" — Greg Nuckols (Stronger By Science)](https://example.com)\n  Evidence-based review of volume landmarks. Use for: weekly set targets per muscle group.\n\n## Wisdom (Communities)\n\n- [r/weightroom](https://reddit.com/r/weightroom)\n  High-signal subreddit, moderated against bro-science. Use for: programme critique, plateau troubleshooting.\n- Local: Tuesday strength class at {gym name}\n  Use for: real-time coaching feedback on lifts.\n```\n\n## Rules\n\n- **High-trust only.** Prefer primary sources, recognised experts, peer-reviewed work, and communities with strong moderation. If a resource is marketing dressed as education, leave it out.\n- **Annotate every entry.** A bare link is useless in three months. Add one line: what it covers and when to reach for it.\n- **Group by Knowledge / Wisdom.** Mirrors the philosophy in [SKILL.md](./SKILL.md). It is fine for a resource to appear in only one group.\n- **Surface gaps explicitly.** If no good resource exists for an area the mission needs, write a `## Gaps` section listing what is missing. This drives future search.\n- **Prune ruthlessly.** A resource that turned out to be wrong, shallow, or off-mission should be removed, not buried. Better five sharp sources than thirty mediocre ones.\n- **Record community preferences.** If the user has opted out of joining communities, note it here so future sessions don't keep proposing them.\n", "binary": false, "truncated": false}], "subdirs": []}]}, {"name": "admin-factory", "source": "Global", "path": "skills/admin-factory", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: \"admin-factory\"\ndescription: \"Usine à documents Qualiopi : conventions, feuilles présence, certificats, attestations. Déclenchement : document administratif/légal formation, Qualiopi.\"\n---\n\n# admin-factory — Usine à documents administratifs formation\n\nGénère les documents légaux et administratifs Qualiopi pour les missions de formation de Laurent Serre Développement.\n\n**Déclenchement immédiat** dès que l'utilisateur demande un document administratif lié à la formation : convention, feuille de présence, convocation, attestation, certificat de réalisation, évaluation, audit Qualiopi, ou tout document de clôture. Également pour toute question sur la conformité Qualiopi d'un dossier.\n\n## Architecture\n\nLe répertoire se trouve ici : `~/../production/admin-factory/`\n\n```\nadmin-factory/\n├── README.md                  ← Guide complet (le lire en premier)\n├── Templates/                 ← TEMPLATES CANONIQUES (NE PAS INVENTER NI MODIFIER)\n│   ├── client-config-TEMPLATE.yaml\n│   ├── convention-bootcamp-commercial-v2.2-TEMPLATE.md\n│   ├── programme-bootcamp-qualiopi-v2.md / .pdf\n│   ├── cgv-formation-lsd-v2026.1.md / .pdf  ← CGV officielles\n│   ├── Apprenants/ (fiches, convocations, livret accueil)\n│   ├── Presence/ (feuille de présence)\n│   ├── Evaluations/ (positionnement, acquis fin, satisfaction, à froid)\n│   ├── Cloture/ (attestation fin, certificat réalisation)\n│   └── Facturation/ (devis, facture)\n├── Scripts/\n│   ├── create-client-folder.py     ← Arborescence client\n│   ├── gen-convention.py           ← Convention PDF 4-en-1\n│   ├── gen-calendrier.py           ← Calendrier sessions\n│   ├── gen-feuilles-presence.py    ← Émargements PDF (A4 paysage)\n│   ├── gen-convocation.py          ← Convocations PDF individuelles\n│   ├── gen-docs-cloture.py         ← Attestations + Certificat\n│   ├── orchestrer.py               ← Point d'entrée unique\n│   └── audit-qualiopi.py           ← Conformité 9 indicateurs\n├── Assets/                        ← Signature_Laurent.png\n├── Exemples/                      ← Conventions antérieures\n└── Deroule_BootCamp/              ← Déroulé pédagogique\n```\n\n## RÈGLES ABSOLUES — Ne pas enfreindre\n\n1. **CGV** : toujours `Templates/cgv-formation-lsd-v2026.1.pdf` — ne jamais inventer ni modifier.\n2. **Programme** : toujours `Templates/programme-bootcamp-qualiopi-v2.pdf` sauf demande explicite de Laurent.\n3. **Dates obligatoires** : `start_date` et `end_date` dans `client-config.yaml`. Aucune convention sans dates.\n4. **Signature Laurent** : `Assets/Signature_Laurent.png` — côté Prestataire dans les blocs de signature.\n5. **Feuilles de présence** : jamais de signature Laurent préremplie.\n6. **Blocs de signature** : même hauteur pour les deux colonnes (Client / LSD).\n7. **Vérification** : après chaque génération PDF, extraire le texte avec `fitz` et contrôler : champs variables présents, pas de pages dupliquées, pas de texte tronqué.\n\n## Dépendances\n\n```bash\npip install reportlab pyyaml fitz  # Python\n```\n\nTous les scripts s'exécutent depuis `production/admin-factory/` :\n```bash\ncd ~/../production/admin-factory/\nSCRIPTS=\"Scripts\"\nCLIENT=\"Nom_Client\"\n```\n\n## Workflow 1 — Création dossier client\n\n```bash\npython3 Scripts/create-client-folder.py \"Nom Client\"\n```\nPuis remplir `client-config.yaml` et `contacts.csv`.\n\nFormat `client-config.yaml` (obligatoire) :\n```yaml\nnom: \"Nom Client\"\norganisation: \"...\"\ncontact_nom: \"...\"\ncontact_email: \"...\"\nformation: \"Bootcamp Commercial\"\nstart_date: 2026-03-10   # OBLIGATOIRE\nend_date: 2026-04-15      # OBLIGATOIRE\nheures: 70\nsessions: 5\nobjectifs: [\"...\"]\nqualiopi:\n  convention_signee: false\n  programme_valide: true\n  statut: en_cours\n```\n\nFormat `contacts.csv` :\n```csv\nnom;prenom;email;telephone;role;entreprise\nDupont;Jean;j.dupond@email.com;0600000000;apprenant;MonEntreprise\n```\nRôles : `apprenant`, `contact_client`, `formateur`.\n\n## Workflow 2 — Convention PDF 4-en-1\n\n```bash\npython3 Scripts/gen-convention.py \"Nom_Client\"\n```\nSortie : `Administratif/convention_Nom_Client_DATE.pdf`\n\nLa convention **4-en-1** contient obligatoirement :\n1. Convention-cadre (15 articles, template v2.2)\n2. Programme de formation en vigueur\n3. Conditions générales de vente (CGV)\n4. Calendrier de session et liste participants\n\nNe jamais générer une convention seule.\n\n## Workflow 3 — Préparation sessions\n\n```bash\npython3 Scripts/gen-feuilles-presence.py \"Nom_Client\"     # Émargements\npython3 Scripts/gen-convocation.py \"Nom_Client\"            # Convocations\npython3 Scripts/gen-calendrier.py \"Nom_Client\"             # Calendrier\n# Ou tout-en-un :\npython3 Scripts/orchestrer.py \"Nom_Client\" --presences --convocations\n```\n\n## Workflow 4 — Clôture formation\n\n```bash\npython3 Scripts/gen-docs-cloture.py \"Nom_Client\" --fin YYYY-MM-DD\n```\nGénère : attestations individuelles (1 par apprenant) + certificat de réalisation.\n\n## Workflow 5 — Audit Qualiopi\n\n```bash\npython3 Scripts/audit-qualiopi.py \"Nom_Client\"    # 9 indicateurs\npython3 Scripts/audit-qualiopi.py --all            # tous les clients\n```\n\n## Workflow 6 — Production complète\n\n```bash\npython3 Scripts/orchestrer.py \"Nom_Client\" --all\n```\nOrdre : convention → calendrier → émargements → convocations. La clôture est explicite via `--cloture`.\n\n## Vérification post-génération\n\n```python\nimport fitz\ndoc = fitz.open(chemin_pdf)\nfor i, page in enumerate(doc):\n    text = page.get_text()\n    # Vérifier : champs variables présents, pas de doublon de page\n    # Vérifier : nombre de pages cohérent\ndoc.close()\n```\n\n## Pièges connus\n\n- Les scripts gèrent les deux noms YAML : `nom`/`name`, `date_debut`/`start_date`\n- Les dossiers avec accents sont gérés automatiquement\n- Ne jamais laisser un PDF non vérifié\n- Signature Laurent jamais préremplie sur feuilles de présence (uniquement convention, certificats, attestations)\n- Programme = bootcamp v2 par défaut, sauf demande explicite de Laurent\n- Préférer un PDF contrôlé à un DOCX non vérifié pour les documents à mise en page riche\n", "binary": false, "truncated": false}], "subdirs": []}, {"name": "agent-architect", "source": "Global", "path": "skills/agent-architect", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: agent-architect\ndescription: \"Concevoir et produire des agents clients isolés sur OpenClaw — architecture, blueprint, pricing, teasing\"\nmetadata:\n  {\n    \"openclaw\":\n      {\n        \"emoji\": \"🏗️\",\n        \"requires\":\n          { \"config\": [\"agents.list\", \"bindings\"] },\n      },\n  }\n---\n\n# Agent Architect — Skill de conception d'agents clients\n\nTu aides Laurent à concevoir et produire des agents qu'il vendra à ses clients B2B, soit en prêt-à-l'emploi (abonnement mensuel), soit en configuré sur mesure (setup + abonnement).\n\nTu t'appuies exclusivement sur les bonnes pratiques OpenClaw de la documentation officielle.\n\n---\n\n## 1. Architecture client : le modèle délégué\n\nChaque client doit être traité comme un **agent isolé** dans OpenClaw. Le modèle architectural de référence est le **Delegate Architecture** de la doc OpenClaw (concepts/delegate-architecture.md).\n\n### Principe\n\n```\nOpenClaw Gateway (1 serveur, 1 process)\n  ├── agent:main               → Laurent (Telegram direct)\n  ├── agent:client-dupont      → Client A (Telegram bot dédié)\n  ├── agent:client-martin      → Client B (Telegram bot dédié)\n  └── agent:client-bernard     → Client C (Telegram bot dédié)\n```\n\nChaque agent client a :\n- Son propre **workspace** (`~/.openclaw/workspace-client-<nom>`)\n- Son propre **agentDir** (`~/.openclaw/agents/client-<nom>/agent`)\n- Ses propres **sessions** complètement isolées\n- Son propre **bot Telegram** (compte channel dédié)\n- Ses propres **skills** limités par allowlist\n- Son propre **profil d'outils** (tool allow/deny)\n- Sa propre **identité** (nom, personnalité via SOUL.md/AGENTS.md)\n\n### Configuration OpenClaw type\n\n```json5\n{\n  agents: {\n    list: [\n      // Agent Laurent - accès complet\n      { id: \"main\", default: true, workspace: \"~/.openclaw/workspace\" },\n      \n      // Agent client Dupont - accès restreint, workspace isolé\n      {\n        id: \"client-dupont\",\n        name: \"Assistant Commercial Dupont\",\n        workspace: \"~/.openclaw/workspace-client-dupont\",\n        agentDir: \"~/.openclaw/agents/client-dupont/agent\",\n        model: { primary: \"deepseek/deepseek-v4-flash\" },\n        skills: [\"github\", \"summarize\"], // liste explicite, pas d'héritage\n        identity: {\n          name: \"Assistant Dupont\",\n          emoji: \"🤖\",\n        },\n        tools: {\n          deny: [\"browser\", \"canvas\", \"gateway\"], // jamais de navigation web\n        },\n      },\n    ],\n  },\n  \n  // Routage : chaque bot Telegram → son agent\n  bindings: [\n    { agentId: \"main\", match: { channel: \"telegram\", accountId: \"default\" } },\n    { agentId: \"client-dupont\", match: { channel: \"telegram\", accountId: \"dupont\" } },\n  ],\n}\n```\n\n---\n\n## 2. Blueprint d'agent client\n\nPour concevoir un agent client, utiliser ce template structuré :\n\n### Agent Blueprint\n\n```markdown\n## Agent Blueprint : [Nom de l'agent]\n\n### Carte d'identité\n- **Nom produit** : [ex: Assistant Publication]\n- **Catégorie** : Prêt-à-emploi / Sur mesure\n- **Prix mensuel** : [ex: 29€, 89€]\n- **Setup** : [ex: 0€, 250€]\n- **Client cible** : [ex: Consultant solo, PME 5-20 personnes]\n\n### Stack technique\n- **Modèle** : deepseek/deepseek-v4-flash (coût infime)\n- **Skills** : [liste des skills nécessaires]\n- **Outils autorisés** : read, write, exec, web_search, web_fetch\n- **Outils refusés** : browser, canvas, cron, gateway\n- **Workspace** : ~/.openclaw/workspace-client-<id>/\n\n### Livrables client\n- [ ] Bot Telegram opérationnel\n- [ ] Workspace initialisé (AGENTS.md, SOUL.md, USER.md)\n- [ ] Skills installés et testés\n- [ ] Session test validée\n- [ ] Documentation d'usage (2 pages max)\n\n### Boucle de feedback\n- [ ] Canal de communication défini (Telegram DM)\n- [ ] Droit de validation humaine sur les sorties\n- [ ] Mécanisme de correction / réglage\n```\n\n---\n\n## 3. Les couches de production d'un agent client\n\n### Couche 1 — Workspace et identité\n- `AGENTS.md` : instructions opérationnelles, règles, périmètre\n- `SOUL.md` : personnalité, ton, limites strictes\n- `USER.md` : profil du client, son secteur, ses préférences\n- `IDENTITY.md` : nom, vibe, emoji\n- `memory/` : mémoire quotidienne + MEMORY.md long terme\n\n### Couche 2 — Skills\nLes skills sont le cœur de la capacité. Par agent, on définit une **skill allowlist explicite** via `agents.list[].skills`. Pas d'héritage des defaults pour éviter les fuites de capacités.\n\nSkills candidats par type d'agent :\n\n| Type agent                | Skills recommandés                          |\n|---------------------------|---------------------------------------------|\n| Publication blog          | copywriter-publisher, web_search            |\n| Assistant vidéo           | laurent-video-editor, summarize             |\n| Assistant prospection     | (à concevoir : workflow dédié)              |\n| Assistant relance         | (à concevoir : CRM léger + relance)         |\n| Assistant diagnostic      | summarize, web_search, exec                 |\n\n### Couche 3 — Outils et sécurité\nUtiliser `agents.list[].tools` pour restreindre :\n- `tools.deny` : browser, canvas, cron (jamais de navigation web ni de modification système)\n- `tools.allow` : read, write, exec, web_search, web_fetch, sessions_spawn, sessions_send\n- `tools.elevated` : désactivé pour les agents clients\n\n### Couche 4 — Canal et interface\n- **Recommandé** : bot Telegram dédié par client\n  - Créer un bot via BotFather → token\n  - Ajouter comme `channels.telegram.accounts.<clientId>`\n  - Binder via `bindings[{ agentId: \"client-<id>\", match: { channel: \"telegram\", accountId: \"<clientId>\" } }]`\n- **Alternatif** : interface web via le webchat OpenClaw\n- **Ne pas faire** : mélanger plusieurs clients sur le même bot Telegram\n\n### Couche 5 — Cycle de vie\n- **Création** : `openclaw agents add client-<id>` → workspace + état\n- **Connexion canal** : `openclaw channels login --channel telegram --account <clientId>`\n- **Test** : validation avec le client sur un cas réel\n- **Mise à jour** : modification des skills/AGENTS.md dans le workspace client\n- **Arrêt** : désactiver le binding, garder les sessions archivées\n\n---\n\n## 4. Prix et packaging\n\n### Grille tarifaire (recommandée par la doc architecture)\n\n| Type                | Prix mensuel | Setup | Complexité | Marge |\n|---------------------|-------------|-------|------------|-------|\n| Agent prêt-à-emploi | 29-89€      | 0€    | Faible     | Très haute (DeepSeek) |\n| Agent sur mesure    | 149-399€    | 500-2000€ | Haute | Haute + lock-in |\n\n### Règle de coût (basée sur DeepSeek V4 Flash)\n- Coût d'inférence moyen par agent : centimes par mois pour un usage normal\n- Même à 29€/mois, la marge est > 95%\n- Facteur limitant : le temps de maintenance humaine, pas le coût d'API\n\n---\n\n## 5. Production et teasing\n\n### Landing page waitlist\n- Structure : nom, email, taille entreprise, besoin (menu déroulant : blog, vidéo, prospection, diagnostic, autre)\n- Message : « Accès anticipé — liste d'attente limitée »\n- Rassurance : création d'entreprise avec Lilian = sérieux\n\n### Calendrier de teasing (vidéos anti-slop)\n1. Semaine 1 : montrer le problème (agents qui slop)\n2. Semaine 2 : montrer la solution (un résultat propre — article, vidéo)\n3. Semaine 3 : révéler l'existence de l'offre + waitlist\n4. Semaine 4 : ouvrir les premiers slots\n\n---\n\n## 6. Checklist de production complète\n\nAvant de déclarer un agent « prêt client » :\n\n- [ ] **Workspace** : AGENTS.md, SOUL.md, USER.md, IDENTITY.md rédigés\n- [ ] **Config** : entrée dans `agents.list[]` + bindings\n- [ ] **Skills** : allowlist définie, aucun skill superflu\n- [ ] **Tools** : deny list active (browser, canvas, cron)\n- [ ] **Bot** : token Telegram créé, connexion testée\n- [ ] **Modèle** : DeepSeek V4 Flash configuré (économie)\n- [ ] **Test** : 3 scénarios réels réussis\n- [ ] **Doc client** : page A5 « Comment utiliser votre assistant »\n- [ ] **Backup** : workspace commité sur git privé\n- [ ] **Facturation** : abonnement configuré\n\n---\n\n## 7. Sources architecturales\n\nConfiguration et conception basées sur :\n- `docs/gateway/config-agents.md` — agents.list, defaults, override hiérarchie\n- `docs/concepts/multi-agent.md` — isolation agent, bindings, comptes channels\n- `docs/concepts/delegate-architecture.md` — modèle délégué, durcissement, tiers de capacité\n- `docs/tools/creating-skills.md` — création de skills\n- `docs/tools/skills.md` — allowlist skills, gating, precedence\n- `docs/tools/subagents.md` — délégation de tâches\n", "binary": false, "truncated": false}], "subdirs": []}, {"name": "analyse-entretien-ac66", "source": "Global", "path": "skills/analyse-entretien-ac66", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: \"analyse-entretien-ac66\"\ndescription: \"Analyse exhaustive d'entretiens audioprothèse AC66 : scoring, coaching, CRM, suivi longitudinal\"\n---\n\n# Analyse Exhaustive d'Entretien — Audition Conseil 66\n\nCompétence exclusive pour l'agent `flora-assistante-bot` (alias ac66).\n\n## Objectif\n\nAnalyser toute transcription d'entretien commercial (audioprothésiste × patient) de façon exhaustive, reproductible et actionnable — de la prise de contact au suivi, en passant par la scorecard, le coaching micro-ciblé, la mise à jour CRM et le suivi longitudinal.\n\n## Déclenchement\n\n- Entrée : transcription d'entretien reçue sur `clawdia-ac66@laurentserre.com`\n- Source d'autorité : `references/plan-de-vente-audition-conseil-66.md` (obligatoire)\n- Si absent → mode dégradé avec grille générique\n\n## Traitement des transcriptions Upmeet\n\n### Délégation au skill analyse-entretien-exhaustive\n\nPour toute transcription provenant d'Upmeet, l'agent DOIT utiliser le skill `analyse-entretien-exhaustive` (situé dans `workspace-executive-assistant/skills/analyse-entretien-exhaustive/`) pour réaliser l'analyse multi-passes complète :\n\n1. **Extraction** : `scripts/extract_transcript.py` — extraire le texte brut de la transcription brute Upmeet\n2. **Segmentation** : `scripts/segment_normalize.py` — segmenter en segments atomiques\n3. **Passes LLM 1→7** : suivre les gabarits stricts de `references/pass-prompts.md` :\n   - Pass 1 : vue globale\n   - Pass 2 : candidats sujets\n   - Pass 3 : carte des sujets\n   - Pass 4A/B/C : analyse détaillée par sujet\n   - Pass 5 : analyse rhétorique\n   - Pass 6 : compte-rendu exhaustif\n   - Pass 7 : QA validation (`scripts/validate_outputs.py` — min 98% coverage)\n4. **Références à lire** :\n   - `references/output-schema.md` — schémas JSON\n   - `references/pass-prompts.md` — templates par passe\n   - `references/workflow.md` — enchaînement et checkpoints\n\nEnsuite seulement, produire la scorecard AC66 (phases plan de vente + coaching micro-ciblé + livrables Flora) en exploitant l'analyse structurée produite par les passes ci-dessus.\n\n### Interdiction stricte du résumé email Upmeet\n\nLe résumé ou compte-rendu automatique inclus dans le corps de l'email Upmeet est **de piètre qualité et ne doit en aucun cas servir de base à l'analyse**.\n\nRègles absolues :\n- ❌ **NE JAMAIS utiliser** le résumé textuel de l'email Upmeet comme source d'analyse\n- ❌ **NE JAMAIS extraire** les sujets, décisions ou next steps depuis ce résumé\n- ❌ **NE JAMAIS citer** de verbatims provenant de ce résumé\n- ✅ **Toujours repartir** de la transcription brute (fichier joint `.txt`, `.pdf` ou `.md` dans l'email Upmeet)\n- ✅ Si la transcription brute est absente ou illisible → signaler « transcription brute non disponible » et ne pas produire d'analyse\n\nEn cas de doute, l'absence d'analyse vaut mieux qu'une analyse basée sur un résumé Upmeet de mauvaise qualité.\n\n## Pipeline d'analyse\n\n### 1. Pré-analyse\n- Vérifier l'intégrité de la transcription (pas vide, pas tronquée)\n- Identifier : audioprothésiste, date, type d'entretien (1er rdv, essai, suivi, clôture)\n- Lire le plan de vente AC66 — s'assurer de la version à jour\n- Lire l'historique du même audioprothésiste dans `state/audioprothesistes_scores.json`\n\n### 2. Cartographie complète par phases du plan de vente\n\nMapper TOUT l'entretien aux phases suivantes (ne rien omettre) :\n\n1. **Prise de contact / accueil** — posture, premier échange, création de confiance\n2. **Cadrage de l'entretien** — ce qui va se passer, le temps, les objectifs partagés\n3. **Découverte** — questions posées, profondeur de l'exploration (besoin, attentes, contexte, budget, motivation)\n4. **Pédagogie audioprothétique** — explications, démonstration, lien besoins → solutions\n5. **Traitement des objections / freins** — objections nommées, accueillies, traitées ou contournées\n6. **Accompagnement à la décision** — closing, proposition, prochaine étape, engagement\n7. **Suivi / clôture** — rendez-vous posé, document donné, relance programmée\n\nPour chaque phase : forces, fragilités, 1-2 extraits probants (verbatims textuels).\n\n### 3. Scorecard exhaustive\n\nNoter chaque critère de 0 à 3 (0=absent, 1=faible, 2=correct, 3=excellent) :\n\n| Critère | Poids |\n|---|---|\n| Qualité du contact / accueil | 10 |\n| Cadrage de l'entretien | 10 |\n| Profondeur de découverte (besoins, budget, décideur) | 15 |\n| Écoute active et reformulation | 10 |\n| Pédagogie audioprothétique (liens besoins → solutions) | 15 |\n| Traitement des objections et des freins | 15 |\n| Capacité à faire avancer la décision (closing) | 15 |\n| Clarté du suivi et des prochaines étapes | 10 |\n\nAgrégation : (total points / 120) × 100 = note sur 100.\n\n### 4. Coaching micro-ciblé (TOP 3)\n\nPour les 3 écarts les plus prioritaires (score le plus bas × impact business le plus fort) :\n\n1. **Constat** : \"Phase cadrage — score 1/3. Pas de cadre posé d'entrée.\"\n2. **Extrait** : verbatim textuel\n3. **Impact** : \"Sans cadre, le patient ne sait pas où va l'entretien → risque de dérive et de non-décision.\"\n4. **3 étapes concrètes** :\n   - Étape 1 : ...\n   - Étape 2 : ...\n   - Étape 3 : ...\n5. **Phrase modèle** : prête à être dite textuellement\n\n### 5. Synthèse ultra-courte (pour Flora)\n\nFormat standardisé :\n```\nNote : XX/100\n3 forces : [force1] / [force2] / [force3]\n3 priorités : [prio1] / [prio2] / [prio3]\nProchaine action : [1 action précise avant prochain entretien]\n```\n\n### 6. Compte rendu CRM (≤180 mots)\n\nStructure :\n- Contexte : interlocuteurs, date, type de rdv\n- Besoins exprimés\n- Décisions / engagements pris\n- Risques / signaux faibles\n- Next steps\n- Opportunité (si identifiable)\n- Tags : type de rdv + profil patient\n\n### 7. Brouillon de mail ORL (si pertinent)\n\nTon sobre, factuel, médical-compatible.\n- Pas de diagnostic inventé\n- Faits cliniques rapportés uniquement\n- Recommandation d'appareillage si argumentée dans l'entretien\n\n### 8. Suivi longitudinal\n\nMettre à jour `state/audioprothesistes_scores.json` :\n```json\n{\n  \"audioprothesiste_nom\": {\n    \"derniere_analyse\": \"YYYY-MM-DD\",\n    \"historique_scores\": [72, 78, 85],\n    \"moyenne\": 78.3,\n    \"tendance\": \"hausse|stable|baisse\",\n    \"forces_recurrentes\": [\"écoute active\", \"découverte\"],\n    \"axes_recurrents\": [\"cadrage\", \"closing\"],\n    \"nb_analyses\": 3,\n    \"derniers_extraits\": [\n      {\"date\": \"YYYY-MM-DD\", \"extrait\": \"...\", \"phase\": \"découverte\"}\n    ]\n  }\n}\n```\n\n## Livrables\n\n1. Email HDE à Flora avec copie Laurent : synthèse + scorecard complète\n2. Mise à jour `state/audioprothesistes_scores.json`\n3. Mise à jour `state/processed_messages.json`\n4. Archive HTML dans `production/emails/YYYY-MM-DD_sujet_flora.html`\n\n## Règles d'or\n\n- ZERO invention. Si un point n'est pas clair dans la transcription, le signaler comme « information manquante ».\n- Distinguer clairement : **fait** / **hypothèse** / **info manquante**\n- Confidentialité stricte : aucun nom de patient, aucune donnée médicale dans les livrables externes\n- Transcription incomplète → le dire, ne pas extrapoler\n- Extrait textuel = citation exacte, pas de reformulation interprétative\n- Si le même axe récurrent apparaît sur 3 analyses consécutives → le signaler comme « tendance lourde » avec alerte\n- **Transcription Upmeet** → toujours repartir de la transcription brute, jamais du résumé email. Délégation au skill `analyse-entretien-exhaustive` pour le pipeline multi-passes.\n", "binary": false, "truncated": false}], "subdirs": []}, {"name": "article-publication", "source": "Global", "path": "skills/article-publication", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: article-publication\ndescription: \"Publication d'articles sur le blog laurentserre.com. Template complet, règles CTA, SEO on-page, vérification post-déploiement.\"\nemoji: \"📰\"\n---\n\n# Publication d'article sur le blog laurentserre.com\n\nSkill canonique pour la publication d'articles de blog. Charger avant TOUTE création ou modification d'article.\n\n---\n\n## Architecture de la page\n\nL'article est divisé en DEUX grandes sections :\n\n```\n<main className=\"bg-primary-bg text-gray-dark\">\n  │\n  ├─ <section className=\"py-24 sm:py-32\">    ← HERO (beaucoup d'espace, centré)\n  │     Breadcrumb (nav > ol)\n  │     Capsule catégorie (inline-flex mint-green)\n  │     H1 (text-4xl sm:text-5xl)\n  │     Infos auteur (inline: photo, nom, date, temps lecture)\n  │     Hero image (rounded-2xl shadow-lg)\n  │\n  ├─ <article>                                ← CONTENU\n  │     <div className=\"prose prose-lg max-w-none\">\n  │       AuthorCard (haut)\n  │       TL;DR → « ✨ Ce que vous allez retenir »\n  │       BDCarousel (si applicable)\n  │       Badge CTA → /diagnostic\n  │       Sommaire → « 📑 Sommaire »\n  │       Intro & Corps (H2 avec ancres, H3, UL, OL)\n  │       Mid-article CTA → /bootcamp\n  │       FAQ (5+ questions)\n  │       Pour aller plus loin (3 liens)\n  │       Chute (paragraphe de clôture)\n  │     \u003c/div>\n  │     AuthorCard (bas, avec border-t)\n  │\n  ├─ HubSpotForm (section bg-white)\n  │\n  └─ Lien retour blog (section bg-primary-bg)\n```\n\n## Détail de chaque section\n\n### 1. `<main>` — Balise racine\n```tsx\n<main className=\"bg-primary-bg text-gray-dark\">\n```\n\n### 2. Hero Section — py-24 sm:py-32\n```tsx\n<section className=\"py-24 sm:py-32\">\n  <div className=\"max-w-4xl mx-auto px-4 sm:px-6 lg:px-8\">\n```\n\n### 3. Breadcrumb — nav > ol\n```tsx\n<nav className=\"mb-8 text-sm text-gray-500\" aria-label=\"Breadcrumb\">\n  <ol className=\"flex items-center gap-2\">\n    <li><Link href=\"/\" className=\"hover:text-mint-green transition-colors\">Accueil\u003c/Link>\u003c/li>\n    <li aria-hidden=\"true\">/\u003c/li>\n    <li><Link href=\"/blog\" className=\"hover:text-mint-green transition-colors\">Blog\u003c/Link>\u003c/li>\n    <li aria-hidden=\"true\">/\u003c/li>\n    <li className=\"text-blue-ink font-medium\" aria-current=\"page\">{slug}\u003c/li>\n  \u003c/ol>\n\u003c/nav>\n```\n\n### 4. Capsule catégorie — inline-flex mint-green\n```tsx\n<div className=\"text-center mb-12\">\n  <div className=\"inline-flex items-center gap-3 bg-mint-green/10 backdrop-blur-sm border border-mint-green/30 px-4 py-2 rounded-full mb-6\">\n    <span className=\"font-title font-semibold text-mint-green text-sm\">\n      {Catégorie}\n    \u003c/span>\n  \u003c/div>\n```\n⚠️ CENTRÉ (`text-center mb-12`) — la capsule et le H1 sont centrés dans la hero\n\n### 5. H1 — centré, tracking-tight\n```tsx\n<h1 className=\"text-4xl font-title font-bold tracking-tight text-blue-ink sm:text-5xl mb-6\">\n  {Titre}\n\u003c/h1>\n```\n\n### 6. Infos auteur — INLINE (pas AuthorCard)\n```tsx\n<div className=\"flex items-center justify-center gap-4 text-sm text-gray-500 mb-8\">\n  <div className=\"flex items-center gap-2\">\n    <Image src=\"/laurent.jpg\" alt=\"Laurent Serre\" width={32} height={32}\n      className=\"rounded-full\" quality={60} sizes=\"32px\" loading=\"lazy\" />\n    <span>Laurent Serre\u003c/span>\n  \u003c/div>\n  <span>•\u003c/span>\n  <time dateTime=\"2026-05-28\">28 mai 2026\u003c/time>\n  <span>•\u003c/span>\n  <span>X min de lecture\u003c/span>\n\u003c/div>\n```\n⚠️ PAS le composant AuthorCard — une div inline avec photo ronde + nom + date + temps\n\n### 7. Hero image — rounded-2xl, h-80 fixed\n```tsx\n<div className=\"relative mb-12\">\n  <Image\n    src=\"...\"\n    alt=\"...\"\n    width={1536}\n    height={1024}\n    className=\"w-full h-80 object-cover object-center rounded-2xl shadow-lg\"\n    quality={78}\n    priority\n    sizes=\"(max-width: 768px) 100vw, (max-width: 1200px) 80vw, 70vw\"\n  />\n\u003c/div>\n```\n⚠️ PAS `fill` + `aspect-[3/2]` — utiliser `h-80 object-cover` + `rounded-2xl shadow-lg`\n\n### 8. ARTICLE + prose wrapper\n```tsx\n<article className=\"max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 pb-16\">\n  <div className=\"prose prose-lg max-w-none\">\n```\n⚠️ Toujours wrapper le contenu dans `prose prose-lg max-w-none`\n\n### 9. AuthorCard (haut)\n```tsx\n<div className=\"mb-8\">\n  <AuthorCard />\n\u003c/div>\n```\n⚠️ Ici on utilise le COMPOSANT AuthorCard (pas l'inline)\n\n### 10. TL;DR — « ✨ Ce que vous allez retenir »\n```tsx\n<div className=\"mt-8 p-6 bg-mint-green/10 rounded-xl border border-mint-green/20\">\n  <p className=\"text-sm font-semibold text-mint-green mb-2\">\n    ✨ Ce que vous allez retenir\n  \u003c/p>\n  <p className=\"text-gray-700 leading-relaxed\">\n    {Résumé en 1-2 phrases continues (pas de liste à puces)}\n  \u003c/p>\n\u003c/div>\n```\n⚠️ Le TL;DR est un PARAGRAPHE (pas une liste) — une à deux phrases qui résument l'article\n\n### 11. BDCarousel (si applicable)\n```tsx\n<div className=\"bg-gradient-to-br from-amber-50 to-amber-100/50 border border-amber-200/60 rounded-2xl p-6 mt-10 mb-6\">\n  <p className=\"font-title font-bold text-amber-800 text-sm uppercase tracking-wider mb-4\">\n    🎬 Carrousel BD : {titre}\n  \u003c/p>\n  <p className=\"text-sm text-amber-700 mb-5\">\n    {description}\n  \u003c/p>\n  <BDCarousel images={images} title=\"...\" maxPreview={2} />\n  <div className=\"mt-4 text-center\">\n    <Link href=\"/downloads/carrousel-{slug}.pdf\" className=\"...\">\n      Télécharger le PDF (X planches)\n    \u003c/Link>\n  \u003c/div>\n\u003c/div>\n```\n\n### 12. Badge CTA → /diagnostic\n```tsx\n<div className=\"mb-8 text-center\">\n  <Link href=\"/diagnostic\"\n    className=\"inline-flex items-center gap-2 bg-mint-green/10 text-mint-green text-sm font-medium px-4 py-2 rounded-full hover:bg-mint-green/20 transition-colors\">\n    🔍 {Question problème} ? Faites un diagnostic →\n  \u003c/Link>\n\u003c/div>\n```\n\n### 13. Sommaire — « 📑 Sommaire »\n```tsx\n<div className=\"mt-10 p-6 bg-blue-ink/5 rounded-xl border border-blue-ink/10\">\n  <p className=\"text-sm font-semibold text-blue-ink mb-3\">📑 Sommaire\u003c/p>\n  <ul className=\"space-y-2 text-sm text-gray-700\">\n    <li><a href=\"#{id}\" className=\"text-mint-green hover:underline\">{titre H2}\u003c/a>\u003c/li>\n  \u003c/ul>\n\u003c/div>\n```\n⚠️ Liens en `text-mint-green` (pas en bleu)\n\n### 14. Mid-article CTA → /bootcamp\nFond teal/mint-green gradient :\n```tsx\n<div className=\"bg-gradient-to-br from-teal-50 to-mint-green/20 border border-teal-200/40 rounded-2xl p-6 my-10\">\n  {/* Contenu CTA bootcamp */}\n\u003c/div>\n```\n\n### 15. FAQ\n```tsx\n<h2 id=\"faq\" className=\"text-2xl font-title font-bold text-blue-ink mt-12 mb-6\">\n  FAQ {sujet}\n\u003c/h2>\n<div className=\"space-y-6\">\n  <div>\n    <p className=\"font-bold text-blue-ink mb-1\">{Question}\u003c/p>\n    <p className=\"text-gray-700\">{Réponse}\u003c/p>\n  \u003c/div>\n  {/* 5 questions minimum */}\n\u003c/div>\n```\n\n### 16. Pour aller plus loin\n```tsx\n<div className=\"bg-blue-ink/5 border border-blue-ink/10 rounded-2xl p-6 my-10\">\n  <p className=\"text-lg font-title font-bold text-blue-ink mb-4\">Pour aller plus loin\u003c/p>\n  <ul className=\"space-y-3 text-sm text-gray-700\">\n    <li>\n      <Link href=\"...\" className=\"text-mint-green hover:underline font-medium\">{Titre lien}\u003c/Link>\n      <span className=\"text-gray-500\">{' '}: {Description}\u003c/span>\n    \u003c/li>\n  \u003c/ul>\n\u003c/div>\n```\n⚠️ Chaque lien a une description courte après le ':'\n\n### 17. CTA final gradient\n```tsx\n<div className=\"bg-gradient-to-r from-blue-ink to-blue-ink/90 text-white p-8 rounded-2xl my-12\">\n  <h3 className=\"text-2xl font-title font-bold mb-4\">{Question percutante}\u003c/h3>\n  <p className=\"mb-6\">{Explication sans fausses promesses}\u003c/p>\n  <div className=\"flex flex-col sm:flex-row gap-4\">\n    <Link href=\"/diagnostic\"\n      className=\"inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-full text-blue-ink bg-mint-green hover:bg-mint-green/90 transition-colors\">\n      Demander un diagnostic commercial\n    \u003c/Link>\n    <Link href=\"/bootcamp\"\n      className=\"inline-flex items-center justify-center px-6 py-3 border border-white text-base font-medium rounded-full text-white hover:bg-white/10 transition-colors\">\n      Découvrir le Bootcamp commercial\n    \u003c/Link>\n  \u003c/div>\n\u003c/div>\n```\n\n### 18. Chute\n```tsx\n<p className=\"text-xl text-gray-700 font-semibold border-t border-gray-200 pt-8 mt-10\">\n  {Phrase de clôture forte, lien avec le CTA}\n\u003c/p>\n```\n\n### 19. AuthorCard (bas)\n```tsx\n<div className=\"mt-10 pt-6 border-t border-gray-200\">\n  <AuthorCard />\n\u003c/div>\n```\n\n### 20. HubSpotForm\n```tsx\n<section className=\"py-16 bg-white\">\n  <div className=\"max-w-2xl mx-auto px-4 sm:px-6\">\n    <h2 className=\"text-2xl sm:text-3xl font-title font-bold text-blue-ink mb-4 text-center\">\n      Besoin d'en parler plus directement ?\n    \u003c/h2>\n    <p className=\"text-center text-gray-600 mb-8\">\n      Si votre situation mérite un é
