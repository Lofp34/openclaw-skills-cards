fig/state (CLI remains installed).\n- `sandbox *`: Manage sandbox containers.\n- `security *`: Security tooling and local config audits.\n- `sessions`: List stored conversation sessions.\n- `setup`: Initialize local config and workspace.\n- `skills *`: List and inspect available skills.\n- `status`: Show channel health + recent recipients.\n- `system *`: System events, heartbeat, presence.\n- `tui`: Open terminal UI connected to Gateway.\n- `uninstall`: Remove gateway service and local data.\n- `update *`: Update OpenClaw and check channel status.\n- `webhooks *`: Webhook integration helpers.\n\n## Common Recipes\n\nInspect help for an area:\n\n```bash\nopenclaw models --help\nopenclaw channels --help\n```\n\nRun gateway locally:\n\n```bash\nopenclaw gateway --port 18789\nopenclaw --dev gateway\nopenclaw gateway --force\n```\n\nPerform channel login with logs:\n\n```bash\nopenclaw channels login --verbose\n```\n\nSend a message with JSON output:\n\n```bash\nopenclaw message send --target +15555550123 --message \"Hi\" --json\nopenclaw message send --channel telegram --target @mychat --message \"Hi\"\n```\n\nRun an agent turn and optionally deliver:\n\n```bash\nopenclaw agent --to +15555550123 --message \"Run summary\" --deliver\n```\n\nCheck runtime health:\n\n```bash\nopenclaw status\nopenclaw health\nopenclaw doctor\n```\n\n## Caution Commands\n\n- `openclaw reset`: destructive local state reset.\n- `openclaw uninstall`: removes service + local data.\n- `openclaw gateway --force`: forcefully clears port conflicts.\n\nAlways confirm intent before running caution commands.\n\n## External Docs\n\n- CLI docs: `https://docs.openclaw.ai/cli`\n", "binary": false, "truncated": false}], "subdirs": []}]}, {"name": "pdf", "source": "Global", "path": "skills/pdf", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: pdf\ndescription: Comprehensive PDF manipulation toolkit for extracting text and tables, creating new PDFs, merging/splitting documents, and handling forms. When Claude needs to fill in a PDF form or programmatically process, generate, or analyze PDF documents at scale.\nlicense: Proprietary. LICENSE.txt has complete terms\n---\n\n# PDF Processing Guide\n\n## Overview\n\nThis guide covers essential PDF processing operations using Python libraries and command-line tools. For advanced features, JavaScript libraries, and detailed examples, see reference.md. If you need to fill out a PDF form, read forms.md and follow its instructions.\n\n## Quick Start\n\n```python\nfrom pypdf import PdfReader, PdfWriter\n\n# Read a PDF\nreader = PdfReader(\"document.pdf\")\nprint(f\"Pages: {len(reader.pages)}\")\n\n# Extract text\ntext = \"\"\nfor page in reader.pages:\n    text += page.extract_text()\n```\n\n## Python Libraries\n\n### pypdf - Basic Operations\n\n#### Merge PDFs\n```python\nfrom pypdf import PdfWriter, PdfReader\n\nwriter = PdfWriter()\nfor pdf_file in [\"doc1.pdf\", \"doc2.pdf\", \"doc3.pdf\"]:\n    reader = PdfReader(pdf_file)\n    for page in reader.pages:\n        writer.add_page(page)\n\nwith open(\"merged.pdf\", \"wb\") as output:\n    writer.write(output)\n```\n\n#### Split PDF\n```python\nreader = PdfReader(\"input.pdf\")\nfor i, page in enumerate(reader.pages):\n    writer = PdfWriter()\n    writer.add_page(page)\n    with open(f\"page_{i+1}.pdf\", \"wb\") as output:\n        writer.write(output)\n```\n\n#### Extract Metadata\n```python\nreader = PdfReader(\"document.pdf\")\nmeta = reader.metadata\nprint(f\"Title: {meta.title}\")\nprint(f\"Author: {meta.author}\")\nprint(f\"Subject: {meta.subject}\")\nprint(f\"Creator: {meta.creator}\")\n```\n\n#### Rotate Pages\n```python\nreader = PdfReader(\"input.pdf\")\nwriter = PdfWriter()\n\npage = reader.pages[0]\npage.rotate(90)  # Rotate 90 degrees clockwise\nwriter.add_page(page)\n\nwith open(\"rotated.pdf\", \"wb\") as output:\n    writer.write(output)\n```\n\n### pdfplumber - Text and Table Extraction\n\n#### Extract Text with Layout\n```python\nimport pdfplumber\n\nwith pdfplumber.open(\"document.pdf\") as pdf:\n    for page in pdf.pages:\n        text = page.extract_text()\n        print(text)\n```\n\n#### Extract Tables\n```python\nwith pdfplumber.open(\"document.pdf\") as pdf:\n    for i, page in enumerate(pdf.pages):\n        tables = page.extract_tables()\n        for j, table in enumerate(tables):\n            print(f\"Table {j+1} on page {i+1}:\")\n            for row in table:\n                print(row)\n```\n\n#### Advanced Table Extraction\n```python\nimport pandas as pd\n\nwith pdfplumber.open(\"document.pdf\") as pdf:\n    all_tables = []\n    for page in pdf.pages:\n        tables = page.extract_tables()\n        for table in tables:\n            if table:  # Check if table is not empty\n                df = pd.DataFrame(table[1:], columns=table[0])\n                all_tables.append(df)\n\n# Combine all tables\nif all_tables:\n    combined_df = pd.concat(all_tables, ignore_index=True)\n    combined_df.to_excel(\"extracted_tables.xlsx\", index=False)\n```\n\n### reportlab - Create PDFs\n\n#### Basic PDF Creation\n```python\nfrom reportlab.lib.pagesizes import letter\nfrom reportlab.pdfgen import canvas\n\nc = canvas.Canvas(\"hello.pdf\", pagesize=letter)\nwidth, height = letter\n\n# Add text\nc.drawString(100, height - 100, \"Hello World!\")\nc.drawString(100, height - 120, \"This is a PDF created with reportlab\")\n\n# Add a line\nc.line(100, height - 140, 400, height - 140)\n\n# Save\nc.save()\n```\n\n#### Create PDF with Multiple Pages\n```python\nfrom reportlab.lib.pagesizes import letter\nfrom reportlab.platypus import SimpleDocTemplate, Paragraph, Spacer, PageBreak\nfrom reportlab.lib.styles import getSampleStyleSheet\n\ndoc = SimpleDocTemplate(\"report.pdf\", pagesize=letter)\nstyles = getSampleStyleSheet()\nstory = []\n\n# Add content\ntitle = Paragraph(\"Report Title\", styles['Title'])\nstory.append(title)\nstory.append(Spacer(1, 12))\n\nbody = Paragraph(\"This is the body of the report. \" * 20, styles['Normal'])\nstory.append(body)\nstory.append(PageBreak())\n\n# Page 2\nstory.append(Paragraph(\"Page 2\", styles['Heading1']))\nstory.append(Paragraph(\"Content for page 2\", styles['Normal']))\n\n# Build PDF\ndoc.build(story)\n```\n\n## Command-Line Tools\n\n### pdftotext (poppler-utils)\n```bash\n# Extract text\npdftotext input.pdf output.txt\n\n# Extract text preserving layout\npdftotext -layout input.pdf output.txt\n\n# Extract specific pages\npdftotext -f 1 -l 5 input.pdf output.txt  # Pages 1-5\n```\n\n### qpdf\n```bash\n# Merge PDFs\nqpdf --empty --pages file1.pdf file2.pdf -- merged.pdf\n\n# Split pages\nqpdf input.pdf --pages . 1-5 -- pages1-5.pdf\nqpdf input.pdf --pages . 6-10 -- pages6-10.pdf\n\n# Rotate pages\nqpdf input.pdf output.pdf --rotate=+90:1  # Rotate page 1 by 90 degrees\n\n# Remove password\nqpdf --password=mypassword --decrypt encrypted.pdf decrypted.pdf\n```\n\n### pdftk (if available)\n```bash\n# Merge\npdftk file1.pdf file2.pdf cat output merged.pdf\n\n# Split\npdftk input.pdf burst\n\n# Rotate\npdftk input.pdf rotate 1east output rotated.pdf\n```\n\n## Common Tasks\n\n### Extract Text from Scanned PDFs\n```python\n# Requires: pip install pytesseract pdf2image\nimport pytesseract\nfrom pdf2image import convert_from_path\n\n# Convert PDF to images\nimages = convert_from_path('scanned.pdf')\n\n# OCR each page\ntext = \"\"\nfor i, image in enumerate(images):\n    text += f\"Page {i+1}:\\n\"\n    text += pytesseract.image_to_string(image)\n    text += \"\\n\\n\"\n\nprint(text)\n```\n\n### Add Watermark\n```python\nfrom pypdf import PdfReader, PdfWriter\n\n# Create watermark (or load existing)\nwatermark = PdfReader(\"watermark.pdf\").pages[0]\n\n# Apply to all pages\nreader = PdfReader(\"document.pdf\")\nwriter = PdfWriter()\n\nfor page in reader.pages:\n    page.merge_page(watermark)\n    writer.add_page(page)\n\nwith open(\"watermarked.pdf\", \"wb\") as output:\n    writer.write(output)\n```\n\n### Extract Images\n```bash\n# Using pdfimages (poppler-utils)\npdfimages -j input.pdf output_prefix\n\n# This extracts all images as output_prefix-000.jpg, output_prefix-001.jpg, etc.\n```\n\n### Password Protection\n```python\nfrom pypdf import PdfReader, PdfWriter\n\nreader = PdfReader(\"input.pdf\")\nwriter = PdfWriter()\n\nfor page in reader.pages:\n    writer.add_page(page)\n\n# Add password\nwriter.encrypt(\"userpassword\", \"ownerpassword\")\n\nwith open(\"encrypted.pdf\", \"wb\") as output:\n    writer.write(output)\n```\n\n## Quick Reference\n\n| Task | Best Tool | Command/Code |\n|------|-----------|--------------|\n| Merge PDFs | pypdf | `writer.add_page(page)` |\n| Split PDFs | pypdf | One page per file |\n| Extract text | pdfplumber | `page.extract_text()` |\n| Extract tables | pdfplumber | `page.extract_tables()` |\n| Create PDFs | reportlab | Canvas or Platypus |\n| Command line merge | qpdf | `qpdf --empty --pages ...` |\n| OCR scanned PDFs | pytesseract | Convert to image first |\n| Fill PDF forms | pdf-lib or pypdf (see forms.md) | See forms.md |\n\n## Next Steps\n\n- For advanced pypdfium2 usage, see reference.md\n- For JavaScript libraries (pdf-lib), see reference.md\n- If you need to fill out a PDF form, follow the instructions in forms.md\n- For troubleshooting guides, see reference.md\n", "binary": false, "truncated": false}, {"name": "_meta.json", "is_md": false, "content": "{\n  \"ownerId\": \"kn725kyxpr1g1e3rjqtkp26v0s809930\",\n  \"slug\": \"pdf\",\n  \"version\": \"0.1.0\",\n  \"publishedAt\": 1769847855729\n}", "binary": false, "truncated": false}], "subdirs": []}, {"name": "powerpoint-pptx", "source": "Global", "path": "skills/powerpoint-pptx", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: Powerpoint / PPTX\nslug: powerpoint-pptx\nversion: 1.0.1\nhomepage: https://clawic.com/skills/powerpoint-pptx\ndescription: \"Create, inspect, and edit Microsoft PowerPoint presentations and PPTX decks with reliable layouts, templates, placeholders, notes, charts, and visual QA. Use when (1) the task is about PowerPoint or `.pptx`; (2) layouts, placeholders, notes, charts, comments, or template fidelity matter; (3) the deck must render cleanly after edits.\"\nchangelog: Rebalanced the skill toward template inventory, layout mapping, and higher-signal QA after a stricter external audit.\nmetadata: {\"clawdbot\":{\"emoji\":\"📊\",\"requires\":{\"bins\":[]},\"os\":[\"linux\",\"darwin\",\"win32\"]}}\n---\n\n## When to Use\n\nUse when the main artifact is a Microsoft PowerPoint presentation or `.pptx` deck, especially when layouts, templates, placeholders, notes, comments, charts, extraction, editing, or final visual quality matter.\n\n## Core Rules\n\n### 1. Choose the workflow before touching the deck\n\n- Reading text, editing an existing deck, rebuilding from a template, and creating from scratch are different jobs with different failure modes.\n- For text extraction or inspection, read the deck before editing it.\n- Text extraction plus thumbnail-style visual inspection is safer than editing from shape assumptions alone.\n- For template-driven work, inventory the deck before replacing content.\n- For deep edits, remember a `.pptx` file is OOXML with separate parts for slides, layouts, masters, media, notes, and comments.\n- If a template exists, template fidelity beats generic slide-design instincts.\n- Reusing or duplicating a good existing slide is often safer than rebuilding it and hoping the theme still matches.\n\n### 2. Inventory the deck before replacing content\n\n- Count the reusable layouts, real placeholders, notes, comments, media, and recurring typography or color patterns first.\n- Placeholder indexes and layout indexes are not portable assumptions.\n- Inspect the actual slide or template before targeting title, body, chart, or image shapes.\n- Speaker notes, comments, and linked assets can live outside the visible slide surface.\n- A missing or wrong placeholder target can silently land content in the wrong box or wrong layer.\n- Master and layout settings can override local slide edits, so the visible problem is not always on the slide you are editing.\n\n### 3. Match content to the actual placeholders\n\n- Count the actual content pieces before choosing a layout.\n- Pick layouts based on the real number of ideas, columns, images, or charts the slide needs.\n- Do not force two ideas into a three-column slide or cram dense text under a chart.\n- Category counts and data series lengths must match or charts will break in ugly ways.\n- Explicit sizing beats wishful thinking: text boxes, images, and charts need real space, not \"it should fit\".\n- Do not choose a layout with more placeholders than the content can meaningfully fill.\n- Quote layouts are for real quotes, and image-led layouts are for slides that actually have images.\n- For chart-, table-, or image-heavy slides, full-slide or two-column layouts are usually safer than stacking dense text above the visual.\n\n### 4. Preserve the deck's visual language\n\n- Theme, master, and layout files usually decide fonts, colors, and hierarchy more than any one slide does.\n- Start from the deck's actual theme, fonts, spacing, and aspect ratio instead of improvising a new style.\n- Reuse the deck's own alignment and spacing system instead of inventing a second visual language.\n- Use common fonts for portability and strong contrast for readability.\n- Preserve the template's visual logic first; originality matters less than not breaking the deck's existing language.\n- Combining slides from multiple sources requires normalizing themes, masters, and alignment afterward.\n\n### 5. Run content QA and visual QA separately\n\n- Text overflow, bad alignment, clipped shapes, weak contrast, and placeholder leftovers are normal first-pass failures.\n- Run both content QA and visual QA; missing text and broken layout are different failure classes.\n- Render or inspect the actual deck output before delivery when layout matters.\n- Search for leftover template junk, sample labels, and placeholder text before calling the deck finished.\n- Check notes, comments, labels, legends, and chart/table semantics separately from the visual pass.\n- A deck can pass text extraction and still fail on overlap, clipping, wrong theme inheritance, or broken notes.\n- Thumbnail grids and rendered slides usually reveal layout bugs faster than code or text inspection.\n- Assume the first render is wrong and do at least one fix-and-verify cycle before calling the deck finished.\n- Re-check affected slides after each fix because one spacing change often creates another issue.\n\n### 6. Keep decks portable and review-safe\n\n- Template masters can override direct edits in surprising ways.\n- Complex effects may degrade across PowerPoint, LibreOffice, and conversion pipelines, so keep important content robust without them.\n- Image sizing, font substitution, and placeholder mismatch are common reasons a deck looks good in code and bad on screen.\n- Notes, comments, linked media, and merged decks can stay broken even when the visible slide looks fine.\n\n## Common Traps\n\n- Placeholder text and sample charts often survive template reuse if not explicitly replaced.\n- Directly editing one slide can fail if the real issue lives in the master or layout.\n- Charts, icons, and text boxes need enough space; near-collisions are usually visible only after rendering.\n- Layout indexes vary by template, so built-in assumptions from one deck often break in another.\n- A missing placeholder or wrong shape target can silently put content in the wrong place.\n- Counting the text ideas after choosing the layout usually leads to empty placeholders, weak hierarchy, or leftover template junk.\n- Font substitution can move line breaks and wreck careful spacing.\n- Speaker notes, comments, and linked media can stay broken even when the visible slide looks fine.\n- A deck can pass text inspection and still fail visually because of overlap, contrast, or edge clipping.\n- Editing from one slide alone can miss the real source of truth in the theme, master, or layout definitions.\n- Choosing a quote, comparison, or multi-column layout without matching content usually makes the deck look templated rather than intentional.\n- Combining or duplicating slides without checking masters and themes can create subtle inconsistency slide by slide.\n- Aspect-ratio mismatches like `16:9` versus `4:3` can shift every placement decision even when each slide looks locally reasonable.\n\n## Related Skills\nInstall with `clawhub install <slug>` if user confirms:\n- `documents` — Document workflows that often feed presentation content.\n- `design` — Visual direction and layout decisions.\n- `brief` — Concise business messaging for slide narratives.\n\n## Feedback\n\n- If useful: `clawhub star powerpoint-pptx`\n- Stay updated: `clawhub sync`\n", "binary": false, "truncated": false}, {"name": "_meta.json", "is_md": false, "content": "{\n  \"ownerId\": \"kn73vp5rarc3b14rc7wjcw8f8580t5d1\",\n  \"slug\": \"powerpoint-pptx\",\n  \"version\": \"1.0.1\",\n  \"publishedAt\": 1773243205254\n}", "binary": false, "truncated": false}], "subdirs": []}, {"name": "presentation-image-first", "source": "Global", "path": "skills/presentation-image-first", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: presentation-image-first\ndescription: \"Génère des présentations PowerPoint premium 16:9 pour Laurent Serre Developpement en mode image-first : le LLM écrit le scénario, produit des prompts image détaillés, génère chaque visuel avec image_generate (gpt-image-2), puis assemble les images en PPTX. À utiliser quand Laurent demande une présentation, un slide deck, une offre commerciale, un support de formation, ou tout visuel corporate LSD. Active-toi dès qu'il y a mention de PowerPoint, slides, deck, présentation, offre, ou charte LSD.\"\n---\n\n# Presentation Image-First\n\nGénère des présentations PowerPoint premium pour **Laurent Serre Developpement** selon le principe :\n\n> **Le PowerPoint n'est pas généré comme un PowerPoint.**\n> **Il est assemblé à partir d'images 16:9 premium générées une par une.**\n\n## Structure du skill\n\n```\nskills/presentation-image-first/\n├── SKILL.md                                    # Ce fichier\n├── scripts/\n│   └── assemble_pptx_from_images.py           # Assembleur PPTX (simple placement image)\n├── templates/\n│   ├── presentation_scenario.md               # Template de scénario stratégique\n│   ├── slides_manifest.yaml                    # Template de manifeste de slides\n│   └── image_prompt_template.txt              # Template de prompt image\n├── references/\n│   ├── brand-style.yaml                       # Identité visuelle LSD\n│   ├── charte-graphique.md                    # Charte complète\n│   └── image-quality-checklist.md             # Checklist contrôle qualité\n└── assets/\n    ├── logo_reference_laurent_serre_developpement.png\n    └── photo_reference_laurent_serre.jpg\n```\n\n## Workflow complet (7 étapes)\n\n### Étape 1 — Briefing\n\nComprendre le besoin auprès de Laurent :\n- **Sujet** de la présentation\n- **Public cible** (direction IT, DSI, comité exécutif, partenaires…)\n- **Objectif** (vendre, former, informer, convaincre)\n- **Ton** (pédagogique, commercial, technique, inspirant)\n- **Niveau de technicité** de l'audience\n- **Nombre de slides** approximatif\n\n### Étape 2 — Scénario\n\nLe LLM rédige un document complet :\n`templates/presentation_scenario.md`\n\nAvec pour chaque slide :\n- Message clé (une idée forte)\n- Intentions visuelles\n- Texte visible exact\n- Éléments obligatoires (logo, photo, charte)\n\n📩 **Soumettre le scénario à Laurent pour validation avant de continuer.**\n\n### Étape 3 — Manifeste\n\nLe LLM transforme le scénario validé en manifeste exploitable :\n`templates/slides_manifest.yaml`\n\nChaque slide a :\n- `id` — Identifiant unique\n- `type` — Type de slide (cover, constat, vision, technique, cas-usage, conclusion)\n- `title` — Titre\n- `image_prompt_file` — Chemin vers le fichier prompt\n- `output_image` — Chemin vers l'image finale\n\n### Étape 4 — Prompts image\n\nPour chaque slide, le LLM produit un prompt image détaillé :\n`templates/image_prompt_template.txt`\n\nLes prompts doivent inclure :\n- Format 16:9, style corporate premium LSD\n- Palette exacte (marine #071B34, rouge #E30613)\n- Typographie Montserrat\n- Texte exact à inclure\n- Intention visuelle et composition\n- Interdits : pas de robots, cyberpunk, néons, SF\n- Références aux assets et slides exemple\n\n### Étape 5 — Génération des images\n\nPour chaque slide du manifeste, appeler `image_generate` :\n\n```bash\nimage_generate prompt=\"...\" model=\"openai/gpt-image-2\"\n```\n\n**Important :** utiliser l'outil natif `image_generate` d'OpenClaw, pas un appel direct à l'API OpenAI. OpenClaw route via OAuth configuré.\n\nRègles :\n- Une image à la fois\n- Utiliser `filename` pour nommer chaque fichier (`slide_01.png`, etc.)\n- Les images sont livrées comme pièces jointes par l'agent\n\n### Étape 6 — Contrôle qualité\n\nVérifier chaque image avec la checklist :\n`references/image-quality-checklist.md`\n\nSi une image échoue → régénérer uniquement cette slide avec un prompt corrigé.\n\n### Étape 7 — Assemblage PPTX\n\nUne fois toutes les images validées, les assembler en PPTX :\n\n```bash\npython3 skills/presentation-image-first/scripts/assemble_pptx_from_images.py \\\n  --images \"images/slide_*.png\" \\\n  --output \"production/documents/presentation_finale.pptx\"\n```\n\nLe script place chaque image en plein cadre sur une slide vierge 16:9.\nAucune création graphique — simple assemblage.\n\n## Règles de style (kit charte LSD)\n\n- **Marque :** Laurent Serre Developpement. Les outils sont des moyens.\n- **Palette :** 65-75% clair, 15-25% bleu marine, 5-12% rouge (accents).\n- **Typo :** Montserrat (titre Bold, corps Regular)\n- **Format :** 16:9 (1920×1080)\n- **Interdits :** cyberpunk, robots humanoïdes, néons, SF, gadgets\n- **Ton :** Clair, direct, rassurant, B2B, pédagogique\n- **Mots-clés :** fluidifier, sécuriser, redonner du temps, améliorer les processus\n\n## Intégration des assets\n\nLes assets officiels (logo, photo) sont dans `assets/`. Le prompt image ne doit PAS les générer — ils sont ajoutés manuellement si besoin au niveau du design final. Le prompt peut décrire leur emplacement dans la composition.\n\n## Notes techniques\n\n- L'outil `image_generate` est disponible via la config OpenClaw (provider OpenAI)\n- Utiliser le modèle `openai/gpt-image-2`\n- L'authentification OAuth OpenAI ChatGPT/Codex est recommandée (pas de frais API directs)\n- `python-pptx` est requis pour l'assemblage (déjà installé)\n", "binary": false, "truncated": false}], "subdirs": [{"name": "assets", "files": [{"name": "logo_reference_laurent_serre_developpement.png", "is_md": false, "content": "(fichier binaire)", "binary": true, "truncated": false}, {"name": "photo_reference_laurent_serre.jpg", "is_md": false, "content": "(fichier binaire)", "binary": true, "truncated": false}], "subdirs": []}, {"name": "references", "files": [{"name": "brand-style.yaml", "is_md": false, "content": "brand:\n  primary_name: \"Laurent Serre Developpement\"\n  role: \"Cabinet de transformation operationnelle augmentee par les agents IA\"\n  primary_asset_logo: \"assets/logo_reference_laurent_serre_developpement.png\"\n  primary_asset_photo: \"assets/photo_reference_laurent_serre.jpg\"\n  rule: \"La marque principale est Laurent Serre Developpement; les outils et frameworks restent secondaires.\"\nvisual_identity:\n  keywords: [\"corporate premium\", \"conseil\", \"methode\", \"confiance\", \"technologie utile\", \"transformation operationnelle\"]\n  avoid: [\"cyberpunk\", \"robots humanoides\", \"neons\", \"hacker\", \"science-fiction\", \"IA gadget\"]\ncolors:\n  navy_primary: \"#071B34\"\n  navy_secondary: \"#0B1F3A\"\n  red_primary: \"#E30613\"\n  red_secondary: \"#D71920\"\n  background_light: \"#F5F7FA\"\n  white: \"#FFFFFF\"\n  text_secondary: \"#5A6472\"\n  line_gray: \"#DDE3EA\"\n  usage_ratio: \"65-75% clair, 15-25% bleu marine, 5-12% rouge, reste gris/neutres\"\ntypography:\n  preferred: [\"Montserrat\", \"Inter\"]\n  fallback: [\"Aptos\", \"Arial\", \"Helvetica\"]\n  titles: \"Bold/ExtraBold, bleu marine, majuscules possibles, mots strategiques en rouge\"\n  body: \"Regular/SemiBold, phrases courtes, lisibilite prioritaire\"\nlayout:\n  format: \"16:9, 1920x1080\"\n  grid: \"12 colonnes\"\n  margins_px: \"48-72\"\n  density: \"une idee forte par slide, 5 points maximum par bloc\"\n  footer: \"bandeau bleu marine possible pour message cle ou CTA\"\nslide_templates:\n  cover: \"logo/photo/titre fort/3 mots piliers\"\n  problem: \"constat + irritants + visuel metier\"\n  vision: \"contraste avant-apres ou principe directeur\"\n  process_exec: \"5 phases maximum, trajectoire ascendante\"\n  process_detail: \"tableau ou cycle de vie detaille pour IT/DSI\"\n  technical: \"architecture en couches, flux lisibles, annotations courtes\"\n  risk_exec: \"3 familles: securite, controle, gouvernance\"\n  risk_register: \"table audit avec risques, impacts, probabilite, maitrise, responsable\"\n  use_case: \"declencheur -> agents/processus -> livrables -> resultat\"\n  results: \"chiffres, preuves, evolution, interpretation\"\n  conclusion: \"humain, temps rendu, processus fluidifies, CTA Parlons-en\"\nicons:\n  style: \"line icons simples, professionnels\"\n  colors: [\"bleu marine\", \"rouge\", \"blanc\"]\n  avoid: [\"cartoon\", \"3D gadget\", \"robots\", \"emojis excessifs\"]\ndiagrams:\n  recommended: [\"timeline\", \"flux\", \"architecture en couches\", \"maturite\", \"matrice\", \"tableau audit\"]\n  rule: \"Chaque fleche doit indiquer une transformation ou une responsabilite.\"\ntone:\n  voice: \"clair, direct, rassurant, pedagogique, B2B\"\n  prefer: [\"fluidifier\", \"securiser\", \"redonner du temps\", \"ameliorer les processus\", \"au service des equipes\"]\n  avoid_words: [\"remplacer\", \"recrue numerique\", \"magique\", \"IA autonome non controlee\"]\nai_positioning:\n  principle: \"L'IA est un levier operationnel controle, pas le heros.\"\n  reassure: \"automatiser les irritants, pas les collaborateurs\"\n  governance: [\"droits\", \"validation humaine\", \"monitoring\", \"rollback\", \"registre des risques\"]\ndo:\n  - \"utiliser les assets officiels joints\"\n  - \"garder une forte hierarchie visuelle\"\n  - \"limiter le rouge aux accents strategiques\"\n  - \"relier chaque slide a une valeur metier\"\ndont:\n  - \"regenerer le logo ou remplacer la photo\"\n  - \"mettre trop de texte\"\n  - \"basculer vers un style science-fiction\"\n  - \"promettre une autonomie sans gouvernance\"\nquality_checklist:\n  - \"titre compris en moins de 3 secondes\"\n  - \"une idee forte par slide\"\n  - \"logo officiel respecte\"\n  - \"photo officielle si personne presente\"\n  - \"texte lisible en projection\"\n  - \"rouge utilise avec moderation\"\n  - \"message humain et metier clair\"\n  - \"aucune confusion entre marque, outil et technologie\"\n", "binary": false, "truncated": false}, {"name": "charte-graphique.md", "is_md": true, "content": "# Charte graphique V2 - Laurent Serre Developpement\n\n**Version :** 2.0  \n**Usage :** presentations commerciales, strategiques, pedagogiques et techniques generees avec des LLM ou des outils de slides.  \n**Assets maitres :** `assets/logo_reference_laurent_serre_developpement.png` et `assets/photo_reference_laurent_serre.jpg`.\n\n---\n\n## 1. Positionnement visuel\n\nLa charte Laurent Serre Developpement doit transmettre une idee simple : la technologie est utile lorsqu'elle rend les organisations plus claires, plus fluides et plus humaines.\n\n### Valeurs a transmettre\n\n- Professionnalisme et credibilite B2B.\n- Maitrise methodologique.\n- Transformation operationnelle concrete.\n- Technologie utile et encadree.\n- Confiance, clarté et impact.\n- Humain augmente par de meilleurs processus.\n\n### Emotions recherchees\n\n- Soulagement : \"nous allons enlever de la charge inutile\".\n- Confiance : \"la methode est structuree et maitrisee\".\n- Projection : \"cela peut s'appliquer chez nous\".\n- Action : \"parlons d'un premier cas d'usage concret\".\n\n### A eviter absolument\n\n- Esthetique cyberpunk, hacker, science-fiction.\n- Robots humanoides, cerveaux lumineux, neons excessifs.\n- Discours de remplacement des collaborateurs.\n- Promesses magiques ou non gouvernees.\n- Slides trop chargees ou trop techniques pour un public metier.\n\n### Principe narratif\n\nL'IA n'est pas le heros. Le heros est le client, le collaborateur, le processus metier et le resultat obtenu.\n\n---\n\n## 2. Identite de marque\n\n### Marque principale\n\nLa marque principale est **Laurent Serre Developpement**.\n\nLes solutions, frameworks, agents, plateformes ou outils ne doivent pas prendre le dessus sur la marque. Ils peuvent apparaitre comme supports techniques, mais la promesse appartient a Laurent Serre Developpement : accompagnement, gouvernance, methode et deploiement.\n\n### Logo officiel\n\nUtiliser exclusivement le logo officiel fourni dans le kit.\n\n**Regles :**\n\n- Ne pas regenerer le logo.\n- Ne pas le recolorer.\n- Ne pas le deformer.\n- Ne pas ajouter de lueur, ombre ou effet supplementaire.\n- Respecter une marge de respiration autour du logo.\n- Le placer par defaut en haut a gauche ou dans le bandeau bas.\n\n### Photo officielle\n\nUtiliser exclusivement la photo officielle fournie dans le kit.\n\n**Autorisés :**\n\n- Recadrage leger.\n- Detourage propre.\n- Integration sur fond clair ou bureau flou.\n- Utilisation en couverture, conclusion, citation, transition.\n\n**Interdits :**\n\n- Remplacer par une personne similaire.\n- Regenerer le visage.\n- Modifier l'identite visuelle de la personne.\n- Utiliser une pose agressive ou trop publicitaire.\n\n### Place des outils et frameworks\n\nOpenClaw, CRM, HubSpot, GitHub, Google Drive, API ou autres frameworks doivent etre presentes comme des moyens. Leur logo ne doit devenir dominant que si la slide traite explicitement de l'outil.\n\n---\n\n## 3. Palette de couleurs\n\n| Role | Couleur | Code | Usage |\n|---|---:|---:|---|\n| Bleu marine principal | Navy | `#071B34` | Titres, bandeaux, cartes fortes, fonds techniques |\n| Bleu marine secondaire | Deep navy | `#0B1F3A` | Fonds profonds, contrastes, citations |\n| Rouge accent | Red | `#E30613` | Mots decisifs, CTA, alertes, fleches, chiffres |\n| Rouge secondaire | Dark red | `#D71920` | Variantes d'accent, niveaux de risque eleves |\n| Fond clair | Light | `#F5F7FA` | Arriere-plans, grandes surfaces |\n| Blanc | White | `#FFFFFF` | Cartes, respirations, tableaux |\n| Texte secondaire | Muted | `#5A6472` | Sous-titres, legendes, notes |\n| Lignes | Gray | `#DDE3EA` | Separateurs, tableaux, cadres |\n\n### Proportions recommandees\n\n- 65 a 75% : blanc / gris clair.\n- 15 a 25% : bleu marine.\n- 5 a 12% : rouge.\n- Le reste : gris et couleurs fonctionnelles.\n\n### Regles d'usage du rouge\n\nLe rouge doit signaler ce qui compte : mot-cle, transformation, risque, CTA, resultat. Il ne doit jamais devenir une couleur de fond dominante hors cas particuliers.\n\n---\n\n## 4. Typographie\n\n### Polices recommandees\n\n- Priorite : Montserrat.\n- Alternative : Inter.\n- Fallback PowerPoint : Aptos, Arial, Helvetica.\n\n### Titres\n\n- Bold ou ExtraBold.\n- Majuscules possibles.\n- Bleu marine par defaut.\n- Un ou deux mots strategiques en rouge.\n- Longueur cible : 5 a 12 mots.\n\n### Sous-titres\n\n- SemiBold.\n- Bleu marine ou gris fonce.\n- 1 ligne idealement, 2 lignes maximum.\n\n### Corps de texte\n\n- Regular ou Medium.\n- Phrases courtes.\n- 5 points maximum par bloc.\n- Texte assez grand pour projection.\n\n### Interdits typographiques\n\n- Polices fantaisie.\n- Trop de tailles differentes.\n- Paragraphes longs.\n- Rouge sur de longues phrases.\n\n---\n\n## 5. Composition des slides\n\n### Format\n\n- 16:9.\n- 1920 x 1080 px.\n- Utilisation PowerPoint, Gamma, Keynote, PDF et LinkedIn carousel.\n\n### Grille\n\n- Grille de 12 colonnes.\n- Marges externes : 48 a 72 px.\n- Grandes respirations.\n- Alignements forts.\n\n### Densite\n\n- Une idee forte par slide.\n- 3 a 5 messages secondaires maximum.\n- Les slides IT ou annexes peuvent etre plus denses, mais doivent assumer un style audit/tableau.\n\n### Structure recurrente\n\n- Haut gauche : logo ou marque.\n- Haut : titre ou categorie.\n- Centre : idee ou schema principal.\n- Droite : illustration, photo ou cartouche.\n- Bas : bandeau message cle / CTA si necessaire.\n\n---\n\n## 6. Modeles de slides\n\n### 6.1 Slide de couverture\n\n**Objectif :** creer l'attention et installer la marque.  \n**Structure :** logo, photo officielle, titre fort, 3 mots piliers.  \n**Style :** impact, contraste, sobriete.  \n**A eviter :** trop de texte, logo outil plus visible que la marque.  \n**Titre exemple :** \"Une methode pour fluidifier vos processus commerciaux\".\n\n### 6.2 Slide de constat\n\n**Objectif :** faire reconnaitre un probleme metier.  \n**Structure :** grand titre, liste d'irritants, phrase de synthese, visuel metier.  \n**A eviter :** dramatisation excessive.  \n**Titre exemple :** \"Le probleme n'est pas le manque d'idees. C'est le manque de temps.\".\n\n### 6.3 Slide de vision\n\n**Objectif :** ouvrir un nouveau cadre mental.  \n**Structure :** opposition avant/apres, principe directeur, schema simple.  \n**Titre exemple :** \"Je ne voulais pas un outil. Je voulais une methode.\".\n\n### 6.4 Slide de processus executive\n\n**Objectif :** rassurer sur la methode.  \n**Structure :** 5 phases maximum, trajectoire ascendante, garde-fous.  \n**Titre exemple :** \"Notre methode d'implementation\".\n\n### 6.5 Slide technique\n\n**Objectif :** expliquer une architecture sans perdre l'audience.  \n**Structure :** couches, flux ou modules, annotations courtes.  \n**A eviter :** jargon sans fonction, schema cyberpunk.  \n**Titre exemple :** \"Architecture fonctionnelle du dispositif\".\n\n### 6.6 Slide registre/tableau\n\n**Objectif :** montrer la maitrise detaillee.  \n**Structure :** tableau audit, colonnes claires, codes couleur de gravite.  \n**Public :** IT, DSI, RSSI, direction operationnelle.  \n**Titre exemple :** \"Registre des risques et mesures de maitrise\".\n\n### 6.7 Slide risques / gouvernance\n\n**Objectif :** rassurer et responsabiliser.  \n**Structure :** 3 familles maximum : securite, controle, gouvernance.  \n**Message cle :** \"Plus un systeme peut agir, plus il doit etre supervise.\".\n\n### 6.8 Slide cas d'usage\n\n**Objectif :** rendre concret.  \n**Structure :** declencheur -> processus -> livrables -> resultat.  \n**Titre exemple :** \"Du rendez-vous client au compte-rendu exploitable\".\n\n### 6.9 Slide resultats\n\n**Objectif :** prouver.  \n**Structure :** chiffres, courbe, avant/apres, interpretation.  \n**Titre exemple :** \"Ce que cela change concretement\".\n\n### 6.10 Slide conclusion / CTA\n\n**Objectif :** finir sur l'humain et ouvrir la discussion.  \n**Structure :** phrase forte, benefices humains, photo officielle, CTA.  \n**Titre exemple :** \"Et si vos collaborateurs pouvaient enfin se concentrer sur leur vrai metier ?\".\n\n---\n\n## 7. Iconographie\n\n### Style\n\n- Line icons simples.\n- Formes rondes ou cartes blanches.\n- Couleurs : bleu marine, rouge, blanc.\n- Un style constant sur toute la presentation.\n\n### A eviter\n\n- Icones cartoon.\n- Icones 3D gadget.\n- Emojis en masse.\n- Robots humanoides.\n- Elements futuristes gratuits.\n\n---\n\n## 8. Diagrammes et schemas\n\n### Types recommandes\n\n- Timeline ascendante.\n- Flux en 3 a 5 etapes.\n- Architecture en couches.\n- Cycle de maturite.\n- Tableau audit.\n- Matrice de risques.\n- Avant/apres.\n\n### Regles\n\n- Chaque fleche doit expliquer une transformation.\n- Un diagramme doit pouvoir etre compris sans commentaire long.\n- Les couleurs ne doivent pas etre decoratives : elles codent une famille, une priorite ou un niveau.\n- Les schémas techniques doivent garder un fond clair et des blocs lisibles.\n\n---\n\n## 9. Style editorial\n\n### Ton\n\n- Clair.\n- Direct.\n- B2B.\n- Rassurant.\n- Pedagogique.\n- Oriente action.\n\n### Mots a privilegier\n\n- Fluidifier.\n- Securiser.\n- Structurer.\n- Redonner du temps.\n- Fiabiliser.\n- Capitaliser.\n- Accompagner.\n- Gouvernance.\n- Impact.\n\n### Mots a eviter\n\n- Remplacer.\n- Recrue numerique.\n- Magique.\n- Autonome sans controle.\n- Revolution totale.\n- IA toute-puissante.\n\n### CTA recommandes\n\n- Parlons-en.\n- Construisons une feuille de route.\n- Identifions un premier cas d'usage.\n- Testons un pilote controle.\n\n---\n\n## 10. Regles specifiques IA\n\n### Positionnement\n\nL'IA doit etre presentee comme un levier operationnel controle. Elle permet d'automatiser les irritants, pas les collaborateurs.\n\n### Formulations recommandees\n\n- \"Des agents IA au service de vos equipes\".\n- \"Automatiser ce qui empeche les collaborateurs d'exprimer leur valeur\".\n- \"Garder l'humain dans la boucle la ou la decision compte\".\n- \"Passer progressivement de l'assistance a l'automatisation supervisee\".\n\n### Formulations a eviter\n\n- \"Remplacer les equipes\".\n- \"Deleguer toute l'activite a l'IA\".\n- \"Agent autonome sans supervision\".\n- \"Recruter un collaborateur numerique\" si le contexte social est sensible.\n\n### Garde-fous a rappeler\n\n- Droits limites.\n- Validation humaine.\n- Monitoring.\n- Journalisation.\n- Rollback.\n- Registre des risques.\n\n---\n\n## 11. Exemples de prompts\n\nVoir le fichier `prompts/04_PROMPTS_GENERATION.md` pour les prompts prets a l'emploi.\n\n---\n\n## 12. Checklist qualite\n\nAvant validation d'une slide, verifier :\n\n1. Une seule idee forte.\n2. Titre compris en moins de 3 secondes.\n3. Logo officiel respecte.\n4. Photo officielle utilisee si une personne apparait.\n5. Rouge utilise uniquement pour les accents strategiques.\n6. Texte lisible en projection.\n7. Aucune esthetique science-fiction ou IA gadget.\n8. Message metier plus fort que la technologie.\n9. Aucun discours de remplacement des collaborateurs.\n10. CTA ou conclusion claire.\n\n---\n\n## 13. Guide d'utilisation en 5 etapes\n\n### Etape 1 - Definir le sujet\n\nFormuler le sujet sous forme de probleme ou de transformation : \"fluidifier le suivi commercial\", \"structurer la prospection\", \"mettre sous controle les processus\", etc.\n\n### Etape 2 - Choisir le public\n\nPreciser le public : dirigeant, direction commerciale, equipe IT, CODIR, managers, commerciaux, RH.\n\n### Etape 3 - Choisir le niveau de technicite\n\n- Executif : peu de detail, forte lisibilite.\n- Mixte : valeur metier + methode.\n- IT/DSI : architecture, risques, tableaux, gouvernance.\n\n### Etape 4 - Generer le plan\n\nDemander un plan slide par slide avant les visuels. Valider la progression narrative : probleme -> vision -> methode -> preuve -> action.\n\n### Etape 5 - Generer les slides\n\nColler le style brief compact, joindre le logo et la photo, puis demander une slide a la fois si la coherence visuelle est critique.\n\n---\n\n## 14. Style brief compact\n\n```text\nSTYLE BRIEF COMPACT - A COLLER DANS UN PROMPT\n\nIdentite: Laurent Serre Developpement est la marque principale. Les outils/frameworks (OpenClaw, CRM, IA, etc.) sont des moyens, pas la marque. L'humain, le processus et le resultat metier sont les heros.\nStyle: corporate premium, cabinet de conseil, transformation operationnelle, technologie utile, methode, confiance. Jamais cyberpunk, jamais robot humanoide, jamais promesse magique.\nFormat: 16:9, 1920x1080, fond clair blanc/gris legerement texture, larges respirations, une idee forte par slide.\nLogo: utiliser uniquement le logo officiel joint, sans regeneration, deformation, recoloration ni ajout d'effet. Position par defaut: coin superieur gauche ou bandeau bas selon slide.\nPhoto: utiliser uniquement la photo officielle jointe. Detourage/cadrage autorises; ne jamais remplacer par une personne similaire. Usage privilegie: couverture, transition, conclusion, citation.\nCouleurs: bleu marine principal #071B34/#0B1F3A; rouge accent #E30613/#D71920; fond #F5F7FA/#FFFFFF; texte secondaire #5A6472; gris de lignes #DDE3EA. Le rouge reste rare: 5 a 12% de la slide.\nTypographie: Montserrat ou Inter; alternatives: Aptos/Arial. Titres en ExtraBold/Bold, majuscules possibles, bleu marine. Mots decisifs en rouge. Corps en Regular/SemiBold, tres lisible.\nComposition: grille 12 colonnes; marges 48-72 px; hierarchie forte; titres courts; maximum 5 points par bloc; eviter les paragraphes longs; privilegier cartes, bandeaux, timelines, schemas.\nIcones: line icons simples, professionnels, monochromes bleu marine ou rouge. Pas d'icones cartoon, 3D gadget, robots, cerveaux lumineux.\nIllustrations: infographie premium proche Microsoft/AWS/McKinsey/Accenture; fonds de bureau flous possibles; ombres legeres; coins arrondis; pas de neon ni interface hacker.\nDiagrammes: privilegier timelines ascendantes, flux en 3-5 etapes, architectures en couches, tableaux audit, matrices risque. Chaque fleche doit porter du sens.\nSlide couverture: photo officielle + titre fort + 3 mots piliers. Sobriete, impact, marque LSD en premier.\nSlide constat: grand titre probleme + liste courte + visuel metier. Objectif: faire ressentir la douleur operationnelle.\nSlide vision: contraste avant/apres ou chatbot/equipe/processus. Objectif: ouvrir le cadre mental.\nSlide processus: 5 phases maximum en lecture exec; slide annexe possible en tableau detaille.\nSlide technique: architecture claire en couches; fond clair; blocs lisibles; jargon limite; annotations courtes.\nSlide tableau/audit: brut mais propre; entete bleu marine; gravite en rouge/orange/jaune; lignes fines; lisible par IT/DSI.\nSlide conclusion: ton humain et rassurant; parler de temps rendu, processus fluidifies, collaborateurs recentres sur leur vrai metier; CTA sobre: Parlons-en.\nTon editorial: direct, clair, B2B, rassurant, orienté valeur. Eviter \"remplacer\", \"recrue numerique\", \"magique\", \"autonome sans controle\". Preferer \"au service des equipes\", \"fluidifier\", \"securiser\", \"redonner du temps\", \"ameliorer les processus\".\nIA: presenter l'IA comme levier operationnel controle. Insister sur gouvernance, validation humaine, monitoring, droits, risques maitrises.\nChecklist slide: 1 idee forte; titre lisible en 3 secondes; logo correct; rouge utilise avec moderation; pas trop de texte; message metier clair; aucune peur de remplacement; CTA ou conclusion explicite.\n```\n\n---\n\n## 15. Version YAML machine-readable\n\n```yaml\nbrand:\n  primary_name: \"Laurent Serre Developpement\"\n  role: \"Cabinet de transformation operationnelle augmentee par les agents IA\"\n  primary_asset_logo: \"assets/logo_reference_laurent_serre_developpement.png\"\n  primary_asset_photo: \"assets/photo_reference_laurent_serre.jpg\"\n  rule: \"La marque principale est Laurent Serre Developpement; les outils et frameworks restent secondaires.\"\nvisual_identity:\n  keywords: [\"corporate premium\", \"conseil\", \"methode\", \"confiance\", \"technologie utile\", \"transformation operationnelle\"]\n  avoid: [\"cyberpunk\", \"robots humanoides\", \"neons\", \"hacker\", \"science-fiction\", \"IA gadget\"]\ncolors:\n  navy_primary: \"#071B34\"\n  navy_secondary: \"#0B1F3A\"\n  red_primary: \"#E30613\"\n  red_secondary: \"#D71920\"\n  background_light: \"#F5F7FA\"\n  white: \"#FFFFFF\"\n  text_secondary: \"#5A6472\"\n  line_gray: \"#DDE3EA\"\n  usage_ratio: \"65-75% clair, 15-25% bleu marine, 5-12% rouge, reste gris/neutres\"\ntypography:\n  preferred: [\"Montserrat\", \"Inter\"]\n  fallback: [\"Aptos\", \"Arial\", \"Helvetica\"]\n  titles: \"Bold/ExtraBold, bleu marine, majuscules possibles, mots strategiques en rouge\"\n  body: \"Regular/SemiBold, phrases courtes, lisibilite prioritaire\"\nlayout:\n  format: \"16:9, 1920x1080\"\n  grid: \"12 colonnes\"\n  margins_px: \"48-72\"\n  density: \"une idee forte par slide, 5 points maximum par bloc\"\n  footer: \"bandeau bleu marine possible pour message cle ou CTA\"\nslide_templates:\n  cover: \"logo/photo/titre fort/3 mots piliers\"\n  problem: \"constat + irritants + visuel metier\"\n  vision: \"contraste avant-apres ou principe directeur\"\n  process_exec: \"5 phases maximum, trajectoire ascendante\"\n  process_detail: \"tableau ou cycle de vie detaille pour IT/DSI\"\n  technical: \"architecture en couches, flux lisibles, annotations courtes\"\n  risk_exec: \"3 familles: securite, controle, gouvernance\"\n  risk_register: \"table audit avec risques, impacts, probabilite, maitrise, responsable\"\n  use_case: \"declencheur -> agents/processus -> livrables -> resultat\"\n  results: \"chiffres, preuves, evolution, interpretation\"\n  conclusion: \"humain, temps rendu, processus fluidifies, CTA Parlons-en\"\nicons:\n  style: \"line icons simples, professionnels\"\n  colors: [\"bleu marine\", \"rouge\", \"blanc\"]\n  avoid: [\"cartoon\", \"3D gadget\", \"robots\", \"emojis excessifs\"]\ndiagrams:\n  recommended: [\"timeline\", \"flux\", \"architecture en couches\", \"maturite\", \"matrice\", \"tableau audit\"]\n  rule: \"Chaque fleche doit indiquer une transformation ou une responsabilite.\"\ntone:\n  voice: \"clair, direct, rassurant, pedagogique, B2B\"\n  prefer: [\"fluidifier\", \"securiser\", \"redonner du temps\", \"ameliorer les processus\", \"au service des equipes\"]\n  avoid_words: [\"remplacer\", \"recrue numerique\", \"magique\", \"IA autonome non controlee\"]\nai_positioning:\n  principle: \"L'IA est un levier operationnel controle, pas le heros.\"", "binary": false, "truncated": true}, {"name": "image-quality-checklist.md", "is_md": true, "content": "# Checklist qualité image — Présentation image-first\n\n## Pour chaque image générée, vérifier :\n\n### Format et technique\n- [ ] Format 16:9 (1920×1080)\n- [ ] Résolution suffisante pour projection\n- [ ] Pas de distorsion ou d'artefacts\n\n### Charte graphique LSD\n- [ ] Palette respectée (65-75% clair, 15-25% marine, 5-12% rouge)\n- [ ] Typographie lisible (Montserrat ou Inter)\n- [ ] Logo non déformé, bien positionné\n- [ ] Photo non déformée (si portrait présent)\n- [ ] Rouge utilisé avec modération (accents uniquement)\n\n### Contenu et lisibilité\n- [ ] Texte lisible en projection (taille suffisante)\n- [ ] Pas de texte inventé par l'IA (hallucinations)\n- [ ] Message compréhensible en moins de 3 secondes\n- [ ] Une idée forte par slide\n\n### Style et cohérence\n- [ ] Pas d'esthétique cyberpunk, robots humanoïdes, néons\n- [ ] Pas de rupture de style entre les slides\n- [ ] Cohérence des polices et couleurs sur l'ensemble\n- [ ] Si utilisation d'icônes : style line icons, professionnel\n\n### Règles spéciales\n- [ ] Pas de confusion entre marque (LSD), outils (OpenClaw) et technologies\n- [ ] L'IA est un levier, pas le héros de l'histoire\n- [ ] Pas de promesse d'autonomie sans gouvernance\n\n## Si une image échoue\n1. Identifier le problème exact\n2. Reformuler le prompt image en corrigeant le point échoué\n3. Régénérer uniquement cette slide\n4. Re-vérifier avec cette checklist\n", "binary": false, "truncated": false}], "subdirs": []}, {"name": "scripts", "files": [{"name": "assemble_pptx_from_images.py", "is_md": false, "content": "#!/usr/bin/env python3\n\"\"\"\nAssembleur PPTX image-first.\nUsage: python3 assemble_pptx_from_images.py --images images/*.png --output presentation.pptx\n\nNe fait AUCUNE création graphique — place simplement des images 16:9 plein cadre.\n\"\"\"\n\nimport argparse, glob, os, re\nfrom pptx import Presentation\nfrom pptx.util import Inches, Emu\n\nSLIDE_W = Inches(13.333)\nSLIDE_H = Inches(7.5)\n\ndef natural_sort_key(s):\n    return [int(c) if c.isdigit() else c.lower() for c in re.split(r'(\\d+)', s)]\n\ndef main():\n    parser = argparse.ArgumentParser(description=\"Assembleur PPTX image-first\")\n    parser.add_argument(\"--images\", required=True, help=\"Glob pattern ou liste de fichiers séparés par des virgules\")\n    parser.add_argument(\"--output\", default=\"presentation.pptx\", help=\"Fichier de sortie\")\n    args = parser.parse_args()\n\n    if \",\" in args.images:\n        files = [f.strip() for f in args.images.split(\",\")]\n    else:\n        files = sorted(glob.glob(args.images), key=natural_sort_key)\n\n    if not files:\n        print(\"❌ Aucune image trouvée\")\n        return 1\n\n    prs = Presentation()\n    prs.slide_width = SLIDE_W\n    prs.slide_height = SLIDE_H\n\n    for img_path in files:\n        slide = prs.slides.add_slide(prs.slide_layouts[6])  # Blank\n        # Place image in full frame\n        slide.shapes.add_picture(img_path, Inches(0), Inches(0), SLIDE_W, SLIDE_H)\n\n    prs.save(args.output)\n    print(f\"✅ PPTX assemblé : {args.output}\")\n    print(f\"   {len(files)} slides (images plein cadre 16:9)\")\n\nif __name__ == \"__main__\":\n    main()\n", "binary": false, "truncated": false}], "subdirs": []}, {"name": "templates", "files": [{"name": "image_prompt_template.txt", "is_md": false, "content": "# Prompt image pour slide — [Titre]\n# Adapté pour gpt-image-2 (OpenAI)\n\n## Instructions générales\n- Format : 16:9 (1920×1080)\n- Style : corporate premium, conseil, confiance, technologie utile\n- Palette : fond clair (65-75%), bleu marine #071B34 (15-25%), rouge #E30613 en accents (5-12%), gris neutres #5A6472\n- Typographie suggérée : Montserrat Bold pour les titres, Regular pour le corps\n- Pas de : robots humanoïdes, cyberpunk, néons, science-fiction, IA gadget\n- Le logo officiel Laurent Serre Developpement sera ajouté séparément — ne pas générer de logo\n- La photo officielle de Laurent Serre sera ajoutée séparément — ne pas générer de portrait\n\n## Slide spécifique\nType : [cover / constat / vision / technique / cas-usage / conclusion]\nTitre : [titre de la slide]\nMessage clé : [une phrase, l'idée unique de cette slide]\n\n## Composition visuelle\n[Description détaillée de la composition : agencement des éléments, couleurs dominantes, icônes, schémas, illustrations]\n\n## Texte à inclure\n[Texte exact à faire apparaître dans l'image, avec hiérarchie : titre, sous-titre, corps, légendes]\n\n## Références\n- Consulter examples_slides_reference/ pour l'inspiration stylistique\n- Consulter brand-style.yaml pour les règles exactes de couleur et typographie\n", "binary": false, "truncated": false}, {"name": "presentation_scenario.md", "is_md": true, "content": "# Scénario de présentation — [Titre]\n\n## Métadonnées\n- **Client / Contexte** :\n- **Public cible** :\n- **Objectif** (vendre / former / informer / convaincre) :\n- **Ton** (pédagogique / commercial / technique / inspirant) :\n- **Niveau de technicité** de l'audience :\n- **Nombre de slides** estimé :\n- **Contraintes de charte** (lien vers brand-style.yaml) :\n- **Images de référence disponibles** (logo, photo, slides exemple) :\n\n## Plan détaillé\n\n### Slide 1 — Couverture\n- **Message clé** :\n- **Intentions visuelles** :\n- **Texte visible** :\n- **Éléments obligatoires** : logo, photo, titre accrocheur\n\n### Slide 2 — [Titre]\n- **Message clé** :\n- **Intentions visuelles** :\n- **Texte visible** :\n\n### Slide N — Conclusion\n- **Message clé** :\n- **CTA** (Call To Action) :\n- **Éléments obligatoires** : logo, phrase de clôture, bouton contact\n\n## Checklist de validation\n- [ ] Chaque slide porte une idée forte\n- [ ] La progression est logique (constat → solution → preuve → action)\n- [ ] Le ton est adapté au public cible\n- [ ] La charte graphique LSD est respectée\n", "binary": false, "truncated": false}, {"name": "slides_manifest.yaml", "is_md": false, "content": "# Manifeste de slides pour génération image-first\n# Le LLM génère ce fichier après validation du scénario\n\npresentation:\n  title: \"Titre de la présentation\"\n  format: \"16:9\"\n  output: \"pptx_image_first\"\n\nassets:\n  logo: \"assets/logo_reference_laurent_serre_developpement.png\"\n  portrait: \"assets/photo_reference_laurent_serre.jpg\"\n  style_brief: \"references/brand-style.yaml\"\n\nslides:\n  - id: \"01\"\n    type: \"cover\"\n    title: \"Titre accrocheur\"\n    image_prompt_file: \"prompts/slide_01.txt\"\n    output_image: \"images/slide_01.png\"\n\n  - id: \"02\"\n    type: \"constat\"\n    title: \"Le problème\"\n    image_prompt_file: \"prompts/slide_02.txt\"\n    output_image: \"images/slide_02.png\"\n\n  - id: \"03\"\n    type: \"solution\"\n    title: \"Notre approche\"\n    image_prompt_file: \"prompts/slide_03.txt\"\n    output_image: \"images/slide_03.png\"\n", "binary": false, "truncated": false}], "subdirs": []}]}, {"name": "self-improving-agent", "source": "Global", "path": "skills/self-improving-agent", "files": [{"name": "README.md", "is_md": true, "content": "# self-improvement\n\nSelf-improvement skill for OpenClaw. It captures learnings, errors, and feature requests to support continuous improvement across sessions.\n\n## Attribution\n\nRemade for OpenClaw from the original repo:\n\n- https://github.com/pskoett/pskoett-ai-skills\n- https://github.com/pskoett/pskoett-ai-skills/tree/main/skills/self-improvement\n\n## Main File\n\n- `SKILL.md`\n", "binary": false, "truncated": false}, {"name": "SKILL.md", "is_md": true, "content": "---\nname: self-improvement\ndescription: \"Captures learnings, errors, and corrections to enable continuous improvement. Use when: (1) A command or operation fails unexpectedly, (2) User corrects Claude ('No, that's wrong...', 'Actually...'), (3) User requests a capability that doesn't exist, (4) An external API or tool fails, (5) Claude realizes its knowledge is outdated or incorrect, (6) A better approach is discovered for a recurring task. Also review learnings before major tasks.\"\nmetadata:\n---\n\n# Self-Improvement Skill\n\nLog learnings and errors to markdown files for continuous improvement. Coding agents can later process these into fixes, and important learnings get promoted to project memory.\n\n## First-Use Initialisation\n\nBefore logging anything, ensure the `.learnings/` directory and files exist in the project or workspace root. If any are missing, create them:\n\n```bash\nmkdir -p .learnings\n[ -f .learnings/LEARNINGS.md ] || printf \"# Learnings\\n\\nCorrections, insights, and knowledge gaps captured during development.\\n\\n**Categories**: correction | insight | knowledge_gap | best_practice\\n\\n---\\n\" > .learnings/LEARNINGS.md\n[ -f .learnings/ERRORS.md ] || printf \"# Errors\\n\\nCommand failures and integration errors.\\n\\n---\\n\" > .learnings/ERRORS.md\n[ -f .learnings/FEATURE_REQUESTS.md ] || printf \"# Feature Requests\\n\\nCapabilities requested by the user.\\n\\n---\\n\" > .learnings/FEATURE_REQUESTS.md\n```\n\nNever overwrite existing files. This is a no-op if `.learnings/` is already initialised.\n\nDo not log secrets, tokens, private keys, environment variables, or full source/config files unless the user explicitly asks for that level of detail. Prefer short summaries or redacted excerpts over raw command output or full transcripts.\n\nIf you want automatic reminders or setup assistance, use the opt-in hook workflow described in [Hook Integration](#hook-integration).\n\n## Quick Reference\n\n| Situation | Action |\n|-----------|--------|\n| Command/operation fails | Log to `.learnings/ERRORS.md` |\n| User corrects you | Log to `.learnings/LEARNINGS.md` with category `correction` |\n| User wants missing feature | Log to `.learnings/FEATURE_REQUESTS.md` |\n| API/external tool fails | Log to `.learnings/ERRORS.md` with integration details |\n| Knowledge was outdated | Log to `.learnings/LEARNINGS.md` with category `knowledge_gap` |\n| Found better approach | Log to `.learnings/LEARNINGS.md` with category `best_practice` |\n| Simplify/Harden recurring patterns | Log/update `.learnings/LEARNINGS.md` with `Source: simplify-and-harden` and a stable `Pattern-Key` |\n| Similar to existing entry | Link with `**See Also**`, consider priority bump |\n| Broadly applicable learning | Promote to `CLAUDE.md`, `AGENTS.md`, and/or `.github/copilot-instructions.md` |\n| Workflow improvements | Promote to `AGENTS.md` (OpenClaw workspace) |\n| Tool gotchas | Promote to `TOOLS.md` (OpenClaw workspace) |\n| Behavioral patterns | Promote to `SOUL.md` (OpenClaw workspace) |\n\n## OpenClaw Setup (Recommended)\n\nOpenClaw is the primary platform for this skill. It uses workspace-based prompt injection with automatic skill loading.\n\n### Installation\n\n**Via ClawdHub (recommended):**\n```bash\nclawdhub install self-improving-agent\n```\n\n**Manual:**\n```bash\ngit clone https://github.com/peterskoett/self-improving-agent.git ~/.openclaw/skills/self-improving-agent\n```\n\nRemade for openclaw from original repo : https://github.com/pskoett/pskoett-ai-skills - https://github.com/pskoett/pskoett-ai-skills/tree/main/skills/self-improvement\n\n### Workspace Structure\n\nOpenClaw injects these files into every session:\n\n```\n~/.openclaw/workspace/\n├── AGENTS.md          # Multi-agent workflows, delegation patterns\n├── SOUL.md            # Behavioral guidelines, personality, principles\n├── TOOLS.md           # Tool capabilities, integration gotchas\n├── MEMORY.md          # Long-term memory (main session only)\n├── memory/            # Daily memory files\n│   └── YYYY-MM-DD.md\n└── .learnings/        # This skill's log files\n    ├── LEARNINGS.md\n    ├── ERRORS.md\n    └── FEATURE_REQUESTS.md\n```\n\n### Fichiers workspace — rôles, usage et red lines (réf. doc OpenClaw)\n\nCes fichiers sont injectés dans le contexte des sessions main (canal direct). Les modifier maladroitement peut casser le comportement de l'agent ou perdre des informations critiques.\n\n**⚠️ Attention sous-agents :** les sessions sous-agent (spawned) ne reçoivent que `AGENTS.md` et `TOOLS.md`. Pas de SOUL.md, MEMORY.md, ni USER.md.\n\n#### SOUL.md — Personnalité, ton, principes\n\n| Aspect | Détail (source : docs OpenClaw) |\n|--------|----------------------------------|\n| **Rôle canonique** | Définit la voix de l'agent : ton, opinions, humour, franchise, limites. C'est le fichier qui empêche l'agent de sonner comme un assistant générique. |\n| **Usage** | Règles de comportement générales, principes de décision, garde-fous. Ton direct, concis, impératif. Court > long. Précis > vague. |\n| **Red lines** | ❌ Pas de procédures opérationnelles (→ AGENTS.md). ❌ Pas de config technique (→ TOOLS.md). ❌ Pas de « vie et œuvre », de changelog, de pavé de vibes sans effet comportemental. ❌ Pas de réécriture sans comprendre la personnalité existante. |\n\n#### AGENTS.md — Instructions opérationnelles\n\n| Aspect | Détail (source : docs OpenClaw) |\n|--------|----------------------------------|\n| **Rôle canonique** | Operating instructions for the agent and how it should use memory. Règles, priorités, « how to behave ». Chargé au début de chaque session. |\n| **Usage** | Procédures étape par étape, protocoles d'échange entre agents, règles de sécurité, cycles de vie, conventions de mémoire. Structuré, listes à puces, exemples actionnables. |\n| **Red lines** | ❌ Pas de règles de personnalité (→ SOUL.md). ❌ Pas de suppression de protocoles sans comprendre qui les utilise. ❌ Pas de « il faut » — des instructions actionnables. ❌ Respecter la structure existante. |\n\n#### TOOLS.md — Notes locales sur les outils\n\n| Aspect | Détail (source : docs OpenClaw) |\n|--------|----------------------------------|\n| **Rôle canonique** | Notes sur les outils locaux et les conventions. **Ne contrôle PAS la disponibilité des outils** — c'est uniquement indicatif. |\n| **Usage** | Chemins de scripts, commandes précises, noms de devices, gotchas d'intégration, configurations d'environnement. Pas de prose — du technique. |\n| **Red lines** | ❌ Ne pas documenter des outils qui n'existent pas. ❌ Ne pas enlever des gotchas documentés (appris par l'expérience). ❌ Pas de règles de comportement ou de workflows. ❌ Les skills (dossier `skills/`) décrivent comment les outils marchent ; TOOLS.md est pour ce qui est propre à ton setup. |\n\n#### MEMORY.md — Mémoire durable (optionnel)\n\n| Aspect | Détail (source : docs OpenClaw) |\n|--------|----------------------------------|\n| **Rôle canonique** | Mémoire long terme : faits durables, préférences, décisions, résumés. **Optionnel** — son injection dépend de sa présence. |\n| **Usage** | Noter des décisions explicites, dates importantes, relations, configurations validées. Format chronologique ou par thème. |\n| **Red lines** | ❌ À charger UNIQUEMENT dans une session main (canal direct, pas de groupe/partagé) — sécurité. ❌ Ne jamais écraser l'historique — ajouter en fin. ❌ Pas de transcriptions brutes (→ `memory/`). ❌ Pas d'instructions opérationnelles (→ AGENTS.md). ❌ Pas de secrets ou tokens. |\n\n#### `memory/` (dossier) — Journal quotidien\n\n| Aspect | Détail |\n|--------|--------|\n| **Rôle** | Journal quotidien de l'agent : transcriptions, logs, notes temporaires, observations. Accessible via les outils de mémoire (pas automatiquement injecté). |\n| **Usage** | Un fichier par jour (`YYYY-MM-DD.md`). Contenu libre, horodaté. |\n| **Red lines** | ❌ Pas de suppression de fichiers sans raison. ❌ Pas de décisions durables ici (promouvoir vers MEMORY.md). ❌ Pas de secrets ou tokens. |\n\n#### USER.md — Identité de l'utilisateur\n\n| Aspect | Détail |\n|--------|--------|\n| **Rôle** | Qui est l'utilisateur, comment s'adresser à lui. Chargé chaque session. |\n| **Usage** | Nom, coordonnées, contexte, préférences de communication. |\n| **Red lines** | ❌ Ne pas modifier sans validation utilisateur. ❌ Pas de données sensibles. |\n\n#### IDENTITY.md — Nom, vibe, emoji de l'agent\n\n| Aspect | Détail |\n|--------|--------|\n| **Rôle** | Enregistrement d'identité : nom, type de créature, vibe, émoji signature. |\n| **Usage** | Rempli pendant le bootstrap, rarement modifié. Format minimal. |\n| **Red lines** | ❌ Pas de détails opérationnels. ❌ Ne pas le réécrire sans raison. |\n\n#### HEARTBEAT.md — Checklist heartbeat\n\n| Aspect | Détail |\n|--------|--------|\n| **Rôle** | Checklist optionnelle pour les tours heartbeat. Reste court pour limiter la consommation de tokens. |\n| **Usage** | Tâches périodiques à vérifier, commandes à lancer. Commentaires uniquement = pas d'appels heartbeat. |\n| **Red lines** | ❌ Pas de prose longue. ❌ Pas de données dont l'agent a besoin pour répondre (ce n'est pas injecté dans les tours normaux). |\n\n#### Règle transversale\n> **Toute modification d'un fichier workspace doit être cohérente avec la personnalité définie dans SOUL.md.** Si tu n'es pas sûr de l'impact d'un changement, ajoute une section sans supprimer l'existant. Les fichiers workspace sont ta mémoire et ta personnalité — les traiter comme tels.\n\n### Create Learning Files\n\n```bash\nmkdir -p ~/.openclaw/workspace/.learnings\n```\n\nThen create the log files (or copy from `assets/`):\n- `LEARNINGS.md` — corrections, knowledge gaps, best practices\n- `ERRORS.md` — command failures, exceptions\n- `FEATURE_REQUESTS.md` — user-requested capabilities\n\n### Promotion Targets\n\nWhen learnings prove broadly applicable, promote them to workspace files:\n\n| Learning Type | Promote To | Example |\n|---------------|------------|---------|\n| Behavioral patterns | `SOUL.md` | \"Be concise, avoid disclaimers\" |\n| Workflow improvements | `AGENTS.md` | \"Spawn sub-agents for long tasks\" |\n| Tool gotchas | `TOOLS.md` | \"Git push needs auth configured first\" |\n\n### Inter-Session Communication\n\nOpenClaw provides tools to share learnings across sessions:\n\n- **sessions_list** — View active/recent sessions\n- **sessions_history** — Read another session's transcript  \n- **sessions_send** — Send a learning to another session\n- **sessions_spawn** — Spawn a sub-agent for background work\n\nUse these only in trusted environments and only when the user explicitly wants cross-session sharing. Prefer sending a short sanitized summary and relevant file paths, not raw transcripts, secrets, or full command output.\n\n### Optional: Enable Hook\n\nFor automatic reminders at session start:\n\n```bash\n# Copy hook to OpenClaw hooks directory\ncp -r hooks/openclaw ~/.openclaw/hooks/self-improvement\n\n# Enable it\nopenclaw hooks enable self-improvement\n```\n\nSee `references/openclaw-integration.md` for complete details.\n\n---\n\n## Generic Setup (Other Agents)\n\nFor Claude Code, Codex, Copilot, or other agents, create `.learnings/` in the project or workspace root:\n\n```bash\nmkdir -p .learnings\n```\n\nCreate the files inline using the headers shown above. Avoid reading templates from the current repo or workspace unless you explicitly trust that path.\n\n### Add reference to agent files AGENTS.md, CLAUDE.md, or .github/copilot-instructions.md to remind yourself to log learnings. (this is an alternative to hook-based reminders)\n\n#### Self-Improvement Workflow\n\nWhen errors or corrections occur:\n1. Log to `.learnings/ERRORS.md`, `LEARNINGS.md`, or `FEATURE_REQUESTS.md`\n2. Review and promote broadly applicable learnings to:\n   - `CLAUDE.md` - project facts and conventions\n   - `AGENTS.md` - workflows and automation\n   - `.github/copilot-instructions.md` - Copilot context\n\n## Logging Format\n\n### Learning Entry\n\nAppend to `.learnings/LEARNINGS.md`:\n\n```markdown\n## [LRN-YYYYMMDD-XXX] category\n\n**Logged**: ISO-8601 timestamp\n**Priority**: low | medium | high | critical\n**Status**: pending\n**Area**: frontend | backend | infra | tests | docs | config\n\n### Summary\nOne-line description of what was learned\n\n### Details\nFull context: what happened, what was wrong, what's correct\n\n### Suggested Action\nSpecific fix or improvement to make\n\n### Metadata\n- Source: conversation | error | user_feedback\n- Related Files: path/to/file.ext\n- Tags: tag1, tag2\n- See Also: LRN-20250110-001 (if related to existing entry)\n- Pattern-Key: simplify.dead_code | harden.input_validation (optional, for recurring-pattern tracking)\n- Recurrence-Count: 1 (optional)\n- First-Seen: 2025-01-15 (optional)\n- Last-Seen: 2025-01-15 (optional)\n\n---\n```\n\n### Error Entry\n\nAppend to `.learnings/ERRORS.md`:\n\n```markdown\n## [ERR-YYYYMMDD-XXX] skill_or_command_name\n\n**Logged**: ISO-8601 timestamp\n**Priority**: high\n**Status**: pending\n**Area**: frontend | backend | infra | tests | docs | config\n\n### Summary\nBrief description of what failed\n\n### Error\n```\nActual error message or output\n```\n\n### Context\n- Command/operation attempted\n- Input or parameters used\n- Environment details if relevant\n- Summary or redacted excerpt of relevant output (avoid full transcripts and secret-bearing data by default)\n\n### Suggested Fix\nIf identifiable, what might resolve this\n\n### Metadata\n- Reproducible: yes | no | unknown\n- Related Files: path/to/file.ext\n- See Also: ERR-20250110-001 (if recurring)\n\n---\n```\n\n### Feature Request Entry\n\nAppend to `.learnings/FEATURE_REQUESTS.md`:\n\n```markdown\n## [FEAT-YYYYMMDD-XXX] capability_name\n\n**Logged**: ISO-8601 timestamp\n**Priority**: medium\n**Status**: pending\n**Area**: frontend | backend | infra | tests | docs | config\n\n### Requested Capability\nWhat the user wanted to do\n\n### User Context\nWhy they needed it, what problem they're solving\n\n### Complexity Estimate\nsimple | medium | complex\n\n### Suggested Implementation\nHow this could be built, what it might extend\n\n### Metadata\n- Frequency: first_time | recurring\n- Related Features: existing_feature_name\n\n---\n```\n\n## ID Generation\n\nFormat: `TYPE-YYYYMMDD-XXX`\n- TYPE: `LRN` (learning), `ERR` (error), `FEAT` (feature)\n- YYYYMMDD: Current date\n- XXX: Sequential number or random 3 chars (e.g., `001`, `A7B`)\n\nExamples: `LRN-20250115-001`, `ERR-20250115-A3F`, `FEAT-20250115-002`\n\n## Resolving Entries\n\nWhen an issue is fixed, update the entry:\n\n1. Change `**Status**: pending` → ` ted rules as short prevention rules (what to do before/while coding),\nnot long incident write-ups.\n\n## Periodic Review\n\nReview `.learnings/` at natural breakpoints:\n\n### When to Review\n- Before starting a new major task\n- After completing a feature\n- When working in an area with past learnings\n- Weekly during active development\n\n### Quick Status Check\n```bash\n# Count pending items\ngrep -h \"Status\\*\\*: pending\" .learnings/*.md | wc -l\n\n# List pending high-priority items\ngrep -B5 \"Priority\\*\\*: high\" .learnings/*.md | grep \"^## \\[\"\n\n# Find learnings for a specific area\ngrep -l \"Area\\*\\*: backend\" .learnings/*.md\n```\n\n### Review Actions\n- Resolve fixed items\n- Promote applicable learnings\n- Link related entries\n- Escalate recurring issues\n\n## Detection Triggers\n\nAutomatically log when you notice:\n\n**Corrections** (→ learning with `correction` category):\n- \"No, that's not right...\"\n- \"Actually, it should be...\"\n- \"You're wrong about...\"\n- \"That's outdated...\"\n\n**Feature Requests** (→ feature request):\n- \"Can you also...\"\n- \"I wish you could...\"\n- \"Is there a way to...\"\n- \"Why can't you...\"\n\n**Knowledge Gaps** (→ learning with `knowledge_gap` category):", "binary": false, "truncated": true}, {"name": "_meta.json", "is_md": false, "content": "{\n  \"ownerId\": \"kn70cjr952qdec1nx70zs6wefn7ynq2t\",\n  \"slug\": \"self-improving-agent\",\n  \"version\": \"3.0.21\",\n  \"publishedAt\": 1777649615088\n}", "binary": false, "truncated": false}], "subdirs": [{"name": "assets", "files": [{"name": "ERRORS.md", "is_md": true, "content": "# Errors Log\n\nCommand failures, exceptions, and unexpected behaviors.\n\n---\n", "binary": false, "truncated": false}, {"name": "FEATURE_REQUESTS.md", "is_md": true, "content": "# Feature Requests\n\nCapabilities requested by user that don't currently exist.\n\n---\n", "binary": false, "truncated": false}, {"name": "LEARNINGS.md", "is_md": true, "content": "# Learnings\
