éorie.** Chaque article commence par une scène vécue, une observation concrète, un moment réel. Pas de définition, pas de contexte général.\n- **La voix de Laurent.** Un article doit pouvoir être lu à voix haute et sonner juste. Pas de jargon, pas de formules toutes faites, pas de « il faut » lénifiant.\n- **Densité.** Chaque paragraphe doit apporter quelque chose. Si un passage peut être supprimé sans perdre le sens, le supprimer.\n- **Une idée par article.** Ne pas vouloir tout dire. Creuser une idée, la rendre tangible.\n\n## Avant de commencer\n\nLire les fichiers de référence avant toute rédaction :\n\n1. `references/VOICE_CALIBRATION.md` — la voix terrain de Laurent et les corrections durables\n2. `references/ANTI_CALQUE.md` — interdiction des anglicismes et du tiret cadratin\n3. `references/PREFLIGHT.md` — checklist à passer avant chaque livraison\n\nNe pas improviser. Ces fichiers sont la mémoire des corrections et des préférences accumulées.\n\n## Structures d'article\n\nPour éviter la monotonie (un article par jour), alterner entre ces structures. Ne pas utiliser la même deux jours de suite.\n\n### Structure A — « La scène qui dit tout »\n\n```\n1. Alinéa d'accroche — une scène courte, un moment précis\n2. La conséquence — ce que cette scène révèle\n3. Le diagnostic — pourquoi c'est un problème récurrent\n4. La solution — concrète, en 2-3 points maximum\n5. La chute — une phrase courte qui claque\n```\n\nUtilisation : sujet de prise de conscience, révélation, contre-intuitif.\n\n### Structure B — « De la difficulté à la solution »\n\n```\n1. Le piège — ce qui ne marche plus (scène d'échec)\n2. L'erreur commune — pourquoi on fait tous cette erreur\n3. Le déclic — ce qui a changé le regard\n4. Les actions concrètes — 3 à 4 points, pas plus\n5. L'invitation — CTA doux vers le diagnostic\n```\n\nUtilisation : sujet pratique, méthode, retour d'expérience.\n\n### Structure C — « La question qui dérange »\n\n```\n1. La question — posée franchement, sans détour\n2. Pourquoi on l'évite — le confort, l'habitude, la peur\n3. Ce que j'ai vu sur le terrain — scène ou accumulation de cas\n4. Ce qu'il faut regarder — 2-3 indicateurs ou signaux\n5. La décision à prendre — courte, tranchante\n```\n\nUtilisation : sujet sensible, vérité qui dérange, provocation constructive.\n\n### Règle de rotation\n\nL'éditorialiste qui a écrit l'article hier regarde la structure utilisée et choisit une structure différente aujourd'hui. Objectif : ne pas répéter le même pattern plus de 2 fois par semaine.\n\n## Titre\n\n- **SERP title** : max 60 caractères. Accrocheur, pas putaclic.\n- **Meta description** : max 160 caractères. Résume l'article comme si on le présentait à un collègue.\n- **Slug** : en minuscules, traits d'union, pas de mots vides inutiles.\n\nLe titre de la page (h1) peut être légèrement différent du SERP title, mais doit rester dans le même esprit.\n\n## CTA\n\n- 1 CTA principal, 1 CTA secondaire maximum.\n- Sur article de prise de conscience (Structure A) : le CTA principal oriente vers le diagnostic offert, pas vers le Bootcamp.\n- Sur article pratique (Structure B) : le CTA peut orienter vers le coaching ou le Bootcamp.\n- Le placement : après la chute, pas avant. Les CTA en milieu d'article cassent la lecture.\n\n## Images\n\n- **Hero image** : 1 seule, générée via `image_generate` (gpt-image-2). Pas de carrousel, pas de BD. La BD carrousel est gérée par le skill **bd-carousel**.\n- **Format** : WebP, 1536×1024 (paysage) ou 1024×1536 (portrait selon le sujet).\n- **Style** : réaliste, naturel, pas de template IA. Scène terrain plutôt que personne qui pose.\n- **Pas d'écriture sur le visage** de la photo de Laurent.\n\n## Garde-fous absolus\n\n- **Aucun tiret cadratin (U+2014, « — »)** dans tout l'article. Voir `references/ANTI_CALQUE.md`.\n- **Aucune citation nominative, aucun chiffre client, aucun logo** sans validation explicite.\n- **Ne pas inventer de prestations Laurent** (coaching, bootcamp, diagnostic). Utiliser seulement les pages existantes.\n- **Validation éditoriale** ≠ feu vert de publication. Toujours demander avant de publier, sauf pipeline automatique validé.\n", "binary": false, "truncated": false}], "subdirs": [{"name": "references", "files": [{"name": "ANTI_CALQUE.md", "is_md": true, "content": "# ANTI-CALQUE ET INTERDICTIONS TYPOGRAPHIQUES\n\n## ⚠️ Règle absolue : pas de tiret cadratin\n\nLe caractère U+2014 (EM DASH / tiret cadratin « — ») est **totalement interdit** dans tous les contenus : articles blog, posts LinkedIn, descriptions, alt text, tout.\n\nC'est un signe typographique américain qui trahit immédiatement la rédaction IA. En français, on n'utilise pas ce signe.\n\n**Alternatives françaises :**\n| Usage | Au lieu de | Faire |\n|-------|-----------|------|\n| Pause explicative | — le vrai problème | : le vrai problème |\n| Incise | le prospect — qui hésitait — a signé | le prospect, qui hésitait, a signé |\n| Mise en relief | l'IA — et c'est là le piège — exécute | reformuler sans incise |\n| Énumération | trois leviers — la préparation, l'écoute, le suivi | trois leviers : la préparation, l'écoute, le suivi |\n\n**Après chaque rédaction :** vérifier l'absence du caractère U+2014 dans le fichier. Si présent, remplacer systématiquement.\n\n## Anglicismes à bannir\n\n| À ne pas écrire | Remplacer par |\n|----------------|---------------|\n| mindset | état d'esprit, posture |\n| onboarding | intégration, accueil |\n| scaling | passage à l'échelle, développement |\n| best practices | bonnes pratiques |\n| sales enablement | (conserver si technique, mais expliquer) |\n| lead gen | génération de leads |\n| closing | conclusion, signature |\n| cold outreach | prospection à froid, prise de contact |\n| feedback | retour |\n| pitch | présentation, argumentaire |\n| call | appel, entretien |\n| meeting | réunion, rendez-vous |\n| coaching | (conserver : adopté en français) |\n| follow-up | relance, suivi |\n| insights | enseignements, observations |\n\n## Syntaxe\n\n- **Éviter les phrases trop longues** (plus de 30 mots). Couper en deux.\n- **Éviter les questions rhétoriques** enchaînées. Une seule par article, bien placée.\n- **Éviter les triplés** : « convaincre, rassurer, accompagner » — ça sonne IA. Si tu énumères, que 2 éléments ou une formule unique.\n- **Préférer la voix active** à la voix passive. « On a testé » plutôt que « il a été testé ».\n- **Ne pas abuser des guillemets** pour mettre en valeur des mots. Si un mot est important, le mettre en italique ou le laisser sans marquage.\n- **Points de suspension** : maximum 1 par article. Ils donnent un ton hésitant.\n- **Points d'exclamation** : avec parcimonie. 1-2 par article max.\n\n## LinkedIn spécifique\n\n- **Pas de listes numérotées** (1., 2., 3.) dans le commentary — LinkedIn les parse en HTML et les tronque après le premier item.\n- **Pas de parenthèses** (texte) dans le commentary — LinkedIn les interprète comme délimiteur de format et tronque.\n- Utiliser → ou • pour les énumérations.\n", "binary": false, "truncated": false}, {"name": "PREFLIGHT.md", "is_md": true, "content": "# PRÉFLIGHT — Checklist avant livraison\n\nPasser cette checklist **avant** d'envoyer le package au site-maintainer ou à Laurent.\n\n## 1. Voix et ton\n\n- [ ] L'article commence-t-il par une scène terrain (pas une définition ou un constat général) ?\n- [ ] Peut-on lire le texte à voix haute sans que ça sonne faux ?\n- [ ] Y a-t-il des « il faut », « vous devez », ou formules injonctives ? Les remplacer.\n- [ ] Y a-t-il des phrases génériques qu'on pourrait trouver sur n'importe quel blog commercial ? Les supprimer ou les réécrire.\n- [ ] Le ton est-il celui de Laurent : direct, terrain, pas de jargon ?\n\n## 2. Structure\n\n- [ ] La structure choisie (A, B ou C) est-elle différente de l'article précédent ?\n- [ ] Y a-t-il un fil conducteur clair ? Le lecteur sait-il où il va ?\n- [ ] La chute est-elle courte et tranchante ? (pas une conclusion bilan)\n- [ ] Le CTA est-il bien placé (après la chute, pas avant) ?\n- [ ] Un seul CTA principal + un secondaire max ?\n\n## 3. Style et typographie\n\n- [ ] **Vérifier l'absence de tiret cadratin (U+2014)** dans tout le fichier. → Commande : `grep -n '—' page.tsx`\n- [ ] Pas d'anglicismes non justifiés (voir ANTI_CALQUE.md)\n- [ ] Pas de parenthèses dans le commentary (UNIQUEMENT pour LinkedIn)\n- [ ] Pas de listes numérotées (UNIQUEMENT pour LinkedIn)\n- [ ] Pas de triplés d'adjectifs ou de concepts\n- [ ] Phrases de moins de 30 mots en moyenne\n\n## 4. Contenu\n\n- [ ] Aucun nom de client, chiffre, logo sans validation\n- [ ] Aucune prestation inventée (coaching, bootcamp, diagnostic)\n- [ ] Les liens pointent vers des pages existantes (vérifier les slugs)\n- [ ] Les exemples sont crédibles (réels ou typiques, pas inventés)\n- [ ] Le sujet est-il vraiment utile pour un dirigeant de PME ?\n\n## 5. Technique\n\n- [ ] La syntaxe TSX est valide (imports, composants, balises fermées)\n- [ ] Les images sont au bon format (WebP, bonnes dimensions)\n- [ ] Les métadonnées sont renseignées (title, description, keywords, og, twitter)\n- [ ] Les UTM sont présents sur les liens externes (LinkedIn → site)\n- [ ] Le JSON-LD article et FAQ sont présents et valides\n- [ ] L'URL canonique correspond au slug\n\n## 6. Publication\n\n- [ ] Le package complet est livré (page TSX + hero image + BD carrousel si applicable + PDF)\n- [ ] Un seul message au site-maintaine (pas de notifications prématurées)\n- [ ] Le post LinkedIn est prêt (commentary + UTM + document attaché)\n- [ ] Poster LinkedIn seulement après confirmation du site-maintaineur (URL live)\n", "binary": false, "truncated": false}, {"name": "VOICE_CALIBRATION.md", "is_md": true, "content": "# VOIX ET CALIBRATIONS — Référence canonique pour la rédaction\n\n## La voix Laurent en 5 principes\n\n1. **Terrain, pas théorie** — chaque article commence par une scène, un moment, un cas réel. Pas d'introduction contextuelle, pas de définition, pas de généralité.\n2. **Oral et incarné** — le texte doit pouvoir se lire à voix haute. Des phrases courtes, du rythme, des questions qui interpellent.\n3. **Concret** — des chiffres, des situations, des dates, des lieux. Rien d'abstrait.\n4. **Pas de « il faut »** — remplacer par des constats, des questionnements, des retours d'expérience.\n5. **Densité** — chaque paragraphe fait avancer. Pas de remplissage, pas de transitions inutiles.\n\n## Calibrations fortes (corrections durables de Laurent)\n\n### Ouverture\n- Ne pas commencer par « vous avez vu passer le débat », « on entend souvent dire » ou toute forme d'introduction commentée.\n- Aller vite à la mécanique commerciale : une scène, un chiffre, une question franche.\n\n### Ton\n- Éviter le contenu « propre » mais faible. Chercher la scène terrain, la tension, la conséquence visible.\n- Bousculer positivement, pas agressivement. Une formule unique et active plutôt qu'une énumération de concepts.\n- « Performance commerciale » plutôt que « avancement commercial » — plus concret, plus résultat.\n\n### Causes terrain\n- Les vraies causes d'une perte commerciale : priorité faible, vrai décideur absent, proposition trop tôt, vente mal engagée.\n- Le concurrent est souvent un symptôme, pas la cause profonde.\n- Ne pas parler du concurrent en premier — parler du problème du client d'abord.\n\n### Fin d'article\n- Chute courte, tranchante, concrète. Pas de conclusion bilan.\n- Sur pilotage commercial : signaler, challenger, requalifier, sortir du pipe, refaire un point réel.\n\n### Exemples\n- Ne pas inventer d'exemples. S'ils ne sont pas réels, les qualifier comme des « situations typiques » ou « ce que je vois souvent ».\n- Ne pas citer de noms de clients, de chiffres précis, de logos sans validation.\n\n## Émulateur de style\n\nQuand tu rédiges, pose-toi ces questions :\n1. Est-ce que je peux entendre Laurent dire cette phrase ?\n2. Est-ce qu'un dirigeant de PME va se reconnaître dans la scène ?\n3. Est-ce que cette phrase apporte quelque chose ou je peux la couper ?\n4. Est-ce que je tombe dans le « blog marketing » générique ?\n5. Est-ce que le ton est assez oral pour être lu à voix haute ?\n", "binary": false, "truncated": false}], "subdirs": []}]}, {"name": "bd-carousel", "source": "Global", "path": "skills/bd-carousel", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: bd-carousel\ndescription: \"Création de carrousels BD éditoriaux pour LinkedIn et le blog. Préflight obligatoire, style canonique, règles techniques, narratives, pièges connus, package livrable. Capitalise toutes les leçons terrain.\"\nmetadata:\n  openclaw:\n    emoji: \"🎬\"\n    requires: {}\n---\n\n# BD Carrousel — Skill canonique\n\nCe skill est la source unique pour la création de carrousels BD éditoriaux.\nIl doit être chargé avant TOUTE génération de carrousel.\n\n---\n\n## 🚨 Préflight obligatoire (vérifier avant chaque génération)\n\n**Ces 2 règles sont bloquantes. Ne pas les respecter = génération rejetée.**\n\n1. **Photo Laurent en référence sur chaque slide où il apparaît**\n   - Chemin : `production/images/Laurent Serre.jpg`\n   - Copier dans `/Users/clawdia/.openclaw/media/inbound/` avant de passer à `image_generate`\n   - Passer UNIQUEMENT sur les slides avec Laurent — NE PAS passer la référence sur les slides sans lui\n   - Après chaque slide avec Laurent : vérifier visuellement la ressemblance. Si générique → régénérer\n\n2. **10-16 slides minimum**\n   - Ne pas se limiter arbitrairement. Le sujet dicte la longueur.\n   - Laurent a validé un carrousel de 16 slides (V5 HOM) et a dit « n'hésite pas à faire beaucoup plus de slides »\n   - 8-10 slides = insuffisant. Viser 10-16 par défaut.\n   - Dernière slide = CTA avec Laurent en BD + texte « Commencez par un diagnostic offert sur laurentserre.com »\n\n---\n\n## Style canonique\n\n**Bloc à copier dans chaque prompt de vignette :**\n\n> Style franco-belge réaliste contemporain. Trait noir fin. Proportions normales. Couleurs naturelles (gris, bleu marine, brun, beige). Bulles blanc fond pur, texte noir centré. Ambiance adulte professionnelle.\n\n- Format : portrait 9:16, **1024×1536**\n- Moteur unique : OpenAI `gpt-image-2`\n\n\n---\n\n## Règles techniques\n\n### Timeout\n- Prompts longs BD avec image référence : `timeoutMs: 600000` (10 min)\n- Prompts moyens : `timeoutMs: 600000`\n- Le timeout 120000ms (2 min) cause des échecs silencieux\n\n### Image de référence\n- **1 seule max.** 2+ images → échec silencieux systématique\n- **Personnage à reproduire** : passer la photo en référence directe (`image:`), ne pas décrire textuellement la ressemblance\n- **Distinction personnages** : décrire physiquement chaque personnage en détail dans le scénario JSON et donc dans chaque prompt où il apparaît\n- Traits communs entre personnages → BD illisible sur mobile\n\n### Consistance visuelle des personnages\n- Les descriptions personnages doivent être longues et stables. Il n'y a pas de raison d'être économe en tokens dans les prompts image.\n- Pour chaque personnage récurrent, définir une fiche morphologique précise : âge apparent, silhouette, taille relative, forme du visage, front, sourcils, yeux, regard, nez, bouche, menton, mâchoire, oreilles visibles ou non, cheveux, implantation, barbe/moustache, peau, signes distinctifs, posture, gestuelle, tenue, matières, couleurs, accessoires.\n- Répéter la même fiche dans chaque prompt via le champ `characters`. Ne pas remplacer par des descriptions vagues comme \"dirigeant PME\" ou \"commercial senior\".\n- Les personnages importants doivent être reconnaissables même sans lire les bulles. Si deux personnages partagent âge, tenue ou morphologie, accentuer volontairement leurs différences.\n- Pour Laurent : utiliser la photo de référence sur les slides où il apparaît, mais conserver aussi une fiche descriptive stable de posture, tenue, présence et expression. La photo aide la ressemblance ; la fiche aide la cohérence narrative et graphique.\n\n### Scènes\n- 1-2 personnages max. Éviter les groupes de 3+\n- **AUCUN GUILLEMET** dans les bulles — ajouter cette contrainte dans chaque prompt\n\n### Génération\n- **Séquentiel uniquement** : ne jamais lancer plusieurs `image_generate` en parallèle\n- 1 seul slot OpenAI disponible → 3 sub-agents simultanés = 1 image, 2 échecs\n- Sub-agent possible SEULEMENT si la session parente n'a pas d'image_generate actif\n- Artefact « delivery failed » = faux positif, l'image est bien générée\n- Après timeout : vérifier manuellement le dossier media/\n\n### Échec silencieux\n- Si 3 min sans fichier → relancer sans image référence\n\n---\n\n## Règles narratives\n\n### Non-didactisme\n- Ne jamais faire un carrousel qui énumère des concepts ou donne des leçons\n- Laurent doit être mis en avant, mais jamais comme un sauveur providentiel. Il intervient comme partenaire terrain : il respecte la compétence commerciale déjà présente, aide à voir plus clair, met du cadre, creuse les vrais enjeux, rend l'action plus juste et plus utile.\n- L'accompagnement de Laurent doit avoir de la profondeur et de l'impact : les personnages progressent, retrouvent du sens dans leur métier, deviennent plus performants sans devenir plus tendus.\n- Le personnage principal ne doit pas être humilié, infantilisé ou \"réparé\" par Laurent. Il garde son intelligence métier et participe activement à la solution.\n- La progression doit être co-produite : Laurent apporte recul, méthode, exigence, questions, diagnostic et mise en mouvement ; l'équipe apporte son terrain, son expérience, ses contraintes et ses intuitions.\n- Le personnage principal doit trouver sa solution avec Laurent, pas grâce à une formule magique extérieure : observation, diagnostic, adaptation, appropriation.\n- Le problème doit être nuancé, pas caricatural\n- Le résultat doit être modeste et crédible, pas triomphal\n\n### Rôle narratif de Laurent\n- Laurent doit avoir une utilité narrative visible : si on le retire du carrousel, l'histoire doit perdre en clarté, en profondeur ou en impact.\n- Rôles recommandés : sparring-partner, observateur lucide, coach terrain, révélateur d'un angle mort, tiers de confiance, accélérateur de prise de recul, accompagnant d'une mise en pratique.\n- Rôles interdits : magicien qui sauve tout, consultant donneur de leçons, expert qui écrase l'équipe, héros qui vole l'histoire, personnage qui apporte une solution toute faite sans écouter le terrain.\n- Bon équilibre : Laurent est important, présent et différenciant, mais il ne confisque ni la compétence ni la transformation des personnages.\n\n### Cohérence avec l'article\n- Le fil rouge du carrousel doit être strictement cohérent avec l'article associé\n- La BD illustre l'article, elle ne raconte PAS une histoire parallèle\n- Si l'article parle d'objection prix, la slide « priorité » doit porter sur l'objection prix\n\n### Slide observer (humour de connivence)\n- Formule canonique : « J'aurais pu sécuriser cette vente tout seul. Mais j'ai choisi ce rendez-vous exprès. L'enjeu est maîtrisé. Alors je me tais et j'observe. »\n\n### Couverture split-screen\n- Les labels vont SUR le personnage central (floquage textile, badge brodé), pas dans les décors\n- La ligne de séparation passe DERRIÈRE le personnage, pas devant\n\n---\n\n## Package livrable attendu\n\n1. **Slides image** — une par vignette, format 9:16 1024×1536\n2. **PDF carrousel** — fusion de toutes les slides\n3. **Post LinkedIn** — texte voix Laurent + UTM\n4. **Validation script/brief** — validé avant génération des images\n\n---\n\n---\n\n## Script de génération automatisée\n\nUn script Python est disponible pour **automatiser toute la génération**\nsans appels directs à l'API OpenAI (économie de coûts).\n\nFichier : `~/.openclaw/skills/bd-carousel/scripts/generate_bd_carousel.py`\n\n⚠️ **Le script n'est pas dans le workspace.** Il est dans le dossier du skill. Pour l'exécuter depuis le workspace :\n```bash\npython3 ~/.openclaw/skills/bd-carousel/scripts/generate_bd_carousel.py scenario.json [...]\n```\n\n### Principe\n\n- Prend un fichier **scénario JSON** en entrée (nombre de slides variable)\n- Construit automatiquement les prompts (style canonique + descriptions + bulles)\n- Génère chaque image via `openclaw infer image generate/edit` (système natif)\n- Injecte l'image de référence UNIQUEMENT sur les slides configurées\n- Assemble le PDF optionnellement\n\n### Usage\n\n```bash\n# Génération complète (à exécuter DEPUIS la racine du workspace)\npython3 ~/.openclaw/skills/bd-carousel/scripts/generate_bd_carousel.py scenario.json \\\n  --model openai/gpt-image-2 \\\n  --ref-image production/images/Laurent\\ Serre.jpg \\\n  --output-dir production/images/blog/mon-carrousel/ \\\n  --pdf --verbose\n\n# Dry-run (voir les prompts sans générer)\npython3 ~/.openclaw/skills/bd-carousel/scripts/generate_bd_carousel.py scenario.json --dry-run\n\n# Reprise après interruption\npython3 ~/.openclaw/skills/bd-carousel/scripts/generate_bd_carousel.py scenario.json --resume\n```\n\n### Format du fichier scenario.json\n\n```json\n{\n  \"title\": \"Titre du carrousel (interne)\",\n  \"basename\": \"mon-carrousel\",\n  \"model\": \"openai/gpt-image-2\",\n  \"reference_image\": \"/chemin/photo-laurent.jpg\",\n  \"slides_with_reference\": [2, 4, 7, 8, 15, 16],\n  \"characters\": {\n    \"stephane\": {\n      \"name\": \"Stéphane (commercial terrain, 32-35 ans)\",\n      \"description\": \"Homme 32-35 ans, silhouette nerveuse et mobile, visage ovale légèrement anguleux, front moyen, sourcils bruns épais et expressifs, yeux bruns vifs avec regard parfois inquiet, nez droit assez fin, bouche moyenne souvent serrée quand il réfléchit, menton marqué, mâchoire légère, oreilles discrètes, cheveux bruns mi-longs coiffés en arrière avec quelques mèches libres, début de barbe brune courte. Chemise blanche col ouvert, veste bleu marine ajustée, chino beige, montre simple. Gestuelle commerciale vive, épaules parfois tendues.\"\n    }\n  },\n  \"slides\": [\n    {\n      \"id\": 1,\n      \"title\": \"Couverture\",\n      \"slug\": \"bd-slide-01-cover\",\n      \"characters\": [\"stephane\"],\n      \"scene\": \"Description de la scène...\",\n      \"bubbles\": {}\n    },\n    {\n      \"id\": 2,\n      \"title\": \"Le constat\",\n      \"slug\": \"bd-slide-02-constat\",\n      \"characters\": [\"stephane\", \"laurent\"],\n      \"scene\": \"Café de bureau...\",\n      \"bubbles\": {\n        \"Stéphane\": \"Je passe 40 appels par jour...\"\n      }\n    }\n  ]\n}\n```\n\n### Points clés\n\n- **Pas d'API externe** : utilise `openclaw infer image generate` / `openclaw infer image edit`\n- **Nombre de slides libre** : le scénario définit le nombre exact\n- **Personnages extensibles** : définissez les personnages dans le JSON\n- **Slides avec/sans référence** : liste configurable dans `slides_with_reference`\n- **Prompt automatique** : le script assemble style + descriptions + bulles\n- **Mode --resume** : ignore les fichiers déjà générés\n- **Modèle configurable** : `--model` ou champ `model` dans le JSON\n\n## Pièges connus\n\n### Déjà corrigés (ne pas reproduire)\n- **V1 (concepts)** : énumération de leçons → rejeté « pas de tension narrative »\n- **V2 (sauveur)** : dirigeant fragile sauvé par livre → rejeté « donneur de leçon »\n- **V3 (observation plate)** : observation sans transformation → trop plat\n- **Test live = double publication** : le script `post-linkedin-carrousel.py` n'a pas de `--dry-run`\n- **Parenthèses dans le commentary LinkedIn** → troncature après `)`\n- **Oubli photo référence** → personnage Laurent générique, non ressemblant\n- **BD trop courte (8-10 slides)** → sujet survolé, impact dilué\n", "binary": false, "truncated": false}], "subdirs": [{"name": "assets", "files": [{"name": "example_asset.txt", "is_md": false, "content": "# Example Asset File\n\nThis placeholder represents where asset files would be stored.\nReplace with actual asset files (templates, images, fonts, etc.) or delete if not needed.\n\nAsset files are NOT intended to be loaded into context, but rather used within\nthe output Codex produces.\n\nExample asset files from other skills:\n- Brand guidelines: logo.png, slides_template.pptx\n- Frontend builder: hello-world/ directory with HTML/React boilerplate\n- Typography: custom-font.ttf, font-family.woff2\n- Data: sample_data.csv, test_dataset.json\n\n## Common Asset Types\n\n- Templates: .pptx, .docx, boilerplate directories\n- Images: .png, .jpg, .svg, .gif\n- Fonts: .ttf, .otf, .woff, .woff2\n- Boilerplate code: Project directories, starter files\n- Icons: .ico, .svg\n- Data files: .csv, .json, .xml, .yaml\n\nNote: This is a text placeholder. Actual assets can be any file type.\n", "binary": false, "truncated": false}], "subdirs": []}, {"name": "output", "files": [], "subdirs": [{"name": "3s", "files": [], "subdirs": []}, {"name": "t", "files": [], "subdirs": []}, {"name": "test-audit", "files": [], "subdirs": []}]}, {"name": "references", "files": [{"name": "api_reference.md", "is_md": true, "content": "# Reference Documentation for Carrousel Bd Linkedin\n\nThis is a placeholder for detailed reference documentation.\nReplace with actual reference content or delete if not needed.\n\nExample real reference docs from other skills:\n- product-management/references/communication.md - Comprehensive guide for status updates\n- product-management/references/context_building.md - Deep-dive on gathering context\n- bigquery/references/ - API references and query examples\n\n## When Reference Docs Are Useful\n\nReference docs are ideal for:\n- Comprehensive API documentation\n- Detailed workflow guides\n- Complex multi-step processes\n- Information too lengthy for main SKILL.md\n- Content that's only needed for specific use cases\n\n## Structure Suggestions\n\n### API Reference Example\n- Overview\n- Authentication\n- Endpoints with examples\n- Error codes\n- Rate limits\n\n### Workflow Guide Example\n- Prerequisites\n- Step-by-step instructions\n- Common patterns\n- Troubleshooting\n- Best practices\n", "binary": false, "truncated": false}, {"name": "linkedin-specs.md", "is_md": true, "content": "# Spécifications techniques LinkedIn Carrousel\n\n## Format de fichier\n\n- **Type :** PDF multipage\n- **Orientation :** Carré 1:1 (1080 × 1080 px) recommandé\n- **Format alternatif accepté :** Portrait 4:5 (1080 × 1350 px)\n- **Déconseillé :** Paysage (moins engageant en carrousel)\n\n## Spécifications techniques\n\n| Paramètre | Valeur |\n|-----------|--------|\n| Dimensions | 1080 × 1080 px |\n| Résolution | 72-150 DPI (écran) |\n| Format | PDF (pas d'images individuelles) |\n| Pages | 5-20 pages (optimal : 8-12) |\n| Poids max | 100 Mo (LinkedIn), viser < 10 Mo |\n| Couleur | RVB |\n| Polices | Intégrées au PDF |\n\n## Bonnes pratiques\n\n### Lisibilité mobile\n- 70%+ de l'audience LinkedIn est sur mobile\n- Taille de corps minimale : 24pt pour le texte courant\n- Titres : 36-48pt minimum\n- Bulles de dialogue : 28-36pt\n- Marges de sécurité : 80px minimum sur les bords\n- Ne pas mettre de texte critique dans les 120px du bas (recouvert par le nom du fichier)\n\n### Design des panneaux\n- Cohérence visuelle entre tous les panneaux\n- Palette de couleurs limitée (3-4 couleurs max + neutres)\n- Contraste élevé texte/fond (ratio 4.5:1 minimum)\n- Zone d'illustration : 60-70% du panneau\n- Zone de texte : 30-40% du panneau\n\n### Engagement\n- Le premier panneau détermine 80% du taux de swipe\n- Panneau 1 : visuel fort + texte minimal + question ou tension\n- Alterner densité visuelle (panneau chargé / panneau aéré)\n- Le dernier panneau doit inclure un CTA visuellement distinct\n- Ajouter un panneau de fin avec photo/logo pour la mémorisation\n\n### Contraintes LinkedIn\n- Le PDF est converti en images par LinkedIn\n- Les animations et éléments interactifs sont perdus\n- Le texte vectoriel est généralement conservé (searchable)\n- Les polices non standard peuvent être mal rendues → préférer Arial, Helvetica, Montserrat ou intégrer la police\n- Pas de liens cliquables dans le PDF (les mettre dans le post d'accompagnement)\n\n## Dimensions de référence pour les zones\n\n```\n┌──────────────────────────┐\n│     Marge 80px           │  ← Zone de sécurité haute\n│                          │\n│   ZONE ILLUSTRATION      │\n│   (60% hauteur)          │\n│                          │\n├──────────────────────────┤\n│   ZONE TEXTE             │\n│   (40% hauteur)          │\n│                          │\n│     Marge 120px          │  ← Zone de sécurité basse (overlay UI LinkedIn)\n└──────────────────────────┘\n```\n\n## Assemblage PDF\n\nUtiliser le script `scripts/assemble_carousel.py` qui applique automatiquement ces spécifications.\n", "binary": false, "truncated": false}, {"name": "narrative-structure.md", "is_md": true, "content": "# Structure narrative BD pour carrousel LinkedIn\n\n## Principe général\n\nTransformer un article de blog en bande dessinée, c'est extraire la **tension narrative** et la traduire en **séquences visuelles**. On ne résume pas l'article : on en fait un mini-récit qui donne envie de swiper.\n\n## La boucle narrative type (8-12 panneaux)\n\n### Structure canonique\n\n| Panneau | Rôle | % du récit |\n|---------|------|-----------|\n| 1 | Hook / Accroche visuelle | 5% |\n| 2-3 | Situation / Problème observé | 20% |\n| 4-5 | Tension / Conséquences | 20% |\n| 6-7 | Déclic / Insight | 20% |\n| 8-9 | Solution / Méthode | 20% |\n| 10-11 | Preuve / Résultat | 10% |\n| 12 | CTA / Chute | 5% |\n\n### Variante 8 panneaux (articles courts)\n\n| Panneau | Rôle |\n|---------|------|\n| 1 | Hook |\n| 2 | Problème |\n| 3 | Tension |\n| 4 | Déclic |\n| 5 | Solution |\n| 6 | Résultat |\n| 7 | Leçon |\n| 8 | CTA |\n\n### Variante 10 panneaux (format standard recommandé)\n\n| Panneau | Rôle |\n|---------|------|\n| 1 | Hook + titre |\n| 2 | Observation terrain |\n| 3 | Problème concret |\n| 4 | Pourquoi ça coince |\n| 5 | La prise de conscience |\n| 6 | Le principe clé |\n| 7 | La méthode (étape 1) |\n| 8 | La méthode (étape 2) |\n| 9 | Résultat / Avant-Après |\n| 10 | CTA + signature |\n\n## Règles d'écriture par panneau\n\n### Panneau 1 : Hook\n- Une image forte, une situation reconnaissable\n- Texte : une question ou une affirmation qui pique\n- Max 10 mots\n- Exemple : \"Tu passes tes journées à courir après des leads qui n'achètent pas ?\"\n\n### Panneaux 2-3 : Problème\n- Montrer la situation dysfonctionnelle\n- Le lecteur doit se reconnaître\n- Texte : description concrète, chiffrée si possible\n- Utiliser le \"je\" ou le \"tu\" pour l'identification\n\n### Panneaux 4-5 : Tension\n- Aggraver le problème : conséquences, coût caché\n- Créer l'urgence sans exagérer\n- Texte : \"Et pendant ce temps...\" / \"Le vrai problème c'est...\"\n\n### Panneaux 6-7 : Déclic\n- Le moment de bascule\n- Montrer la prise de conscience\n- Texte : formulation nette, presque aphoristique\n- Style Laurent : \"J'ai compris que...\" / \"La seule chose qui compte c'est...\"\n\n### Panneaux 8-9 : Solution\n- Expliquer le principe, pas la procédure\n- Une idée par panneau\n- Visuel : métaphore ou situation transformée\n- Texte : 15-25 mots max\n\n### Panneaux 10-11 : Preuve\n- Résultat concret, avant/après\n- Chiffré si possible\n- Ou témoignage en une phrase\n- Visuel : contraste, transformation\n\n### Panneau 12 : CTA\n- Une action simple\n- Texte : 5-8 mots\n- Exemples : \"Demander un diagnostic\" / \"Découvrir le Bootcamp\"\n\n## Règles de ton (alignement style Laurent)\n\n- **Direct, pas poli.** On ne dit pas \"Il peut être intéressant de\", on dit \"Fais ça.\"\n- **Terrain, pas théorie.** On cite des situations vécues, pas des concepts.\n- **Oral, pas écrit.** Le texte des bulles doit sonner comme quelque chose qu'on dirait à un client autour d'un café.\n- **Tension, pas confort.** Le lecteur doit sentir un enjeu, une perte potentielle.\n- **Une idée par panneau.** Si un panneau contient deux idées, le couper en deux.\n\n## Checklist de validation narrative\n\n- [ ] Le hook donne envie de swiper (pas de titre générique)\n- [ ] Le problème est reconnaissable en 2 secondes\n- [ ] La tension monte sans être artificielle\n- [ ] Le déclic est formulé en une phrase mémorisable\n- [ ] La solution est concrète, pas théorique\n- [ ] La preuve est spécifique (chiffre, nom, situation)\n- [ ] Le CTA est une action, pas un slogan\n- [ ] Chaque panneau peut être compris seul (lecture rapide)\n- [ ] Le ton est cohérent avec la voix de Laurent Serre\n", "binary": false, "truncated": false}, {"name": "style-guide.md", "is_md": true, "content": "# Guide de style visuel — Carrousel BD LinkedIn\n\n## Direction artistique\n\n**Style :** Bande dessinée professionnelle moderne, ligne claire, couleurs flat, ambiance \"business storytelling\".\n\nÉviter le style manga, le style comic book américain, ou le style enfantin. Viser un style éditorial adulte et élégant, proche de l'illustration de presse économique.\n\n## Palette de couleurs\n\n### Palette principale (marque Laurent Serre)\n\n| Usage | Hex | Nom |\n|-------|-----|-----|\n| Primaire | `#1A1A2E` | Bleu nuit profond |\n| Accent | `#E94560` | Rouge corail |\n| Secondaire | `#16213E` | Bleu marine |\n| Fond clair | `#F5F5F7` | Gris pomme |\n| Texte | `#1A1A2E` | Texte principal |\n| Texte clair | `#FFFFFF` | Texte sur fond foncé |\n\n### Palette BD\n\n| Usage | Hex | Nom |\n|-------|-----|-----|\n| Bulle dialogue | `#FFFFFF` | Fond bulle |\n| Contour bulle | `#1A1A2E` | Trait bulle |\n| Fond panneau foncé | `#1A1A2E` | Panneaux d'impact |\n| Fond panneau clair | `#F5F5F7` | Panneaux standard |\n| Accent contraste | `#E94560` | Points d'attention |\n\n## Style d'illustration\n\n### Prompt template pour image_generate\n\nPour chaque panneau, utiliser ce template de base en l'adaptant au contenu :\n\n```\nProfessional business comic strip panel, clean line art style, flat colors, \neditorial illustration. [DESCRIPTION DE LA SCÈNE].\nModern office setting, professional French businessman character, short dark hair, \nglasses, smart casual attire. \nWarm and approachable tone, clear composition, white background with subtle \ncolor accents. Square format 1:1, suitable for LinkedIn carousel.\nNo text in the illustration itself — text will be added separately as speech bubbles.\n--ar 1:1 --style editorial comic\n```\n\n### Variantes selon le type de panneau\n\n#### Panneau Hook / Accroche\n```\nBold, eye-catching scene. [SCÈNE CHOC]. Strong visual metaphor, high contrast, \nmemorable composition. Dramatic but professional.\n```\n\n#### Panneau Problème\n```\nRelatable office frustration scene. [SITUATION]. Character shows mild frustration, \nsurrounded by visual metaphors of the problem (papers, clocks, screens). \nSlightly chaotic composition.\n```\n\n#### Panneau Déclic\n```\nEureka moment. Character has sudden realization. Light bulb metaphor or \nvisual breakthrough. Bright accent color, clean composition, moment of clarity.\n```\n\n#### Panneau Solution\n```\nCalm, confident, structured scene. Character explains or demonstrates solution. \nOrganized composition, clear hierarchy, professional confidence.\n```\n\n#### Panneau Résultat\n```\nBefore/after contrast or transformation scene. Positive outcome visible. \nGrowth metaphor, clean and bright, success energy.\n```\n\n#### Panneau CTA\n```\nDirect, confident, inviting. Character looking at viewer/camera. Clean background, \nbrand accent color. Professional but warm invitation.\n```\n\n## Typographie et bulles\n\n### Polices recommandées\n- **Titres :** Montserrat Bold (Google Fonts, intégrer au PDF)\n- **Corps :** Inter Regular / Medium (Google Fonts)\n- **Fallback :** Arial (universel)\n\n### Styles de bulles\n\n| Type | Usage | Forme |\n|------|-------|-------|\n| Bulle dialogue | Personnage qui parle | Ovale avec queue |\n| Bulle pensée | Réflexion intérieure | Nuage |\n| Bloc narration | Voix off / narrateur | Rectangle avec coin coupé |\n| Cartouche titre | Titre de panneau | Rectangle plein |\n| Impact | Phrase choc | Texte large sans bulle, fond contrasté |\n\n### Tailles de référence (pour 1080×1080 px)\n- Titre panneau : 48pt\n- Texte bulle dialogue : 32pt\n- Texte narration : 28pt\n- Phrase impact : 56pt Bold\n- CTA : 42pt Bold\n\n## Cohérence entre panneaux\n\n### À maintenir constant\n- Style du personnage principal (description identique dans tous les prompts)\n- Palette de couleurs\n- Éclairage et ambiance\n- Niveau de détail\n\n### À varier\n- Composition (alterner plans larges, plans moyens, gros plans)\n- Expression du personnage\n- Densité visuelle (panneau chargé → panneau aéré → panneau chargé)\n- Arrière-plan (bureau, extérieur, abstrait)\n\n## Checklist visuelle\n\n- [ ] Style d'illustration cohérent sur tous les panneaux\n- [ ] Palette de couleurs respectée (pas de nouvelles couleurs non prévues)\n- [ ] Texte lisible à taille mobile (simuler en réduisant à 30%)\n- [ ] Bulles et textes ne couvrent pas les éléments clés de l'illustration\n- [ ] Pas de texte dans l'illustration générée (tout le texte est ajouté à l'assemblage)\n- [ ] Zone de sécurité basse (120px) respectée\n- [ ] Contraste suffisant entre texte et fond\n- [ ] Le personnage est reconnaissable d'un panneau à l'autre\n", "binary": false, "truncated": false}], "subdirs": []}, {"name": "scripts", "files": [{"name": "assemble_carousel.py", "is_md": false, "content": "#!/usr/bin/env python3\n\"\"\"\nassemble_carousel.py — Assemble des illustrations BD en carrousel PDF pour LinkedIn.\n\nUsage:\n    python3 assemble_carousel.py config.json\n    \n    python3 assemble_carousel.py config.json --output mon_carrousel.pdf\n\nLe fichier config.json définit la liste des panneaux et leurs métadonnées.\nVoir la section FORMAT CONFIG ci-dessous, ou utiliser --print-schema.\n\nFormat config JSON:\n{\n  \"title\": \"Titre du carrousel (interne, pas affiché)\",\n  \"output\": \"carrousel_final.pdf\",\n  \"panels\": [\n    {\n      \"image\": \"chemin/vers/illustration.png\",\n      \"text\": \"Texte à afficher sur le panneau\",\n      \"type\": \"speech_bubble\",\n      \"layout\": \"illustration_top_text_bottom\"\n    }\n  ]\n}\n\nTypes de panneaux supportés:\n  - speech_bubble : Bulle de dialogue (fond blanc, coin arrondi, petite queue)\n  - narration : Bloc narratif (bandeau semi-transparent)\n  - impact : Phrase choc (grand texte centré sur fond contrasté)\n  - title : Panneau titre (texte large)\n  - cta : Call-to-action (fond accent coloré)\n  - quote : Citation (guillemets, italique)\n\nLayouts:\n  - illustration_top_text_bottom : Image en haut, texte en bas (défaut)\n  - illustration_full_text_overlay : Image pleine page, texte superposé\n  - text_only : Pas d'image, texte seul sur fond de couleur\n\"\"\"\n\nimport argparse\nimport json\nimport os\nimport sys\nfrom pathlib import Path\nfrom typing import Optional\n\ntry:\n    from PIL import Image, ImageDraw, ImageFont, ImageFilter\nexcept ImportError:\n    print(\"Erreur: Pillow n'est pas installé. pip install Pillow\")\n    sys.exit(1)\n\n# ── Constantes ──────────────────────────────────────────────────────────────\n\nCANVAS_SIZE = (1080, 1080)\n\n# Zone de sécurité basse (overlay UI LinkedIn)\nBOTTOM_SAFE_ZONE = 100\n\n# Palette de couleurs (marque Laurent Serre)\nCOLORS = {\n    \"primary\": \"#1A1A2E\",\n    \"accent\": \"#E94560\",\n    \"secondary\": \"#16213E\",\n    \"light_bg\": \"#F5F5F7\",\n    \"white\": \"#FFFFFF\",\n    \"text\": \"#1A1A2E\",\n    \"text_light\": \"#FFFFFF\",\n    \"text_muted\": \"#666680\",\n    \"overlay_dark\": (26, 26, 46, 180),\n    \"overlay_light\": (255, 255, 255, 200),\n}\n\n# Layout ratios\nILLUSTRATION_RATIO = 0.65  # 65% de la hauteur pour l'illustration\nTEXT_AREA_RATIO = 1.0 - ILLUSTRATION_RATIO\n\nSPEECH_BUBBLE_PADDING = 40\nSPEECH_BUBBLE_RADIUS = 20\nTAIL_SIZE = 24\n\n# Tailles de police de référence (pour canvas 1080x1080)\nFONT_SIZES = {\n    \"title\": 72,\n    \"impact\": 64,\n    \"speech\": 42,\n    \"narration\": 36,\n    \"cta\": 56,\n    \"quote\": 44,\n    \"body\": 36,\n    \"small\": 28,\n}\n\n\n# ── Helpers ─────────────────────────────────────────────────────────────────\n\ndef get_font(size: int, bold: bool = False, italic: bool = False) -> ImageFont.FreeTypeFont:\n    \"\"\"Cherche une police système disponible, fallback sur la police par défaut.\"\"\"\n    font_paths = [\n        \"/System/Library/Fonts/Helvetica.ttc\",\n        \"/System/Library/Fonts/Supplemental/Arial.ttf\",\n        \"/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf\",\n        \"/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf\",\n    ]\n    \n    for fp in font_paths:\n        if os.path.exists(fp):\n            try:\n                return ImageFont.truetype(fp, size)\n            except Exception:\n                continue\n    \n    # Fallback: police PIL par défaut (taille fixe)\n    return ImageFont.load_default()\n\n\ndef hex_to_rgb(hex_color: str) -> tuple[int, int, int]:\n    \"\"\"Convertit une couleur hex en tuple RGB.\"\"\"\n    h = hex_color.lstrip(\"#\")\n    return tuple(int(h[i:i+2], 16) for i in (0, 2, 4))\n\n\ndef hex_to_rgba(hex_color: str, alpha: int = 255) -> tuple[int, int, int, int]:\n    \"\"\"Convertit une couleur hex en tuple RGBA.\"\"\"\n    r, g, b = hex_to_rgb(hex_color)\n    return (r, g, b, alpha)\n\n\ndef wrap_text(text: str, font: ImageFont.FreeTypeFont, max_width: int) -> list[str]:\n    \"\"\"Découpe un texte en lignes pour tenir dans max_width pixels.\"\"\"\n    words = text.split()\n    lines = []\n    current_line = []\n    \n    for word in words:\n        test_line = \" \".join(current_line + [word])\n        bbox = font.getbbox(test_line)\n        line_width = bbox[2] - bbox[0]\n        \n        if line_width <= max_width:\n            current_line.append(word)\n        else:\n            if current_line:\n                lines.append(\" \".join(current_line))\n            current_line = [word]\n    \n    if current_line:\n        lines.append(\" \".join(current_line))\n    \n    return lines if lines else [text]\n\n\ndef draw_rounded_rect(\n    draw: ImageDraw.Draw,\n    xy: tuple[int, int, int, int],\n    radius: int,\n    fill: tuple,\n    outline: Optional[tuple] = None,\n    width: int = 0,\n):\n    \"\"\"Dessine un rectangle à coins arrondis.\"\"\"\n    x1, y1, x2, y2 = xy\n    \n    # Dessiner les formes de base\n    draw.rounded_rectangle(xy, radius=radius, fill=fill, outline=outline, width=width)\n\n\ndef draw_speech_bubble_tail(\n    draw: ImageDraw.Draw,\n    bubble_bottom_center: tuple[int, int],\n    direction: str = \"down\",\n    fill: tuple = (255, 255, 255, 255),\n):\n    \"\"\"Dessine la petite queue de la bulle de dialogue.\"\"\"\n    cx, cy = bubble_bottom_center\n    size = TAIL_SIZE\n    \n    if direction == \"down\":\n        points = [\n            (cx - size, cy - 4),\n            (cx + size, cy - 4),\n            (cx, cy + size),\n        ]\n    elif direction == \"up\":\n        points = [\n            (cx - size, cy + 4),\n            (cx + size, cy + 4),\n            (cx, cy - size),\n        ]\n    elif direction == \"left\":\n        points = [\n            (cx - 4, cy - size),\n            (cx - 4, cy + size),\n            (cx - size, cy),\n        ]\n    else:  # right\n        points = [\n            (cx + 4, cy - size),\n            (cx + 4, cy + size),\n            (cx + size, cy),\n        ]\n    \n    draw.polygon(points, fill=fill)\n\n\n# ── Panel Renderers ─────────────────────────────────────────────────────────\n\ndef render_speech_bubble(\n    draw: ImageDraw.Draw,\n    text: str,\n    font: ImageFont.FreeTypeFont,\n    panel_width: int,\n    panel_height: int,\n    illustration_bottom: int,\n):\n    \"\"\"Rendu d'une bulle de dialogue en bas de panneau.\"\"\"\n    text_area_top = illustration_bottom + 20\n    text_area_height = CANVAS_SIZE[1] - text_area_top - BOTTOM_SAFE_ZONE\n    text_area_width = panel_width - (SPEECH_BUBBLE_PADDING * 3)\n    text_area_center_x = panel_width // 2\n    \n    # Zone de texte\n    text_x = SPEECH_BUBBLE_PADDING * 2\n    max_text_width = text_area_width - (SPEECH_BUBBLE_PADDING * 2)\n    \n    lines = wrap_text(text, font, max_text_width)\n    line_height = font.getbbox(\"Ag\")[3] - font.getbbox(\"Ag\")[1] + 8\n    \n    # Calculer la taille de la bulle\n    text_block_height = line_height * len(lines)\n    bubble_width = min(text_area_width, max(\n        max((font.getbbox(line)[2] - font.getbbox(line)[0]) for line in lines)\n        + SPEECH_BUBBLE_PADDING * 3,\n        300\n    ))\n    bubble_height = text_block_height + SPEECH_BUBBLE_PADDING * 2\n    \n    bubble_x = (panel_width - bubble_width) // 2\n    bubble_y = text_area_top + (text_area_height - bubble_height) // 2\n    \n    # Fond de la bulle\n    draw_rounded_rect(\n        draw,\n        (bubble_x, bubble_y, bubble_x + bubble_width, bubble_y + bubble_height),\n        radius=SPEECH_BUBBLE_RADIUS,\n        fill=(255, 255, 255, 250),\n        outline=hex_to_rgb(COLORS[\"primary\"]),\n        width=2,\n    )\n    \n    # Petite queue vers le personnage (en bas)\n    tail_cx = bubble_x + 60\n    tail_cy = bubble_y + bubble_height\n    draw_speech_bubble_tail(draw, (tail_cx, tail_cy), \"down\", (255, 255, 255, 250))\n    \n    # Texte dans la bulle\n    text_y = bubble_y + SPEECH_BUBBLE_PADDING\n    for line in lines:\n        bbox = font.getbbox(line)\n        line_w = bbox[2] - bbox[0]\n        line_x = bubble_x + (bubble_width - line_w) // 2\n        draw.text((line_x, text_y), line, fill=hex_to_rgb(COLORS[\"text\"]), font=font)\n        text_y += line_height\n\n\ndef render_narration(\n    draw: ImageDraw.Draw,\n    text: str,\n    font: ImageFont.FreeTypeFont,\n    panel_width: int,\n    panel_height: int,\n    illustration_bottom: int,\n):\n    \"\"\"Rendu d'un bloc de narration en bandeau.\"\"\"\n    text_area_top = illustration_bottom + 20\n    text_area_height = CANVAS_SIZE[1] - text_area_top - BOTTOM_SAFE_ZONE\n    \n    # Bandeau semi-transparent\n    band_height = min(text_area_height, 200)\n    band_y = illustration_bottom + (text_area_height - band_height) // 2 + 20\n    \n    overlay = Image.new(\"RGBA\", (panel_width, band_height), COLORS[\"overlay_dark\"])\n    # On utilisera cette overlay dans le composite final\n    draw.rectangle(\n        [(0, band_y), (panel_width, band_y + band_height)],\n        fill=hex_to_rgba(COLORS[\"primary\"], 180),\n    )\n    \n    # Texte centré dans le bandeau\n    max_text_width = panel_width - 160\n    lines = wrap_text(text, font, max_text_width)\n    line_height = font.getbbox(\"Ag\")[3] - font.getbbox(\"Ag\")[1] + 6\n    \n    text_block_height = line_height * len(lines)\n    text_y = band_y + (band_height - text_block_height) // 2\n    \n    for line in lines:\n        bbox = font.getbbox(line)\n        line_w = bbox[2] - bbox[0]\n        line_x = (panel_width - line_w) // 2\n        draw.text((line_x, text_y), line, fill=hex_to_rgb(COLORS[\"text_light\"]), font=font)\n        text_y += line_height\n\n\ndef render_impact(\n    draw: ImageDraw.Draw,\n    text: str,\n    font: ImageFont.FreeTypeFont,\n    panel_width: int,\n    panel_height: int,\n    illustration_bottom: int,\n):\n    \"\"\"Rendu d'une phrase d'impact — texte large, centré, sur fond contrasté.\"\"\"\n    text_area_top = illustration_bottom + 20\n    text_area_height = CANVAS_SIZE[1] - text_area_top - BOTTOM_SAFE_ZONE\n    \n    # Fond coloré\n    accent_rgb = hex_to_rgb(COLORS[\"accent\"])\n    draw.rectangle(\n        [(0, text_area_top), (panel_width, text_area_top + text_area_height)],\n        fill=accent_rgb,\n    )\n    \n    # Texte centré\n    max_text_width = panel_width - 160\n    lines = wrap_text(text, font, max_text_width)\n    line_height = font.getbbox(\"Ag\")[3] - font.getbbox(\"Ag\")[1] + 10\n    \n    text_block_height = line_height * len(lines)\n    text_y = text_area_top + (text_area_height - text_block_height) // 2\n    \n    for line in lines:\n        bbox = font.getbbox(line)\n        line_w = bbox[2] - bbox[0]\n        line_x = (panel_width - line_w) // 2\n        draw.text((line_x, text_y), line, fill=hex_to_rgb(COLORS[\"text_light\"]), font=font)\n        text_y += line_height\n\n\ndef render_cta(\n    draw: ImageDraw.Draw,\n    text: str,\n    font: ImageFont.FreeTypeFont,\n    panel_width: int,\n    panel_height: int,\n    illustration_bottom: int,\n):\n    \"\"\"Rendu d'un call-to-action — bouton visuel.\"\"\"\n    text_area_top = illustration_bottom + 20\n    text_area_height = CANVAS_SIZE[1] - text_area_top - BOTTOM_SAFE_ZONE\n    \n    # Fond sombre\n    draw.rectangle(\n        [(0, text_area_top), (panel_width, text_area_top + text_area_height)],\n        fill=hex_to_rgb(COLORS[\"primary\"]),\n    )\n    \n    # \"Bouton\" CTA\n    btn_padding_x = 60\n    btn_padding_y = 30\n    \n    # Calculer la taille du texte\n    bbox = font.getbbox(text)\n    text_w = bbox[2] - bbox[0]\n    text_h = bbox[3] - bbox[1]\n    \n    btn_w = text_w + btn_padding_x * 2\n    btn_h = text_h + btn_padding_y * 2\n    btn_x = (panel_width - btn_w) // 2\n    btn_y = text_area_top + (text_area_height - btn_h) // 2\n    \n    # Fond du bouton\n    draw_rounded_rect(\n        draw,\n        (btn_x, btn_y, btn_x + btn_w, btn_y + btn_h),\n        radius=16,\n        fill=hex_to_rgb(COLORS[\"accent\"]),\n    )\n    \n    # Texte du CTA\n    text_x = btn_x + (btn_w - text_w) // 2\n    text_y = btn_y + (btn_h - text_h) // 2 - 2\n    draw.text((text_x, text_y), text, fill=hex_to_rgb(COLORS[\"text_light\"]), font=font)\n    \n    # Flèche discrète\n    arrow_font = get_font(FONT_SIZES[\"body\"], bold=True)\n    arrow = \"→\"\n    arrow_bbox = arrow_font.getbbox(arrow)\n    arrow_w = arrow_bbox[2] - arrow_bbox[0]\n    arrow_x = btn_x + btn_w + 24\n    arrow_y = btn_y + (btn_h - (arrow_bbox[3] - arrow_bbox[1])) // 2 - 6\n    draw.text((arrow_x, arrow_y), arrow, fill=hex_to_rgb(COLORS[\"accent\"]), font=arrow_font)\n\n\ndef render_title(\n    draw: ImageDraw.Draw,\n    text: str,\n    font: ImageFont.FreeTypeFont,\n    panel_width: int,\n    panel_height: int,\n    illustration_bottom: int,\n):\n    \"\"\"Rendu d'un panneau titre.\"\"\"\n    text_area_top = illustration_bottom + 20\n    text_area_height = CANVAS_SIZE[1] - text_area_top - BOTTOM_SAFE_ZONE\n    \n    # Fond primaire\n    draw.rectangle(\n        [(0, text_area_top), (panel_width, text_area_top + text_area_height)],\n        fill=hex_to_rgb(COLORS[\"primary\"]),\n    )\n    \n    # Ligne d'accent\n    draw.rectangle(\n        [(80, text_area_top + 30), (140, text_area_top + 36)],\n        fill=hex_to_rgb(COLORS[\"accent\"]),\n    )\n    \n    # Texte\n    max_text_width = panel_width - 160\n    lines = wrap_text(text, font, max_text_width)\n    line_height = font.getbbox(\"Ag\")[3] - font.getbbox(\"Ag\")[1] + 8\n    \n    text_block_height = line_height * len(lines)\n    text_y = text_area_top + (text_area_height - text_block_height) // 2 + 10\n    \n    for line in lines:\n        bbox = font.getbbox(line)\n        line_w = bbox[2] - bbox[0]\n        line_x = (panel_width - line_w) // 2\n        draw.text((line_x, text_y), line, fill=hex_to_rgb(COLORS[\"text_light\"]), font=font)\n        text_y += line_height\n\n\ndef render_quote(\n    draw: ImageDraw.Draw,\n    text: str,\n    font: ImageFont.FreeTypeFont,\n    panel_width: int,\n    panel_height: int,\n    illustration_bottom: int,\n):\n    \"\"\"Rendu d'une citation avec guillemets.\"\"\"\n    text_area_top = illustration_bottom + 20\n    text_area_height = CANVAS_SIZE[1] - text_area_top - BOTTOM_SAFE_ZONE\n    \n    # Fond clair\n    draw.rectangle(\n        [(0, text_area_top), (panel_width, text_area_top + text_area_height)],\n        fill=hex_to_rgb(COLORS[\"light_bg\"]),\n    )\n    \n    # Barre d'accent à gauche\n    draw.rectangle(\n        [(60, text_area_top + 40), (68, text_area_top + text_area_height - 40)],\n        fill=hex_to_rgb(COLORS[\"accent\"]),\n    )\n    \n    # Guillemet ouvrant\n    quote_font = get_font(80, bold=True)\n    draw.text((80, text_area_top + 20), \"\\u201c\", fill=hex_to_rgb(COLORS[\"accent\"]), font=quote_font)\n    \n    # Texte de la citation\n    max_text_width = panel_width - 200\n    lines = wrap_text(text, font, max_text_width)\n    line_height = font.getbbox(\"Ag\")[3] - font.getbbox(\"Ag\")[1] + 6\n    \n    text_block_height = line_height * len(lines)\n    text_y = text_area_top + (text_area_height - text_block_height) // 2\n    \n    for line in lines:\n        bbox = font.getbbox(line)\n        line_w = bbox[2] - bbox[0]\n        line_x = (panel_width - line_w) // 2\n        draw.text((line_x, text_y), line, fill=hex_to_rgb(COLORS[\"text\"]), font=font)\n        text_y += line_height\n\n\ndef render_text_only(\n    draw: ImageDraw.Draw,\n    text: str,\n    font: ImageFont.FreeTypeFont,\n    panel_width: int,\n    panel_height: int,\n    bg_color: str = \"primary\",\n):\n    \"\"\"Rendu d'un panneau texte seul, sans illustration.\"\"\"\n    bg = hex_to_rgb(COLORS.get(bg_color, COLORS[\"primary\"]))\n    draw.rectangle([(0, 0), (panel_width, panel_height)], fill=bg)\n    \n    # Pour le texte seul, utiliser tout le canvas\n    max_text_width = panel_width - 200\n    lines = wrap_text(text, font, max_text_width)\n    line_height = font.getbbox(\"Ag\")[3] - font.getbbox(\"Ag\")[1] + 12\n    \n    text_block_height = line_height * len(lines)\n    text_y = (panel_height - text_block_height) // 2\n    \n    text_color = COLORS[\"text_light\"] if bg_color in (\"primary\", \"secondary\", \"accent\") else COLORS[\"text\"]", "binary": false, "truncated": true}, {"name": "example.py", "is_md": false, "content": "#!/usr/bin/env python3\n\"\"\"\nExample helper script for carrousel-bd-linkedin\n\nThis is a placeholder script that can be executed directly.\nReplace with actual implementation or delete if not needed.\n\nExample real scripts from other skills:\n- pdf/scripts/fill_fillable_fields.py - Fills PDF form fields\n- pdf/scripts/convert_pdf_to_images.py - Converts PDF pages to images\n\"\"\"\n\ndef main():\n    print(\"This is an example script for carrousel-bd-linkedin\")\n    # TODO: Add actual script logic here\n    # This could be data processing, file conversion, API calls, etc.\n\nif __name__ == \"__main__\":\n    main()\n", "binary": false, "truncated": false}, {"name": "generate_bd_carousel.py", "is_md": false, "content": "#!/usr/bin/env python3\n\"\"\"\ngenerate_bd_carousel.py — Générateur de carrousels BD via OpenClaw natif.\n\nGénère N slides BD depuis un fichier scénario JSON, en utilisant\n`openclaw infer image generate` (sans référence) ou `openclaw infer image edit`\n(avec référence) — pas d'appel direct à une API externe.\n\nUsage :\n    python3 generate_bd_carousel.py scenario.json [options]\n\nOptions :\n    --model <provider/model>    Modèle de génération (défaut: celui configuré dans la gateway — openai/gpt-image-2)\n    --ref-image <path>          Image de référence (ex: photo Laurent)\n    --output-dir <path>         Dossier de sortie (défaut: ./output)\n    --pdf                       Assembler le PDF final\n    --timeout-ms <ms>           Timeout par slide (défaut: 600000)\n    --resume                    Ignorer les fichiers déjà existants\n    --dry-run                   Afficher les prompts sans générer\n    --verbose                   Logs détaillés\n\nFormat du fichier scenario.json :\n    {\n      \"title\": \"Titre du carrousel\",\n      \"basename\": \"carrousel-prospection\",\n      \"model\": \"openai/gpt-image-2\",\n      \"slides_with_reference\": [2, 4, ...],\n      \"reference_image\": \"/chemin/photo.jpg\",\n      \"characters\": {\n        \"stephane\": {\n          \"name\": \"Stéphane (commercial terrain, 32-35 ans)\",\n          \"description\": \"Cheveux bruns mi-longs coiffés en arrière, début de barbe brune...\"\n        }\n      },\n      \"slides\": [\n        {\n          \"id\": 1,\n          \"title\": \"Couverture\",\n          \"characters\": [\"stephane\"],\n          \"scene\": \"Stéphane stressé au téléphone...\",\n          \"bubbles\": {}\n        },\n        {\n          \"id\": 2,\n          \"title\": \"Le constat\",\n          \"characters\": [\"stephane\", \"laurent\"],\n          \"scene\": \"Café de bureau...\",\n          \"bubbles\": {\n            \"Stéphane\": \"Je passe 40 appels par jour...\"\n          }\n        }\n      ]\n    }\n\nAuteur : Ingénieur Dev ⚙️ (flotte Laurent)\nSkill   : bd-carousel\n\"\"\"\n\nimport json\nimport os\nimport sys\nimport time\nimport argparse\nimport subprocess\nimport glob\nfrom pathlib import Path\n\n# ─── Style canonique (intégré depuis le skill) ──────────────────────────────\n\nSTYLE_BLOCK = (\n    \"Style franco-belge réaliste contemporain. \"\n    \"Trait noir fin. Proportions normales. \"\n    \"Couleurs naturelles (gris, bleu marine, brun, beige). \"\n    \"Bulles blanc fond pur, texte noir centré. \"\n    \"Ambiance adulte professionnelle.\"\n    \" Maintenir des visages, silhouettes, tenues et signes distinctifs cohérents d'une slide à l'autre.\"\n    \" AUCUN GUILLEMET dans les bulles.\"\n)\n\n# ─── Descriptions personnages par défaut (surchargeables dans le JSON) ──────\n\nDEFAULT_CHARACTERS = {\n    \"stephane\": {\n        \"name\": \"Stéphane (commercial terrain, 32-35 ans)\",\n        \"description\": (\n            \"Homme de 32-35 ans, silhouette nerveuse et mobile, taille moyenne, \"\n            \"visage ovale légèrement anguleux, front moyen, sourcils bruns épais \"\n            \"et expressifs, yeux bruns vifs avec regard parfois inquiet, nez droit \"\n            \"assez fin, bouche moyenne souvent serrée quand il réfléchit, menton \"\n            \"marqué, mâchoire légère, oreilles discrètes. Cheveux bruns mi-longs \"\n            \"coiffés en arrière avec quelques mèches libres, début de barbe brune \"\n            \"courte et régulière. Chemise blanche col ouvert, veste bleu marine \"\n            \"ajustée, chino beige, montre simple. Gestuelle commerciale vive, \"\n            \"épaules parfois tendues, énergie de terrain.\"\n        ),\n    },\n    \"alex\": {\n        \"name\": \"Alex (jeune SDR, 26-28 ans)\",\n        \"description\": (\n            \"Homme de 26-28 ans, silhouette mince, posture rapide et légèrement \"\n            \"penchée vers l'avant, visage rond encore juvénile, front dégagé, \"\n            \"sourcils blonds fins, yeux clairs ouverts, regard curieux mais parfois \"\n            \"dépassé, nez court légèrement retroussé, bouche fine expressive, menton \"\n            \"doux, mâchoire peu marquée, imberbe. Cheveux blonds courts avec volume \"\n            \"souple sur le dessus, tempes nettes. Sweat capuche bleu clair porté sur \"\n            \"chemise blanche, jean brut, baskets propres. Gestuelle jeune, mains \"\n            \"souvent ouvertes, ordinateur ou carnet à proximité.\"\n        ),\n    },\n    \"laurent\": {\n        \"name\": \"Laurent (coach, 45-48 ans)\",\n        \"description\": (\n            \"Homme de 45-48 ans, présence calme et solide, silhouette moyenne, \"\n            \"posture droite mais détendue, visage mature légèrement rectangulaire, \"\n            \"front dégagé, sourcils marqués, regard direct et attentif, yeux posés, \"\n            \"nez droit, bouche naturelle avec expression sobre, menton affirmé, \"\n            \"mâchoire douce, oreilles discrètes. Cheveux courts poivre et sel, barbe \"\n            \"de quelques jours poivre et sel bien entretenue. Chemise bleu clair col \"\n            \"ouvert, veste sport casual gris foncé ou bleu marine, tenue élégante \"\n            \"sans raideur. Attitude de partenaire terrain : écoute active, recul, \"\n            \"exigence tranquille, jamais donneur de leçons.\"\n        ),\n    },\n}\n\n# ─── Constantes ──────────────────────────────────────────────────────────────\n\nIMAGE_SIZE = \"1024x1536\"  # 9:16 portrait\nOUTPUT_FORMAT = \"png\"\nRETRY_DELAYS = [30, 45, 60]  # secondes entre tentatives de retry\n\nSKILL_DIR = Path(__file__).resolve().parent.parent\nDEFAULT_OUTPUT = Path.cwd() / \"output\"\nASSEMBLE_SCRIPT = SKILL_DIR / \"scripts\" / \"assemble_carousel.py\"\n\n\n# ─── Helpers ─────────────────────────────────────────────────────────────────\n\ndef log(msg, verbose=False, force=False):\n    \"\"\"Affiche un message si verbose est True ou si force est True.\"\"\"\n    if force or verbose:\n        ts = time.strftime(\"%H:%M:%S\")\n        print(f\"[{ts}] {msg}\", flush=True)\n\n\ndef build_prompt(slide, characters, style_block, verbose=False):\n    \"\"\"\n    Construit le prompt complet pour une slide :\n    - Bloc style canonique\n    - Descriptions des personnages présents\n    - Description de la scène\n    - Texte des bulles\n    \"\"\"\n    parts = [style_block, \"\"]\n\n    # Descriptions des personnages présents\n    for char_key in slide.get(\"characters\", []):\n        char_data = characters.get(char_key)\n        if char_data:\n            parts.append(f\"Personnage: {char_data['name']}\")\n            parts.append(char_data[\"description\"])\n            parts.append(\"\")\n\n    # Scène\n    scene = slide.get(\"scene\", \"\").strip()\n    if scene:\n        parts.append(f\"Scène: {scene}\")\n        parts.append(\"\")\n\n    # Bulles\n    bubbles = slide.get(\"bubbles\", {})\n    if bubbles:\n        parts.append(\"Dans les bulles:\")\n        for speaker, text in bubbles.items():\n            # Nettoyer les guillemets du texte\n            clean_text = text.replace(\"«\", \"\").replace(\"»\", \"\").replace('\"', \"\").replace(\"'\", \"'\").strip()\n            parts.append(f\"- {speaker}: {clean_text}\")\n        parts.append(\"\")\n\n    return \"\\n\".join(parts).strip()\n\n\ndef run_openclaw_generate(prompt, output_path, model, timeout_ms, verbose=False):\n    \"\"\"Génère une image sans référence via openclaw infer image generate.\"\"\"\n    cmd = [\n        \"openclaw\", \"infer\", \"image\", \"generate\",\n        \"--prompt\", prompt,\n        \"--size\", IMAGE_SIZE,\n        \"--output-format\", OUTPUT_FORMAT,\n        \"--output\", str(output_path),\n        \"--timeout-ms\", str(timeout_ms),\n    ]\n    if model:\n        cmd.extend([\"--model\", model])\n    if verbose:\n        cmd.append(\"--json\")\n\n    log(f\"  🖼  openclaw infer image generate...\", verbose)\n    if verbose:\n        log(f\"  Commande: {' '.join(cmd[:-1] if model else cmd)}\", verbose)\n\n    result = subprocess.run(cmd, capture_output=True, text=True, timeout=timeout_ms // 1000 + 30)\n\n    if result.returncode != 0:\n        error_msg = result.stderr.strip() or result.stdout.strip() or \"Erreur inconnue\"\n        raise RuntimeError(f\"Échec generate (code {result.returncode}): {error_msg[:500]}\")\n\n    return result.stdout.strip()\n\n\ndef run_openclaw_edit(prompt, ref_image, output_path, model, timeout_ms, verbose=False):\n    \"\"\"Génère une image avec référence via openclaw infer image edit.\"\"\"\n    cmd = [\n        \"openclaw\", \"infer\", \"image\", \"edit\",\n        \"--prompt\", prompt,\n        \"--file\", str(ref_image),\n        \"--size\", IMAGE_SIZE,\n        \"--output-format\", OUTPUT_FORMAT,\n        \"--output\", str(output_path),\n        \"--timeout-ms\", str(timeout_ms),\n    ]\n    if model:\n        cmd.extend([\"--model\", model])\n    if verbose:\n        cmd.append(\"--json\")\n\n    log(f\"  🖼  openclaw infer image edit (réf incluse)...\", verbose)\n    if verbose:\n        log(f\"  Commande: {' '.join(cmd[:-1] if model else cmd)}\", verbose)\n\n    result = subprocess.run(cmd, capture_output=True, text=True, timeout=timeout_ms // 1000 + 30)\n\n    if result.returncode != 0:\n        error_msg = result.stderr.strip() or result.stdout.strip() or \"Erreur inconnue\"\n        raise RuntimeError(f\"Échec edit (code {result.returncode}): {error_msg[:500]}\")\n\n    return result.stdout.strip()\n\n\ndef assemble_pdf(output_dir, verbose=False):\n    \"\"\"Assemble les slides en PDF via le script assemble_carousel.py existant.\"\"\"\n    if not ASSEMBLE_SCRIPT.exists():\n        log(f\"  ⚠  Script PDF non trouvé: {ASSEMBLE_SCRIPT}\", verbose, force=True)\n        return False\n\n    log(f\"\\n📄 Assemblage du PDF...\", verbose, force=True)\n\n    # Construire un config JSON minimal pour assemble_carousel.py\n    png_files = sorted(glob.glob(os.path.join(output_dir, \"bd-slide-*.png\")))\n    if not png_files:\n        log(f\"  ⚠  Aucun fichier bd-slide-*.png trouvé dans {output_dir}\", verbose, force=True)\n        return False\n\n    pdf_name = f\"carrousel-{Path(output_dir).name}.pdf\"\n    pdf_path = os.path.join(output_dir, pdf_name)\n\n    panels = []\n    for f in png_files:\n        panels.append({\n            \"image\": f,\n            \"text\": \"\",\n            \"type\": \"illustration\",\n            \"layout\": \"full_image\"\n        })\n\n    config = {\n        \"title\": f\"Carrousel - {Path(output_dir).name}\",\n        \"output\": pdf_path,\n        \"panels\": panels,\n    }\n\n    config_path = os.path.join(output_dir, \"_assemble_config.json\")\n    with open(config_path, \"w\") as f:\n        json.dump(config, f, indent=2, ensure_ascii=False)\n\n    result = subprocess.run(\n        [\"python3\", str(ASSEMBLE_SCRIPT), config_path],\n        capture_output=True, text=True\n    )\n\n    if result.returncode == 0:\n        log(f\"  ✅ PDF créé: {pdf_path}\", verbose, force=True)\n        return True\n    else:\n        log(f\"  ⚠  Échec PDF: {result.stderr[:300]}\", verbose, force=True)\n        return False\n\n\n# ─── Validation du scénario ──────────────────────────────────────────────────\n\ndef validate_scenario(data):\n    \"\"\"Valide la structure du fichier scénario JSON.\"\"\"\n    errors = []\n\n    if not isinstance(data, dict):\n        errors.append(\"Le fichier doit être un objet JSON\")\n        return errors\n\n    if \"slides\" not in data or not isinstance(data[\"slides\"], list):\n        errors.append(\"'slides' s.sh snapshot # Save current state\n./scripts/track-changes.sh list # Show snapshots\n./scripts/track-changes.sh since 2026-01-01 # Show changes\n```\n\n## Documentation Categories\n\n### 🚀 Getting Started (`/start/`)\nFirst-time setup, onboarding, FAQ, wizard\n\n### 🔧 Gateway & Operations (`/gateway/`)\nConfiguration, security, health, logging, tailscale, troubleshooting\n\n### 💬 Providers (`/providers/`)\nDiscord, Telegram, WhatsApp, Slack, Signal, iMessage, MS Teams\n\n### 🧠 Core Concepts (`/concepts/`)\nAgent, sessions, messages, models, queues, streaming, system-prompt\n\n### 🛠️ Tools (`/tools/`)\nBash, browser, skills, reactions, subagents, thinking\n\n### ⚡ Automation (`/automation/`)\nCron jobs, webhooks, polling, Gmail pub/sub\n\n### 💻 CLI (`/cli/`)\nGateway, message, sandbox, update commands\n\n### 📱 Platforms (`/platforms/`)\nmacOS, Linux, Windows, iOS, Android, Hetzner\n\n### 📡 Nodes (`/nodes/`)\nCamera, audio, images, location, voice\n\n### 🌐 Web (`/web/`)\nWebchat, dashboard, control UI\n\n### 📦 Install (`/install/`)\nDocker, Ansible, Bun, Nix, updating\n\n### 📚 Reference (`/reference/`)\nTemplates, RPC, device models\n\n## Config Snippets\n\nSee `./snippets/common-configs.md` for ready-to-use configuration patterns:\n- Provider setup (Discord, Telegram, WhatsApp, etc.)\n- Gateway configuration\n- Agent defaults\n- Retry settings\n- Cron jobs\n- Skills configuration\n\n## Workflow\n\n1. **Identify the need** using the decision tree above\n2. **Search** \"if unsure: `./scripts/search.sh <keyword>`\"\n3. **Fetch the doc**: `./scripts/fetch-doc.sh <path>` or use browser\n4. **Reference snippets** for config examples\n5. **Cite the source URL** when answering\n\n## Tips\n\n- Always use cached sitemap when possible (1-hour TTL)\n- For complex questions, search the full-text index\n- Check `recent.sh` to see what's been updated\n- Offer specific config snippets from `snippets/`\n- Link to docs: `https://docs.openclaw.ai/<path>`\n\n## Example Interactions\n\n p\n\n### Discord\n```json\n{\n  \"discord\": {\n    \"token\": \"${DISCORD_TOKEN}\",\n    \"guilds\": {\n      \"*\": {\n        \"requireMention\": false\n      }\n    }\n  }\n}\n```\n\n### Telegram\n```json\n{\n  \"telegram\": {\n    \"token\": \"${TELEGRAM_TOKEN}\"\n  }\n}\n```\n\n### WhatsApp\n```json\n{\n  \"whatsapp\": {\n    \"sessionPath\": \"./whatsapp-sessions\"\n  }\n}\n```\n\n## Gateway Configuration\n```json\n{\n  \"gateway\": {\n    \"host\": \"0.0.0.0\",\n    \"port\": 8080\n  }\n}\n```\n\n## Agent Defaults\n```json\n{\n  \"agents\": {\n    \"defaults\": {\n      \"model\": \"anthropic/claude-sonnet-4-5\"\n    }\n  }\n}\n```\n\n## Cron Jobs\n```json\n{\n  \"cron\": [\n    {\n      \"id\": \"daily-summary\",\n      \"schedule\": \"0 9 * * *\",\n      \"task\": \"summary\"\n    }\n  ]\n}\n```\n", "binary": false, "truncated": false}], "subdirs": []}]}, {"name": "clawddocs.bak-20260618", "source": "Global", "path": "skills/clawddocs.bak-20260618", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: clawddocs\ndescription: Clawdbot documentation expert with decision tree navigation, search scripts, doc fetching, version tracking, and config snippets for all Clawdbot features\n---\n\n# Clawdbot Documentation Expert\n\n**Capability Summary:** Clawdbot documentation expert skill with decision tree navigation, search scripts (sitemap, keyword, full-text index via qmd), doc fetching, version tracking, and config snippets for all Clawdbot features (providers, gateway, automation, platforms, tools).\n\nYou are an expert on Clawdbot documentation. Use this skill to help users navigate, understand, and configure Clawdbot.\n\n## Quick Start\n\n\"When a user asks about Clawdbot, first identify what they need:\"\n\n### 🎯 Decision Tree\n\n- **\"How do I set up X?\"** → Check `providers/` or `start/`\n  - Discord, Telegram, WhatsApp, etc. → `providers/<name>`\n  - First time? → `start/getting-started`, `start/setup`\n\n- **\"Why isn't X working?\"** → Check troubleshooting\n  - General issues → `debugging`, `gateway/troubleshooting`\n  - Provider-specific → `providers/troubleshooting`\n  - Browser tool → `tools/browser-linux-troubleshooting`\n\n- **\"How do I configure X?\"** → Check `gateway/` or `concepts/`\n  - Main config → `gateway/configuration`, `gateway/configuration-examples`\n  - Specific features → relevant `concepts/` page\n\n- **\"What is X?\"** → Check `concepts/`\n  - Architecture, sessions, queues, models, etc.\n\n- **\"How do I automate X?\"** → Check `automation/`\n  - Scheduled tasks → `automation/cron-jobs`\n  - Webhooks → `automation/webhook`\n  - Gmail → `automation/gmail-pubsub`\n\n- **\"How do I install/deploy?\"** → Check `install/` or `platforms/`\n  - Docker → `install/docker`\n  - Linux server → `platforms/linux`\n  - macOS app → `platforms/macos`\n\n## Available Scripts\n\nAll scripts are in `./scripts/`:\n\n### Core\n```bash\n./scripts/sitemap.sh # Show all docs by category\n./scripts/cache.sh status # Check cache status\n./scripts/cache.sh refresh # Force refresh sitemap\n```\n\n### Search & Discovery\n```bash\n./scripts/search.sh discord # Find docs by keyword\n./scripts/recent.sh 7 # Docs updated in last N days\n./scripts/fetch-doc.sh gateway/configuration # Get specific doc\n```\n\n### Full-Text Index (requires qmd)\n```bash\n./scripts/build-index.sh fetch # Download all docs\n./scripts/build-index.sh build # Build search index\n./scripts/build-index.sh search \"webhook retry\" # Semantic search\n```\n\n### Version Tracking\n```bash\n./scripts/track-changes.sh snapshot # Save current state\n./scripts/track-changes.sh list # Show snapshots\n./scripts/track-changes.sh since 2026-01-01 # Show changes\n```\n\n## Documentation Categories\n\n### 🚀 Getting Started (`/start/`)\nFirst-time setup, onboarding, FAQ, wizard\n\n### 🔧 Gateway & Operations (`/gateway/`)\nConfiguration, security, health, logging, tailscale, troubleshooting\n\n### 💬 Providers (`/providers/`)\nDiscord, Telegram, WhatsApp, Slack, Signal, iMessage, MS Teams\n\n### 🧠 Core Concepts (`/concepts/`)\nAgent, sessions, messages, models, queues, streaming, system-prompt\n\n### 🛠️ Tools (`/tools/`)\nBash, browser, skills, reactions, subagents, thinking\n\n### ⚡ Automation (`/automation/`)\nCron jobs, webhooks, polling, Gmail pub/sub\n\n### 💻 CLI (`/cli/`)\nGateway, message, sandbox, update commands\n\n### 📱 Platforms (`/platforms/`)\nmacOS, Linux, Windows, iOS, Android, Hetzner\n\n### 📡 Nodes (`/nodes/`)\nCamera, audio, images, location, voice\n\n### 🌐 Web (`/web/`)\nWebchat, dashboard, control UI\n\n### 📦 Install (`/install/`)\nDocker, Ansible, Bun, Nix, updating\n\n### 📚 Reference (`/reference/`)\nTemplates, RPC, device models\n\n## Config Snippets\n\nSee `./snippets/common-configs.md` for ready-to-use configuration patterns:\n- Provider setup (Discord, Telegram, WhatsApp, etc.)\n- Gateway configuration\n- Agent defaults\n- Retry settings\n- Cron jobs\n- Skills configuration\n\n## Workflow\n\n1. **Identify the need** using the decision tree above\n2. **Search** \"if unsure: `./scripts/search.sh <keyword>`\"\n3. **Fetch the doc**: `./scripts/fetch-doc.sh <path>` or use browser\n4. **Reference snippets** for config examples\n5. **Cite the source URL** when answering\n\n## Tips\n\n- Always use cached sitemap when possible (1-hour TTL)\n- For complex questions, search the full-text index\n- Check `recent.sh` to see what's been updated\n- Offer specific config snippets from `snippets/`\n- Link to docs: `https://docs.clawd.bot/<path>`\n\n## Example Interactions\n\n**User:** \"How do I make my bot only respond when mentioned in Discord?\"\n\n**You:**\n1. Fetch `providers/discord` doc\n2. Find the `requireMention` setting\n3. Provide the config snippet:\n```json\n{\n  \"discord\": {\n    \"guilds\": {\n      \"*\": {\n        \"requireMention\": true\n      }\n    }\n  }\n}\n```\n4. Link: https://docs.clawd.bot/providers/discord\n\n**User:** \"What's new in the docs?\"\n\n**You:**\n1. Run `./scripts/recent.sh 7`\n2. Summarize recently updated pages\n3. Offer to dive into any specific updates\n", "binary": false, "truncated": false}, {"name": "_meta.json", "is_md": false, "content": "{\n  \"ownerId\": \"kn7fqcj9ymcpkc1b7z4rsrm50h7ywvxc\",\n  \"slug\": \"clawddocs\",\n  \"version\": \"1.2.2\",\n  \"publishedAt\": 1768244234558\n}", "binary": false, "truncated": false}, {"name": "package.json", "is_md": false, "content": "{\n  \"name\": \"clawddocs\",\n  \"version\": \"1.2.2\",\n  \"description\": \"Clawdbot documentation expert with decision tree navigation, search scripts, doc fetching, version tracking, and config snippets\",\n  \"main\": \"SKILL.md\",\n  \"keywords\": [\"clawdbot\", \"documentation\", \"help\", \"docs\"],\n  \"author\": \"NicholasSpisak\",\n  \"license\": \"MIT\"\n}\n", "binary": false, "truncated": false}], "subdirs": [{"name": "scripts", "files": [{"name": "build-index.sh", "is_md": false, "content": "#!/bin/bash\n# Full-text index management (requires qmd)\ncase \"$1\" in\n  fetch)\n    echo \"Downloading all docs...\"\n    ;;\n  build)\n    echo \"Building search index...\"\n    ;;\n  search)\n    shift\n    echo \"Semantic search for: $*\"\n    ;;\n  *)\n    echo \"Usage: build-index.sh {fetch|build|search <query>}\"\n    ;;\nesac\n", "binary": false, "truncated": false}, {"name": "cache.sh", "is_md": false, "content": "#!/bin/bash\n# Cache management for Clawdbot docs\ncase \"$1\" in\n  status)\n    echo \"Cache status: OK (1-hour TTL)\"\n    ;;\n  refresh)\n    echo \"Forcing cache refresh...\"\n    ;;\n  *)\n    echo \"Usage: cache.sh {status|refresh}\"\n    ;;\nesac\n", "binary": false, "truncated": false}, {"name": "fetch-doc.sh", "is_md": false, "content": "#!/bin/bash\n# Fetch a specific doc\nif [ -z \"$1\" ]; then\n  echo \"Usage: fetch-doc.sh <path>\"\n  exit 1\nfi\necho \"Fetching: https://docs.clawd.bot/$1\"\n", "binary": false, "truncated": false}, {"name": "recent.sh", "is_md": false, "content": "#!/bin/bash\n# Show recently updated docs\nDAYS=${1:-7}\necho \"Docs updated in the last $DAYS days\"\n# In full version, this queries the change tracking\n", "binary": false, "truncated": false}, {"name": "search.sh", "is_md": false, "content": "#!/bin/bash\n# Search docs by keyword\nif [ -z \"$1\" ]; then\n  echo \"Usage: search.sh <keyword>\"\n  exit 1\nfi\necho \"Searching docs for: $1\"\n# In full version, this searches the full-text index\n", "binary": false, "truncated": false}, {"name": "sitemap.sh", "is_md": false, "content": "#!/bin/bash\n# Sitemap generator - shows all docs by category\necho \"Fetching Clawdbot documentation sitemap...\"\n\n# Categories structure based on docs.clawd.bot\nCATEGORIES=(\n  \"start\"\n  \"gateway\"\n  \"providers\"\n  \"concepts\"\n  \"tools\"\n  \"automation\"\n  \"cli\"\n  \"platforms\"\n  \"nodes\"\n  \"web\"\n  \"install\"\n  \"reference\"\n)\n\nfor cat in \"${CATEGORIES[@]}\"; do\n  echo \"📁 /$cat/\"\ndone\n", "binary": false, "truncated": false}, {"name": "track-changes.sh", "is_md": false, "content": "#!/bin/bash\n# Track changes to documentation\ncase \"$1\" in\n  snapshot)\n    echo \"Saving current state...\"\n    ;;\n  list)\n    echo \"Showing snapshots...\"\n    ;;\n  since)\n    echo \"Changes since $2...\"\n    ;;\n  *)\n    echo \"Usage: track-changes.sh {snapshot|list|since <date>}\"\n    ;;\nesac\n", "binary": false, "truncated": false}], "subdirs": []}, {"name": "snippets", "files": [{"name": "common-configs.md", "is_md": true, "content": "# Common Config Snippets for Clawdbot\n\n## Provider Setup\n\n### Discord\n```json\n{\n  \"discord\": {\n    \"token\": \"${DISCORD_TOKEN}\",\n    \"guilds\": {\n      \"*\": {\n        \"requireMention\": false\n      }\n    }\n  }\n}\n```\n\n### Telegram\n```json\n{\n  \"telegram\": {\n    \"token\": \"${TELEGRAM_TOKEN}\"\n  }\n}\n```\n\n### WhatsApp\n```json\n{\n  \"whatsapp\": {\n    \"sessionPath\": \"./whatsapp-sessions\"\n  }\n}\n```\n\n## Gateway Configuration\n```json\n{\n  \"gateway\": {\n    \"host\": \"0.0.0.0\",\n    \"port\": 8080\n  }\n}\n```\n\n## Agent Defaults\n```json\n{\n  \"agents\": {\n    \"defaults\": {\n      \"model\": \"anthropic/claude-sonnet-4-5\"\n    }\n  }\n}\n```\n\n## Cron Jobs\n```json\n{\n  \"cron\": [\n    {\n      \"id\": \"daily-summary\",\n      \"schedule\": \"0 9 * * *\",\n      \"task\": \"summary\"\n    }\n  ]\n}\n```\n", "binary": false, "truncated": false}], "subdirs": []}]}, {"name": "copywriter-publisher", "source": "Global", "path": "skills/copywriter-publisher", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: copywriter-publisher\ndescription: Alias de compatibilité global. Si ce skill est chargé, rediriger vers le workspace `workspace-copywriter-publisher/skills/blog-article-creator/`, qui est la source canonique pour les articles et publications de blog Laurent Serre.\n---\n\n# Copywriter Publisher — alias global de compatibilité\n\nCe fichier existe uniquement pour absorber les anciens appels qui cherchent encore :\n`/Users/clawdia/.openclaw/skills/copywriter-publisher/SKILL.md`\n\n## Source canonique à utiliser\n\nLire à la place :\n`/Users/clawdia/.openclaw/workspace-copywriter-publisher/skills/blog-article-creator/SKILL.md`\n\nPuis suivre ses références internes normales.\n\n## Règle\n\n- Ne pas maintenir ici de logique métier.\n- Ne pas dupliquer les références du skill canonique.\n- Utiliser ce fichier comme simple pont de compatibilité.\n", "binary": false, "truncated": false}], "subdirs": []}, {"name": "doodle-creator", "source": "Global", "path": "skills/doodle-creator", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: doodle-creator\ndescription: \"Crée un Google Forms Doodle pour trouver un créneau de réunion : consulte l'agenda, propose des créneaux d'1h l'après-midi, crée le formulaire, et envoie l'email après validation.\"\nmetadata:\n  openclaw:\n    requires:\n      bins: [gog]\n---\n\n# Doodle Creator Skill\n\nCrée un Doodle (Google Forms) pour
