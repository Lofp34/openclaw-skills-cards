actionnables\n\nNe jamais répondre de mémoire si la question est précise — toujours vérifier dans la doc.\n\n## Mapping questions → pages\n\nUtilise `references/doc-map.md` pour le mapping complet. Voici les points d'entrée principaux :\n\n| Si la question porte sur... | Page à fetcher |\n|---|---|\n| Boutons inline, callbacks, keyboards | `/bots/features#inline-keyboards` ou `/bots/features#keyboards` |\n| InlineKeyboardMarkup, callback_data | `/bots/api#inlinekeyboardmarkup` |\n| CallbackQuery, répondre à un callback | `/bots/api#callbackquery` |\n| Commandes (/start, menu, scopes) | `/bots/features#commands` |\n| sendMessage et ses paramètres | `/bots/api#sendmessage` |\n| Gérer les updates (getUpdates, webhook) | `/bots/api#getting-updates` |\n| Privacy mode des bots | `/bots/features#privacy-mode` |\n| Gérer plusieurs bots / comptes | `/bots/faq` (section multi-bots) |\n| Formats de message (Markdown, HTML) | `/bots/api#formatting-options` |\n| Limitations, limites de rate | `/bots/faq` (section limites) |\n| Bot-to-bot communication | `/bots/features#bot-to-bot-communication` |\n| Types de chat, chat_id | `/bots/api#chat` |\n| Nouveautés API (changelog) | `/bots/api` (section recent changes) |\n\nURL de base : `https://core.telegram.org`\n\n## Contexte OpenClaw\n\nQuand tu interprètes la doc pour un usage OpenClaw, garde en tête :\n\n- **OpenClaw gère le binding des bots Telegram** : chaque agent peut avoir son propre bot Telegram via `channels.telegram.accounts[]` et `bindings[]`. Un bot = un token = une identité.\n- **Les boutons inline arrivent comme callbacks** : OpenClaw les traite comme des messages normaux. Si un bouton est pressé dans la conversation du CRM Manager, le callback arrive dans la session de cet agent.\n- **Problème classique** : un agent envoie un message avec boutons via `sessions_send` vers un autre agent → les callbacks sont routés vers la session de l'agent émetteur, pas celle du destinataire. Solution : l'agent doit envoyer depuis sa propre session, ou le callback doit être traité par l'agent qui a créé les boutons.\n- **Les conversations Telegram sont isolées par chat_id** : chaque bot a son propre chat avec l'utilisateur. Un message envoyé par le bot A n'est pas visible par le bot B (sauf bot-to-bot communication).\n- **Pas de callback inter-bot** : si le CRM Manager crée des boutons et les envoie dans la conversation de ClawdIA, les callbacks arrivent dans la session ClawdIA — pas dans celle du CRM Manager.\n\n## Méthode de recherche\n\nSi le mapping ne couvre pas la question :\n\n1. Commencer par `/bots/api` — la référence complète\n2. Si c'est un concept/feature → `/bots/features`\n3. Si c'est une question pratique → `/bots/faq` ou `/bots/tutorial`\n4. Utiliser `web_search` avec `site:core.telegram.org <mots-clés>` en dernier recours\n\n## Format de réponse\n\nToujours structurer la réponse en :\n\n1. **Ce que dit la doc** (citation ou résumé fidèle)\n2. **Ce que ça signifie pour OpenClaw** (traduction dans notre contexte)\n3. **Recommandation** (action concrète, configuration à changer, code à modifier)\n", "binary": false, "truncated": false}], "subdirs": [{"name": "references", "files": [{"name": "doc-map.md", "is_md": true, "content": "# Telegram Bot API — Documentation Map\n\nURL de base : `https://core.telegram.org`\n\n## Structure de la documentation\n\n```\ncore.telegram.org/\n├── /bots                    ← Introduction aux bots\n├── /bots/api                ← Référence API complète (tous les types, méthodes)\n├── /bots/features           ← Fonctionnalités : keyboards, inline, commands...\n├── /bots/faq                ← FAQ pratique\n├── /bots/tutorial           ← Tutoriel pas à pas\n├── /bots/webapps            ← Mini Apps / Web Apps\n├── /bots/payments           ← Paiements\n└── /api                     ← API générale Telegram (TDLib, MTProto)\n```\n\n## Mapping détaillé\n\n### Boutons et Keyboards\n\n| Question | Page | Section |\n|---|---|---|\n| Comment créer des boutons sous un message ? | `/bots/features` | #inline-keyboards |\n| Quels types de boutons existent ? | `/bots/api` | #inlinekeyboardmarkup, #inlinekeyboardbutton |\n| Comment gérer un clic sur un bouton ? | `/bots/api` | #callbackquery |\n| Reply keyboard (clavier natif) | `/bots/features` | #keyboards |\n| Bouton d'ouverture Web App | `/bots/api` | #keyboardbutton, #webappinfo |\n| Bouton de demande de contact/location | `/bots/api` | #keyboardbutton |\n| Limites : combien de boutons par ligne/message ? | `/bots/faq` | (rechercher \"buttons limit\") |\n\n### Callbacks et Interactions\n\n| Question | Page | Section |\n|---|---|---|\n| Comment répondre à un callback query ? | `/bots/api` | #answercallbackquery |\n| Callback data : taille max, format | `/bots/api` | #inlinekeyboardbutton (callback_data) |\n| Timeout d'un callback | `/bots/faq` | (rechercher \"callback\") |\n| Pourquoi mon callback n'arrive pas ? | `/bots/faq` | (rechercher \"callback not received\") |\n\n### Commandes\n\n| Question | Page | Section |\n|---|---|---|\n| Créer des commandes pour un bot | `/bots/features` | #commands |\n| setMyCommands | `/bots/api` | #setmycommands |\n| Menu button (bouton à gauche du champ texte) | `/bots/features` | #menu-button |\n| Command scopes (par chat, admin, etc.) | `/bots/api` | #botcommandscope |\n| Global commands obligatoires | `/bots/features` | #global-commands |\n\n### Messages\n\n| Question | Page | Section |\n|---|---|---|\n| Envoyer un message texte | `/bots/api` | #sendmessage |\n| Formats supportés (Markdown, HTML) | `/bots/api` | #formatting-options |\n| Envoyer des médias (photo, vidéo, doc) | `/bots/api` | #sendphoto, #sendvideo, #senddocument |\n| Éditer un message existant | `/bots/api` | #editmessagetext |\n| Supprimer un message | `/bots/api` | #deletemessage |\n| Épingler un message | `/bots/api` | #pinchatmessage |\n| Messages avec boutons inline | `/bots/api` | #sendmessage + reply_markup param |\n\n### Updates et Webhooks\n\n| Question | Page | Section |\n|---|---|---|\n| Recevoir les messages (getUpdates) | `/bots/api` | #getupdates |\n| Configurer un webhook | `/bots/api` | #setwebhook |\n| Structure d'un Update | `/bots/api` | #update |\n| Long polling vs webhook | `/bots/faq` | (rechercher \"webhook vs getupdates\") |\n\n### Chats et utilisateurs\n\n| Question | Page | Section |\n|---|---|---|\n| Structure d'un Chat | `/bots/api` | #chat |\n| Structure d'un User | `/bots/api` | #user |\n| chat_id : formats possibles | `/bots/api` | #chat (id field) |\n| Types de chat (private, group, supergroup, channel) | `/bots/api` | #chat (type field) |\n\n### Gestion de bots\n\n| Question | Page | Section |\n|---|---|---|\n| Créer un bot (BotFather) | `/bots` | #creating-a-new-bot |\n| Privacy mode | `/bots/features` | #privacy-mode |\n| Plusieurs bots, un serveur | `/bots/faq` | (rechercher \"multiple bots\") |\n| Bot-to-bot communication | `/bots/features` | #bot-to-bot-communication |\n| Tester un bot en développement | `/bots/features` | #testing-your-bot |\n| Gérer les tokens | `/bots/faq` | (rechercher \"token\") |\n\n### Limitations et erreurs\n\n| Question | Page | Section |\n|---|---|---|\n| Rate limiting (messages/seconde) | `/bots/faq` | (rechercher \"rate limit\" ou \"flood\") |\n| Taille max des messages | `/bots/api` | #sendmessage (limites) |\n| Erreurs courantes et codes | `/bots/api` | (rechercher \"error\" en bas de page) |\n| BOT_COMMANDS_TOO_MUCH | `/bots/api` | #setmycommands |\n\n### OpenClaw ↔ Telegram\n\n| Problème | Pages à consulter |\n|---|---|\n| Callback de bouton arrive dans la mauvaise session | `/bots/api#callbackquery` + `/bots/api#inlinekeyboardmarkup` |\n| Un agent ne reçoit pas les messages d'un bot | `/bots/features#privacy-mode` + `/bots/faq` (bot rights) |\n| Plusieurs bots avec le même webhook | `/bots/faq` (multiple bots) |\n| Menu commands n'apparaît pas | `/bots/features#commands` + `/bots/api#setmycommands` |\n| Message \"bot can't initiate conversation\" | `/bots/faq` (rechercher \"initiate\") |\n", "binary": false, "truncated": false}], "subdirs": []}]}, {"name": "word-docx", "source": "Global", "path": "skills/word-docx", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: Word / DOCX\nslug: word-docx\nversion: 1.0.2\nhomepage: https://clawic.com/skills/word-docx\ndescription: \"Create, inspect, and edit Microsoft Word documents and DOCX files with reliable styles, numbering, tracked changes, tables, sections, and compatibility checks. Use when (1) the task is about Word or `.docx`; (2) the file includes tracked changes, comments, fields, tables, templates, or page layout constraints; (3) the document must survive round-trip editing without formatting drift.\"\nchangelog: Tightened the skill around fragile review workflows, reference stability, and layout drift after a stricter external audit.\nmetadata: {\"clawdbot\":{\"emoji\":\"📘\",\"os\":[\"linux\",\"darwin\",\"win32\"]}}\n---\n\n## When to Use\n\nUse when the main artifact is a Microsoft Word document or `.docx` file, especially when tracked changes, comments, headers, numbering, fields, tables, templates, or compatibility matter.\n\n## Core Rules\n\n### 1. Treat DOCX as OOXML, not plain text\n\n- A `.docx` file is a ZIP of XML parts, so structure matters as much as visible text.\n- The critical parts are usually `word/document.xml`, `styles.xml`, `numbering.xml`, headers, footers, and relationship files.\n- Text may be split across multiple runs; never assume one word or sentence lives in one XML node.\n- Use different workflows on purpose: structured extraction for quick reading, style-driven generation for new files, and OOXML-aware editing for fragile existing documents.\n- If the job is mainly reading, extracting, or reviewing, prefer a structure-preserving read path before touching OOXML.\n- For deep edits, inspect the package layout instead of relying only on rendered output.\n- Reading, generating, and preserving an existing reviewed document are different jobs even when the format is the same.\n- Legacy `.doc` inputs usually need conversion before you can trust modern `.docx` assumptions.\n\n### 2. Preserve styles and direct formatting deliberately\n\n- Prefer named styles over direct formatting so the document stays editable.\n- Styles layer: paragraph styles, character styles, and direct formatting do not behave the same.\n- Removing direct formatting is often safer than stacking more inline formatting on top.\n- When editing an existing file, extend the current style system instead of inventing a parallel one.\n- Copying content between documents can silently import foreign styles, theme settings, and numbering definitions.\n\n### 3. Lists and numbering are their own system\n\n- Bullets and numbering belong to Word's numbering definitions, not pasted Unicode characters.\n- `abstractNum`, `num`, and paragraph numbering properties all matter, so restart behavior is rarely \"visual only\".\n- Indentation and numbering are related but not identical; a list can have broken numbering even if the indent looks right.\n- A list that looks correct in one editor can restart, flatten, or renumber itself later if the underlying numbering state is wrong.\n\n### 4. Page layout lives in sections\n\n- Margins, orientation, headers, footers, and page numbering are section-level behavior.\n- First-page and odd/even headers can differ inside the same document, so one header fix may not fix the document.\n- Set page size explicitly because A4 and US Letter defaults change pagination and table widths.\n- Use section breaks for layout changes; manual spacing and stray page breaks usually create drift.\n- Header and footer media use part-specific relationships, so copied IDs often break images or links.\n- Tables, page breaks, and headers often drift together, so treat layout fixes as document-wide, not local cosmetic edits.\n- Table geometry depends on page width, margins, and fixed widths, so \"close enough\" table edits often break later in Google Docs or LibreOffice.\n\n### 5. Track changes, comments, and fields need precise edits\n\n- Visible text is not the full document when tracked changes are enabled.\n- Insertions, deletions, and comments carry metadata that can survive careless edits.\n- Deleted text may still exist in the XML even when it no longer appears on screen.\n- Comment anchors and review ranges can break if edits move text without preserving the surrounding structure.\n- Comment markers and review wrappers do not behave like inline formatting, so moving text carelessly can orphan or misplace them.\n- Comments, footnotes, bookmarks, and linked media may live in separate parts, not only in the main document body.\n- Tables of contents, page numbers, dates, cross-references, and mail merge placeholders are fields.\n- Edit the field source carefully and expect cached display values to lag until refresh.\n- Hyperlinks, bookmarks, and references can break if IDs or relationships stop matching.\n- Bookmarks, footnotes, comment ranges, and cross-references depend on stable anchors even when the visible text seems untouched.\n- A document can look correct while still containing stale field output that refreshes later into something different.\n- For review workflows, make minimal replacements instead of rewriting whole paragraphs.\n- In tracked-change workflows, only the changed span should look changed; broad rewrites create noisy reviews and can destroy the original formatting context.\n- For legal, academic, or business review documents, default to review-style edits over wholesale paragraph rewrites unless the user explicitly wants a rewrite.\n\n### 6. Verify round-trip compatibility before delivery\n\n- Complex documents can shift between Word, LibreOffice, Google Docs, and conversion tools.\n- Tables, headers, embedded fonts, and copied styles are common sources of layout drift.\n- Treat `.docm` as macro-bearing and higher risk; treat `.doc` as legacy input that may need conversion first.\n- When layout matters, explicit table widths are safer than auto-fit or percentage-style behavior that different editors reinterpret.\n- A document that passes a text check can still fail on pagination, table widths, or reference refresh after the recipient opens it.\n\n## Common Traps\n\n- Copy-paste can import unwanted styles and numbering definitions.\n- Header or footer images use part-specific relationships, so reusing IDs blindly breaks them.\n- Empty paragraphs used as spacing make templates fragile; spacing belongs in paragraph settings.\n- A clean-looking export can still hide unresolved revisions, comments, or stale field values.\n- Restarting lists \"by eye\" usually fails because numbering state lives outside the paragraph text.\n- One visible phrase can be split across several runs, bookmarks, revision tags, or field boundaries.\n- Replacing a whole paragraph to change one clause often breaks review quality, bookmarks, comments, or nearby inline formatting.\n- Deleting all visible text from a paragraph or list item can still leave behind an empty paragraph mark, empty bullet, or unstable numbering.\n- Table auto-fit and percentage-like width behavior can look acceptable in Word and still drift in Google Docs or LibreOffice.\n- LibreOffice and Google Docs can shift complex tables, section behavior, and embedded fonts even when Word looks perfect.\n- Compatibility mode can silently cap newer features or change pagination behavior.\n- A single change in page size or margin defaults can ripple through tables, headers, TOC, and cross-references.\n- A revision workflow can look accepted on screen while leftover metadata, comments, or field caches still make the file unstable later.\n- TOC entries, footnotes, and cross-references can look correct until the recipient updates fields and exposes broken anchors.\n\n## Related Skills\nInstall with `clawhub install <slug>` if user confirms:\n- `documents` — General document handling and format conversion.\n- `brief` — Concise business writing and structured summaries.\n- `article` — Long-form drafting and editorial structure.\n\n## Feedback\n\n- If useful: `clawhub star word-docx`\n- Stay updated: `clawhub sync`\n", "binary": false, "truncated": false}, {"name": "_meta.json", "is_md": false, "content": "{\n  \"ownerId\": \"kn73vp5rarc3b14rc7wjcw8f8580t5d1\",\n  \"slug\": \"word-docx\",\n  \"version\": \"1.0.2\",\n  \"publishedAt\": 1773243096816\n}", "binary": false, "truncated": false}], "subdirs": []}, {"name": "youtube-api-skill", "source": "Global", "path": "skills/youtube-api-skill", "files": [{"name": "LICENSE.txt", "is_md": false, "content": "The MIT License (MIT)\n\nCopyright (c) 2026 Maton\n\nPermission is hereby granted, free of charge, to any person obtaining a copy\nof this software and associated documentation files (the \"Software\"), to deal\nin the Software without restriction, including without limitation the rights\nto use, copy, modify, merge, publish, distribute, sublicense, and/or sell\ncopies of the Software, and to permit persons to whom the Software is\nfurnished to do so, subject to the following conditions:\n\nThe above copyright notice and this permission notice shall be included in all\ncopies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR\nIMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,\nFITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE\nAUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER\nLIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,\nOUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE\nSOFTWARE.\n", "binary": false, "truncated": false}, {"name": "SKILL.md", "is_md": true, "content": "---\nname: youtube\ndescription: |\n  YouTube Data API integration with managed OAuth. Search videos, manage playlists, access channel data, and interact with comments. Use this skill when users want to interact with YouTube. For other third party apps, use the api-gateway skill (https://clawhub.ai/byungkyu/api-gateway).\ncompatibility: Requires network access and valid Maton API key\nmetadata:\n  author: maton\n  version: \"1.0\"\n  clawdbot:\n    emoji: 🧠\n    requires:\n      env:\n        - MATON_API_KEY\n---\n\n# YouTube\n\nAccess the YouTube Data API v3 with managed OAuth authentication. Search videos, manage playlists, access channel information, and interact with comments and subscriptions.\n\n## Quick Start\n\n```bash\n# Search for videos\npython <<'EOF'\nimport urllib.request, os, json\nreq = urllib.request.Request('https://gateway.maton.ai/youtube/youtube/v3/search?part=snippet&q=coding+tutorial&type=video&maxResults=10')\nreq.add_header('Authorization', f'Bearer {os.environ[\"MATON_API_KEY\"]}')\nprint(json.dumps(json.load(urllib.request.urlopen(req)), indent=2))\nEOF\n```\n\n## Base URL\n\n```\nhttps://gateway.maton.ai/youtube/{native-api-path}\n```\n\nReplace `{native-api-path}` with the actual YouTube Data API endpoint path. The gateway proxies requests to `www.googleapis.com` and automatically injects your OAuth token.\n\n## Authentication\n\nAll requests require the Maton API key in the Authorization header:\n\n```\nAuthorization: Bearer $MATON_API_KEY\n```\n\n**Environment Variable:** Set your API key as `MATON_API_KEY`:\n\n```bash\nexport MATON_API_KEY=\"YOUR_API_KEY\"\n```\n\n### Getting Your API Key\n\n1. Sign in or create an account at [maton.ai](https://maton.ai)\n2. Go to [maton.ai/settings](https://maton.ai/settings)\n3. Copy your API key\n\n## Connection Management\n\nManage your Google OAuth connections at `https://ctrl.maton.ai`.\n\n### List Connections\n\n```bash\npython <<'EOF'\nimport urllib.request, os, json\nreq = urllib.request.Request('https://ctrl.maton.ai/connections?app=youtube&status=ACTIVE')\nreq.add_header('Authorization', f'Bearer {os.environ[\"MATON_API_KEY\"]}')\nprint(json.dumps(json.load(urllib.request.urlopen(req)), indent=2))\nEOF\n```\n\n### Create Connection\n\n```bash\npython <<'EOF'\nimport urllib.request, os, json\ndata = json.dumps({'app': 'youtube'}).encode()\nreq = urllib.request.Request('https://ctrl.maton.ai/connections', data=data, method='POST')\nreq.add_header('Authorization', f'Bearer {os.environ[\"MATON_API_KEY\"]}')\nreq.add_header('Content-Type', 'application/json')\nprint(json.dumps(json.load(urllib.request.urlopen(req)), indent=2))\nEOF\n```\n\n### Get Connection\n\n```bash\npython <<'EOF'\nimport urllib.request, os, json\nreq = urllib.request.Request('https://ctrl.maton.ai/connections/{connection_id}')\nreq.add_header('Authorization', f'Bearer {os.environ[\"MATON_API_KEY\"]}')\nprint(json.dumps(json.load(urllib.request.urlopen(req)), indent=2))\nEOF\n```\n\n**Response:**\n```json\n{\n  \"connection\": {\n    \"connection_id\": \"21fd90f9-5935-43cd-b6c8-bde9d915ca80\",\n    \"status\": \"ACTIVE\",\n    \"creation_time\": \"2025-12-08T07:20:53.488460Z\",\n    \"last_updated_time\": \"2026-01-31T20:03:32.593153Z\",\n    \"url\": \"https://connect.maton.ai/?session_token=...\",\n    \"app\": \"youtube\",\n    \"metadata\": {}\n  }\n}\n```\n\nOpen the returned `url` in a browser to complete OAuth authorization.\n\n### Delete Connection\n\n```bash\npython <<'EOF'\nimport urllib.request, os, json\nreq = urllib.request.Request('https://ctrl.maton.ai/connections/{connection_id}', method='DELETE')\nreq.add_header('Authorization', f'Bearer {os.environ[\"MATON_API_KEY\"]}')\nprint(json.dumps(json.load(urllib.request.urlopen(req)), indent=2))\nEOF\n```\n\n### Specifying Connection\n\nIf you have multiple YouTube connections, specify which one to use with the `Maton-Connection` header:\n\n```bash\npython <<'EOF'\nimport urllib.request, os, json\nreq = urllib.request.Request('https://gateway.maton.ai/youtube/youtube/v3/channels?part=snippet&mine=true')\nreq.add_header('Authorization', f'Bearer {os.environ[\"MATON_API_KEY\"]}')\nreq.add_header('Maton-Connection', '21fd90f9-5935-43cd-b6c8-bde9d915ca80')\nprint(json.dumps(json.load(urllib.request.urlopen(req)), indent=2))\nEOF\n```\n\nIf omitted, the gateway uses the default (oldest) active connection.\n\n## API Reference\n\n### Search\n\n#### Search Videos, Channels, or Playlists\n\n```bash\nGET /youtube/youtube/v3/search\n```\n\nQuery parameters:\n- `part` - Required: `snippet`\n- `q` - Search query\n- `type` - Filter by type: `video`, `channel`, `playlist`\n- `maxResults` - Results per page (1-50, default 5)\n- `order` - Sort order: `date`, `rating`, `relevance`, `title`, `viewCount`\n- `publishedAfter` - Filter by publish date (RFC 3339)\n- `publishedBefore` - Filter by publish date (RFC 3339)\n- `channelId` - Filter by channel\n- `videoDuration` - `short` (<4min), `medium` (4-20min), `long` (>20min)\n- `pageToken` - Pagination token\n\n**Example:**\n\n```bash\ncurl -s -X GET \"https://gateway.maton.ai/youtube/youtube/v3/search?part=snippet&q=machine+learning&type=video&maxResults=10&order=viewCount\" -H \"Authorization: Bearer $MATON_API_KEY\"\n```\n\n**Response:**\n```json\n{\n  \"kind\": \"youtube#searchListResponse\",\n  \"nextPageToken\": \"CAUQAA\",\n  \"pageInfo\": {\n    \"totalResults\": 1000000,\n    \"resultsPerPage\": 10\n  },\n  \"items\": [\n    {\n      \"kind\": \"youtube#searchResult\",\n      \"id\": {\n        \"kind\": \"youtube#video\",\n        \"videoId\": \"abc123xyz\"\n      },\n      \"snippet\": {\n        \"publishedAt\": \"2024-01-15T10:00:00Z\",\n        \"channelId\": \"UCxyz123\",\n        \"title\": \"Machine Learning Tutorial\",\n        \"description\": \"Learn ML basics...\",\n        \"thumbnails\": {\n          \"default\": {\"url\": \"https://i.ytimg.com/vi/abc123xyz/default.jpg\"}\n        },\n        \"channelTitle\": \"Tech Channel\"\n      }\n    }\n  ]\n}\n```\n\n### Videos\n\n#### Get Video Details\n\n```bash\nGET /youtube/youtube/v3/videos?part=snippet,statistics,contentDetails&id={videoId}\n```\n\nParts available:\n- `snippet` - Title, description, thumbnails, channel info\n- `statistics` - View count, likes, comments\n- `contentDetails` - Duration, dimension, definition\n- `status` - Upload status, privacy status\n- `player` - Embedded player HTML\n\n**Example:**\n\n```bash\ncurl -s -X GET \"https://gateway.maton.ai/youtube/youtube/v3/videos?part=snippet,statistics&id=dQw4w9WgXcQ\" -H \"Authorization: Bearer $MATON_API_KEY\"\n```\n\n#### Get My Videos (Uploaded)\n\n```bash\nGET /youtube/youtube/v3/search?part=snippet&forMine=true&type=video&maxResults=25\n```\n\n#### Rate Video (Like/Dislike)\n\n```bash\nPOST /youtube/youtube/v3/videos/rate?id={videoId}&rating=like\n```\n\nRating values: `like`, `dislike`, `none`\n\n#### Get Trending Videos\n\n```bash\nGET /youtube/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=US&maxResults=10\n```\n\n#### Get Video Categories\n\n```bash\nGET /youtube/youtube/v3/videoCategories?part=snippet&regionCode=US\n```\n\n### Channels\n\n#### Get Channel Details\n\n```bash\nGET /youtube/youtube/v3/channels?part=snippet,statistics,contentDetails&id={channelId}\n```\n\n#### Get My Channel\n\n```bash\nGET /youtube/youtube/v3/channels?part=snippet,statistics,contentDetails&mine=true\n```\n\n**Response:**\n```json\n{\n  \"items\": [\n    {\n      \"id\": \"UCxyz123\",\n      \"snippet\": {\n        \"title\": \"My Channel\",\n        \"description\": \"Channel description\",\n        \"customUrl\": \"@mychannel\",\n        \"publishedAt\": \"2020-01-01T00:00:00Z\",\n        \"thumbnails\": {...}\n      },\n      \"statistics\": {\n        \"viewCount\": \"1000000\",\n        \"subscriberCount\": \"50000\",\n        \"videoCount\": \"100\"\n      },\n      \"contentDetails\": {\n        \"relatedPlaylists\": {\n          \"uploads\": \"UUxyz123\"\n        }\n      }\n    }\n  ]\n}\n```\n\n#### Get Channel by Username\n\n```bash\nGET /youtube/youtube/v3/channels?part=snippet,statistics&forUsername={username}\n```\n\n### Playlists\n\n#### List My Playlists\n\n```bash\nGET /youtube/youtube/v3/playlists?part=snippet,contentDetails&mine=true&maxResults=25\n```\n\n#### Get Playlist\n\n```bash\nGET /youtube/youtube/v3/playlists?part=snippet,contentDetails&id={playlistId}\n```\n\n#### Create Playlist\n\n```bash\nPOST /youtube/youtube/v3/playlists?part=snippet,status\nContent-Type: application/json\n\n{\n  \"snippet\": {\n    \"title\": \"My New Playlist\",\n    \"description\": \"A collection of videos\",\n    \"defaultLanguage\": \"en\"\n  },\n  \"status\": {\n    \"privacyStatus\": \"private\"\n  }\n}\n```\n\nPrivacy values: `public`, `private`, `unlisted`\n\n#### Update Playlist\n\n```bash\nPUT /youtube/youtube/v3/playlists?part=snippet,status\nContent-Type: application/json\n\n{\n  \"id\": \"PLxyz123\",\n  \"snippet\": {\n    \"title\": \"Updated Playlist Title\",\n    \"description\": \"Updated description\"\n  },\n  \"status\": {\n    \"privacyStatus\": \"public\"\n  }\n}\n```\n\n#### Delete Playlist\n\n```bash\nDELETE /youtube/youtube/v3/playlists?id={playlistId}\n```\n\n### Playlist Items\n\n#### List Playlist Items\n\n```bash\nGET /youtube/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId={playlistId}&maxResults=50\n```\n\n#### Add Video to Playlist\n\n```bash\nPOST /youtube/youtube/v3/playlistItems?part=snippet\nContent-Type: application/json\n\n{\n  \"snippet\": {\n    \"playlistId\": \"PLxyz123\",\n    \"resourceId\": {\n      \"kind\": \"youtube#video\",\n      \"videoId\": \"abc123xyz\"\n    },\n    \"position\": 0\n  }\n}\n```\n\n#### Remove from Playlist\n\n```bash\nDELETE /youtube/youtube/v3/playlistItems?id={playlistItemId}\n```\n\n### Subscriptions\n\n#### List My Subscriptions\n\n```bash\nGET /youtube/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=50\n```\n\n#### Check Subscription to Channel\n\n```bash\nGET /youtube/youtube/v3/subscriptions?part=snippet&mine=true&forChannelId={channelId}\n```\n\n#### Subscribe to Channel\n\n```bash\nPOST /youtube/youtube/v3/subscriptions?part=snippet\nContent-Type: application/json\n\n{\n  \"snippet\": {\n    \"resourceId\": {\n      \"kind\": \"youtube#channel\",\n      \"channelId\": \"UCxyz123\"\n    }\n  }\n}\n```\n\n#### Unsubscribe\n\n```bash\nDELETE /youtube/youtube/v3/subscriptions?id={subscriptionId}\n```\n\n### Comments\n\n#### List Video Comments\n\n```bash\nGET /youtube/youtube/v3/commentThreads?part=snippet,replies&videoId={videoId}&maxResults=100\n```\n\n#### Add Comment to Video\n\n```bash\nPOST /youtube/youtube/v3/commentThreads?part=snippet\nContent-Type: application/json\n\n{\n  \"snippet\": {\n    \"videoId\": \"abc123xyz\",\n    \"topLevelComment\": {\n      \"snippet\": {\n        \"textOriginal\": \"Great video!\"\n      }\n    }\n  }\n}\n```\n\n#### Reply to Comment\n\n```bash\nPOST /youtube/youtube/v3/comments?part=snippet\nContent-Type: application/json\n\n{\n  \"snippet\": {\n    \"parentId\": \"comment123\",\n    \"textOriginal\": \"Thanks for your comment!\"\n  }\n}\n```\n\n#### Delete Comment\n\n```bash\nDELETE /youtube/youtube/v3/comments?id={commentId}\n```\n\n## Code Examples\n\n### JavaScript\n\n```javascript\nconst headers = {\n  'Authorization': `Bearer ${process.env.MATON_API_KEY}`\n};\n\n// Search videos\nconst results = await fetch(\n  'https://gateway.maton.ai/youtube/youtube/v3/search?part=snippet&q=tutorial&type=video&maxResults=10',\n  { headers }\n).then(r => r.json());\n\n// Get video details\nconst video = await fetch(\n  'https://gateway.maton.ai/youtube/youtube/v3/videos?part=snippet,statistics&id=dQw4w9WgXcQ',\n  { headers }\n).then(r => r.json());\n\n// Create playlist\nawait fetch(\n  'https://gateway.maton.ai/youtube/youtube/v3/playlists?part=snippet,status',\n  {\n    method: 'POST',\n    headers: { ...headers, 'Content-Type': 'application/json' },\n    body: JSON.stringify({\n      snippet: { title: 'My Playlist', description: 'Videos I like' },\n      status: { privacyStatus: 'private' }\n    })\n  }", "binary": false, "truncated": true}, {"name": "_meta.json", "is_md": false, "content": "{\n  \"ownerId\": \"kn75240wq8bnv2qm2xgry748jd80b9r0\",\n  \"slug\": \"youtube-api-skill\",\n  \"version\": \"1.0.3\",\n  \"publishedAt\": 1770756366839\n}", "binary": false, "truncated": false}], "subdirs": []}]

<script>
document.addEventListener('DOMContentLoaded', function() {
  var rawData = document.getElementById('skills-data').textContent;
  var ALL_SKILLS = JSON.parse(rawData);

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function renderFile(file) {
    var icon = file.is_md ? '[MD]' : (file.binary ? '[BIN]' : '[TXT]');
    var trunc = file.truncated ? '<div class="truncated-note">Tronque (500 lignes max)</div>' : '';
    var body;
    if (file.binary) {
      body = '<pre>' + esc(file.content) + '</pre>';
    } else if (file.is_md) {
      try { body = '<div class="md-content">' + marked.parse(file.content) + '</div>'; }
      catch(e) { body = '<pre>' + esc(file.content) + '</pre>'; }
    } else {
      body = '<pre>' + esc(file.content) + '</pre>';
    }
    return '<div class="file-card"><div class="file-header" onclick="this.parentElement.classList.toggle(&quot;open&quot;)"><div>' + icon + ' ' + esc(file.name) + '</div><span>v</span></div><div class="file-body">' + trunc + body + '</div></div>';
  }

  function renderSubdirs(subdirs) {
    if (!subdirs || !subdirs.length) return '';
    return subdirs.map(function(sd) {
      var n = sd.files.length + (sd.subdirs ? sd.subdirs.length : 0);
      return '<div class="subdir-card"><div class="subdir-header" onclick="this.parentElement.classList.toggle(&quot;open&quot;)"><div>[DIR] ' + esc(sd.name) + '</div><span class="file-count">' + n + ' items</span></div><div class="subdir-body">' + (sd.files||[]).map(renderFile).join('') + renderSubdirs(sd.subdirs||[]) + '</div></div>';
    }).join('');
  }

  function renderSkill(s) {
    var badge = s.source === 'Workspace' ? '<span class="badge badge-workspace">WS</span>' : '<span class="badge badge-global">Global</span>';
    return '<div class="skill-card" data-name="' + s.name.toLowerCase() + '"><div class="skill-header" onclick="this.parentElement.classList.toggle(&quot;open&quot;)"><div class="skill-header-left">' + badge + ' <span class="skill-name">' + esc(s.name) + '</span></div><span class="chevron">></span></div><div class="skill-body"><div style="margin-bottom:8px;color:var(--text-dim);font-size:0.8rem;font-family:monospace">' + esc(s.path||'') + '</div>' + (s.files||[]).map(renderFile).join('') + renderSubdirs(s.subdirs||[]) + '</div></div>';
  }

  var ws = ALL_SKILLS.filter(function(s){return s.source==='Workspace'});
  var gl = ALL_SKILLS.filter(function(s){return s.source==='Global'});
  document.getElementById('workspace-skills').innerHTML = ws.map(renderSkill).join('');
  document.getElementById('global-skills').innerHTML = gl.map(renderSkill).join('');
  document.getElementById('ws-count-label').textContent = ws.length + ' skills';
  document.getElementById('g-count-label').textContent = gl.length + ' skills';

  document.getElementById('search').addEventListener('input', function() {
    var q = this.value.toLowerCase();
    document.querySelectorAll('.skill-card').forEach(function(c) {
      c.style.display = (!q || c.getAttribute('data-name').indexOf(q) > -1) ? '' : 'none';
    });
  });
});
</script>
