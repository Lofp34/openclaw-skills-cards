planifier une réunion, en respectant strictement les règles de disponibilité de Laurent.\n\n---\n\n## 1. Règles de base (APPLIQUER SYSTÉMATIQUEMENT)\n\n1. **Créneaux d'1h** — jamais de demi-journées\n2. **Après-midi uniquement** — de 14h30 à 17h (fin de réunion max 18h)\n3. **Pas de vendredi après-midi** — aucun créneau\n4. **3+ RDV l'après-midi** → journée entière exclue, même s'il reste des trous\n5. **Jour avec événement toute la journée** → exclu\n6. **À partir de la semaine prochaine** — pas la semaine en cours\n\n## 2. Consultation agenda\n\nUtiliser `gog calendar events` avec les paramètres suivants :\n\n```bash\n# Plage sur 2 semaines (semaine prochaine + suivante)\nGOG_ACCOUNT=ls@laurentserre.com gog calendar events \\\n  --from=\"<LUNDI_PROP>T00:00:00+02:00\" \\\n  --to=\"<VENDREDI_S2>T23:59:00+02:00\" \\\n  --json\n```\n\n**ATTENTION PAGINATION :** l'API Google Calendar pagine. Lire TOUTES les pages. Si la réponse contient `nextPageToken`, relancer la requête avec `--page <token>` jusqu'à épuisement. Les événements \"journée entière\" (date sans `dateTime`) sont souvent sur la page 2+.\n\n### Détection des événements\n\n- **Événement journée entière** : `start.date` présent, pas de `dateTime` → jour bloqué\n  ```python\n  # Un événement avec start: {\"date\": \"2026-06-09\"} et end: {\"date\": \"2026-06-10\"}\n  # bloque toute la journée du 2026-06-09 (convention Google : end exclu)\n  ```\n- **Événement horaire** : `start.dateTime` présent → conflit si chevauchement avec créneau\n\n## 3. Calcul des créneaux libres\n\nPour chaque jour de la plage (sauf vendredis) :\n\n1. Exclure les jours avec événement \"journée entière\"\n2. Compter les RDV présents l'après-midi (14h-18h)\n3. Si 3 RDV ou plus dans l'après-midi → exclure le jour\n4. Lister les créneaux d'1h libres entre 14h30 et 17h (fin avant 18h)\n5. Filtrer : garder max 3 créneaux par jour (pour éviter la noyade)\n\n### Priorisation des créneaux\n\nPréférer dans l'ordre :\n- Semaine prochaine > semaine suivante\n- Créneaux 15h-16h et 16h-17h (milieu d'après-midi) > 17h-18h\n- Mercredi et jeudi > lundi et mardi\n\n## 4. Création du formulaire Google Forms\n\n```bash\n# 1. Créer le formulaire\nGOG_ACCOUNT=ls@laurentserre.com gog forms create \\\n  --title \"📅 [TITRE_REUNION]\"\n\n# 2. Mettre à jour la description (utiliser --description)\n#    Écrire les accents SANS accents car le terminal ne les gère pas\nGOG_ACCOUNT=ls@laurentserre.com gog forms update <FORM_ID> \\\n  --description \"Bonjour a tous,\\n\\nMerci de renseigner vos disponibilites...\"\n\n# 3. Ajouter la question \"Votre nom et prenom\"\nGOG_ACCOUNT=ls@laurentserre.com gog forms add-question <FORM_ID> \\\n  --title \"Votre nom et prenom\" \\\n  --required\n\n# 4. Ajouter les créneaux en checkbox\nGOG_ACCOUNT=ls@laurentserre.com gog forms add-question <FORM_ID> \\\n  --title \"Cochez les creneaux qui vous conviennent\" \\\n  --type checkbox --required \\\n  --option \"Lun X juin -- 15h-16h\" \\\n  --option \"...\" \\\n  --json\n```\n\n## 5. Validation du mail avant envoi\n\n**NE JAMAIS ENVOYER SANS VALIDATION.** Suivre ce processus :\n\n1. Construire l'email complet (destinataires, sujet, corps)\n2. Partager le contenu dans la conversation Telegram\n3. Attendre le feu vert explicite de Laurent\n4. Envoyer uniquement après validation\n\n### Format d'email type\n\n```\nBonjour a tous,\n\nSuite a nos echanges, voici un Doodle pour trouver le creneau qui convient :\n\n<LIEN_DU_FORMULAIRE>\n\n[OBJECTIF DE LA REUNION]\n\nMerci de repondre avant [DATE_LIMITE].\n\nBonne journee,\nLaurent\n```\n\n### Envoi\n\n```bash\nGOG_ACCOUNT=ls@laurentserre.com gog gmail send \\\n  --to \"Destinataire1 <email1>, Destinataire2 <email2>\" \\\n  --subject \"📅 Doodle -- [TITRE]\" \\\n  --body \"[CONTENU_VALIDE]\"\n```\n\n## 6. Mise à jour CRM\n\nAprès envoi du Doodle :\n- Mettre à jour la task CRM concernée (statut → done ou en attente)\n- Enregistrer le threadId de l'email envoyé\n\n## 7. Rappel : tout le processus\n\n```mermaid\nflowchart TD\n    A[Demande de Doodle] --> B[Consulter agenda gog calendar]\n    B --> C[Pagination: TOUTES les pages]\n    C --> D[Exclure jours bloqués]\n    D --> E[Calculer créneaux libres 14h30-17h]\n    E --> F[Appliquer règles: pas vendredi, pas 3+ RDV]\n    F --> G[Croiser avec les personnes concernées]\n    G --> H[Créer formulaire Google Forms]\n    H --> I[PRÉSENTER le mail à Laurent]\n    I --> J{Laurent valide?}\n    J -->|Non| K[Corriger]\n    K --> I\n    J -->|Oui| L[Envoyer l'email]\n    L --> M[Mettre à jour CRM]\n```\n\n## 8. Erreurs fréquentes à éviter\n\n| Erreur | Correction |\n|--------|-----------|\n| Proposer des demi-journées | Toujours des créneaux d'1h |\n| Proposer le matin | Après-midi uniquement, 14h30-17h |\n| Proposer un vendredi | Jamais de vendredi |\n| Oublier la pagination | Vérifier `nextPageToken`, re-query avec `--page` |\n| Proposer un jour avec all-day event | Détecter via `start.date` (pas `dateTime`) |\n| Envoyer le mail sans validation | Toujours partager dans la conversation d'abord |\n| Écrire les accents dans le terminal | Remplacer par les équivalents sans accents |\n", "binary": false, "truncated": false}], "subdirs": []}, {"name": "fleet-health", "source": "Global", "path": "skills/fleet-health", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: fleet-health\ndescription: \"Check-up hebdomadaire de la flotte : promotion du passif .learnings/ + audit de cohérence de tous les fichiers système. Détecte doublons, contradictions, obsolescence, dérive, contamination. Applique les corrections automatiques safe, signale celles qui nécessitent décision humaine.\"\nmetadata:\n  openclaw:\n    emoji: \"🩺\"\n    requires: {}\n---\n\n# Fleet Health — Médecin de la flotte\n\nCheck-up hebdomadaire complet de tous les agents. Deux phases : promotion du passif, puis audit de cohérence.\n\nExécution prévue : dimanche matin (hebdomadaire), via cron job isolé.\n\n---\n\n## Phase 1 — Rattrapage `.learnings/`\n\nPour chaque agent de la flotte :\n\n1. Scanner `workspace/.learnings/LEARNINGS.md`, `ERRORS.md`, `FEATURE_REQUESTS.md`\n2. Identifier toutes les entrées avec `**Status**: pending`\n3. Pour chaque entrée `pending`, évaluer :\n   - **Promouvoir** → leçon durable, actionnable, pas déjà couverte → insérer dans le bon fichier cible\n   - **Fusionner** → déjà couvert par une autre entrée ou déjà présent dans un fichier cible → résoudre comme doublon\n   - **Résoudre** → incident ponctuel, plus pertinent, leçon trop vague → marquer `resolved` avec justification\n   - **Laisser** → feature request légitime dans FEATURE_REQUESTS.md → ne pas toucher\n4. Mettre à jour le statut de chaque entrée traitée avec la cible ou la justification\n5. Ne JAMAIS supprimer une entrée — seulement changer son statut\n\n### Ratio de sélectivité attendu\n\nSur 10 entrées pending, le ratio typique est : 4-5 promotions, 2-3 fusions, 2-3 résolus, 1 laissé.\nSi toutes les entrées sont promues, c'est un signal de manque de sélectivité.\n\n### Règles de promotion strictes\n\n- **Relire le fichier cible ENTIER** avant d'insérer — beaucoup de règles sont déjà couvertes\n- **Fusionner les doublons** : une seule promotion pour N entrées qui pointent vers la même règle\n- **Ne pas gonfler** : si un fichier cible a déjà 300+ lignes, être plus sélectif. Condenser plutôt qu'ajouter.\n- **Respecter la structure existante** : insérer dans la section appropriée, pas à la fin\n- **Pas de secrets** : ne jamais copier de tokens, clés, ou identifiants dans les fichiers cibles\n\n### Cibles de promotion\n\n| Type de leçon | Fichier cible |\n|---|---|\n| Comportement, ton, posture | SOUL.md |\n| Workflow, délégation, process | AGENTS.md |\n| Commandes, outils, flags, API, gotchas | TOOLS.md |\n| Faits durables, décisions, contexte | MEMORY.md |\n\n---\n\n## Phase 2 — Audit de cohérence\n\nAuditer CHAQUE fichier système de CHAQUE agent, puis les cohérences inter-fichiers.\n\n### 2.1 Patterns de contamination — Détection automatique\n\nCes patterns sont des anomalies structurelles. Les corriger automatiquement quand c'est safe.\n\n#### SOUL.md contaminé\n\n**Symptôme** : contient des sections avec des noms de fichiers, outils, commandes, chemins, flags CLI.\n**Règle** : SOUL.md = posture pure (20-50 lignes max). Tout contenu technique → TOOLS.md. Tout contenu procédural → AGENTS.md.\n**Action auto** : déplacer les sections techniques vers TOOLS.md, conserver uniquement la posture dans SOUL.md.\n\n#### IDENTITY.md fantôme\n\n**Symptôme** : template vierge (mention `Fill this in`), ou contenu < 8 lignes, ou périmètre qui contredit les autres fichiers.\n**Règle** : IDENTITY doit avoir name, creature, vibe, emoji, et une phrase de mission cohérente avec SOUL.md.\n**Action auto** : signaler dans le rapport (🟡). La décision du nom/emoji/vibe est humaine.\n\n#### HEARTBEAT.md en dérive\n\n**Symptômes** (3 modes) :\n1. **Journal** : état actif figé > 7 jours (« Post LinkedIn en attente du 21 mai », « livrable généré le... »)\n2. **Infra** : scripts shell, chemins launchd, configs système, commandes curl\n3. **Manuel** : procédures complètes qui devraient être dans TOOLS.md\n\n**Seuils** : > 50 lignes = 🟡, > 80 lignes = 🔴\n**Action auto** : extraire l'infra vers TOOLS.md, nettoyer les états obsolètes. Garder uniquement : priorités, boucle standard, format de remontée, contrôles obligatoires.\n\n#### MEMORY.md — artefacts de promotion brute\n\n**Symptôme** : lignes contenant `\u003c!-- openclaw-memory-promotion -->` suivies de métadonnées JSON brutes illisibles.\n**Action auto** : remplacer par un placeholder propre `*(Promoted From Short-Term Memory)*`.\n\n#### Chemin skills obsolète\n\n**Symptôme** : AGENTS.md ou TOOLS.md mentionne `/usr/local/lib/node_modules/openclaw/skills/` (répertoire bundled, écrasé à chaque màj).\n**Règle** : le chemin canonique est `~/.openclaw/skills/` (managed, survit aux màj).\n**Action auto** : corriger le chemin.\n\n### 2.2 Contradictions inter-fichiers — Détection + signalement\n\nCes patterns nécessitent un arbitrage humain. Ne pas corriger automatiquement.\n\n| Vérification | Pattern |\n|---|---|\n| **MEMORY.md vs AGENTS.md** | Une règle de permission ou de périmètre diffère entre les deux (ex: « ne jamais écrire dans le CRM » vs « lit et écrit dans le CRM ») |\n| **SOUL.md vs IDENTITY.md** | Le ton/périmètre décrit dans IDENTITY ne correspond pas à la posture dans SOUL |\n| **HEARTBEAT.md vs TOOLS.md** | Le heartbeat décrit un comportement que TOOLS interdit (ex: délégation à un sous-agent) |\n| **AGENTS.md vs TOOLS.md** | Outil documenté dans TOOLS mais jamais référencé dans les process AGENTS (ou l'inverse) |\n\n### 2.3 Doublons inter-fichiers\n\n**Règle des 3** : si la même information apparaît dans 3 fichiers ou plus, signaler et proposer un fichier canonique unique.\n\n**Patterns connus** (à détecter) :\n- Template article dupliqué dans AGENTS + TOOLS + HEARTBEAT\n- Règle anti-doublon éditorial en triple\n- Règle image/moteur canonique en triple\n- Règle « livrables clients » en quintuple\n- EM DASH ban en double section dans le même TOOLS.md\n\n### 2.4 Cohérence inter-agents\n\n- Règles communes à plusieurs agents (pas de tirets cadratins, pas de secrets, signature email) : vérifier la cohérence\n- Provider d'image : l'orchestrateur prescrit `gpt-image-2`, ne pas avoir d'autre moteur dans les agents spécialisés\n- Signaler les divergences sans corriger (arbitrage humain)\n\n---\n\n## Phase 3 — Évolution du registre des skills\n\nComparer le `REGISTRY.md` actuel avec celui de la semaine précédente (si disponible dans git log).\n\n### Détections\n\n- **Nouveaux skills** : skills ajoutés depuis la dernière mise à jour\n- **Skills modifiés** : skills dont la description a changé\n- **Skills supprimés** : skills qui n'existent plus\n- **Duplications** : skills présents dans plusieurs workspaces\n- **Skills orphelins** : skills sans SKILL.md valide ou sans description\n\n### Fichier de référence\n\nLe registre canonique est `~/.openclaw/skills/REGISTRY.md`.\nSi le cron `skills-registry-update` (dimanche 6h) a tourné avant fleet-health (dimanche 9h), le registre est déjà à jour.\nSinon, le régénérer avec `python3 ~/.openclaw/skills/skills-registry/scripts/update-registry.py`.\n\n---\n\n## Rapport final — Envoi HDE\n\nLe rapport doit être envoyé par email HDE (HTML Design Élégant) à `ls@laurentserre.com` avec pour sujet : `🩺 Fleet Health — <date>`.\n\n### Structure de l'email HDE\n\n```\nSujet : 🩺 Fleet Health — <date>\n\nDesign :\n- Fond clair, carte blanche, bordures subtiles\n- Titres avec emoji de section\n- Tableaux propres pour les données chiffrées\n- Badges de couleur : 🔴 critique / 🟡 attention / 🔵 suggestion / ✅ OK\n\nSections :\n1. Résumé exécutif (2-3 lignes)\n2. Phase 1 — Promotions (tableau)\n3. Phase 2 — Anomalies (classées par sévérité)\n4. Phase 3 — Évolution skills (nouveaux, modifiés, supprimés, orphelins)\n5. Actions recommandées\n```\n\nSauvegarder une copie dans `~/.openclaw/workspace/production/documents/fleet-health/YYYY-MM-DD.md`.\n\nSignature standard : `ClawdIA, assistant digital et dévoué de Laurent`\n\n---\n\n## Règles d'exécution\n\n### Corrections automatiques (safe)\n\nCes corrections sont appliquées sans demander :\n- Nettoyage artefacts de promotion dans MEMORY.md\n- Correction chemins skills obsolètes\n- Extraction contenu infra du HEARTBEAT vers TOOLS.md\n- Déplacement contenu technique de SOUL vers TOOLS.md\n- Fusion de doublons (sections identiques dans plusieurs fichiers)\n\n### Corrections avec signalement (décision humaine)\n\nCes anomalies sont signalées dans le rapport sans être corrigées :\n- Périmètre agent (IDENTITY vs réalité)\n- Rôle CRM / permissions d'écriture\n- Choix de provider ou modèle\n- Règles métier contradictoires entre fichiers\n\n### Contraintes\n\n- **Ne jamais toucher aux fichiers d'un agent occupé** — reporter\n- **Timeout** : 30 min par agent max. Si dépassé, sauvegarder l'état partiel.\n- **Coût token** : prévoir 10-15 min par agent avec > 20 pending.\n- **Pas de secrets** dans les fichiers cibles.\n", "binary": false, "truncated": false}], "subdirs": []}, {"name": "fleet-map", "source": "Global", "path": "skills/fleet-map", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: fleet-map\ndescription: Produce a structured, mindmap-compatible Markdown map of the entire OpenClaw agent fleet (ClawdIA ecosystem). Use when Laurent asks for a \"point sur les agents\", \"cartographie de la flotte\", \"état des lieux des agents\", \"mindmap des agents\", \"infrastructure agentique\", or wants a visual/structural overview of all agents, their roles, skills, interactions, and infrastructure. Also use when Laurent requests an update to the existing fleet map document.\n---\n\n# Fleet Map — Agent Fleet Cartographer\n\nProduce consistent, hierarchical Markdown maps of the ClawdIA agent ecosystem, formatted for mindmap visualization tools (`#` / `##` / `###` / `####` — max 4 levels).\n\n## Quick Start\n\n1. Run `scripts/scan_fleet.py --json` from the skill directory to collect raw fleet data.\n2. Read `references/fleet-schema.md` for the canonical output structure.\n3. Read `references/agent-interactions.md` for known inter-agent pipelines.\n4. Supplement with manual workspace reads where the scanner data is thin.\n5. Write the final mindmap to `production/documents/mindmap-flotte-agents-YYYY-MM-DD.md`.\n\n## Workflow\n\n### Phase 1: Scan\n\n```bash\npython3 scripts/scan_fleet.py --json > /tmp/fleet_scan.json\n```\n\nThe script reads:\n- `~/.openclaw/openclaw.json` — agent config, models, heartbeats, cron, bindings\n- Each agent's workspace — `IDENTITY.md`, `SOUL.md`, skills, projects, memory\n- `~/.openclaw/skills/` — global skills inventory\n\nIf the scan times out on large workspaces, run it with `exec timeout=30`.\n\n### Phase 2: Supplement\n\nCheck the scan output for thin spots:\n- Agents missing identity data → read their `IDENTITY.md` and `SOUL.md` manually\n- Missing interactions → check `TOOLS.md` (main) and `MEMORY.md` for delegation rules\n- Recent agent changes → scan `memory/YYYY-MM-DD.md` files (last 7 days)\n- New pipelines → consult `references/agent-interactions.md` for known patterns\n\n### Phase 3: Build the mindmap\n\nFollow the canonical structure in `references/fleet-schema.md`. Key sections:\n\n1. **Root** — `# 🐾 ClawdIA — Cartographie de la flotte d'agents [DATE]`\n2. **Laurent** — the human pilot, role, preferences\n3. **Main agent** — full capabilities, global skills, channels\n4. **Each specialized agent** — role, model, workspace, heartbeat, missions, rules, skills, interactions\n5. **Pipelines** — inter-agent value chains with data flow\n6. **Infrastructure** — models, heartbeats, Telegram bots, skills inventory\n7. **Governance** — principles, projects, synthesis table\n\n### Phase 4: Deliver\n\nWrite to `production/documents/mindmap-flotte-agents-YYYY-MM-DD.md` in the main workspace, then attach the file to the conversation with:\n\n```\nMEDIA:/Users/clawdia/.openclaw/workspace/production/documents/mindmap-flotte-agents-[DATE].md\n```\n\n## Format Constraints\n\n- **Max 4 heading levels**: `#` through `####`. Mindmap tools choke on deeper nesting.\n- **One key fact per leaf**: compress information, don't narrate.\n- **Emoji anchors**: Every `##` agent node gets an emoji. Use the agent's IDENTITY.md emoji if available.\n- **Interactions as a dedicated section**: Don't bury interaction info inside agent nodes. Collect it in the Pipelines and agent Interaction subsections.\n- **Date all outputs**: The title includes the scan date.\n- **Language**: French throughout (ecosystem language).\n\n## Agent Roster Validation\n\nBefore writing, verify against this canonical roster (from `TOOLS.md` and `openclaw.json`):\n\n| Agent ID | Expected Role |\n|---|---|\n| `main` / ClawdIA | Orchestrateur général |\n| `executive-assistant` | Briefings, CRM, emails, agenda |\n| `crm-manager` | Bibliothécaire CRM canonique |\n| `copywriter-publisher` | Articles blog, posts LinkedIn |\n| `site-maintainer` | SEO Master, déploiement site |\n| `video-montage` | Montage vidéo, YouTube |\n| `prospector` | Prospection LinkedIn précision |\n| `target-hunter` | Ciblage et scoring entreprises |\n| `sales-coach` | Coach de vente généraliste |\n| `mcb` | Mon Coach Brico |\n| `flora-assistante-bot` | Audition Conseil 66 |\n| `construct` | Architecte marque LSD Agents |\n| `workspace-cleaner` | Nettoyage workspaces |\n\nFlag any mismatch between config and expected roster.\n\n## Edge Cases\n\n- **New agent not in roster**: Include it, note \"⚠️ nouveau\" in its section.\n- **Agent without workspace**: Note path as \"⚠️ workspace non trouvé\", use config data only.\n- **Agent with broken Telegram**: Check session model override (`session_status`), note diagnostic in a comment.\n- **Multi-model agent**: Show `primary` prominently, list fallbacks as `#### Fallbacks : [list]`.\n- **No recent memory files**: Flag as \"⚠️ mémoire locale absente\" for that agent.\n\n## Iteration\n\nAfter producing a map, ask Laurent if he wants:\n- A deeper zoom on a specific agent or pipeline\n- A diff from the previous map (what changed)\n- A correction pass on any section\n\nAlways keep the output file — it becomes the reference for the next scan diff.\n", "binary": false, "truncated": false}], "subdirs": [{"name": "references", "files": [{"name": "agent-interactions.md", "is_md": true, "content": "# Agent Interaction Patterns\n\nThis document captures known inter-agent communication patterns in Laurent's fleet. Use it to correctly wire the pipeline sections of the fleet mindmap.\n\n## Core Patterns\n\n### Pipeline Prospection\n```\nTarget Hunter → scoring + enrichissement → Prospector → messages LinkedIn → Copywriter Publisher\n```\n- **Data**: JSON target files with priority scoring\n- **Trigger**: Laurent requests geographic/sector target list\n\n### Pipeline Contenu\n```\nLaurent (brief) → Copywriter Publisher → article + visuel → email validation Laurent → publication site → Site Maintainer (SEO)\n```\n- **Data**: Article draft, illustrations, publish-ok signal\n- **Trigger**: Article brief from Laurent or cron job\n\n### Pipeline Vidéo\n```\nSource (Descript/Drive) → Video Montage → upload YouTube → notifie Site Maintainer → intégration site → notifie Copywriter (post LinkedIn)\n```\n- **Data**: videoId, titre, type, client\n- **Trigger**: New testimonial recording available\n\n### Pipeline Coaching\n```\nAppel client → MCB / Flora / Sales Coach → analyse → rapport → dashboard (GitHub → Vercel) → feedback client\n```\n- **Data**: Call recordings, transcriptions, coaching reports\n- **Trigger**: Email with call recording\n\n### Pipeline CRM\n```\nSignal client (email, Tel, LinkedIn) → ClawdIA → CRM Manager → fiche CRM → Executive Assistant → briefing Laurent\n```\n- **Data**: Client signal → structured CRM record\n- **Trigger**: Any incoming client signal\n\n### Pipeline Marque (LSD Agents)\n```\nConstruct → brief stratégique → Copywriter Publisher (contenu) + Site Maintainer (déploiement) → site LSD Agents\n```\n- **Data**: Brand assets, content briefs, deployment specs\n- **Trigger**: Laurent direction on LSD Agents brand\n\n## Delegation Rules\n\n1. **Copywriting/publishing** → toujours déléguer à `workspace-copywriter-publisher`\n2. **Montage vidéo** → toujours déléguer à `video-montage`\n3. **SEO/Site** → toujours déléguer à `site-maintainer`\n4. **Prospection LinkedIn** → `target-hunter` puis `prospector`\n5. **Analyse d'appels** → `sales-coach` (généraliste) ou `mcb` / `flora-assistante-bot` (spécifiques)\n\n## Communication Channels\n\n### Telegram Bots\n- `@CRM_lolo_bot` → CRM Manager\n- `@seo_lolo_bot` → Site Maintainer\n- `@sales_coach_lolo_bot` → Sales Coach\n\n### Direct Telegram\n- Laurent → ClawdIA (main) via chat 8621395693\n\n### Email\n- `ls@laurentserre.com` — Laurent's self-address (delivery allowed without confirmation)\n- MCB alias → MCB agent\n- Flora bot → Flora Assistante Bot\n\n### Cross-session (interne OpenClaw)\n- `sessions_send` for agent-to-agent communication\n- `sessions_spawn` for sub-agent creation\n\n## Detection Heuristics\n\nWhen scanning for interactions, check:\n1. `TOOLS.md` in main workspace — lists delegation rules\n2. Agent SOUL.md files — often mention \"Je délègue...\" or \"Je briefe...\"\n3. `MEMORY.md` — captures recent pipeline validations\n4. Memory files — may document new interaction patterns\n", "binary": false, "truncated": false}, {"name": "fleet-schema.md", "is_md": true, "content": "# Fleet Map Output Schema\n\nThis document defines the canonical structure of a Fleet Mindmap markdown file. Every scan should produce a file that respects this hierarchy.\n\n## Format Rules\n\n- Use `#` / `##` / `###` / `####` heading levels for mindmap compatibility.\n- Max 4 levels of nesting (mindmap tools flatten beyond that).\n- Each `##` node is a top-level branch.\n- Keep leaf nodes concise — one key fact per `###` or `####` line.\n- Emojis are allowed and encouraged as visual anchors.\n\n## Canonical Structure\n\n```\n# 🐾 ClawdIA — Cartographie de la flotte d'agents [DATE]\n## 👤 Laurent Serre — Le pilote humain\n### [Rôle principal]\n### [Positionnement]\n### [Interface principale avec les agents]\n### [Préférences de collaboration clés]\n## 🧠 ClawdIA — Agent principal (main)\n### Rôle : Orchestrateur général\n### Modèle : [primary] ([fallbacks])\n### Skills globaux détenus (level 4)\n#### [skill1]\n#### [skill2]\n### Skills locaux\n#### [local-skill1]\n### Responsabilités transverses\n#### [responsabilité1]\n#### [responsabilité2]\n### Canaux\n#### Telegram (principal)\n#### Email\n## [Agent Emoji] [Agent Name]\n### Rôle : [One-liner]\n### Modèle : [model]\n### Workspace : [path]\n### Heartbeat : [interval/frequency]\n### Canal Telegram : [@handle]\n### Missions\n#### [mission1]\n#### [mission2]\n### Règles\n#### [rule1]\n#### [rule2]\n### Skills locaux\n#### [skill1]\n### Interaction\n#### [interaction avec autre agent]\n#### [reçoit de / envoie à]\n## 🔄 Pipelines inter-agents\n### Pipeline [Nom]\n#### [Agent A] → [Action] → [Agent B] → [Action] → [Agent C]\n#### [Donnée échangée]\n### Pipeline [Nom]\n#### ...\n## 🧰 Infrastructure technique\n### Modèles disponibles\n#### [modèle] (rôle — utilisé par [agents])\n### Heartbeats actifs\n#### [Agent] : [interval] ([heures actives])\n### Canaux Telegram\n#### @[handle] → [Agent]\n### Skills globaux\n#### [skill] — [description courte]\n### Skills locaux (par agent)\n#### [skill] → [Agent propriétaire]\n## 📐 Gouvernance & architecture\n### Principes fondateurs\n#### [principe1]\n#### [principe2]\n### Projets actifs\n#### [projet1] ([agents impliqués])\n### Abandonné\n#### [projet]\n## 📊 Synthèse\n### Modèle [X] ([N] agents)\n#### [Agent1] — [Rôle]\n#### [Agent2] — [Rôle]\n### Agents avec heartbeat\n#### [Agent] : [interval]\n### Agents avec canal Telegram dédié\n#### [Agent] (@[handle])\n```\n\n## Data Sources (in priority order)\n\n1. `openclaw.json` → agents list, models, heartbeats, cron, bindings, channels\n2. Each agent's `IDENTITY.md` → role, vibe, emoji, creature\n3. Each agent's `SOUL.md` → detailed mission, rules, tone\n4. Each agent's `TOOLS.md` → local skills, interactions, notes\n5. `~/.openclaw/skills/` → global skills inventory\n6. Each agent's `workspace-*/skills/` → local skills inventory\n7. `MEMORY.md` → known pipeline interactions between agents\n8. Memory files `memory/YYYY-MM-DD.md` → recent agent changes, project updates\n\n## Interaction Detection\n\nKnown interaction patterns to check for (from AGENTS.md / MEMORY.md):\n- Target Hunter → Prospector (enriched targets)\n- Prospector → Copywriter (personalized messages)\n- Video Montage → Site Maintainer (YouTube uploads → site embedding)\n- Site Maintainer → Copywriter (SEO signals → LinkedIn posts)\n- CRM Manager → Executive Assistant (client signals → briefings)\n- Construct → Copywriter + Site Maintainer (brand briefs → execution)\n- MCB / Flora → Sales Coach (appel corpus sharing)\n- ClawdIA → all agents (orchestration, diagnostics)\n\n## Output Variation Rules\n\n- If an agent section is new or lacks data, note \"⚠️ à compléter\" rather than fabricating.\n- If the date in the title is today, generate fresh. If reusing, update the date.\n- Keep the governance section stable (principles change slowly).\n- Update the synthesis section on every scan to reflect current model distribution.\n", "binary": false, "truncated": false}], "subdirs": []}, {"name": "scripts", "files": [{"name": "scan_fleet.py", "is_md": false, "content": "#!/usr/bin/env python3\n\"\"\"\nFleet scanner — gather raw agent infrastructure data from the OpenClaw config and workspaces.\n\nUsage:\n  python3 scan_fleet.py [--openclaw-dir ~/.openclaw] [--json]\n\nOutput:\n  JSON blob on stdout with keys:\n    - agents: list of agent records (id, name, model, workspace, agentDir, heartbeat, cron, bindings)\n    - channels: channel config summary (Telegram bots, etc.)\n    - global_skills: list of skills in ~/.openclaw/skills/\n    - defaults: agent defaults (primary model, fallbacks, image gen model)\n    - summary: counts, model distribution, heartbeat agents, cron agents\n\nErrors go to stderr so you can still pipe stdout to jq or a file.\n\"\"\"\n\nimport json, os, sys, re\nfrom pathlib import Path\n\n\ndef safe_read_json(path):\n    try:\n        with open(path) as f:\n            return json.load(f)\n    except Exception as e:\n        print(f\"[WARN] Cannot read {path}: {e}\", file=sys.stderr)\n        return None\n\n\ndef scan_workspace(ws_path):\n    \"\"\"Read the key identity files from a workspace directory.\"\"\"\n    info = {}\n    ws = Path(ws_path)\n    if not ws.is_dir():\n        return info\n    for fname in [\"IDENTITY.md\", \"SOUL.md\"]:\n        fp = ws / fname\n        if fp.is_file():\n            # Extract first few lines for a quick signature\n            lines = fp.read_text().split(\"\\n\")\n            info[fname.replace(\".md\", \"\").lower()] = \"\\n\".join(lines[:20])\n    # Check for local skills\n    local_skills = []\n    skills_dir = ws / \"skills\"\n    if skills_dir.is_dir():\n        local_skills = [d.name for d in skills_dir.iterdir() if d.is_dir()]\n    info[\"local_skills\"] = local_skills\n\n    # Check for memory files\n    memory_dir = ws / \"memory\"\n    if memory_dir.is_dir():\n        info[\"memory_files\"] = sorted([f.name for f in memory_dir.glob(\"*.md\")])[-10:]\n        info[\"memory_count\"] = len(list(memory_dir.glob(\"*.md\")))\n\n    # Check for projects\n    projects_dir = ws / \"projects\"\n    if projects_dir.is_dir():\n        info[\"projects\"] = [d.name for d in projects_dir.iterdir() if d.is_dir()]\n\n    return info\n\n\ndef extract_identity_lines(text_blob):\n    \"\"\"Extract key identity lines: name, creature, vibe, emoji.\"\"\"\n    lines = {}\n    for line in text_blob.split(\"\\n\"):\n        line = line.strip()\n        if line.startswith(\"- **Name:**\") or line.startswith(\"- **Nom :**\"):\n            lines[\"name\"] = line.split(\"**\", 3)[-1].strip() if \"**\" in line else line\n        if line.startswith(\"- **Rôle:**\") or line.startswith(\"- **Rôle :**\"):\n            lines[\"role\"] = line.split(\"**\", 3)[-1].strip() if \"**\" in line else line\n        if line.startswith(\"- **Mission:**\") or line.startswith(\"- **Mission :**\"):\n            lines[\"mission\"] = line.split(\"**\", 3)[-1].strip() if \"**\" in line else line\n        if line.startswith(\"- **Vibe:**\") or line.startswith(\"- **Vibe :**\"):\n            lines[\"vibe\"] = line.split(\"**\", 3)[-1].strip() if \"**\" in line else line\n        if line.startswith(\"- **Emoji:**\") or line.startswith(\"- **Emoji :**\"):\n            lines[\"emoji\"] = line.split(\"**\", 3)[-1].strip() if \"**\" in line else line\n        if line.startswith(\"- **Agent ID:**\"):\n            lines[\"agent_id\"] = line.split(\"**\", 3)[-1].strip().strip(\"`\") if \"**\" in line else line\n        if line.startswith(\"- **Telegram:**\"):\n            lines[\"telegram\"] = line.split(\"**\", 3)[-1].strip().strip(\"`\") if \"**\" in line else line\n        if line.startswith(\"- **Creature:**\"):\n            lines[\"creature\"] = line.split(\"**\", 3)[-1].strip() if \"**\" in line else line\n        if line.startswith(\"- **Compétences clés:**\") or line.startswith(\"- **Compétences clés :**\"):\n            lines[\"competences\"] = []\n    return lines\n\n\ndef scan_global_skills(skills_dir):\n    \"\"\"List global skills (level 4).\"\"\"\n    sd = Path(skills_dir)\n    if not sd.is_dir():\n        return []\n    skills = []\n    for d in sorted(sd.iterdir()):\n        if d.is_dir() and (d / \"SKILL.md\").is_file():\n            skills.append(d.name)\n    return skills\n\n\ndef main():\n    base = Path(os.environ.get(\"HOME\", str(Path.home()))) / \".openclaw\"\n    base_str = os.environ.get(\"OPENCLAW_DIR\", str(base))\n    base = Path(base_str)\n\n    config_path = base / \"openclaw.json\"\n    config = safe_read_json(config_path)\n    if not config:\n        print(\"FATAL: cannot read openclaw.json\", file=sys.stderr)\n        sys.exit(1)\n\n    agents_section = config.get(\"agents\", {})\n    defaults = agents_section.get(\"defaults\", {})\n    agent_list = agents_section.get(\"list\", [])\n    bindings_global = config.get(\"bindings\", {})\n    channels = config.get(\"channels\", {})\n\n    # Build agent records\n    agents = []\n    for a in agent_list:\n        aid = a.get(\"id\", \"?\")\n        ws = a.get(\"workspace\")\n        agent_dir = a.get(\"agentDir\")\n        model = a.get(\"model\", {})\n        model_primary = model.get(\"primary\", \"default\") if isinstance(model, dict) else str(model)\n        model_fallbacks = model.get(\"fallbacks\", []) if isinstance(model, dict) else []\n\n        hb = a.get(\"heartbeat\")\n        heartbeat = None\n        if hb:\n            ah = hb.get(\"activeHours\", {})\n            heartbeat = {\n                \"every\": hb.get(\"every\"),\n                \"start\": ah.get(\"start\"),\n                \"end\": ah.get(\"end\"),\n                \"timezone\": ah.get(\"timezone\"),\n                \"timeout\": hb.get(\"timeoutSeconds\"),\n            }\n\n        cron_cfg = a.get(\"cron\")\n        cron_jobs = []\n        if cron_cfg:\n            for j in cron_cfg.get(\"jobs\", []):\n                cron_jobs.append({\n                    \"schedule\": j.get(\"schedule\"),\n                    \"label\": j.get(\"label\"),\n                    \"timeout\": j.get(\"timeoutSeconds\"),\n                })\n\n        bindings = a.get(\"bindings\", {})\n\n        # Workspace scan\n        ws_info = {}\n        if ws:\n            ws_info = scan_workspace(ws)\n\n        # Extract identity\n        identity_raw = ws_info.get(\"identity\", \"\")\n        extracted = extract_identity_lines(identity_raw)\n\n        agents.append({\n            \"id\": aid,\n            \"name\": a.get(\"name\", \"\"),\n            \"model_primary\": model_primary,\n            \"model_fallbacks\": model_fallbacks,\n            \"workspace\": ws,\n            \"agent_dir\": agent_dir,\n            \"heartbeat\": heartbeat,\n            \"cron_jobs\": cron_jobs,\n            \"bindings\": list(bindings.keys()),\n            \"identity\": extracted,\n            \"ws_info\": {\n                \"local_skills\": ws_info.get(\"local_skills\", []),\n                \"memory_count\": ws_info.get(\"memory_count\", 0),\n                \"memory_files\": ws_info.get(\"memory_files\", []),\n                \"projects\": ws_info.get(\"projects\", []),\n            },\n        })\n\n    # Global skills (level 4)\n    global_skills = scan_global_skills(base / \"skills\")\n\n    # Channel summary\n    channel_summary = {}\n    for ch_name, ch_cfg in channels.items():\n        if isinstance(ch_cfg, dict):\n            channel_summary[ch_name] = {\n                \"provider\": ch_cfg.get(\"provider\"),\n                \"accounts\": list(ch_cfg.get(\"accounts\", {}).keys()) if ch_cfg.get(\"accounts\") else [],\n            }\n\n    # Model defaults\n    default_model = defaults.get(\"model\", {})\n    image_model = defaults.get(\"imageGenerationModel\", {})\n    model_list = defaults.get(\"models\", {})\n\n    # Summary\n    summary = {\n        \"total_agents\": len(agents),\n        \"agents_with_heartbeat\": [a[\"id\"] for a in agents if a[\"heartbeat\"]],\n        \"agents_with_cron\": [a[\"id\"] for a in agents if a[\"cron_jobs\"]],\n        \"models_in_use\": list(set(a[\"model_primary\"] for a in agents)),\n        \"global_skills_count\": len(global_skills),\n        \"workspaces_found\": len([a for a in agents if a[\"workspace\"]]),\n    }\n\n    output = {\n        \"scan_date\": __import__('datetime').datetime.now().isoformat(),\n        \"scan_base\": str(base),\n        \"summary\": summary,\n        \"defaults\": {\n            \"model_primary\": default_model.get(\"primary\"),\n            \"model_fallbacks\": default_model.get(\"fallbacks\", []),\n            \"image_gen_model\": image_model.get(\"primary\"),\n            \"image_gen_fallbacks\": image_model.get(\"fallbacks\", []),\n            \"available_models\": list(model_list.keys()),\n        },\n        \"agents\": agents,\n        \"channels\": channel_summary,\n        \"global_skills\": global_skills,\n    }\n\n    if \"--json\" in sys.argv:\n        print(json.dumps(output, indent=2, ensure_ascii=False))\n    else:\n        print(json.dumps(output, indent=2, ensure_ascii=False, default=str))\n\n\nif __name__ == \"__main__\":\n    main()\n", "binary": false, "truncated": false}], "subdirs": []}]}, {"name": "google-gemini-tts", "source": "Global", "path": "skills/google-gemini-tts", "files": [{"name": "README.md", "is_md": true, "content": "# gemini-tts\n\nClawHub-ready packaging for a Gemini text-to-speech skill.\n\nDefault target: Gemini 3.1 Flash TTS Preview.\nBackward compatibility: Gemini 2.5 Flash Preview TTS and Gemini 2.5 Pro Preview TTS still work when passed with `-m`.\n\n## What is in the bundle\n\n- `SKILL.md`: publishable skill definition\n- `scripts/gemini_tts.sh`: runnable shell wrapper for the Gemini REST API\n- `.clawhubignore`: excludes generated artifacts from the bundle\n\n## Why the new default matters\n\nGemini 3.1 Flash TTS Preview is the right default now because it combines:\n\n- low-latency speech generation\n- stronger naturalness\n- expressive audio tags\n- multilingual output\n- single-speaker and two-speaker generation in one simple workflow\n\nThis makes the skill more than a plain narrator. It is good for agents that need controllable voice output, not just generic TTS.\n\n## Prompting nuance\n\n- audio tags like `[short pause]` and `[whisper]` work best inside a structured transcript or a clear instruction block\n- a bare tag-heavy prompt without enough framing can return no audio\n- practical takeaway: wrap tags in a real narration prompt, not just a pile of modifiers\n\n## Tested prompt patterns that worked\n\nSingle speaker:\n\n```text\nSay in a spooky voice:\n\"By the pricking of my thumbs... [short pause]\n[whisper] Something wicked this way comes\"\n```\n\nMulti-speaker:\n\n```text\nMake Speaker1 sound tired and bored, and Speaker2 sound excited and happy:\n\nSpeaker1: So... [yawn] what's on the agenda today?\nSpeaker2: You're never going to guess!\n```\n\n## What agents can do with this\n\nThis model is especially useful when agents need to deliver output with intent.\n\nExamples:\n\n- Voice replies in chat: an agent can answer with a short spoken memo instead of plain text\n- Daily briefings: a research agent can turn its morning findings into a narrated update\n- Newsletter voice preview: a content agent can turn a written summary into a quick audio rundown\n- Social content drafts: a marketing agent can generate spoken hooks, trailers, or teaser clips\n- Podcast-style synthesis: two-agent conversations can become clean host and guest audio\n- Demo agents: product agents can narrate walkthroughs, onboarding, or feature explanations\n- Emotional delivery: agents can add pauses, whispers, excitement, boredom, or emphasis where it helps the message land\n\nThe main unlock is controllability. You are not just picking a voice. You are giving the agent delivery instructions.\n\n## Usage examples\n\nDefault model:\n\n```bash\nscripts/gemini_tts.sh \"Hello, welcome to the show!\"\n```\n\nPick a voice:\n\n```bash\nscripts/gemini_tts.sh -v Puck \"This is Puck speaking.\"\n```\n\nAdd style guidance:\n\n```bash\nscripts/gemini_tts.sh -s \"Say in a warm, calm tone:\" \"Take a deep breath.\"\n```\n\nUse explicit audio tags in the transcript:\n\n```bash\nscripts/gemini_tts.sh -o /tmp/tagged.wav 'Say in a spooky voice:\n\"By the pricking of my thumbs... [short pause]\n[whisper] Something wicked this way comes\"'\n```\n\nTwo-speaker audio:\n\n```bash\nscripts/gemini_tts.sh --multi \"Host:Kore,Guest:Puck\" \\\n  \"Host: Welcome to the podcast! Guest: Thanks for having me.\"\n```\n\nFallback model selection:\n\n```bash\nscripts/gemini_tts.sh -m gemini-2.5-pro-preview-tts \"Long-form narration example\"\n```\n\n## Requirements\n\nDeclared in `SKILL.md` under `metadata.openclaw.requires` — `GEMINI_API_KEY` (or `GOOGLE_API_KEY` as an alias), plus `curl`, `jq`, `base64`, and `ffmpeg` on the host.\n\n## Suggested publish flow\n\n1. Review `SKILL.md`\n2. Confirm the version number\n3. Submit the folder through the ClawHub publisher\n4. After publish, smoke test with a real API key\n", "binary": false, "truncated": false}, {"name": "SKILL.md", "is_md": true, "content": "---\nname: google-gemini-tts\ndescription: \"Generate spoken audio from text using Google's Gemini TTS models (default is Gemini 3.1 Flash TTS Preview, with fallback to Gemini 2.5 Flash/Pro preview TTS). Use when an agent needs to convert text to speech, produce voice replies, narrate briefings or newsletters, create podcast-style two-speaker conversations, generate audio with expressive style control (whispers, pauses, accents, emotion), or output WAV files for voice-enabled workflows. Supports 30 prebuilt voices, 70+ languages, single and multi-speaker modes, and natural-language style prompts. Requires a GEMINI_API_KEY from Google AI Studio (the script also accepts GOOGLE_API_KEY as an alternative name for the same key).\"\nversion: 1.0.3\nauthor: Shubham Saboo\ncompatibility: Requires curl, jq, base64, ffmpeg, and a GEMINI_API_KEY from Google AI Studio. Preview model names may change as Google promotes them to GA.\nmetadata:\n  openclaw:\n    emoji: \"🔊\"\n    homepage: https://ai.google.dev/gemini-api/docs/speech-generation\n    requires:\n      env:\n        - GEMINI_API_KEY\n      bins:\n        - curl\n        - jq\n        - base64\n        - ffmpeg\n    primaryEnv: GEMINI_API_KEY\n---\n\n# Gemini TTS\n\nGenerate speech audio from text using Gemini TTS models. The default is Gemini 3.1 Flash TTS Preview, and the script still supports Gemini 2.5 preview TTS models when you pass `-m`.\n\n## What this skill does\n\n- Single-speaker text to speech\n- Two-speaker podcast-style audio\n- Style control with natural language prompts\n- WAV output that can be sent directly in chat or used in apps\n\n## Files\n\n- `scripts/gemini_tts.sh`: CLI wrapper around the Gemini REST API\n\n## Quick start\n\n```bash\n# Show all options\nscripts/gemini_tts.sh --help\n\n# Single speaker, default voice (Kore)\nscripts/gemini_tts.sh \"Hello, welcome to the show!\"\n\n# Pick a voice\nscripts/gemini_tts.sh -v Puck \"This is Puck speaking.\"\n\n# With style control\nscripts/gemini_tts.sh -s \"Say in a warm, calm tone:\" \"Take a deep breath.\"\n\n# Save to a specific file\nscripts/gemini_tts.sh -o /tmp/greeting.wav \"Hey there!\"\n\n# Multi-speaker conversation\nscripts/gemini_tts.sh --multi \"Host:Kore,Guest:Puck\" \\\n  \"Host: Welcome to the podcast! Guest: Thanks for having me.\"\n```\n\nThe script prints the output WAV file path.\n\n## Models\n\n| Model | Best for |\n|---|---|\n| `gemini-3.1-flash-tts-preview` (default) | Best default now: low-latency, natural output, expressive narration |\n| `gemini-2.5-flash-preview-tts` | Backward-compatible fast preview model |\n| `gemini-2.5-pro-preview-tts` | Long-form narration and higher-end creative work |\n\nCurrent note: Gemini 3.1 Flash TTS Preview is live and should be the default path for this skill. Gemini 2.5 preview TTS models remain useful as compatibility fallbacks.\n\n> **Preview model note:** `gemini-3.1-flash-tts-preview` is a preview model. If Google renames or retires it, pass `-m gemini-2.5-flash-preview-tts` as a fallback, or check the [current model list](https://ai.google.dev/gemini-api/docs/models).\n\nSwitch model examples:\n\n```bash\nscripts/gemini_tts.sh -m gemini-2.5-pro-preview-tts \"Your text here\"\nscripts/gemini_tts.sh -m gemini-2.5-flash-preview-tts \"Your text here\"\n```\n\n## Voices\n\nAvailable prebuilt voices:\n\n`Zephyr`, `Puck`, `Charon`, `Kore`, `Fenrir`, `Leda`, `Orus`, `Aoede`, `Callirrhoe`, `Autonoe`, `Enceladus`, `Iapetus`, `Umbriel`, `Algieba`, `Despina`, `Erinome`, `Gacrux`, `Pulcherrima`, `Achird`, `Zubenelgenubi`, `Vindemiatrix`, `Sadachbia`, `Sadaltager`, `Sulafat`, `Laomedeia`, `Achernar`, `Schedar`, `Rasalgethi`, `Nashira`, `Enif`\n\nThe same 30-voice library is shared between `gemini-3.1-flash-tts-preview` and the `gemini-2.5-flash-preview-tts` / `gemini-2.5-pro-preview-tts` fallbacks, so a voice you pick for the default model will still work if you drop back to a fallback via `-m`.\n\n## Style control\n\nGemini 3.1 Flash TTS reads plain transcripts naturally, but gives you two complementary ways to steer the delivery when you want more control.\n\n### Inline audio tags\n\nDrop bracketed directions into the transcript. They modify what follows, can appear anywhere, and can stack or repeat across a single script:\n\n```text\n[excitedly] Massive update today — [whispers] but keep it between us. [laughs]\n```\n\nTags are open-ended; anything in `[ ]` is treated as a direction to the model. A useful starting set:\n\n- **Emotion** — `[excitedly]`, `[bored]`, `[reluctantly]`, `[amazed]`, `[curious]`, `[mischievously]`, `[panicked]`, `[sarcastic]`, `[serious]`, `[tired]`, `[trembling]`\n- **Pace and volume** — `[very fast]`, `[very slowly]`, `[asmr]`, `[deep and loud shouting]`, `[whispers]`\n- **Non-verbal** — `[gasp]`, `[giggles]`, `[sighs]`, `[snorts]`, `[cough]`, `[laughs]`, `[crying]`\n- **Character / style** — `[like dracula]`, `[like a dog]`, `[singing]`, `[sarcastically, one painfully slow word at a time]`\n\n### Structured context prompt\n\nFor longer pieces where you want a consistent persona, prepend an `AUDIO PROFILE / SCENE / DIRECTOR'S NOTES / TRANSCRIPT` block. The four headers are load-bearing — the model uses them to separate performance context from the script it should actually speak:\n\n```text\n# AUDIO PROFILE: Jaz, London morning-show radio DJ\n\n## THE SCENE: 10 PM, neon-lit studio, \"ON AIR\" tally blazing.\nJaz is bouncing on their heels, hands on the faders, infectious energy.\n\n### DIRECTOR'S NOTES\nStyle: vocal smile always audible; punchy consonants; elongated vowels on excitement words.\nAccent: Brixton, London.\nPace: energetic, bouncing cadence, no dead air.\n\n#### TRANSCRIPT\n[excitedly] Yes, massive vibes in the studio! [shouting] Turn it up!\n```\n\nInline tags inside `#### TRANSCRIPT` override the baseline direction when you want a specific beat.\n\n### Tips\n\n- Keep the script and direction coherent — the speaker, what is said, and how it is said should agree.\n- Don't overspecify. Give the model space to fill gaps; it reads better.\n- A simple preamble (\"Say cheerfully: ...\") still works for quick one-offs, but inline tags give you per-phrase control and structured prompts give you persona consistency.\n\nFull prompting reference: [Gemini speech-generation docs](https://ai.google.dev/gemini-api/docs/speech-generation).\n\n## Multi-speaker\n\nUp to 2 speakers. Use `--multi \"Name1:Voice1,Name2:Voice2\"` and make sure the speaker names in the text match.\n\n## Supported languages\n\n70+ languages are supported, including Arabic, Bengali, Chinese, English, French, German, Hindi, Indonesian, Italian, Japanese, Korean, Portuguese, Russian, Spanish, Turkish, Ukrainian, Urdu, Vietnamese, and many more. See the [Gemini speech-generation docs](https://ai.google.dev/gemini-api/docs/speech-generation) for the full locale list.\n\n## Limitations\n\n- Audio output only\n- Maximum 2 speakers in multi-speaker mode\n- Preview model names may change\n- No SSML support\n- No custom voice cloning\n\n## Verification\n\nBasic smoke test once your API key is set:\n\n```bash\nexport GEMINI_API_KEY=your_key_here   # GOOGLE_API_KEY is also accepted\nscripts/gemini_tts.sh -o /tmp/gemini-test.wav \"This is a Gemini TTS smoke test.\"\nfile /tmp/gemini-test.wav\n```\n\nExpected result: a playable WAV file is created (24 kHz mono, 16-bit PCM WAV).\n", "binary": false, "truncated": false}, {"name": "_meta.json", "is_md": false, "content": "{\n  \"ownerId\": \"kn7fhx3kpfzzdvb7hg46n42ea5831wxb\",\n  \"slug\": \"google-gemini-tts\",\n  \"version\": \"1.0.3\",\n  \"publishedAt\": 1776297867800\n}", "binary": false, "truncated": false}], "subdirs": [{"name": "scripts", "files": [{"name": "gemini_tts.sh", "is_md": false, "content": "#!/usr/bin/env bash\n# gemini_tts.sh — Gemini TTS via REST API\n# Usage: gemini_tts.sh [options] \"text to speak\"\n#\n# Options:\n#   -v, --voice VOICE     Voice name (default: Kore)\n#   -m, --model MODEL     TTS model (default: gemini-3.1-flash-tts-preview)\n#   -o, --output FILE     Output file path (default: /tmp/gemini-tts-<timestamp>.wav)\n#   -s, --style STYLE     Style/mood prompt prefix (e.g. \"Say cheerfully:\")\n#   --multi SPEC          Multi-speaker: \"Speaker1:Voice1,Speaker2:Voice2\"\n#   -h, --help            Show this help\n#\n# Auth: GEMINI_API_KEY env var (GOOGLE_API_KEY is also accepted as an alternative name).\n#       Get one at https://aistudio.google.com/apikey. No ambient cloud credentials are used.\n# Env:  GEMINI_API_VERSION (default: v1beta) — override when the endpoint is promoted to v1\n# Requires: curl, jq, base64, ffmpeg (for PCM→WAV conversion)\n\nset -euo pipefail\n\n# --- defaults ---\nVOICE=\"Kore\"\nMODEL=\"gemini-3.1-flash-tts-preview\"\nOUTPUT=\"\"\nSTYLE=\"\"\nMULTI=\"\"\nTEXT=\"\"\n\nusage() {\n  sed -n '2,/^$/s/^# //p' \"$0\"\n  exit 0\n}\n\ndie() { echo \"ERROR: $*\" >&2; exit 1; }\n\n# --- parse args ---\nwhile [[ $# -gt 0 ]]; do\n  case \"$1\" in\n    -v|--voice)  VOICE=\"$2\";  shift 2 ;;\n    -m|--model)  MODEL=\"$2\";  shift 2 ;;\n    -o|--output) OUTPUT=\"$2\"; shift 2 ;;\n    -s|--style)  STYLE=\"$2\";  shift 2 ;;\n    --multi)     MULTI=\"$2\";  shift 2 ;;\n    -h|--help)   usage ;;\n    --)          shift; TEXT=\"$*\"; break ;;\n    -*)          die \"Unknown option: $1\" ;;\n    *)           TEXT=\"$*\"; break ;;\n  esac\ndone\n\n[[ -z \"$TEXT\" ]] && die \"No text provided. Usage: gemini_tts.sh [options] \\\"text\\\"\"\n\n# --- auth check ---\nif [[ -z \"${GEMINI_API_KEY:-}\" && -n \"${GOOGLE_API_KEY:-}\" ]]; then\n  GEMINI_API_KEY=\"$GOOGLE_API_KEY\"\nfi\n\nif [[ -z \"${GEMINI_API_KEY:-}\" ]]; then\n  die \"GEMINI_API_KEY is not set. Get one at https://aistudio.google.com/apikey (GOOGLE_API_KEY is also accepted).\"\nfi\n\n# --- deps check ---\nfor cmd in curl jq base64 ffmpeg; do\n  command -v \"$cmd\" &>/dev/null || die \"Required command not found: $cmd\"\ndone\n\n# --- output path ---\nif [[ -z \"$OUTPUT\" ]]; then\n  OUTPUT=\"/tmp/gemini-tts-$(date +%s).wav\"\nfi\n\n# Ensure output dir exists\nmkdir -p \"$(dirname \"$OUTPUT\")\"\n\n# --- build prompt ---\nPROMPT=\"$TEXT\"\nif [[ -n \"$STYLE\" ]]; then\n  PROMPT=\"${STYLE} ${TEXT}\"\nfi\n\n# --- build speech config ---\nif [[ -n \"$MULTI\" ]]; then\n  # Multi-speaker mode: parse \"Speaker1:Voice1,Speaker2:Voice2\"\n  SPEAKER_CONFIGS=\"[]\"\n  IFS=',' read -ra PAIRS <<< \"$MULTI\"\n  for pair in \"${PAIRS[@]}\"; do\n    IFS=':' read -r spk vce <<< \"$pair\"\n    spk=\"$(echo \"$spk\" | xargs)\"\n    vce=\"$(echo \"$vce\" | xargs)\"\n    [[ -z \"$spk\" || -z \"$vce\" ]] && die \"Invalid multi-speaker format. Use: Speaker1:Voice1,Speaker2:Voice2\"\n    SPEAKER_CONFIGS=$(echo \"$SPEAKER_CONFIGS\" | jq --arg s \"$spk\" --arg v \"$vce\" \\\n      '. + [{\"speaker\": $s, \"voiceConfig\": {\"prebuiltVoiceConfig\": {\"voiceName\": $v}}}]')\n  done\n\n  SPEECH_CONFIG=$(jq -n --argjson sc \"$SPEAKER_CONFIGS\" \\\n    '{\"multiSpeakerVoiceConfig\": {\"speakerVoiceConfigs\": $sc}}')\nelse\n  # Single-speaker mode\n  SPEECH_CONFIG=$(jq -n --arg v \"$VOICE\" \\\n    '{\"voiceConfig\": {\"prebuiltVoiceConfig\": {\"voiceName\": $v}}}')\nfi\n\n# --- build request body ---\nBODY=$(jq -n \\\n  --arg model \"$MODEL\" \\\n  --arg text \"$PROMPT\" \\\n  --argjson speech \"$SPEECH_CONFIG\" \\\n  '{\n    \"model\": $model,\n    \"contents\": [{\"parts\": [{\"text\": $text}]}],\n    \"generationConfig\": {\n      \"responseModalities\": [\"AUDIO\"],\n      \"speechConfig\": $speech\n    }\n  }')\n\n# --- API call ---\nTMPDIR_LOCAL=\"${TMPDIR:-/tmp}\"\nWORKDIR=\"$(mktemp -d \"$TMPDIR_LOCAL/gemini-tts.XXXXXX\")\"\nTMPFILE=\"$WORKDIR/response.json\"\nRAW_PCM=\"$WORKDIR/raw.pcm\"\ntrap 'rm -rf \"$WORKDIR\" 2>/dev/null' EXIT\n\nAPI_VERSION=\"${GEMINI_API_VERSION:-v1beta}\"\nAPI_URL=\"https://generativelanguage.googleapis.com/${API_VERSION}/models/${MODEL}:generateContent\"\n\nAUTH_HEADER=\"x-goog-api-key: $GEMINI_API_KEY\"\n\n# Retry on transient failures (5xx, 429). Max 3 attempts, 1s -> 2s -> 4s backoff.\nMAX_ATTEMPTS=3\nBACKOFF=1\nATTEMPT=1\nHTTP_CODE=\"\"\nwhile (( ATTEMPT <= MAX_ATTEMPTS )); do\n  HTTP_CODE=$(curl -s -w \"%{http_code}\" -o \"$TMPFILE\" \\\n    --connect-timeout 10 --max-time 60 \\\n    -X POST \"$API_URL\" \\\n    -H \"Content-Type: application/json\" \\\n    -H \"$AUTH_HEADER\" \\\n    -d \"$BODY\")\n\n  if [[ \"$HTTP_CODE\" == \"200\" ]]; then\n    break\n  fi\n\n  # Retry on 429 and 5xx; fail fast on 4xx (bad auth, malformed request, etc.)\n  if [[ \"$HTTP_CODE\" == \"429\" || \"$HTTP_CODE\" =~ ^5[0-9][0-9]$ ]]; then\n    if (( ATTEMPT < MAX_ATTEMPTS )); then\n      echo \"API error (HTTP $HTTP_CODE), retry ${ATTEMPT}/${MAX_ATTEMPTS} in ${BACKOFF}s...\" >&2\n      sleep \"$BACKOFF\"\n      BACKOFF=$(( BACKOFF * 2 ))\n      ATTEMPT=$(( ATTEMPT + 1 ))\n      continue\n    fi\n  fi\n\n  echo \"API error (HTTP $HTTP_CODE):\" >&2\n  cat \"$TMPFILE\" >&2\n  exit 1\ndone\n\n# --- extract audio ---\nAUDIO_B64=$(jq -r '.candidates[0].content.parts[0].inlineData.data // empty' \"$TMPFILE\")\n[[ -z \"$AUDIO_B64\" ]] && die \"No audio data in response. Response: $(cat \"$TMPFILE\")\"\n\n# Decode base64 to raw PCM\necho \"$AUDIO_B64\" | base64 --decode > \"$RAW_PCM\"\n\n# Convert PCM (s16le, 24kHz, mono) to WAV. Surface ffmpeg failures instead of silently producing a broken file.\nif ! ffmpeg -y -loglevel error \\\n  -f s16le -ar 24000 -ac 1 \\\n  -i \"$RAW_PCM\" \\\n  \"$OUTPUT\"; then\n  die \"ffmpeg conversion failed (raw PCM: $(wc -c < \"$RAW_PCM\") bytes at $RAW_PCM)\"\nfi\n\necho \"$OUTPUT\"\n", "binary": false, "truncated": false}], "subdirs": []}]}, {"name": "linkedin-api", "source": "Global", "path": "skills/linkedin-api", "files": [{"name": "LICENSE.txt", "is_md": false, "content": "The MIT License (MIT)\n\nCopyright (c) 2026 Maton\n\nPermission is hereby granted, free of charge, to any person obtaining a copy\nof this software and associated documentation files (the \"Software\"), to deal\nin the Software without restriction, including without limitation the rights\nto use, copy, modify, merge, publish, distribute, sublicense, and/or sell\ncopies of the Software, and to permit persons to whom the Software is\nfurnished to do so, subject to the following conditions:\n\nThe above copyright notice and this permission notice shall be included in all\ncopies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR\nIMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,\nFITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE\nAUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER\nLIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,\nOUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE\nSOFTWARE.\n", "binary": false, "truncated": false}, {"name": "SKILL.md", "is_md": true, "content": "---\nname: linkedin\ndescription: |\n  LinkedIn API integration with managed OAuth. Share posts, manage profile, run ads, and access LinkedIn features.\n  Use this skill when users want to share content on LinkedIn, manage ad campaigns, get profile/organization information, or interact with LinkedIn's platform.\n  For other third party apps, use the api-gateway skill (https://clawhub.ai/byungkyu/api-gateway).\n  Requires network access and valid Maton API key.\nmetadata:\n  author: maton\n  version: \"1.0\"\n  clawdbot:\n    emoji: 🧠\n    requires:\n      env:\n        - MATON_API_KEY\n---\n\n# LinkedIn\n\nAccess the LinkedIn API with managed OAuth authentication. Share posts, manage advertising campaigns, retrieve profile and organization information, upload media, and access the Ad Library.\n\n## Quick Start\n\n```bash\n# Get current user profile\npython <<'EOF'\nimport urllib.request, os, json\nreq = urllib.request.Request('https://gateway.maton.ai/linkedin/rest/me')\nreq.add_header('Authorization', f'Bearer {os.environ[\"MATON_API_KEY\"]}')\nreq.add_header('LinkedIn-Version', '202506')\nprint(json.dumps(json.load(urllib.request.urlopen(req)), indent=2))\nEOF\n```\n\n## Base URL\n\n```\nhttps://gateway.maton.ai/linkedin/rest/{resource}\n```\n\nThe gateway proxies requests to `api.linkedin.com` and automatically injects your OAuth token.\n\n## Authentication\n\nAll requests require the Maton API key in the Authorization header:\n\n```\nAuthorization: Bearer $MATON_API_KEY\n```\n\n**Environment Variable:** Set your API key as `MATON_API_KEY`:\n\n```bash\nexport MATON_API_KEY=\"YOUR_API_KEY\"\n```\n\n### Getting Your API Key\n\n1. Sign in or create an account at [maton.ai](https://maton.ai)\n2. Go to [maton.ai/settings](https://maton.ai/settings)\n3. Copy your API key\n\n### Required Headers\n\nLinkedIn REST API requires the version header:\n\n```\nLinkedIn-Version: 202506\n```\n\n## Connection Management\n\nManage your LinkedIn OAuth connections at `https://ctrl.maton.ai`.\n\n### List Connections\n\n```bash\npython <<'EOF'\nimport urllib.request, os, json\nreq = urllib.request.Request('https://ctrl.maton.ai/connections?app=linkedin&status=ACTIVE')\nreq.add_header('Authorization', f'Bearer {os.environ[\"MATON_API_KEY\"]}')\nprint(json.dumps(json.load(urllib.request.urlopen(req)), indent=2))\nEOF\n```\n\n### Create Connection\n\n```bash\npython <<'EOF'\nimport urllib.request, os, json\ndata = json.dumps({'app': 'linkedin'}).encode()\nreq = urllib.request.Request('https://ctrl.maton.ai/connections', data=data, method='POST')\nreq.add_header('Authorization', f'Bearer {os.environ[\"MATON_API_KEY\"]}')\nreq.add_header('Content-Type', 'application/json')\nprint(json.dumps(json.load(urllib.request.urlopen(req)), indent=2))\nEOF\n```\n\n### Get Connection\n\n```bash\npython <<'EOF'\nimport urllib.request, os, json\nreq = urllib.request.Request('https://ctrl.maton.ai/connections/{connection_id}')\nreq.add_header('Authorization', f'Bearer {os.environ[\"MATON_API_KEY\"]}')\nprint(json.dumps(json.load(urllib.request.urlopen(req)), indent=2))\nEOF\n```\n\n**Response:**\n```json\n{\n  \"connection\": {\n    \"connection_id\": \"ba10eb9e-b590-4e95-8c2e-3901ff94642a\",\n    \"status\": \"ACTIVE\",\n    \"creation_time\": \"2026-02-07T08:00:24.372659Z\",\n    \"last_updated_time\": \"2026-02-07T08:05:16.609085Z\",\n    \"url\": \"https://connect.maton.ai/?session_token=...\",\n    \"app\": \"linkedin\",\n    \"metadata\": {}\n  }\n}\n```\n\nOpen the returned `url` in a browser to complete OAuth authorization.\n\n### Delete Connection\n\n```bash\npython <<'EOF'\nimport urllib.request, os, json\nreq = urllib.request.Request('https://ctrl.maton.ai/connections/{connection_id}', method='DELETE')\nreq.add_header('Authorization', f'Bearer {os.environ[\"MATON_API_KEY\"]}')\nprint(json.dumps(json.load(urllib.request.urlopen(req)), indent=2))\nEOF\n```\n\n### Specifying Connection\n\nIf you have multiple LinkedIn connections, specify which one to use with the `Maton-Connection` header:\n\n```bash\npython <<'EOF'\nimport urllib.request, os, json\nreq = urllib.request.Request('https://gateway.maton.ai/linkedin/rest/me')\nreq.add_header('Authorization', f'Bearer {os.environ[\"MATON_API_KEY\"]}')\nreq.add_header('LinkedIn-Version', '202506')\nreq.add_header('Maton-Connection', 'ba10eb9e-b590-4e95-8c2e-3901ff94642a')\nprint(json.dumps(json.load(urllib.request.urlopen(req)), indent=2))\nEOF\n```\n\nIf omitted, the gateway uses the default (oldest) active connection.\n\n## API Reference\n\n### Profile\n\n#### Get Current User Profile\n\n```bash\nGET /linkedin/rest/me\nLinkedIn-Version: 202506\n```\n\n**Example:**\n```bash\npython <<'EOF'\nimport urllib.request, os, json\nreq = urllib.request.Request('https://gateway.maton.ai/linkedin/rest/me')\nreq.add_header('Authorization', f'Bearer {os.environ[\"MATON_API_KEY\"]}')\nreq.add_header('LinkedIn-Version', '202506')\nprint(json.dumps(json.load(urllib.request.urlopen(req)), indent=2))\nEOF\n```\n\n**Response:**\n```json\n{\n  \"firstName\": {\n    \"localized\": {\"en_US\": \"John\"},\n    \"preferredLocale\": {\"country\": \"US\", \"language\": \"en\"}\n  },\n  \"localizedFirstName\": \"John\",\n  \"lastName\": {\n    \"localized\": {\"en_US\": \"Doe\"},\n    \"preferredLocale\": {\"country\": \"US\", \"language\": \"en\"}\n  },\n  \"localizedLastName\": \"Doe\",\n  \"id\": \"yrZCpj2Z12\",\n  \"vanityName\": \"johndoe\",\n  \"localizedHeadline\": \"Software Engineer at Example Corp\",\n  \"profilePicture\": {\n    \"displayImage\": \"urn:li:digitalmediaAsset:C4D00AAAAbBCDEFGhiJ\"\n  }\n}\n```\n\n### Sharing Posts\n\n#### Create a Text Post\n\n```bash\nPOST /linkedin/rest/posts\nContent-Type: application/json\nLinkedIn-Version: 202506\n\n{\n  \"author\": \"urn:li:person:{personId}\",\n  \"lifecycleState\": \"PUBLISHED\",\n  \"visibility\": \"PUBLIC\",\n  \"commentary\": \"Hello LinkedIn! This is my first API post.\",\n  \"distribution\": {\n    \"feedDistribution\": \"MAIN_FEED\"\n  }\n}\n```\n\n**Response:** `201 Created` with `x-restli-id` header containing the post URN.\n\n#### Create an Article/URL Share\n\n```bash\nPOST /linkedin/rest/posts\nContent-Type: application/json\nLinkedIn-Version: 202506\n\n{\n  \"author\": \"urn:li:person:{personId}\",\n  \"lifecycleState\": \"PUBLISHED\",\n  \"visibility\": \"PUBLIC\",\n  \"commentary\": \"Check out this great article!\",\n  \"distribution\": {\n    \"feedDistribution\": \"MAIN_FEED\"\n  },\n  \"content\": {\n    \"article\": {\n      \"source\": \"https://example.com/article\",\n      \"title\": \"Article Title\",\n      \"description\": \"Article description here\"\n    }\n  }\n}\n```\n\n#### Create an Image Post\n\nFirst, initialize the image upload, then upload the image, then create the post.\n\n**Step 1: Initialize Image Upload**\n```bash\nPOST /linkedin/rest/images?action=initializeUpload\nContent-Type: application/json\nLinkedIn-Version: 202506\n\n{\n  \"initializeUploadRequest\": {\n    \"owner\": \"urn:li:person:{personId}\"\n  }\n}\n```\n\n**Response:**\n```json\n{\n  \"value\": {\n    \"uploadUrlExpiresAt\": 1770541529250,\n    \"uploadUrl\": \"https://www.linkedin.com/dms-uploads/...\",\n    \"image\": \"urn:li:image:D4D10AQH4GJAjaFCkHQ\"\n  }\n}\n```\n\n**Step 2: Upload Image Binary**\n```bash\nPUT {uploadUrl from step 1}\nContent-Type: image/png\n\n{binary image data}\n```\n\n**Step 3: Create Image Post**\n```bash\nPOST /linkedin/rest/posts\nContent-Type: application/json\nLinkedIn-Version: 202506\n\n{\n  \"author\": \"urn:li:person:{personId}\",\n  \"lifecycleState\": \"PUBLISHED\",\n  \"visibility\": \"PUBLIC\",\n  \"commentary\": \"Check out this image!\",\n  \"distribution\": {\n    \"feedDistribution\": \"MAIN_FEED\"\n  },\n  \"content\": {\n    \"media\": {\n      \"id\": \"urn:li:image:D4D10AQH4GJAjaFCkHQ\",\n      \"title\": \"Image Title\"\n    }\n  }\n}\n```\n\n### Visibility Options\n\n| Value | Description |\n|-------|-------------|\n| `PUBLIC` | Viewable by anyone on LinkedIn |\n| `CONNECTIONS` | Viewable by 1st-degree connections only |\n\n### Share Media Categories\n\n| Value | Description |\n|-------|-------------|\n| `NONE` | Text-only post |\n| `ARTICLE` | URL/article share |\n| `IMAGE` | Image post |\n| `VIDEO` | Video post |\n\n### Ad Library (Public Data)\n\nThe Ad Library API provides access to public advertising data on LinkedIn. These endpoints use the REST API with version headers.\n\n#### Required Headers for Ad Library\n\n```\nLinkedIn-Version: 202506\n```\n\n#### Search Ads\n\n```bash\nGET /linkedin/rest/adLibrary?q=criteria&keyword={keyword}\n```\n\nQuery parameters:\n- `keyword` (string): Search ad content (multiple keywords use AND logic)\n- `advertiser` (string): Search by advertiser name\n- `countries` (array): Filter by ISO 3166-1 alpha-2 country codes\n- `dateRange` (object): Filter by served dates\n- `start` (integer): Pagination offset\n- `count` (integer): Results per page (max 25)\n\n**Example - Search ads by keyword:**\n```bash\nGET /linkedin/rest/adLibrary?q=criteria&keyword=linkedin\n```\n\n**Example - Search ads by advertiser:**\n```bash\nGET /linkedin/rest/adLibrary?q=criteria&advertiser=microsoft\n```\n\n**Response:**\n```json\n{\n  \"paging\": {\n    \"start\": 0,\n    \"count\": 10,\n    \"total\": 11619543,\n    \"links\": [...]\n  },\n  \"elements\": [\n    {\n      \"adUrl\": \"https://www.linkedin.com/ad-library/detail/...\",\n      \"details\": {\n        \"advertiser\": {...},\n        \"adType\": \"TEXT_AD\",\n        \"targeting\": {...},\n        \"statistics\": {\n          \"firstImpressionDate\": 1704067200000,\n          \"latestImpressionDate\": 1706745600000,\n          \"impressionsFrom\": 1000,\n          \"impressionsTo\": 5000\n        }\n      },\n      \"isRestricted\": false\n    }\n  ]\n}\n```\n\n#### Search Job Postings\n\n```bash\nGET /linkedin/rest/jobLibrary?q=criteria&keyword={keyword}\n```\n\n**Note:** Job Library requires version `202506`.\n\nQuery parameters:\n- `keyword` (string): Search job content\n- `organization` (string): Filter by company name\n- `countries` (array): Filter by country codes\n- `dateRange` (object): Filter by posting dates\n- `start` (integer): Pagination offset\n- `count` (integer): Results per page (max 24)\n\n**Example:**\n```bash\nGET /linkedin/rest/jobLibrary?q=criteria&keyword=software&organization=google\n```\n\n**Response includes:**\n- `jobPostingUrl`: Link to job listing\n- `jobDetails`: Title, location, description, salary, benefits\n- `statistics`: Impression data\n\n### Marketing API (Advertising)\n\nThe Marketing API provides access to LinkedIn's advertising platform. These endpoints use the versioned REST API.\n\n**Ad Account Allowlist:** If you receive a 403 Forbidden error when creating campaigns with the message \"Your application is not configured to access the related advertiser account(s)\", your ad account ID needs to be added to Maton's allowlist. Contact [support@maton.ai](mailto:support@maton.ai) with your ad account ID to request access.\n\n#### Required Headers for Marketing API\n\n```\nLinkedIn-Version: 202506\n```\n\n#### List Ad Accounts\n\n```bash\nGET /linkedin/rest/adAccounts?q=search\n```\n\nReturns all ad accounts accessible by the authenticated user.\n\n**Response:**\n```json\n{\n  \"paging\": {\n    \"start\": 0,\n    \"count\": 10,\n    \"links\": []\n  },\n  \"elements\": [\n    {\n      \"id\": 123456789,\n      \"name\": \"My Ad Account\",\n      \"status\": \"ACTIVE\",\n      \"type\": \"BUSINESS\",\n      \"currency\": \"USD\",\n      \"reference\": \"urn:li:organization:12345\"\n    }\n  ]\n}\n```\n\n#### Get Ad Account\n\n```bash\nGET /linkedin/rest/adAccounts/{adAccountId}\n```\n\n#### Create Ad Account\n\n```bash\nPOST /linkedin/rest/adAccounts\nContent-Type: application/json\n\n{\n  \"name\": \"New Ad Account\",\n  \"currency\": \"USD\",\n  \"reference\": \"urn:li:organization:{orgId}\",\n  \"type\": \"BUSINESS\"\n}\n```\n\n#### Update Ad Account\n\n```bash\nPOST /linkedin/rest/adAccounts/{adAccountId}\nContent-Type: application/json\nX-RestLi-Method: PARTIAL_UPDATE\n\n{\n  \"patch\": {\n    \"$set\": {\n      \"name\": \"Updated Account Name\"\n    }\n  }\n}\n```\n\n#### List Campaign Groups\n\nCampaign groups are nested under ad accounts:\n\n```bash\nGET /linkedin/rest/adAccounts/{adAccountId}/adCampaignGroups\n```\n\n#### Create Campaign Group\n\n```bash\nPOST /linkedin/rest/adAccounts/{adAccountId}/adCampaignGroups\nContent-Type: application/json\n", "binary": false, "truncated": true}, {"name": "_meta.json", "is_md": false, "content": "{\n  \"ownerId\": \"kn75240wq8bnv2qm2xgry748jd80b9r0\",\n  \"slug\": \"linkedin-api\",\n  \"version\": \"1.0.6\",\n  \"publishedAt\": 1775771166812\n}", "binary": false, "truncated": false}], "subdirs": []}, {"name": "linkedin-search", "source": "Global", "path": "skills/linkedin-search", "files": [{"name": "SKILL.md", "is_md": true, "content": "---\nname: linkedin-search\ndescription: Search LinkedIn via AnySite MCP (mcporter) — posts, profiles, companies, jobs. Use when agents need to find people, search posts by keyword, look up companies, or explore LinkedIn content. Covers the full pipeline: discover → execute → get_page, with anti-529 rules and credit cost awareness.\nmetadata:\n  openclaw:\n    emoji: 🔍\n    requires:\n      bins: [mcporter]\n      config: [skills.entries.linkedin-search]\n---\n\n# LinkedIn Search via AnySite MCP\n\nUtilise `mcporter` pour interroger LinkedIn à travers le MCP AnySite. Tous les agents ont la config dans `config/mcporter.json`.\n\n## Quick start\n\n```bash\ncd ~/.openclaw/workspace && mcporter call anysite.execute source=linkedin category=search endpoint=search_posts 'params={\"keywords\":\"agents IA entreprise\",\"count\":5,\"sort\":\"recent\"}'\n```\n\n## Pipeline standard\n\nToujours suivre cet ordre pour éviter les 529 :\n\n1. **discover** → trouver le bon endpoint et ses paramètres\n2. **execute** → avec `count` réduit (3-10 max)\n3. **get_page** → paginer si besoin (utiliser le `cache_key` retourné)\n\nNe jamais tout faire en un seul appel lourd.\n\n## Endpoints principaux\n\n| Endpoint | Usage | Coût |\n|---|---|---|\n| `linkedin/search/posts` | Rechercher des posts par mot-clé | 1 crédit / 3 résultats |\n| `linkedin/search/users` | Trouver un profil par nom | 1 crédit / 10 résultats |\n| `linkedin/user` | Détail d'un profil (URN ou alias) | 1-9 crédits |\n| `linkedin/user/posts` | Posts d'un utilisateur | 1 crédit / 3 résultats |\n| `linkedin/company/posts` | Posts d'une entreprise | 1 crédit / 10 résultats |\n| `linkedin/search/companies` | Rechercher une entreprise | — |\n\n## Règles anti-529\n\n- `count` maximum : 3-10 par appel, jamais 100\n- Pipeline : search → user → posts (ne pas empiler les appels)\n- Cibler avec `first_name + last_name + company_keywords` quand possible\n- Si 529 : attendre 30-60s, relancer avec un lot plus petit\n- Éviter `sn_search/users` (150 crédits/100 résultats) et `company/employees` (150 crédits/100 résultats)\n\n## Timeout\n\nLes appels LinkedIn peuvent prendre >60s. Utiliser :\n\n```bash\nmcporter call --timeout 180000 anysite.execute ...\n# ou\nMCPORTER_CALL_TIMEOUT=180000 mcporter call anysite.execute ...\n```\n\n## Grille complète des coûts\n\nVoir `references/costs.md`.\n", "binary": false, "truncated": false}], "subdirs": [{"name": "references", "files": [{"name": "costs.md", "is_md": true, "content": "# Coûts LinkedIn — AnySite MCP\n\n## Profils\n\n| Endpoint | Crédits | Notes |\n|---|---|---|\n| `linkedin/user` | 1-9 | Selon champs demandés (with_experience, with_skills, etc.) |\n| `linkedin/user/email` | 1 | Email d'un profil |\n| `linkedin/user/posts` | 1 / 3 résultats | Posts d'un utilisateur |\n| `linkedin/user/skills` | 1 | Compétences |\n| `linkedin/user/experience` | 1 | Expérience pro |\n\n## Recherche\n\n| Endpoint | Crédits | Notes |\n|---|---|---|\n| `linkedin/search/users` | 1 / 10 résultats | Recherche de profils |\n| `linkedin/search/posts` | 1 / 3 résultats | Recherche de posts |\n| `linkedin/search/companies` | 1 | Recherche d'entreprises |\n| `linkedin/search/jobs` | 1 | Recherche d'offres |\n\n## Entreprises\n\n| Endpoint | Crédits | Notes |\n|---|---|---|\n| `linkedin/company` | 1 | Détail entreprise |\n| `linkedin/company/posts` | 1 / 10 résultats | Posts d'entreprise |\n\n## ⚠️ Éviter (coûteux)\n\n| Endpoint | Crédits | Pourquoi éviter |\n|---|---|---|\n| `linkedin/sn_search/users` | 150 / 100 résultats | Très cher, utiliser `search/users` |\n| `linkedin/company/employees` | 150 / 100 résultats | Très cher |\n| `linkedin/user/find_email_by_url` | 50 | Très cher, utiliser `user/email` |\n", "binary": false, "truncated": false}], "subdirs": []}]}, {"name": "openclaw-cli", "source": "Global", "path": "skills/openclaw-cli", "files": [{"name": "README.md", "is_md": true, "content": "# OpenClaw CLI Skill\n\nA Codex skill for operating and troubleshooting the OpenClaw CLI safely and quickly.\n\nThis skill helps route requests to the correct `openclaw` command family, apply profile isolation correctly (`--dev`, `--profile`), and verify outcomes after each operation.\n\n## Highlights\n\n- Command-family routing for setup, runtime, channels, messaging, agents, models, plugins, and system health.\n- Built-in triage flow for \"OpenClaw not working\" incidents.\n- Safety-first guidance for destructive commands (`reset`, `uninstall`, `--force`).\n- Verification-first workflow (`status`, `health`, `doctor`, `--json` when available).\n\n## Command Coverage\n\n- Runtime and services: `gateway`, `daemon`, `node`, `nodes`\n- Diagnostics: `status`, `health`, `doctor`, `logs`\n- Messaging and channels: `channels`, `message`, `pairing`, `devices`, `qr`\n- Agent workflows: `agent`, `agents`, `skills`\n- Setup and config: `setup`, `configure`, `config`, `onboard`\n- Extensions and system: `plugins`, `models`, `system`, `update`\n- Security and policy: `security`, `approvals`, `sandbox`\n\n## Installation\n\nClone this repo into your Codex skills directory:\n\n```bash\nmkdir -p ~/.codex/skills\ngit clone https://github.com/ramensushi2026/openclaw-cli-skill.git ~/.codex/skills/openclaw-cli\n```\n\nIf you already cloned it elsewhere, copy the folder so the final path is:\n\n```text\n~/.codex/skills/openclaw-cli\n```\n\n## Usage\n\nAsk Codex with the skill name:\n\n```text\nUse $openclaw-cli to diagnose why my channels are disconnected.\nUse $openclaw-cli to send a WhatsApp message from the dev profile.\nUse $openclaw-cli to restart gateway and verify health.\n```\n\n## Safety Model\n\nThe skill is designed to avoid accidental destructive actions:\n\n- Confirms intent before `reset`, `uninstall`, or forceful flows.\n- Prefers diagnostics before restarts.\n- Keeps profile context consistent across a workflow.\n- Uses explicit post-checks after each operation.\n\n## Repository Structure\n\n- `SKILL.md`: Skill definition, workflow, triage sequence, and guardrails.\n- `references/command-map.md`: OpenClaw command routing, recipes, and caution commands.\n- `agents/openai.yaml`: Agent-facing display metadata and prompt defaults.\n\n## References\n\n- OpenClaw CLI docs: https://docs.openclaw.ai/cli\n", "binary": false, "truncated": false}, {"name": "SKILL.md", "is_md": true, "content": "---\nname: openclaw-cli\ndescription: Operate and troubleshoot the OpenClaw CLI across setup, gateway/node lifecycle, channel login, messaging, agent turns, models, plugins, and system health. Use when asked to choose, run, debug, or explain `openclaw` commands, global flags (`--dev`, `--profile`), or command families such as `gateway`, `agent`, `channels`, `message`, `doctor`, `status`, and `update`.\n---\n\n# OpenClaw CLI\n\nRun OpenClaw commands safely and efficiently. Choose the right command family, execute with the correct profile context, and verify postconditions.\n\n## Execution Workflow\n\n1. Clarify the target state.\nAsk what should change and what must remain untouched.\n\n2. Select runtime scope first.\nUse default profile unless isolation is requested. Use:\n- `openclaw --dev ...` for isolated dev state under `~/.openclaw-dev`.\n- `openclaw --profile <name> ...` for named isolated state under `~/.openclaw-<name>`.\n\n3. Choose the command family.\nUse `references/command-map.md` to route the request quickly.\n\n4. Expand command details before running risky operations.\nRun `openclaw <command> --help` for starred families and confirm flags.\n\n5. Prefer machine-readable output when automation is needed.\nUse `--json` where available, then parse/verify.\n\n6. Verify outcomes explicitly.\nCheck with `openclaw status`, `openclaw health`, `openclaw nodes status --json`, or command-specific follow-up.\n\n## Safety Rules\n\n- Require explicit user confirmation before `reset`, `uninstall`, destructive `--force` flows, or credential-clearing operations.\n- Prefer non-destructive diagnostics first: `status`, `health`, `doctor`, `logs`.\n- Keep profile usage consistent across a workflow. Do not mix default and `--dev`/`--profile` commands accidentally.\n- For gateway issues, diagnose before restart unless restart is explicitly requested.\n\n## Triage Sequence\n\nFor generic \"OpenClaw not working\" issues:\n1. Run `openclaw status`.\n2. Run `openclaw health`.\n3. Run `openclaw doctor`.\n4. Check `openclaw gateway ...`, `openclaw node ...`, or `openclaw nodes ...` based on where failure appears.\n5. Escalate to targeted commands in `references/command-map.md`.\n\n## Resources\n\n- `references/command-map.md`: Command families, routing guidance, and practical recipes.\n", "binary": false, "truncated": false}, {"name": "_meta.json", "is_md": false, "content": "{\n  \"ownerId\": \"kn75t1drpy8q5r6nkzh1cx3jk581fwen\",\n  \"slug\": \"openclaw-cli\",\n  \"version\": \"1.0.0\",\n  \"publishedAt\": 1771600704235\n}", "binary": false, "truncated": false}], "subdirs": [{"name": "agents", "files": [{"name": "openai.yaml", "is_md": false, "content": "interface:\n  display_name: \"OpenClaw CLI\"\n  short_description: \"Run and troubleshoot OpenClaw CLI workflows\"\n  default_prompt: \"Use $openclaw-cli to pick and run the right OpenClaw command for my task.\"\n", "binary": false, "truncated": false}], "subdirs": []}, {"name": "references", "files": [{"name": "command-map.md", "is_md": true, "content": "# OpenClaw CLI Command Map\n\n## Table of Contents\n\n- Global flags\n- Command routing quick map\n- Command families\n- Common recipes\n- Caution commands\n\n## Global Flags\n\n- `--dev`: Use dev profile and isolate under `~/.openclaw-dev`; default gateway port `19001`.\n- `--profile <name>`: Isolate state/config under `~/.openclaw-<name>`.\n- `--no-color`: Disable ANSI colors for logs/automation.\n- `-h`, `--help`: Show help.\n- `-V`, `--version`: Print version.\n\nPrefer choosing profile flags before the command family:\n\n```bash\nopenclaw --dev status\nopenclaw --profile staging gateway\n```\n\n## Command Routing Quick Map\n\n- Run a single agent turn: `agent`\n- Manage isolated agent runtimes: `agents`\n- Diagnose health: `status`, `health`, `doctor`, `logs`\n- Operate gateway runtime: `gateway`, `daemon`\n- Operate headless node service: `node`, `nodes`\n- Manage channel auth/connectivity: `channels`, `pairing`, `devices`, `qr`\n- Send/read messages: `message`\n- Model discovery/config: `models`\n- Config/setup/onboarding: `setup`, `configure`, `config`, `onboard`\n- Plugin/extension management: `plugins`\n- Scheduled jobs: `cron`\n- Security/audits: `security`, `approvals`, `sandbox`\n- Live docs lookup: `docs`\n- Open Control UI: `dashboard`, `tui`\n- System/presence/events: `system`\n- Local data lifecycle: `reset`, `uninstall`, `update`\n\nFor starred families, inspect subcommands first:\n\n```bash\nopenclaw <family> --help\n```\n\n## Command Families\n\n- `acp *`: Agent Control Protocol tooling.\n- `agent`: Execute one agent turn via Gateway.\n- `agents *`: Manage isolated agents, auth, routing, workspaces.\n- `approvals *`: Manage exec approvals.\n- `browser *`: Manage dedicated browser (Chrome/Chromium).\n- `channels *`: Manage chat channel connections.\n- `clawbot *`: Legacy command aliases.\n- `completion`: Generate shell completions.\n- `config *`: Non-interactive config helper commands.\n- `configure`: Interactive setup wizard.\n- `cron *`: Manage scheduler jobs.\n- `daemon *`: Legacy alias for gateway service control.\n- `dashboard`: Open Control UI with current token.\n- `devices *`: Device pairing and token management.\n- `directory *`: Lookup contact/group IDs for channels.\n- `dns *`: DNS helpers for wide-area discovery.\n- `docs`: Search live OpenClaw docs.\n- `doctor`: Run health checks and quick fixes.\n- `gateway *`: Run/inspect/query the WebSocket Gateway.\n- `health`: Fetch health from running gateway.\n- `hooks *`: Manage internal agent hooks.\n- `logs`: Tail gateway file logs via RPC.\n- `memory *`: Search/reindex memory files.\n- `message *`: Send/read/manage messages.\n- `models *`: Discover/scan/configure models.\n- `node *`: Run/manage headless node host service.\n- `nodes *`: Manage gateway-owned node pairing and commands.\n- `onboard`: Interactive onboarding for gateway/workspace/skills.\n- `pairing *`: Secure DM pairing flow.\n- `plugins *`: Manage plugins/extensions.\n- `qr`: Generate iOS pairing QR/setup code.\n- `reset`: Reset local con
